// ADVISOR TAB UI
// ============================================================
function AdvisorTab({
  purchases, harvestLogs, laborLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills,
  areas, schedules, breeds, allTasks, supervisors, diagnoses, inventoryAlerts,
  openingCash, recurringObligations, cashflowSettings, forecastOverrides,
}) {
  const mobile = useIsMobile();
  const [priceLog, setPriceLog] = useState([]);
  const [nfaFloor, setNfaFloor] = useState(null);
  const [categoryFilter, setCategoryFilter] = useState('all');
  const [dismissed, setDismissed] = usePersistedState('rfops-advisor-dismissed', {});

  useEffect(() => {
    fetch('/api/log').then(r => r.ok ? r.json() : null).then(j => setPriceLog((j && j.entries) || [])).catch(() => {});
    fetch('/api/prices/floor').then(r => r.ok ? r.json() : null).then(j => setNfaFloor(j && j.nfa)).catch(() => {});
  }, []);

  // Compute cashflow forecast once to feed into rules
  const cf = useMemo(() => computeCashflowForecast({
    openingCash, purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills,
    areas, schedules, breeds, allTasks, priceLog, nfaFloor, recurringObligations,
    settings: cashflowSettings, overrides: forecastOverrides,
  }), [openingCash, purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills, areas, schedules, breeds, allTasks, priceLog, nfaFloor, recurringObligations, cashflowSettings, forecastOverrides]);

  const advisories = useMemo(() => runAdvisoryRules({
    purchases, harvestLogs, laborLogs, supervisors, areas, schedules, breeds, allTasks, diagnoses, priceLog, nfaFloor, inventoryAlerts,
    fertilizerPrices,
    settings: cashflowSettings, cashflowForecast: cf,
  }), [purchases, harvestLogs, laborLogs, supervisors, areas, schedules, breeds, allTasks, diagnoses, priceLog, nfaFloor, inventoryAlerts, fertilizerPrices, cashflowSettings, cf]);

  const filtered = advisories.filter(a => categoryFilter === 'all' || a.category === categoryFilter).filter(a => !dismissed[a.id]);
  const totalImpact = filtered.reduce((s, a) => s + (a.pesoImpact || 0), 0);

  const CATEGORY_META = {
    revenue: { label: "💰 Revenue", color: "#2e7d32", bg: "#e8f5e9" },
    cost:    { label: "📉 Cost",    color: "#1565c0", bg: "#e3f2fd" },
    risk:    { label: "⚠ Risk",    color: "#c62828", bg: "#ffebee" },
    ops:     { label: "🛠 Ops",     color: "#5d4037", bg: "#efebe9" },
  };
  const SEV_BORDER = { high: "#c62828", medium: "#ef6c00", low: "#666" };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

      {/* Header */}
      <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>💡 Farm Advisor</div>
        <div style={{ fontSize:12, color:"#666", marginBottom:10, lineHeight:1.5 }}>
          Recommendations to cut cost and maximize profit, ranked by estimated peso impact. Built from your live data — gets sharper the more you log.
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:10 }}>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {[['all','All','#333'], ['revenue','💰 Revenue','#2e7d32'], ['cost','📉 Cost','#1565c0'], ['risk','⚠ Risk','#c62828'], ['ops','🛠 Ops','#5d4037']].map(([k,l,c]) => (
              <button key={k} onClick={() => setCategoryFilter(k)} style={{
                padding:"6px 12px", borderRadius:16, border:"1px solid",
                background: categoryFilter === k ? c : "white",
                color: categoryFilter === k ? "white" : c,
                borderColor: categoryFilter === k ? c : "#ddd",
                fontSize:11, fontWeight:700, cursor:"pointer"
              }}>{l}</button>
            ))}
          </div>
          {filtered.length > 0 && (
            <div style={{ fontSize:13, color:"#333" }}>
              Total opportunity: <strong style={{ color:"#2e7d32", fontSize:16 }}>₱{Math.round(totalImpact).toLocaleString()}</strong>
            </div>
          )}
        </div>
      </div>

      {/* Recommendations list */}
      {filtered.length === 0 ? (
        <div style={{ background:"white", borderRadius:14, padding:40, boxShadow:"0 1px 6px rgba(0,0,0,.07)", textAlign:"center", color:"#666" }}>
          <div style={{ fontSize:32 }}>✨</div>
          <div style={{ fontSize:14, fontWeight:700, marginTop:6 }}>No recommendations in this category right now</div>
          <div style={{ fontSize:12, color:"#888", marginTop:4 }}>Either you're running things well, or there isn't enough data yet for these rules to fire. Log more purchases, harvests, and tasks to unlock sharper insights.</div>
        </div>
      ) : filtered.map((a, idx) => {
        const cat = CATEGORY_META[a.category] || CATEGORY_META.ops;
        return (
          <div key={a.id} style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)", borderLeft: `5px solid ${SEV_BORDER[a.severity] || '#666'}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", gap:10, flexWrap:"wrap", marginBottom:6 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:0 }}>
                <span style={{ background: cat.bg, color: cat.color, padding:"3px 8px", borderRadius:8, fontSize:10, fontWeight:700, whiteSpace:"nowrap" }}>{cat.label}</span>
                <span style={{ fontSize:10, color:"#999", textTransform:"uppercase", letterSpacing:".05em" }}>{a.severity || 'low'}</span>
                <span style={{ fontSize:10, color:"#999" }}>· {a.horizon}</span>
              </div>
              {a.pesoImpact > 0 && <div style={{ fontWeight:800, fontSize:15, color:"#2e7d32" }}>₱{Math.round(a.pesoImpact).toLocaleString()}</div>}
            </div>
            <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>#{idx + 1} · {a.title}</div>
            <div style={{ fontSize:12, color:"#555", lineHeight:1.5, marginBottom:6 }}>{a.detail}</div>
            {a.evidence && a.evidence.length > 0 && (
              <div style={{ background:"#fafafa", borderRadius:6, padding:"6px 10px", marginBottom:6 }}>
                <div style={{ fontSize:9, fontWeight:700, color:"#888", letterSpacing:".06em", textTransform:"uppercase", marginBottom:3 }}>Evidence from your data</div>
                {a.evidence.map((e, i) => <div key={i} style={{ fontSize:11, color:"#666", padding:"1px 0" }}>· {e}</div>)}
              </div>
            )}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:6 }}>
              <button onClick={() => setDismissed({ ...dismissed, [a.id]: 1 })} style={{ background:"transparent", border:"none", color:"#999", fontSize:11, cursor:"pointer", padding:"4px 8px" }}>Dismiss</button>
            </div>
          </div>
        );
      })}

      {Object.keys(dismissed).length > 0 && (
        <div style={{ textAlign:"center" }}>
          <button onClick={() => setDismissed({})} style={{ background:"transparent", border:"1px solid #ddd", borderRadius:8, padding:"6px 14px", fontSize:11, color:"#666", cursor:"pointer" }}>↺ Restore {Object.keys(dismissed).length} dismissed</button>
        </div>
      )}
    </div>
  );
}

// CASHFLOW TAB — 90-day forecast UI
// ============================================================
function CashflowTab({
  openingCash, setOpeningCash,
  recurringObligations, setRecurringObligations,
  cashflowSettings, setCashflowSettings,
  forecastOverrides,
  purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills,
  areas, schedules, breeds, allTasks,
}) {
  const mobile = useIsMobile();
  const [priceLog, setPriceLog] = useState([]);
  const [nfaFloor, setNfaFloor] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showRecurring, setShowRecurring] = useState(false);
  const [showOpening, setShowOpening] = useState(false);

  // Pull price history once (used for harvest price prediction)
  useEffect(() => {
    fetch('/api/log').then(r => r.ok ? r.json() : null).then(j => setPriceLog((j && j.entries) || [])).catch(() => {});
    fetch('/api/prices/floor').then(r => r.ok ? r.json() : null).then(j => setNfaFloor(j && j.nfa)).catch(() => {});
  }, []);

  const cf = useMemo(() => computeCashflowForecast({
    openingCash, purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills,
    areas, schedules, breeds, allTasks, priceLog, nfaFloor, recurringObligations, settings: cashflowSettings, overrides: forecastOverrides,
  }), [openingCash, purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills, areas, schedules, breeds, allTasks, priceLog, nfaFloor, recurringObligations, cashflowSettings, forecastOverrides]);

  const balanceColor = cf.balanceToday >= 0 ? "#2e7d32" : "#c62828";
  const lowestColor  = cf.lowest.balance >= 0 ? "#2e7d32" : "#c62828";
  const peso = (n) => "₱" + Math.round(n).toLocaleString();

  // Recharts data: balance over time
  const chartData = cf.buckets.map(b => ({
    week: b.label,
    balance: Math.round(b.balance),
    inflow: Math.round(b.netIn),
    outflow: -Math.round(b.netOut),
  }));

  // --- Opening cash form ---
  const saveOpeningCash = (amount, asOf, note) => {
    setOpeningCash({ amount: Number(amount) || 0, asOf: asOf || today, note: note || "" });
    setShowOpening(false);
  };

  // --- Recurring obligations ---
  const addRecurring = (entry) => {
    const id = recurringObligations.length > 0 ? Math.max(...recurringObligations.map(o => o.id || 0)) + 1 : 1;
    setRecurringObligations([...recurringObligations, { ...entry, id, monthlyAmount: Number(entry.monthlyAmount) || 0, dayOfMonth: Number(entry.dayOfMonth) || 1 }]);
  };
  const removeRecurring = (id) => setRecurringObligations(recurringObligations.filter(o => o.id !== id));

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

      {/* ---------- Position card ---------- */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
        <KpiCard label="Cash today" value={peso(cf.balanceToday)} icon="💰" color={balanceColor} sub={`Opening ${peso((openingCash && openingCash.amount) || 0)} + ${peso(cf.histInflows)} in − ${peso(cf.histOutflows)} out`} />
        <KpiCard label="Low water" value={peso(cf.lowest.balance)} icon={cf.lowest.balance < 0 ? "⚠" : "🛟"} color={lowestColor} sub={cf.lowest.week ? `Week of ${new Date(cf.lowest.weekStart).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })}` : "no projection"} />
        <KpiCard label="Suggested reserve" value={peso(cf.suggestedReserve)} icon="🏦" color="#1565c0" sub="1.5× peak weekly outflow" />
        <KpiCard label="Runway" value={cf.runwayDays != null ? `${cf.runwayDays} days` : "—"} icon="🛣" color="#5d4037" sub="at current 30-day burn" />
      </div>

      {/* ---------- Cash-crunch banner ---------- */}
      {cf.lowest.balance < 0 && (
        <div style={{ background:"#ffebee", borderLeft:"4px solid #c62828", borderRadius:8, padding:"12px 14px", color:"#b71c1c", lineHeight:1.5 }}>
          <div style={{ fontWeight:800, fontSize:14, marginBottom:6 }}>⚠ Cash crunch projected — {new Date(cf.lowest.weekStart).toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric' })}</div>
          <div style={{ fontSize:13, marginBottom:6 }}>Projected balance dips to <strong>{peso(cf.lowest.balance)}</strong>. Need <strong>{peso(Math.abs(cf.lowest.balance))}</strong> additional working capital.</div>
          {cf.suggestions.length > 0 && (
            <ul style={{ margin:"6px 0 0 18px", padding:0, fontSize:12 }}>
              {cf.suggestions.map((s, i) => <li key={i} style={{ marginBottom:3 }}>{s}</li>)}
            </ul>
          )}
        </div>
      )}

      {/* ---------- 90-day balance chart ---------- */}
      <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10, flexWrap:"wrap" }}>
          <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>📈 {cashflowSettings.horizonWeeks}-week balance projection</div>
          <button onClick={() => setShowSettings(!showSettings)} style={{ background:"transparent", border:"1px solid #ddd", borderRadius:6, padding:"4px 10px", fontSize:11, color:"#666", cursor:"pointer" }}>⚙ Settings</button>
        </div>
        {showSettings && (
          <div style={{ background:"#f5f5f0", borderRadius:8, padding:12, marginBottom:12, display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(3, 1fr)", gap:10, fontSize:12 }}>
            <label style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <span style={{ fontWeight:600, color:"#555" }}>Yield confidence factor</span>
              <input type="number" step="0.05" min="0.5" max="1.2" value={cashflowSettings.yieldFactor} onChange={e => setCashflowSettings({ ...cashflowSettings, yieldFactor: Number(e.target.value) })} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
              <span style={{ fontSize:10, color:"#888" }}>Multiplier on breed-rated yield (0.85 = conservative)</span>
            </label>
            <label style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <span style={{ fontWeight:600, color:"#555" }}>Daily wage (₱/worker)</span>
              <input type="number" min="0" step="50" value={cashflowSettings.dailyWage} onChange={e => setCashflowSettings({ ...cashflowSettings, dailyWage: Number(e.target.value) })} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
            </label>
            <label style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <span style={{ fontWeight:600, color:"#555" }}>Forecast horizon (weeks)</span>
              <input type="number" min="4" max="52" value={cashflowSettings.horizonWeeks} onChange={e => setCashflowSettings({ ...cashflowSettings, horizonWeeks: Number(e.target.value) })} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
            </label>
          </div>
        )}
        <div style={{ width:"100%", height: mobile ? 220 : 300 }}>
          <Recharts.ResponsiveContainer>
            <Recharts.ComposedChart data={chartData} margin={{ top:5, right:8, left:8, bottom:5 }}>
              <Recharts.CartesianGrid stroke="#eee" />
              <Recharts.XAxis dataKey="week" tick={{ fontSize:10 }} />
              <Recharts.YAxis tick={{ fontSize:10 }} tickFormatter={v => v >= 1000 ? `₱${Math.round(v/1000)}k` : `₱${v}`} />
              <Recharts.Tooltip formatter={(v) => "₱" + Math.round(v).toLocaleString()} />
              <Recharts.ReferenceLine y={0} stroke="#c62828" strokeDasharray="3 3" />
              <Recharts.Bar dataKey="inflow"  fill="#a5d6a7" name="Inflows"  />
              <Recharts.Bar dataKey="outflow" fill="#ef9a9a" name="Outflows" />
              <Recharts.Line type="monotone" dataKey="balance" stroke="#1565c0" strokeWidth={2.5} dot={{ r: 3 }} name="Running balance" />
            </Recharts.ComposedChart>
          </Recharts.ResponsiveContainer>
        </div>
      </div>

      {/* ---------- Per-area expected profit ---------- */}
      {cf.perAreaProfit.length > 0 && (
        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)", overflowX:"auto" }}>
          <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:10 }}>🌾 Per-area profit forecast</div>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth: mobile ? 600 : "auto" }}>
            <thead><tr style={{ background:"#f5f5f0" }}>
              {["Area","Crop","Harvest","Expected yield","Gross","− Supervisor","− Remaining cost","Net profit","ROI%"].map(h => (
                <th key={h} style={{ padding:"8px 6px", textAlign:"right", fontWeight:700, color:"#666", borderBottom:"2px solid #e0e0e0", fontSize:10, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {cf.perAreaProfit.map(p => (
                <tr key={p.areaId} style={{ borderBottom:"1px solid #f0f0f0" }}>
                  <td style={{ padding:"8px 6px", fontWeight:700, textAlign:"left" }}>{p.areaName}</td>
                  <td style={{ padding:"8px 6px", textAlign:"left", color:"#666" }}>{p.crop} · {p.breed || '—'}</td>
                  <td style={{ padding:"8px 6px", textAlign:"left", whiteSpace:"nowrap" }}>{new Date(p.harvestDate).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right" }}>{Math.round(p.expectedKg/100)/10}t @ ₱{p.pricePerKg.toFixed(2)}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", color:"#2e7d32" }}>{peso(p.gross)}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", color:"#e65100" }}>{peso(p.supervisorShare)}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", color:"#c62828" }}>{peso(p.projectedRemainingCost || 0)}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:800, color: (p.netProfit || 0) >= 0 ? "#2e7d32" : "#c62828" }}>{peso(p.netProfit || 0)}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:700 }}>{p.roiPct != null ? `${p.roiPct.toFixed(0)}%` : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ fontSize:10, color:"#999", marginTop:8 }}>
            Yield × confidence factor ({cashflowSettings.yieldFactor}). Price uses PSA seasonality + NFA floor as bound. Remaining cost = projected outflows from incomplete tasks (inputs + heuristic labor).
          </div>
        </div>
      )}

      {/* ---------- Opening cash + recurring obligations ---------- */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:12 }}>
        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8 }}>
            <div style={{ fontWeight:800, fontSize:13, color:"#333" }}>💵 Opening cash position</div>
            <button onClick={() => setShowOpening(!showOpening)} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>{showOpening ? "Cancel" : "Update"}</button>
          </div>
          <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>Your bank balance + cash on hand on the date below. All historical purchases, labor, and harvests are added/subtracted from this to derive today's position.</div>
          <div style={{ display:"flex", gap:14, alignItems:"baseline" }}>
            <div style={{ fontSize:22, fontWeight:800, color:"#1b5e20" }}>{peso((openingCash && openingCash.amount) || 0)}</div>
            <div style={{ fontSize:11, color:"#888" }}>as of {openingCash && openingCash.asOf ? new Date(openingCash.asOf).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) : '—'}</div>
          </div>
          {openingCash && openingCash.note && <div style={{ fontSize:11, color:"#666", fontStyle:"italic", marginTop:4 }}>{openingCash.note}</div>}
          {showOpening && (
            <OpeningCashForm initial={openingCash} onSave={saveOpeningCash} onCancel={() => setShowOpening(false)} />
          )}
        </div>

        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:8 }}>
            <div style={{ fontWeight:800, fontSize:13, color:"#333" }}>📅 Recurring obligations ({recurringObligations.length})</div>
            <button onClick={() => setShowRecurring(!showRecurring)} style={{ background:"#1565c0", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>{showRecurring ? "Cancel" : "+ Add"}</button>
          </div>
          <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>Fixed monthly outflows: loan payments, salaries, rent, insurance. Posted on the day of each month in the forecast.</div>
          {recurringObligations.length === 0 && !showRecurring && <div style={{ fontSize:11, color:"#bbb", padding:"6px 0" }}>None yet — add loan or salary payments if relevant.</div>}
          {recurringObligations.map(ob => (
            <div key={ob.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #f0f0f0", fontSize:12 }}>
              <div>
                <div style={{ fontWeight:600, color:"#333" }}>{ob.name}</div>
                <div style={{ fontSize:10, color:"#888" }}>day {ob.dayOfMonth} of each month{ob.endDate ? ` · until ${ob.endDate}` : ''}</div>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontWeight:700, color:"#c62828" }}>{peso(ob.monthlyAmount)}</span>
                <button onClick={() => removeRecurring(ob.id)} style={{ background:"none", border:"none", color:"#c62828", cursor:"pointer", fontSize:14 }}>×</button>
              </div>
            </div>
          ))}
          {showRecurring && <RecurringForm onAdd={(e) => { addRecurring(e); setShowRecurring(false); }} onCancel={() => setShowRecurring(false)} />}
        </div>
      </div>

      {/* ---------- Detailed weekly events list (collapsible) ---------- */}
      <details style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <summary style={{ fontWeight:800, fontSize:13, color:"#333", cursor:"pointer" }}>📋 Week-by-week breakdown ({cf.buckets.reduce((s,b) => s + b.events.length, 0)} events)</summary>
        <div style={{ marginTop:10, fontSize:12 }}>
          {cf.buckets.map(b => b.events.length > 0 && (
            <div key={b.weekStart} style={{ borderBottom:"1px solid #f0f0f0", padding:"8px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:4 }}>
                <span style={{ fontWeight:700, color:"#1565c0" }}>{new Date(b.weekStart).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })} – {new Date(b.weekEnd).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' })}</span>
                <span style={{ fontSize:11 }}>
                  <span style={{ color:"#2e7d32" }}>+{peso(b.netIn)}</span> / <span style={{ color:"#c62828" }}>−{peso(b.netOut)}</span> · bal <span style={{ fontWeight:700, color: b.balance >= 0 ? "#2e7d32" : "#c62828" }}>{peso(b.balance)}</span>
                </span>
              </div>
              {b.events.sort((a,b) => (a.date||'').localeCompare(b.date||'')).map((e, i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"2px 0 2px 12px", fontSize:11, color:"#666" }}>
                  <span>{new Date(e.date).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })} · {e.label}</span>
                  <span style={{ color: e.kind === 'inflow' ? "#2e7d32" : "#c62828", fontWeight:600 }}>{e.kind === 'inflow' ? '+' : '−'}{peso(e.amount)}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </details>
    </div>
  );
}

function OpeningCashForm({ initial, onSave, onCancel }) {
  const [amount, setAmount] = useState((initial && initial.amount) || 0);
  const [asOf, setAsOf] = useState((initial && initial.asOf) || today);
  const [note, setNote] = useState((initial && initial.note) || "");
  return (
    <div style={{ background:"#f5f5f0", borderRadius:8, padding:12, marginTop:10, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, fontSize:12 }}>
      <label style={{ display:"flex", flexDirection:"column", gap:3 }}>
        <span style={{ fontWeight:600, color:"#555" }}>Amount (₱)</span>
        <input type="number" min="0" value={amount} onChange={e => setAmount(e.target.value)} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6, fontWeight:700 }} />
      </label>
      <label style={{ display:"flex", flexDirection:"column", gap:3 }}>
        <span style={{ fontWeight:600, color:"#555" }}>As of date</span>
        <input type="date" value={asOf} onChange={e => setAsOf(e.target.value)} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <label style={{ display:"flex", flexDirection:"column", gap:3, gridColumn:"span 2" }}>
        <span style={{ fontWeight:600, color:"#555" }}>Note (optional)</span>
        <input value={note} onChange={e => setNote(e.target.value)} placeholder="e.g. ₱45k bank, ₱20k cash on hand, ₱20k mobile money" style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <div style={{ gridColumn:"span 2", display:"flex", gap:8 }}>
        <button onClick={() => onSave(amount, asOf, note)} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:6, padding:"8px 16px", fontWeight:700, cursor:"pointer" }}>Save</button>
        <button onClick={onCancel} style={{ background:"transparent", border:"1px solid #ddd", borderRadius:6, padding:"8px 16px", cursor:"pointer" }}>Cancel</button>
      </div>
    </div>
  );
}

function RecurringForm({ onAdd, onCancel }) {
  const [name, setName] = useState("");
  const [monthlyAmount, setMonthlyAmount] = useState("");
  const [dayOfMonth, setDayOfMonth] = useState(1);
  const [endDate, setEndDate] = useState("");
  const valid = name.trim() && Number(monthlyAmount) > 0;
  return (
    <div style={{ background:"#e3f2fd", borderRadius:8, padding:12, marginTop:10, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, fontSize:12 }}>
      <label style={{ display:"flex", flexDirection:"column", gap:3, gridColumn:"span 2" }}>
        <span style={{ fontWeight:600, color:"#555" }}>Name</span>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. PRDP loan payment" style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <label style={{ display:"flex", flexDirection:"column", gap:3 }}>
        <span style={{ fontWeight:600, color:"#555" }}>Monthly amount (₱)</span>
        <input type="number" min="0" value={monthlyAmount} onChange={e => setMonthlyAmount(e.target.value)} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <label style={{ display:"flex", flexDirection:"column", gap:3 }}>
        <span style={{ fontWeight:600, color:"#555" }}>Day of month</span>
        <input type="number" min="1" max="28" value={dayOfMonth} onChange={e => setDayOfMonth(e.target.value)} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <label style={{ display:"flex", flexDirection:"column", gap:3, gridColumn:"span 2" }}>
        <span style={{ fontWeight:600, color:"#555" }}>End date (optional — for finite loans)</span>
        <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} style={{ padding:"6px 8px", border:"1px solid #ddd", borderRadius:6 }} />
      </label>
      <div style={{ gridColumn:"span 2", display:"flex", gap:8 }}>
        <button onClick={() => valid && onAdd({ name, monthlyAmount, dayOfMonth, endDate: endDate || null })} disabled={!valid} style={{ background: valid ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:6, padding:"8px 16px", fontWeight:700, cursor: valid ? "pointer" : "not-allowed" }}>Add</button>
        <button onClick={onCancel} style={{ background:"transparent", border:"1px solid #ddd", borderRadius:6, padding:"8px 16px", cursor:"pointer" }}>Cancel</button>
      </div>
    </div>
  );
}

function EquipmentTab({ equipment, setEquipment, maintenanceLogs, setMaintenanceLogs, fuelLogs, setFuelLogs, toolInventory, setToolInventory }) {
  const mobile = useIsMobile();
  const [view, setView] = useState("equipment"); // equipment | tools
  const [showAddEquip, setShowAddEquip] = useState(false);
  const [showAddTool, setShowAddTool] = useState(false);
  const [selectedEquip, setSelectedEquip] = useState(null);
  const [showMaint, setShowMaint] = useState(false);
  const [showFuel, setShowFuel] = useState(false);

  const [newEquip, setNewEquip] = useState({ name:"", type:"Tractor", purchaseDate:"", purchaseCost:"", condition:"Good", notes:"" });
  const [newTool, setNewTool] = useState({ name:"", qty:1, condition:"Good", location:"Storage", purchaseDate:"", unitCost:"", notes:"" });
  const [maintEntry, setMaintEntry] = useState({ date: today, type:"Oil Change", cost:"", mechanic:"", notes:"" });
  const [fuelEntry, setFuelEntry] = useState({ date: today, liters:"", costPerLiter:"", hoursOperated:"", notes:"" });

  const equipTypes = ["Tractor", "Hand Tractor", "Water Pump", "Sprayer", "Thresher", "Harvester", "Dryer", "Hauling Vehicle", "Generator", "Other"];
  const maintTypes = ["Oil Change", "Filter Replacement", "Tire/Track Repair", "Engine Overhaul", "Belt Replacement", "Blade Sharpening", "Bearing Replacement", "Electrical Repair", "Hydraulic Repair", "General Service", "Other"];
  const conditions = ["Excellent", "Good", "Fair", "Needs Repair", "Out of Service"];

  const labelStyle = { display:"flex", flexDirection:"column", gap:3, fontSize:11, fontWeight:600, color:"#555" };
  const inputStyle = { padding:"8px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, background:"white" };

  const addEquipment = () => {
    if (!newEquip.name) return;
    setEquipment(prev => [...prev, { ...newEquip, id: Date.now(), purchaseCost: Number(newEquip.purchaseCost) || 0 }]);
    setNewEquip({ name:"", type:"Tractor", purchaseDate:"", purchaseCost:"", condition:"Good", notes:"" });
    setShowAddEquip(false);
  };

  const addTool = () => {
    if (!newTool.name) return;
    setToolInventory(prev => [...prev, { ...newTool, id: Date.now(), qty: Number(newTool.qty) || 1, unitCost: Number(newTool.unitCost) || 0 }]);
    setNewTool({ name:"", qty:1, condition:"Good", location:"Storage", purchaseDate:"", unitCost:"", notes:"" });
    setShowAddTool(false);
  };

  const addMaintenance = () => {
    if (!selectedEquip) return;
    setMaintenanceLogs(prev => [...prev, { ...maintEntry, id: Date.now(), equipId: selectedEquip.id, equipName: selectedEquip.name, cost: Number(maintEntry.cost) || 0 }]);
    setMaintEntry({ date: today, type:"Oil Change", cost:"", mechanic:"", notes:"" });
    setShowMaint(false);
  };

  const addFuel = () => {
    if (!selectedEquip || !fuelEntry.liters) return;
    const liters = Number(fuelEntry.liters) || 0;
    const costPerLiter = Number(fuelEntry.costPerLiter) || 0;
    setFuelLogs(prev => [...prev, { ...fuelEntry, id: Date.now(), equipId: selectedEquip.id, equipName: selectedEquip.name, liters, costPerLiter, totalCost: liters * costPerLiter, hoursOperated: Number(fuelEntry.hoursOperated) || 0 }]);
    setFuelEntry({ date: today, liters:"", costPerLiter:"", hoursOperated:"", notes:"" });
    setShowFuel(false);
  };

  // Summaries
  const totalMaintCost = maintenanceLogs.reduce((s, m) => s + m.cost, 0);
  const totalFuelCost = fuelLogs.reduce((s, f) => s + f.totalCost, 0);
  const totalFuelLiters = fuelLogs.reduce((s, f) => s + f.liters, 0);
  const totalEquipCost = equipment.reduce((s, e) => s + (e.purchaseCost || 0), 0);
  const totalToolCost = toolInventory.reduce((s, t) => s + (t.unitCost || 0) * (t.qty || 1), 0);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      {/* Sub-nav */}
      <div style={{ display:"flex", gap:6 }}>
        {[{k:"equipment",l:"Equipment",icon:"🚜"},{k:"tools",l:"Tool Inventory",icon:"🔧"}].map(v => (
          <button key={v.k} onClick={() => { setView(v.k); setSelectedEquip(null); }} style={{
            flex:1, padding:"10px 14px", borderRadius:10, border: view === v.k ? "2px solid #2e7d32" : "2px solid #e0e0e0",
            background: view === v.k ? "#e8f5e9" : "white", color: view === v.k ? "#2e7d32" : "#888",
            fontWeight:700, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6
          }}>
            <span>{v.icon}</span>{v.l}
          </button>
        ))}
      </div>

      {/* ========== EQUIPMENT VIEW ========== */}
      {view === "equipment" && (
        <>
          {/* Summary Cards */}
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
            <div style={{ background:"linear-gradient(135deg,#e3f2fd,#bbdefb)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#1565c0", textTransform:"uppercase" }}>Equipment</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#0d47a1", marginTop:4 }}>{equipment.length}</div>
              <div style={{ fontSize:10, color:"#1976d2", marginTop:2 }}>₱{totalEquipCost.toLocaleString()} invested</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#e65100", textTransform:"uppercase" }}>Maintenance</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#bf360c", marginTop:4 }}>₱{totalMaintCost.toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#e65100", marginTop:2 }}>{maintenanceLogs.length} records</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#fce4ec,#f8bbd0)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#c62828", textTransform:"uppercase" }}>Fuel Cost</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#b71c1c", marginTop:4 }}>₱{totalFuelCost.toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#c62828", marginTop:2 }}>{totalFuelLiters.toLocaleString()} L total</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#ede7f6,#d1c4e9)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#4527a0", textTransform:"uppercase" }}>Total Equipment Cost</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#311b92", marginTop:4 }}>₱{(totalMaintCost + totalFuelCost).toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#4527a0", marginTop:2 }}>Maintenance + Fuel</div>
            </div>
          </div>

          {/* Equipment List / Detail */}
          {!selectedEquip ? (
            <>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>Equipment Registry</div>
                <button onClick={() => setShowAddEquip(!showAddEquip)} style={{ background: showAddEquip ? "#999" : "#2e7d32", color:"white", border:"none", borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  {showAddEquip ? "Cancel" : "+ Add Equipment"}
                </button>
              </div>

              {showAddEquip && (
                <div style={{ background:"#f5fff5", borderRadius:12, padding:16, border:"1px solid #c8e6c9" }}>
                  <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
                    <label style={labelStyle}>Name / Model
                      <input value={newEquip.name} onChange={e => setNewEquip(p => ({...p, name: e.target.value}))} placeholder="e.g. Kubota L3301" style={inputStyle} />
                    </label>
                    <label style={labelStyle}>Type
                      <select value={newEquip.type} onChange={e => setNewEquip(p => ({...p, type: e.target.value}))} style={inputStyle}>
                        {equipTypes.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </label>
                    <label style={labelStyle}>Condition
                      <select value={newEquip.condition} onChange={e => setNewEquip(p => ({...p, condition: e.target.value}))} style={inputStyle}>
                        {conditions.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </label>
                    <label style={labelStyle}>Purchase Date
                      <input type="date" value={newEquip.purchaseDate} onChange={e => setNewEquip(p => ({...p, purchaseDate: e.target.value}))} style={inputStyle} />
                    </label>
                    <label style={labelStyle}>Purchase Cost (₱)
                      <input type="number" min="0" value={newEquip.purchaseCost} onChange={e => setNewEquip(p => ({...p, purchaseCost: e.target.value}))} placeholder="0" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32" }} />
                    </label>
                    <label style={labelStyle}>Notes
                      <input value={newEquip.notes} onChange={e => setNewEquip(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={inputStyle} />
                    </label>
                  </div>
                  <button onClick={addEquipment} disabled={!newEquip.name} style={{ marginTop:12, background: newEquip.name ? "#2e7d32" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: newEquip.name ? "pointer" : "not-allowed" }}>Save Equipment</button>
                </div>
              )}

              {equipment.length === 0 ? (
                <div style={{ textAlign:"center", padding:30, color:"#aaa", fontSize:13 }}>No equipment registered yet. Add your farm equipment above.</div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:10 }}>
                  {equipment.map(eq => {
                    const eqMaint = maintenanceLogs.filter(m => m.equipId === eq.id);
                    const eqFuel = fuelLogs.filter(f => f.equipId === eq.id);
                    const eqMaintCost = eqMaint.reduce((s, m) => s + m.cost, 0);
                    const eqFuelCost = eqFuel.reduce((s, f) => s + f.totalCost, 0);
                    const condColor = eq.condition === "Excellent" ? "#2e7d32" : eq.condition === "Good" ? "#1565c0" : eq.condition === "Fair" ? "#f57f17" : "#c62828";
                    return (
                      <div key={eq.id} onClick={() => setSelectedEquip(eq)} style={{ background:"white", borderRadius:12, padding:14, border:"1px solid #e0e0e0", cursor:"pointer", transition:"all .15s", boxShadow:"0 1px 4px rgba(0,0,0,.04)" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                          <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>🚜 {eq.name}</div>
                          <span style={{ fontSize:10, fontWeight:700, color: condColor, background: condColor + "18", padding:"2px 8px", borderRadius:6 }}>{eq.condition}</span>
                        </div>
                        <div style={{ fontSize:11, color:"#888", marginBottom:8 }}>{eq.type}{eq.purchaseDate ? ` · Acquired ${fmtDate(eq.purchaseDate)}` : ""}</div>
                        <div style={{ display:"flex", gap:12, fontSize:11 }}>
                          <span>🔧 <strong>{eqMaint.length}</strong> services · ₱{eqMaintCost.toLocaleString()}</span>
                          <span>⛽ <strong>{eqFuel.length}</strong> fills · ₱{eqFuelCost.toLocaleString()}</span>
                        </div>
                        <div style={{ fontSize:10, color:"#bbb", marginTop:6 }}>Tap to view details →</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          ) : (
            /* ===== Equipment Detail View ===== */
            <>
              <button onClick={() => setSelectedEquip(null)} style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:8, padding:"8px 16px", fontSize:12, fontWeight:700, cursor:"pointer", alignSelf:"flex-start", color:"#555" }}>
                ← Back to Equipment List
              </button>

              <div style={{ background:"white", borderRadius:14, padding:16, border:"1px solid #e0e0e0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div>
                    <div style={{ fontWeight:800, fontSize:18, color:"#333" }}>🚜 {selectedEquip.name}</div>
                    <div style={{ fontSize:12, color:"#888" }}>{selectedEquip.type}{selectedEquip.purchaseDate ? ` · Since ${fmtDate(selectedEquip.purchaseDate)}` : ""}</div>
                  </div>
                  <span style={{ fontSize:12, fontWeight:700, color: selectedEquip.condition === "Good" || selectedEquip.condition === "Excellent" ? "#2e7d32" : "#c62828", background: (selectedEquip.condition === "Good" || selectedEquip.condition === "Excellent" ? "#2e7d32" : "#c62828") + "15", padding:"4px 12px", borderRadius:8 }}>{selectedEquip.condition}</span>

// ============================================================
// DEMO DATA GENERATOR (5-10 years of simulated farm operations)
// ============================================================
// Generates a realistic 6-year history (2020-2025) across all 18 synced-state
// keys. EVERY generated record carries _demo:true (objects) or has an id in
// 800000-899999 (arrays) so we can wipe the demo cleanly without touching
// the user's real data. Merge-only — never replaces.
//
// Scale: 5 areas, 60 harvests, ~240 purchases, ~150 labor logs, etc.
// Targets every advisor rule and every tab so QA can see all behaviors.
// ============================================================
function generateDemoData(opts) {
  const today = new Date(opts && opts.today ? opts.today : Date.now());
  const yearsBack = (opts && opts.yearsBack) || 6;
  const D = (offsetDays) => {
    const d = new Date(today); d.setDate(d.getDate() + offsetDays);
    return d.toISOString().slice(0, 10);
  };
  const Diso = (offsetDays) => {
    const d = new Date(today); d.setDate(d.getDate() + offsetDays);
    return d.toISOString();
  };
  // Stable pseudo-random so reruns produce the same dataset
  let seed = 42;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const pick = (arr) => arr[Math.floor(rand() * arr.length)];
  const jitter = (base, pct) => base * (1 + (rand() - 0.5) * 2 * pct);

  // ---- areas ----------------------------------------------------------------
  // Five plots around Santa Maria, Isabela (16.8167, 121.7167) — Kit's actual
  // farm location. Polygons are simple ~hectare-scale rectangles offset by
  // a small lat/lon delta so they don't overlap.
  const FARM = { lat: 16.8167, lon: 121.7167 };
  const polyAt = (dLat, dLon, sizeM) => {
    // sizeM in meters → ~degrees (1 deg lat ≈ 111000m, 1 deg lon at 17°N ≈ 107000m)
    const dy = sizeM / 111000;
    const dx = sizeM / 107000;
    const cy = FARM.lat + dLat, cx = FARM.lon + dLon;
    return [
      [cy + dy, cx - dx], [cy + dy, cx + dx],
      [cy - dy, cx + dx], [cy - dy, cx - dx],
    ];
  };
  const areas = [
    { id: 800001, _demo: true, name: '[DEMO] Plot A · Riverside', ha: 8, managedBy: '[DEMO] Mang Tirso', commissionPct: 10, crop: 'rice', breed: 'NSIC Rc 222', maturity: 114, season: 'Wet 2025', transplantDate: D(-60), status: 'Active',  notes: 'Demo area — irrigated rice', protocol: 'default', plantingMethod: 'transplanting', polygon: polyAt( 0.0020, -0.0030, 140) },
    { id: 800002, _demo: true, name: '[DEMO] Plot B · Main',      ha:12, managedBy: '[DEMO] Aling Carmen', commissionPct: 10, crop: 'rice', breed: 'NSIC Rc 216', maturity: 114, season: 'Wet 2025', transplantDate: D(-72), status: 'Active',  notes: 'Demo area — largest rice plot', protocol: 'default', plantingMethod: 'transplanting', polygon: polyAt( 0.0020,  0.0010, 175) },
    { id: 800003, _demo: true, name: '[DEMO] Plot C · West',      ha: 6, managedBy: '[DEMO] Mang Tirso', commissionPct: 10, crop: 'rice', breed: 'NSIC Rc 160', maturity: 112, season: 'Wet 2025', transplantDate: D(-90), status: 'Active',  notes: 'Demo area — Ka Danny protocol', protocol: 'kadanny', plantingMethod: 'transplanting', polygon: polyAt(-0.0010, -0.0040, 120) },
    { id: 800004, _demo: true, name: '[DEMO] Plot D · Backfield', ha: 5, managedBy: '[DEMO] Boyet',     commissionPct: 12, crop: 'rice', breed: 'NSIC Rc 222', maturity: 114, season: 'Dry 2026', transplantDate: D( 10), status: 'Planning', notes: 'Demo area — planned dry-season (transplant in 10 days so Basal Field event falls in the 14-day batch-buy window)', protocol: 'rice-alt-fert', plantingMethod: 'transplanting', polygon: polyAt(-0.0030, 0.0020, 110) },
    { id: 800005, _demo: true, name: '[DEMO] Plot E · Cornfield', ha: 4, managedBy: '[DEMO] Lito',      commissionPct: 10, crop: 'corn', breed: 'DK 9132',     maturity: 110, season: 'Wet 2025', transplantDate: D(-45), status: 'Active', notes: 'Demo area — yellow hybrid corn', protocol: 'corn-standard',  plantingMethod: 'transplanting', polygon: polyAt(-0.0010, 0.0030, 105) },
  ];

  // ---- supervisors ----------------------------------------------------------
  const supervisors = [
    { id: 800101, _demo: true, name: '[DEMO] Mang Tirso',    commissionPct: 10, notes: 'Long-time supervisor — Plots A, C', phone: '0917-555-0101' },
    { id: 800102, _demo: true, name: '[DEMO] Aling Carmen',  commissionPct: 10, notes: 'Plot B specialist',                  phone: '0917-555-0102' },
    { id: 800103, _demo: true, name: '[DEMO] Boyet',         commissionPct: 12, notes: 'Newer supervisor, dry-season Plot D',phone: '0917-555-0103' },
    { id: 800104, _demo: true, name: '[DEMO] Lito',          commissionPct: 10, notes: 'Corn specialist — Plot E',           phone: '0917-555-0104' },
    { id: 800105, _demo: true, name: '[DEMO] Andoy',         commissionPct: 10, notes: 'Substitute / floats between plots',  phone: '0917-555-0105' },
  ];

  // ---- harvest history (~60 entries: 5 areas × 2 cycles/yr × 6 yrs, less for corn) ----
  const harvestLogs = [];
  const buyersByYear = (yr) => ({ palay: 18 + (yr - 2020) * 0.8, corn: 15 + (yr - 2020) * 0.5 });
  let hId = 800200;
  for (let yr = today.getFullYear() - yearsBack; yr <= today.getFullYear() - 1; yr++) {
    areas.forEach((a, idx) => {
      const isCorn = a.crop === 'corn';
      const cyclesPerYear = isCorn ? 1 : 2; // corn 1, rice 2 (wet + dry)
      for (let c = 0; c < cyclesPerYear; c++) {
        const month = isCorn ? 8 : (c === 0 ? 4 : 10);
        const day   = 5 + Math.floor(rand() * 20);
        const date = `${yr}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const yieldTha = isCorn ? jitter(6.2, 0.15) : jitter(4.8, 0.18);
        const totalKg = Math.round(yieldTha * 1000 * a.ha);
        const bags = Math.round(totalKg / 50);
        const moisture = isCorn ? jitter(14.5, 0.05) : jitter(15.0, 0.08);
        const priceTbl = buyersByYear(yr);
        const buyerPrice = isCorn ? +(jitter(priceTbl.corn, 0.10)).toFixed(2) : +(jitter(priceTbl.palay, 0.10)).toFixed(2);
        harvestLogs.push({
          id: hId++, _demo: true,
          area: a.name, season: c === 0 && !isCorn ? `Dry ${yr}` : `Wet ${yr}`,
          breed: a.breed, date,
          bags, weightPerBag: 50, totalKg,
          moisture: +moisture.toFixed(1),
          buyerPrice, grade: pick(['Premium','Good','Good','Fair']),
          notes: c === 0 ? 'Dry-season harvest' : 'Wet-season harvest',
          yieldPerHa: Math.round(yieldTha * 1000),
        });
      }
    });
  }

  // ---- purchases (~240: 4 per cycle) ----------------------------------------
  const purchases = [];
  let pId = 800400;
  const suppliers = ['[DEMO] Cagayan Agri Supply','[DEMO] Isabela Fertilizer Trading','[DEMO] La Suerte Hardware','[DEMO] Tuguegarao Agro'];
  const fertItems = [
    { item:'14-14-14', basePrice: 1750 },
    { item:'46-0-0',   basePrice: 1500 },
    { item:'0-0-60',   basePrice: 1850 },
    { item:'21-0-0',   basePrice: 1100 },
    { item:'FAA',      basePrice: 350,  unit:'L' },
  ];
  for (let yr = today.getFullYear() - yearsBack; yr <= today.getFullYear(); yr++) {
    for (let m = 0; m < 12; m++) {
      // 2-4 purchases per month

// Count current demo records across all known keys
function countDemoRecords(state) {
  let count = 0;
  Object.values(state || {}).forEach(v => {
    if (Array.isArray(v)) count += v.filter(x => x && x._demo).length;
    else if (v && typeof v === 'object') {
      Object.values(v).forEach(item => {
        if (Array.isArray(item)) count += item.filter(x => x && x._demo).length;
        else if (item && typeof item === 'object' && item._demo) count += 1;
      });
    }
  });
  return count;
}

// FERTILIZER PRICES PANEL
// ============================================================
// Manual snapshot of current fertilizer market prices, keyed by product.
// Used by:
//   • The *-alt-fert protocols to pick the cheapest N source
//   • The FertilizerCalculator inline preview ("at current prices this blend
//     costs ₱X less than 14-14-14")
//   • The C1 cost-spike rule (cross-checks last purchase ₱ vs manual price)
// Auto-suggests starting prices from the user's most recent purchase per item
// so the user doesn't have to type from scratch.
// Tiny SVG sparkline — last 12 price points, newest on the right.
function PriceSparkline({ history, width = 80, height = 24 }) {
  if (!history || history.length < 2) {
    return <span style={{ fontSize:10, color:"#bbb" }}>—</span>;
  }
  // history is newest-first; we want oldest-first for left→right rendering.
  const series = [...history].reverse().map(h => h.pricePerBag);
  const min = Math.min(...series), max = Math.max(...series);
  const range = (max - min) || 1;
  const pts = series.map((v, i) => {
    const x = (i / (series.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = series[series.length - 1], first = series[0];
  const trendUp = last > first;
  const color = trendUp ? "#c62828" : "#2e7d32";
  return (
    <svg width={width} height={height} style={{ verticalAlign:"middle" }}>
      <polyline fill="none" stroke={color} strokeWidth="1.5" points={pts} />
      <circle cx={width} cy={height - ((last - min) / range) * height} r="2" fill={color} />
    </svg>
  );
}

function FertilizerPricesPanel({ fertilizerPrices, setFertilizerPrices, fertilizerPriceHistory, setFertilizerPriceHistory, purchases, mobile }) {
  // Products we accept prices for. Matches FERT_DB keys + FAA.
  const PRICED_ITEMS = ["14-14-14","16-20-0","17-0-17","18-46-0","0-46-0","21-0-0","25-0-0","46-0-0","0-0-60","0-0-50","1-6-16-8","FAA"];
  const today = new Date().toISOString().slice(0, 10);

  // Append a snapshot to history (idempotent per day — replaces today's entry
  // instead of stacking duplicates if you edit twice).
  const snapshot = (item, pricePerBag) => {
    if (!setFertilizerPriceHistory) return;
    setFertilizerPriceHistory(prev => {
      const next = { ...(prev || {}) };
      const arr = [...((prev || {})[item] || [])];
      // Replace today's entry if it exists
      const todayIdx = arr.findIndex(h => h.date === today);
      const entry = { date: today, pricePerBag: Math.round(pricePerBag) };
      if (todayIdx >= 0) arr[todayIdx] = entry;
      else arr.unshift(entry);
      // Keep newest-first, cap at 12 entries
      arr.sort((a, b) => b.date.localeCompare(a.date));
      next[item] = arr.slice(0, 12);
      return next;
    });
  };

  // Last purchase ₱/bag per item (for the "use last purchase" suggestion).
  const lastPurchase = useMemo(() => {
    const out = {};
    (purchases || []).forEach(p => {
      if (!p.item || !p.unitCost) return;
      const dt = p.date || '';
      const perBag = (p.unit === 'bags' || p.unit === 'bag') ? Number(p.unitCost) : Number(p.unitCost) * 50;
      if (!out[p.item] || dt > out[p.item].date) {
        out[p.item] = { date: dt, pricePerBag: perBag, supplier: p.supplier || '' };
      }
    });
    return out;
  }, [purchases]);

  const upd = (item, field, value) => {
    setFertilizerPrices(prev => {
      const next = { ...(prev || {}) };
      const rec = { ...(next[item] || {}) };
      rec[field] = value;
      // Auto-derive the missing of pricePerBag/pricePerKg when one is set.
      if (field === 'pricePerBag' && value !== '' && !isNaN(Number(value))) {
        rec.pricePerKg = Math.round((Number(value) / 50) * 100) / 100;
      }
      if (field === 'pricePerKg' && value !== '' && !isNaN(Number(value))) {
        rec.pricePerBag = Math.round(Number(value) * 50);
      }
      rec.dateUpdated = today;
      next[item] = rec;
      return next;
    });
    // Auto-snapshot to history if we have a positive number
    const v = Number(value);
    if (!isNaN(v) && v > 0) {
      const ppb = field === 'pricePerKg' ? v * 50 : v;
      snapshot(item, ppb);
    }
  };

  const useLastPurchase = (item) => {
    const lp = lastPurchase[item];
    if (!lp) return;
    setFertilizerPrices(prev => {
      const next = { ...(prev || {}) };
      next[item] = {
        ...(next[item] || {}),
        pricePerBag: Math.round(lp.pricePerBag),
        pricePerKg: Math.round((lp.pricePerBag / 50) * 100) / 100,
        dateUpdated: today,
        source: `last purchase ${lp.date}${lp.supplier ? ` · ${lp.supplier}` : ''}`,
      };
      return next;
    });
    snapshot(item, lp.pricePerBag);
  };

  const clearAll = () => {
    if (!confirm('Clear all manually-entered fertilizer prices?')) return;
    setFertilizerPrices({});
  };

  // For each item, derive ₱/kg-N (or P, or K) so user can see which product is
  // actually cheapest per nutrient. Helps justify picking 21-0-0 over urea.
  const FERT_PCT = {
    "14-14-14":   { N: 14, P: 14, K: 14 },
    "16-20-0":    { N: 16, P: 20, K: 0 },
    "17-0-17":    { N: 17, P: 0,  K: 17 },
    "1-6-16-8":   { N: 1,  P: 6,  K: 16 },
    "18-46-0":    { N: 18, P: 46, K: 0 },
    "0-46-0":     { N: 0,  P: 46, K: 0 },
    "21-0-0":     { N: 21, P: 0,  K: 0 },
    "25-0-0":     { N: 25, P: 0,  K: 0 },
    "46-0-0":     { N: 46, P: 0,  K: 0 },
    "0-0-60":     { N: 0,  P: 0,  K: 60 },
    "0-0-50":     { N: 0,  P: 0,  K: 50 },
    "FAA":        { N: 0,  P: 0,  K: 0 },  // foliar, not measured by N-P-K
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ background:"#fff8e1", borderLeft:"4px solid #f9a825", borderRadius:8, padding:"10px 14px", fontSize:11, color:"#5d4037", lineHeight:1.5 }}>
        <strong>💰 Current fertilizer prices.</strong> Enter today's market price per bag (50 kg) — these power the "Alt-Fertilizer" protocols (which pick the cheapest N source automatically) and the inline cost preview on the fertilizer calculator. Click <em>📥 from last purchase</em> to copy a price you already recorded, or just type a fresh one.

        <button onClick={clearAll} style={{ background:"#fff", color:"#c62828", border:"1px solid #ffcdd2", borderRadius:8, padding:"6px 12px", fontSize:11, fontWeight:600, cursor:"pointer" }}>Clear all prices</button>
      </div>
      <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead><tr style={{ background:"#fff8e1" }}>
            {["Product","₱/bag (50kg)","₱/kg","₱/kg of dominant nutrient","Trend (12 entries)","Updated","Source","Last purchase"].map(h => (
              <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#5d4037", borderBottom:"2px solid #ffe082", fontSize:11 }}>{h}</th>

              return (

                      <div style={{ fontSize:10, color:"#888", marginTop:2 }}>N {pct.N || 0} · P {pct.P || 0} · K {pct.K || 0}</div>

                    <input
