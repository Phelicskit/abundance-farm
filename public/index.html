        setNdviInfoLoading(true);
        fetch(`/api/ndvi-info?lat=${center[0].toFixed(4)}&lon=${center[1].toFixed(4)}&days=90&maxcc=60`)
          .then(r => r.json())
          .then(j => setNdviInfo(j))
          .catch(() => setNdviInfo({ error: 'fetch failed' }))
          .finally(() => setNdviInfoLoading(false));
      }
    }).catch(() => setNdviAvailable(false));
  }, [area.id]);   // eslint-disable-line react-hooks/exhaustive-deps

  // Stable refs so the polygon callbacks see the current area.id even
  // though React effects close over stale values during edit mode.
  const areaIdRef = React.useRef(area.id);
  const updateAreaRef = React.useRef(updateArea);
  useEffect(() => { areaIdRef.current = area.id; updateAreaRef.current = updateArea; });

  // Build the map. Rebuild on area-switch so the satellite recenters and the
  // green polygon refreshes.
  useEffect(() => {
    if (!ready || !mapElRef.current) return;
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }

    const center = area.polygon && area.polygon.length > 0
      ? area.polygon[0]
      : [FARM_LAT, FARM_LON];

    const map = L.map(mapElRef.current, { zoomControl:true, tap: true }).setView(center, area.polygon ? 16 : 14);
    mapRef.current = map;

    // ESRI World Imagery — free, no auth required.
    // errorTileUrl: 1x1 transparent gif so failed tiles don't show broken-img.
    // Tile-load errors are logged but don't crash the map.
    const tileLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
      maxZoom: 19,
      errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==',
    });
    tileLayer.on('tileerror', (e) => {
      // Don't spam; first error is enough info to debug.
      if (!tileLayer._loggedError) {
        tileLayer._loggedError = true;
        console.warn('[ParcelMap] tile load failed', e && e.error);
      }
    });
    tileLayer.addTo(map);

    // Render other areas' polygons as faded reference outlines
    (allAreas || []).filter(x => x.id !== area.id && x.polygon && x.polygon.length >= 3).forEach(x => {
      L.polygon(x.polygon, { color: '#888', weight: 1, fillOpacity: 0.05, dashArray: '4,4' })
        .bindTooltip(x.name, { permanent: false, direction: 'top' })
        .addTo(map);
    });

    // Existing polygon for THIS area, if any
    if (area.polygon && area.polygon.length >= 3) {
      const poly = L.polygon(area.polygon, { color: '#2e7d32', weight: 3, fillOpacity: 0.25 });
      poly.addTo(map);
      polygonRef.current = poly;
      try { map.fitBounds(poly.getBounds(), { padding: [20, 20] }); } catch (e) {}
    } else {
      polygonRef.current = null;
      // No polygon yet — try GPS auto-center so we land at the actual field
      // instead of the hardcoded Santa Maria coords. Best-effort only;
      // failures (no permission, no GPS) silently fall back to FARM_LAT/LON.
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (p) => {
            if (!mapRef.current || mapRef.current !== map) return; // remounted; skip
            map.setView([p.coords.latitude, p.coords.longitude], 17);
          },
          () => { /* permission denied or timeout — keep default */ },
          { enableHighAccuracy: true, timeout: 5000, maximumAge: 60000 }
        );
      }
    }

    // FIX BLANK MAP: Leaflet measures the container during init, but the
    // container may not have its final dimensions yet when subTab="map" first
    // renders (React layout settles in the next animation frame). Invalidate
    // size on next paint and again a beat later to force re-measure.
    requestAnimationFrame(() => { try { map.invalidateSize(); } catch (e) {} });
    const t1 = setTimeout(() => { try { map.invalidateSize(); } catch (e) {} }, 250);
    const t2 = setTimeout(() => { try { map.invalidateSize(); } catch (e) {} }, 800);
    // Also re-measure on window resize and orientation change (mobile rotate)
    const onResize = () => { try { map.invalidateSize(); } catch (e) {} };
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);

    setComputedHa(area.polygon ? polygonAreaHa(area.polygon) : 0);
    return () => {
      clearTimeout(t1); clearTimeout(t2);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('orientationchange', onResize);
      // Stop GPS watching if active
      if (gpsWatchIdRef.current != null && navigator.geolocation) {
        try { navigator.geolocation.clearWatch(gpsWatchIdRef.current); } catch (e) {}
        gpsWatchIdRef.current = null;
      }
      map.remove(); mapRef.current = null;
    };
  }, [ready, area.id, area.polygon]);   // eslint-disable-line react-hooks/exhaustive-deps

  // ============================================================
  // GPS LAYER — "you are here" blue dot + accuracy circle
  // ============================================================
  // Render or update the GPS marker whenever gpsPos changes. Uses a circleMarker
  // for the dot and a circle (radius in meters) for accuracy.
  useEffect(() => {
    if (!ready || !mapRef.current) return;
    const map = mapRef.current;
    // Remove old layer
    if (gpsLayerRef.current) {
      try { map.removeLayer(gpsLayerRef.current); } catch (e) {}
      gpsLayerRef.current = null;
    }
    if (!gpsPos) return;
    const group = L.layerGroup();
    L.circle([gpsPos.lat, gpsPos.lon], {
      radius: gpsPos.accuracy || 20,
      color: '#1976d2', weight: 1, fillColor: '#1976d2', fillOpacity: 0.12,
    }).addTo(group);
    L.circleMarker([gpsPos.lat, gpsPos.lon], {
      radius: 7, color: 'white', weight: 2, fillColor: '#1976d2', fillOpacity: 1,
    }).bindTooltip(`You are here · ±${Math.round(gpsPos.accuracy || 0)}m`).addTo(group);
    group.addTo(map);
    gpsLayerRef.current = group;
  }, [gpsPos, ready]);

  // GPS controls: one-shot vs continuous watching
  const startWatchingGPS = () => {
    if (!navigator.geolocation) { setGpsError('Geolocation not supported by this browser.'); return; }
    setGpsError(null);
    if (gpsWatchIdRef.current != null) {
      try { navigator.geolocation.clearWatch(gpsWatchIdRef.current); } catch (e) {}
      gpsWatchIdRef.current = null;
      setGpsWatching(false);
      return;
    }
    setGpsWatching(true);
    gpsWatchIdRef.current = navigator.geolocation.watchPosition(
      (p) => {
        setGpsPos({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy });
        setGpsError(null);
      },
      (err) => {
        setGpsError(err.code === 1 ? 'Permission denied. Enable Location in browser settings.' : err.message);
        setGpsWatching(false);
        gpsWatchIdRef.current = null;
      },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 5000 }
    );
  };

  const dropPinAtGPS = () => {
    if (!navigator.geolocation) { setGpsError('Geolocation not supported.'); return; }
    setGpsBusy(true); setGpsError(null);
    navigator.geolocation.getCurrentPosition(
      (p) => {
        setGpsBusy(false);
        const pt = [p.coords.latitude, p.coords.longitude];
        setGpsPos({ lat: pt[0], lon: pt[1], accuracy: p.coords.accuracy });
        if (mode === 'drawing') {
          // Append to in-progress polygon
          setDrawingPoints(pts => [...pts, pt]);
        } else {
          // Just recenter the map at the GPS position
          if (mapRef.current) mapRef.current.setView(pt, Math.max(mapRef.current.getZoom(), 17));
        }
      },
      (err) => {
        setGpsBusy(false);
        setGpsError(err.code === 1 ? 'Permission denied. Enable Location in browser settings.' : err.message);
      },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
  };

  // ============================================================
  // DRAWING MODE — custom guided flow
  // Each tap on the map appends a point. Markers numbered 1..N show what's
  // been placed. The dashed closing edge previews how the polygon will look
  // once finished. Finish/Undo/Cancel buttons live in the bottom action bar.
  // ============================================================
  const clearDrawLayers = () => {
    drawLayersRef.current.forEach(l => { try { mapRef.current?.removeLayer(l); } catch (e) {} });
    drawLayersRef.current = [];
  };

  // Tap handler — attaches only when in 'drawing' mode.
  useEffect(() => {
    if (!ready || !mapRef.current || mode !== 'drawing') return;
    const map = mapRef.current;
    const onClick = (e) => {
      setDrawingPoints(pts => {
        // Auto-close if the user taps near the first point and we have ≥3
        if (pts.length >= 3) {
          const p0 = pts[0];
          const here = [e.latlng.lat, e.latlng.lng];
          const distMeters = map.distance(L.latLng(p0[0], p0[1]), L.latLng(here[0], here[1]));
          if (distMeters < 8) {
            // signal "close" — handled in the points-render effect via 'closed' flag
            queueMicrotask(() => commitPolygon(pts));
            return pts;
          }
        }
        return [...pts, [e.latlng.lat, e.latlng.lng]];
      });
    };
    map.on('click', onClick);
    map.getContainer().style.cursor = 'crosshair';
    return () => {
      map.off('click', onClick);
      try { map.getContainer().style.cursor = ''; } catch (e) {}
    };
  }, [ready, mode]);   // eslint-disable-line react-hooks/exhaustive-deps

  // Render the in-progress polygon (markers + polyline) whenever drawingPoints changes.
  useEffect(() => {
    if (!ready || !mapRef.current) return;
    const map = mapRef.current;
    clearDrawLayers();
    if (mode !== 'drawing' || drawingPoints.length === 0) return;

    // Numbered corner markers
    drawingPoints.forEach((pt, i) => {
      const isFirst = i === 0;
      const m = L.marker(pt, {
        icon: L.divIcon({
          className: '',
          iconSize: [26, 26],
          iconAnchor: [13, 13],
          html: `<div style="width:26px;height:26px;border-radius:50%;background:${isFirst && drawingPoints.length >= 3 ? '#ff6f00' : '#2e7d32'};color:white;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid white;">${i + 1}</div>`,
        }),
        keyboard: false,
      });
      m.addTo(map);
      drawLayersRef.current.push(m);
    });

    // Solid polyline through the placed points
    if (drawingPoints.length >= 2) {
      const line = L.polyline(drawingPoints, { color: '#2e7d32', weight: 3, opacity: 0.9 });
      line.addTo(map);
      drawLayersRef.current.push(line);
    }
    // Dashed closing edge preview once ≥3 points
    if (drawingPoints.length >= 3) {
      const closer = L.polyline([drawingPoints[drawingPoints.length - 1], drawingPoints[0]], {
        color: '#2e7d32', weight: 3, opacity: 0.6, dashArray: '6,6',
      });
      closer.addTo(map);
      drawLayersRef.current.push(closer);
    }
  }, [drawingPoints, mode, ready]);

  // Commit a polygon (from finish button or auto-close-on-tap-first-corner).
  const commitPolygon = (pts) => {
    if (!pts || pts.length < 3) return;
    // Remove any old committed polygon
    if (polygonRef.current) { try { mapRef.current.removeLayer(polygonRef.current); } catch (e) {} polygonRef.current = null; }
    const poly = L.polygon(pts, { color: '#2e7d32', weight: 3, fillOpacity: 0.25 });
    poly.addTo(mapRef.current);
    polygonRef.current = poly;
    updateArea(area.id, 'polygon', pts);
    setComputedHa(polygonAreaHa(pts));
    setDrawingPoints([]);
    setMode('idle');
    try { mapRef.current.fitBounds(poly.getBounds(), { padding:[20, 20] }); } catch (e) {}
  };

  const cancelDrawing = () => {
    setDrawingPoints([]);
    setMode('idle');
  };
  const undoLastPoint = () => setDrawingPoints(pts => pts.slice(0, -1));
  const deletePolygon = () => {
    if (!confirm('Delete this polygon? You can draw a new one anytime.')) return;
    if (polygonRef.current) { try { mapRef.current.removeLayer(polygonRef.current); } catch (e) {} polygonRef.current = null; }
    updateArea(area.id, 'polygon', null);
    setComputedHa(0);
    setMode('idle');
  };

  // ============================================================
  // EDITING MODE — drag vertex markers on the existing polygon.
  // ============================================================
  useEffect(() => {
    if (!ready || !mapRef.current) return;
    const map = mapRef.current;
    // Always clear previous vertex markers
    editVertexMarkersRef.current.forEach(m => { try { map.removeLayer(m); } catch (e) {} });
    editVertexMarkersRef.current = [];
    if (mode !== 'editing' || !area.polygon || area.polygon.length < 3) return;

    const updatePolygonFromMarkers = () => {
      const pts = editVertexMarkersRef.current.map(m => {
        const ll = m.getLatLng(); return [ll.lat, ll.lng];
      });
      if (polygonRef.current) {
        polygonRef.current.setLatLngs(pts);
      }
      setComputedHa(polygonAreaHa(pts));
      updateArea(area.id, 'polygon', pts);
    };

    area.polygon.forEach(pt => {
      const m = L.marker(pt, {
        draggable: true,
        icon: L.divIcon({
          className: '',
          iconSize: [22, 22],
          iconAnchor: [11, 11],
          html: '<div style="width:22px;height:22px;border-radius:50%;background:#1565c0;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',
        }),
      });
      m.on('drag', updatePolygonFromMarkers);
      m.on('dragend', updatePolygonFromMarkers);
      m.addTo(map);
      editVertexMarkersRef.current.push(m);
    });
  }, [mode, ready, area.polygon, area.id]);   // eslint-disable-line react-hooks/exhaustive-deps

  // NDVI overlay layer
  useEffect(() => {
    if (!ready || !mapRef.current) return;
    const map = mapRef.current;
    if (map._ndviLayer) { map.removeLayer(map._ndviLayer); map._ndviLayer = null; }
    if (showNdvi && ndviAvailable) {
      map._ndviLayer = L.tileLayer('/api/ndvi-tile?z={z}&x={x}&y={y}', {
        attribution: 'NDVI © Sentinel-2 via Sentinel Hub',
        opacity: 0.7, maxZoom: 18,
      }).addTo(map);
    }
  }, [showNdvi, ndviAvailable, ready]);

  const recordedHa = Number(area.ha) || 0;
  const haDiff = computedHa > 0 && recordedHa > 0 ? Math.abs(computedHa - recordedHa) / recordedHa : 0;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

      {/* Header / actions */}
      <div style={{ background:"white", borderRadius:12, padding: mobile ? 12 : 16, boxShadow:"0 1px 4px rgba(0,0,0,.07)", display:"flex", flexWrap:"wrap", gap:10, alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>📍 {area.name} — parcel map</div>
          <div style={{ fontSize:11, color:"#666", marginTop:2 }}>
            Recorded: <strong>{recordedHa}ha</strong>
            {area.polygon && computedHa > 0 && (
              <> · From polygon: <strong style={{ color: haDiff > 0.15 ? '#c62828' : '#2e7d32' }}>{computedHa}ha</strong>
                {haDiff > 0.15 && <span style={{ color:'#c62828', fontSize:10 }}> · differs {(haDiff*100).toFixed(0)}%</span>}
              </>
            )}
          </div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {mode === 'idle' && !area.polygon && (
            <button onClick={() => { setDrawingPoints([]); setMode('drawing'); }} style={{
              padding:"10px 16px", borderRadius:8, border:"none",
              background:"#2e7d32", color:"white", fontSize:13, fontWeight:700, cursor:"pointer"
            }}>📐 Draw polygon</button>
          )}
          {mode === 'idle' && area.polygon && (
            <button onClick={() => setMode('editing')} style={{
              padding:"10px 16px", borderRadius:8, border:"1px solid #ddd",
              background:"white", color:"#1565c0", fontSize:13, fontWeight:700, cursor:"pointer"
            }}>✏️ Edit polygon</button>
          )}
          {mode === 'editing' && (
            <button onClick={() => setMode('idle')} style={{
              padding:"10px 16px", borderRadius:8, border:"none",
              background:"#1565c0", color:"white", fontSize:13, fontWeight:700, cursor:"pointer"
            }}>✓ Done</button>
          )}
          {ndviAvailable && mode !== 'drawing' && (
            <button onClick={() => setShowNdvi(!showNdvi)} style={{
              padding:"10px 16px", borderRadius:8, border:"1px solid #ddd",
              background: showNdvi ? "#2e7d32" : "white", color: showNdvi ? "white" : "#2e7d32",
              fontSize:13, fontWeight:700, cursor:"pointer"
            }}>{showNdvi ? "Hide NDVI" : "Show NDVI"}</button>
          )}
        </div>
      </div>

      {/* NDVI imagery date — Sentinel-2 revisit cadence over Cagayan Valley
          is about every 5 days; cloud cover often blocks the most recent.
          This card tells the user how fresh the picture is. */}
      {ndviAvailable && (showNdvi || ndviInfo) && (
        <div style={{
          background: "#e8f5e9", borderLeft:"4px solid #2e7d32", borderRadius:8,
          padding:"10px 14px", fontSize:12, color:"#1b5e20", lineHeight:1.5,
          display:"flex", flexWrap:"wrap", gap:14, alignItems:"baseline"
        }}>
          <span style={{ fontWeight:800 }}>🛰️ Sentinel-2 imagery:</span>
          {ndviInfoLoading && <span style={{ color:"#558b2f" }}>checking latest pass…</span>}
          {!ndviInfoLoading && ndviInfo && ndviInfo.date && (() => {
            const d = new Date(ndviInfo.date);
            const daysAgo = Math.round((Date.now() - d.getTime()) / 86400000);
            const dateLabel = d.toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
            const cc = ndviInfo.cloudCoverPercentage;
            return (
              <>
                <span><strong>{dateLabel}</strong> <span style={{ color:"#558b2f" }}>({daysAgo === 0 ? 'today' : daysAgo + ' day' + (daysAgo === 1 ? '' : 's') + ' ago'})</span></span>
                {cc != null && (
                  <span style={{ color: cc < 10 ? "#2e7d32" : cc < 30 ? "#f9a825" : "#c62828" }}>
                    ☁️ {cc.toFixed(0)}% cloud cover {cc < 10 ? "(clear)" : cc < 30 ? "(some clouds)" : "(cloudy — image may be patchy)"}
                  </span>
                )}
                {ndviInfo.previousDate && (
                  <span style={{ color:"#888" }}>Previous pass: {new Date(ndviInfo.previousDate).toLocaleDateString('en-PH', { month:'short', day:'numeric' })}</span>
                )}
                {ndviInfo.relaxedFromRequest && (
                  <span style={{ color:"#bf360c", fontSize:10 }}>Search widened to {ndviInfo.searchedDays}d / ≤{ndviInfo.searchedMaxCc}% cloud — recent passes were too cloudy.</span>
                )}
              </>
            );
          })()}
          {!ndviInfoLoading && ndviInfo && !ndviInfo.date && !ndviInfo.error && (
            <span style={{ color:"#bf360c" }}>{ndviInfo.message || 'No recent imagery found — try widening the date range.'}</span>
          )}
          {!ndviInfoLoading && ndviInfo && ndviInfo.error && (
            <span style={{ color:"#bf360c" }}>Couldn't reach Sentinel Hub catalog ({ndviInfo.error}).</span>
          )}
        </div>
      )}

      {/* GPS toolbar — works in idle, drawing, and editing modes */}
      <div style={{
        background:"white", borderRadius:12, padding: mobile ? "8px 10px" : "10px 14px",
        boxShadow:"0 1px 4px rgba(0,0,0,.07)",
        display:"flex", flexWrap:"wrap", alignItems:"center", gap:8
      }}>
        <button
          onClick={dropPinAtGPS}
          disabled={gpsBusy}
          title={mode === 'drawing'
            ? "Capture your current GPS location as a polygon vertex"
            : "Recenter the map on your current GPS location"}
          style={{
            padding:"8px 12px", borderRadius:8, border:"none",
            background: gpsBusy ? "#bbb" : (mode === 'drawing' ? "#2e7d32" : "#1976d2"),
            color:"white", fontSize:12, fontWeight:700, cursor: gpsBusy ? "wait" : "pointer",
            whiteSpace:"nowrap"
          }}
        >
          {gpsBusy ? "📡 Getting GPS…" : (mode === 'drawing' ? "📍 Drop pin at my location" : "📍 Center on my location")}
        </button>
        <button
          onClick={startWatchingGPS}
          title="Continuously update your position on the map as you move around the field"
          style={{
            padding:"8px 12px", borderRadius:8,
            border: gpsWatching ? "none" : "1px solid #1976d2",
            background: gpsWatching ? "#1976d2" : "white",
            color: gpsWatching ? "white" : "#1976d2",
            fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
          }}
        >
          {gpsWatching ? "🛰 Tracking · stop" : "🛰 Track me"}
        </button>
        {gpsPos && (
          <span style={{ fontSize:11, color:"#666", fontFamily:"monospace" }}>
            {gpsPos.lat.toFixed(5)}, {gpsPos.lon.toFixed(5)}
            <span style={{ color: gpsPos.accuracy > 50 ? "#c62828" : gpsPos.accuracy > 15 ? "#ef6c00" : "#2e7d32", marginLeft:6 }}>
              ±{Math.round(gpsPos.accuracy)}m
            </span>
          </span>
        )}
        {gpsError && (
          <span style={{ fontSize:11, color:"#c62828", marginLeft:"auto" }}>
            ⚠ {gpsError}
          </span>
        )}
      </div>

      {/* The map */}
      <div ref={mapElRef} style={{ height: mobile ? 400 : 520, borderRadius:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,.07)", background:"#f0eee5" }}>
        {!ready && <div style={{ padding:24, color:"#888", fontSize:12 }}>Loading map library…</div>}
      </div>

      {/* NDVI setup banner */}
      {ndviAvailable === false && (
        <div style={{ background:"#fff8e1", borderLeft:"4px solid #f9a825", borderRadius:6, padding:12, fontSize:12, color:"#5d4037", lineHeight:1.5 }}>
          <strong>📡 NDVI satellite overlay not yet enabled.</strong> To see vegetation health from Sentinel-2 imagery on each parcel:
          <ol style={{ margin:"6px 0 0 18px", padding:0 }}>
            <li>Register a free account at <a href="https://apps.sentinel-hub.com/dashboard/" target="_blank" rel="noopener">apps.sentinel-hub.com</a></li>
            <li>Create a new "configuration" with the NDVI preset, copy the <strong>Instance ID</strong></li>
            <li>From your project root: <code style={{ background:"#fff3e0", padding:"1px 6px", borderRadius:4 }}>wrangler secret put SENTINEL_HUB_INSTANCE_ID</code> and paste the ID</li>
            <li>Re-deploy with <code style={{ background:"#fff3e0", padding:"1px 6px", borderRadius:4 }}>./redeploy.command</code> — the NDVI button will appear</li>
          </ol>
        </div>
      )}

      {/* Drawing mode — instructions + bottom action bar */}
      {mode === 'drawing' && (
        <>
          <div style={{ background:"#e3f2fd", borderLeft:"4px solid #1565c0", borderRadius:8, padding:"12px 14px", fontSize:13, color:"#0d47a1", lineHeight:1.4 }}>
            <strong>🖍️ Tap each corner of your parcel</strong> on the satellite map.
            {drawingPoints.length === 0 && " Start at any corner."}
            {drawingPoints.length === 1 && " Now tap the second corner."}
            {drawingPoints.length === 2 && " One more corner needed (minimum 3)."}
            {drawingPoints.length >= 3 && " Tap the orange ① marker — or the Finish button below — to close the polygon."}
          </div>
          <div style={{
            background:"white", borderRadius:12, padding:"10px 12px", boxShadow:"0 1px 4px rgba(0,0,0,.07)",
            display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, alignItems:"center"
          }}>
            <button onClick={undoLastPoint} disabled={drawingPoints.length === 0} style={{
              padding:"12px 8px", borderRadius:8, border:"1px solid #ddd",
              background: drawingPoints.length === 0 ? "#f5f5f5" : "white",
              color: drawingPoints.length === 0 ? "#bbb" : "#666",
              fontSize:13, fontWeight:700, cursor: drawingPoints.length === 0 ? "not-allowed" : "pointer"
            }}>↶ Undo</button>
            <button onClick={() => commitPolygon(drawingPoints)} disabled={drawingPoints.length < 3} style={{
              padding:"12px 8px", borderRadius:8, border:"none",
              background: drawingPoints.length < 3 ? "#bbb" : "#2e7d32",
              color:"white", fontSize:13, fontWeight:800,
              cursor: drawingPoints.length < 3 ? "not-allowed" : "pointer"
            }}>✓ Finish ({drawingPoints.length}{drawingPoints.length < 3 ? "/3" : ""})</button>
            <button onClick={cancelDrawing} style={{
              padding:"12px 8px", borderRadius:8, border:"1px solid #ffcdd2",
              background:"white", color:"#c62828", fontSize:13, fontWeight:700, cursor:"pointer"
            }}>✕ Cancel</button>
          </div>
        </>
      )}

      {/* Editing mode — drag vertices + delete option */}
      {mode === 'editing' && (
        <>
          <div style={{ background:"#fff3e0", borderLeft:"4px solid #ef6c00", borderRadius:8, padding:"12px 14px", fontSize:13, color:"#bf360c", lineHeight:1.4 }}>
            <strong>✏️ Drag any blue dot</strong> to move that corner. Tap <strong>✓ Done</strong> when finished, or use the red button below to remove the polygon entirely.
          </div>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={deletePolygon} style={{
              padding:"10px 16px", borderRadius:8, border:"1px solid #ffcdd2",
              background:"white", color:"#c62828", fontSize:12, fontWeight:700, cursor:"pointer"
            }}>🗑 Delete polygon</button>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// GOOGLE MAPS variant of ParcelMap — used when GOOGLE_MAPS_API_KEY
// is configured in the worker. Smoother touch UX than Leaflet + sharper
// satellite imagery. Same API surface as ParcelMap.
// ============================================================
let _gmapsLoadPromise = null;
// Captures Google Maps auth failures (InvalidKeyMapError, RefererNotAllowed,
// BillingNotEnabled, etc.) so the UI can render a useful error instead of a
// gray box. Google's API only signals these via the global gm_authFailure
// callback or by rendering its gm-err-* overlay — both are intercepted here.
window.__gmapsAuthFailed = false;
window.gm_authFailure = () => { window.__gmapsAuthFailed = true; };

function loadGoogleMaps(apiKey) {
  if (typeof window === 'undefined') return Promise.reject(new Error('no window'));
  if (window.google && window.google.maps && window.google.maps.drawing) {
    return Promise.resolve(window.google);
  }
  if (_gmapsLoadPromise) return _gmapsLoadPromise;
  _gmapsLoadPromise = new Promise((resolve, reject) => {
    const cbName = '__abundanceGmapsReady';
    window[cbName] = () => { resolve(window.google); delete window[cbName]; };
    const s = document.createElement('script');
    // _r=timestamp is a cache buster so the browser/CDN doesn't replay a
    // stale InvalidKeyMapError from before the key was activated.
    // loading=async silences a recent dev warning and matches Google's
    // recommended best practice.
    s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}&libraries=drawing,geometry&callback=${cbName}&v=weekly&loading=async&_r=${Date.now()}`;
    s.async = true;
    s.defer = true;
    s.onerror = () => { _gmapsLoadPromise = null; reject(new Error('Failed to load Google Maps')); };
    document.head.appendChild(s);
  });
  return _gmapsLoadPromise;
}

function GoogleParcelMap({ area, updateArea, allAreas, apiKey, mobile }) {
  const mapDivRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const polygonRef = React.useRef(null);
  const drawingManagerRef = React.useRef(null);
  const refOverlaysRef = React.useRef([]);
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(null);
  // Persist the auth-failure flag across area-switches and tab-switches so the
  // user doesn't see "Loading Google Maps..." every time before falling back.
  // First time we detect it we set window.__gmapsHardFail; subsequent mounts
  // skip Google entirely and go straight to Leaflet.
  const initialHardFail = (typeof window !== 'undefined') && (window.__gmapsHardFail || window.__gmapsAuthFailed);
  const [authFailed, setAuthFailed] = useState(!!initialHardFail);
  const [showHelp, setShowHelp] = useState(false);
  const [mode, setMode] = useState('idle');                  // idle | drawing | editing
  const [showNdvi, setShowNdvi] = useState(false);
  const [ndviAvailable, setNdviAvailable] = useState(null);
  const [ndviInfo, setNdviInfo] = useState(null);
  const [ndviInfoLoading, setNdviInfoLoading] = useState(false);
  const ndviOverlayRef = React.useRef(null);
  const [computedHa, setComputedHa] = useState(area.polygon ? polygonAreaHa(area.polygon) : 0);

  // Load the API once (skip if a previous mount already saw auth failure)
  useEffect(() => {
    if (authFailed) return;  // already known-bad; render Leaflet fallback instead
    let cancelled = false;
    loadGoogleMaps(apiKey).then(g => {
      if (cancelled) return;
      setLoaded(!!g);
      // gm_authFailure fires asynchronously after the first failed tile fetch.
      // Poll for a beat so the user sees the actionable error instead of a
      // gray box that looks like a bug in our app.
      let polls = 0;
      const tick = () => {
        if (cancelled) return;
        if (window.__gmapsAuthFailed) {
          window.__gmapsHardFail = true;  // remember across remounts
          setAuthFailed(true); setError('auth'); return;
        }
        // Belt-and-suspenders: detect Google's own error overlay too. It
        // renders as a div.gm-err-container inside the map div.
        const errEl = mapDivRef.current && mapDivRef.current.querySelector && mapDivRef.current.querySelector('.gm-err-container');
        if (errEl) {
          window.__gmapsHardFail = true;
          setAuthFailed(true); setError('auth'); return;
        }
        if (polls++ < 20) setTimeout(tick, 200);
      };
      setTimeout(tick, 200);
    }).catch(e => { if (!cancelled) setError(e.message || 'load failed'); });
    return () => { cancelled = true; };
  }, [apiKey, authFailed]);

  // AUTO-FALLBACK: if Google auth failed, render the Leaflet ParcelMap
  // instead. The user gets a working map (ESRI satellite tiles, no API key
  // needed) with all the drawing/editing/GPS features. A small dismissable
  // banner above explains why we switched + how to fix the key if they want
  // Google back.
  if (authFailed) {
    return (
      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        <div style={{ background:"#fff8e1", borderLeft:"4px solid #f9a825", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#5d4037", lineHeight:1.5 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8, flexWrap:"wrap" }}>
            <span><strong>🗝️ Google Maps unavailable</strong> — using free ESRI satellite tiles instead. Drawing, editing, and GPS all still work.</span>
            <button onClick={() => setShowHelp(!showHelp)} style={{ background:"transparent", border:"1px solid #f9a825", color:"#bf360c", borderRadius:6, padding:"3px 10px", fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>
              {showHelp ? "Hide" : "How to fix Google Maps"}
            </button>
          </div>
          {showHelp && (
            <ol style={{ fontSize:11, color:"#5d4037", lineHeight:1.5, paddingLeft:18, margin:"8px 0 0" }}>
              <li><strong>Maps JavaScript API not enabled</strong> on the GCP project. Console → APIs & Services → Library → "Maps JavaScript API" → Enable.</li>
              <li><strong>HTTP referrer restriction</strong> excludes <code>abundance.mak-ct.com/*</code>. Console → APIs & Services → Credentials → your key → Application restrictions.</li>
              <li><strong>Billing not enabled</strong> on the GCP project. Console → Billing.</li>
              <li><strong>Key was regenerated or deleted</strong>. Rotate via <code>wrangler secret put GOOGLE_MAPS_API_KEY</code>.</li>
            </ol>
          )}
        </div>
        <ParcelMap area={area} updateArea={updateArea} allAreas={allAreas} mobile={mobile} />
      </div>
    );
  }

  // Probe NDVI + fetch acquisition date (shared with Leaflet variant)
  useEffect(() => {
    fetch('/api/ndvi-tile?probe=1').then(r => {
      const ok = r.ok;
      setNdviAvailable(ok);
      if (ok) {
        const center = (area.polygon && area.polygon.length > 0)
          ? area.polygon.reduce((acc, p) => [acc[0] + p[0] / area.polygon.length, acc[1] + p[1] / area.polygon.length], [0, 0])
          : [FARM_LAT, FARM_LON];
        setNdviInfoLoading(true);
        fetch(`/api/ndvi-info?lat=${center[0].toFixed(4)}&lon=${center[1].toFixed(4)}&days=90&maxcc=60`)
          .then(r => r.json())
          .then(j => setNdviInfo(j))
          .catch(() => setNdviInfo({ error: 'fetch failed' }))
          .finally(() => setNdviInfoLoading(false));
      }
    }).catch(() => setNdviAvailable(false));
  }, [area.id]);   // eslint-disable-line react-hooks/exhaustive-deps

  // Build the map on load + on area-switch
  useEffect(() => {
    if (!loaded || !mapDivRef.current) return;
    const g = window.google;
    const center = (area.polygon && area.polygon.length > 0)
      ? { lat: area.polygon[0][0], lng: area.polygon[0][1] }
      : { lat: FARM_LAT, lng: FARM_LON };

    const map = new g.maps.Map(mapDivRef.current, {
      center,
      zoom: area.polygon ? 17 : 14,
      mapTypeId: 'hybrid',       // satellite + labels
      tilt: 0,
      streetViewControl: false,
      fullscreenControl: true,
      mapTypeControl: true,
      mapTypeControlOptions: { style: g.maps.MapTypeControlStyle.DROPDOWN_MENU },
      gestureHandling: 'greedy',  // single-finger pan on mobile
    });
    mapRef.current = map;

    // Render other areas' polygons as faded reference outlines
    refOverlaysRef.current = [];
    (allAreas || []).filter(x => x.id !== area.id && x.polygon && x.polygon.length >= 3).forEach(x => {
      const poly = new g.maps.Polygon({
        paths: x.polygon.map(p => ({ lat: p[0], lng: p[1] })),
        strokeColor: '#888', strokeWeight: 1, strokeOpacity: 0.6,
        fillColor: '#888', fillOpacity: 0.05,
        clickable: false, editable: false,
      });
      poly.setMap(map);
      refOverlaysRef.current.push(poly);
      // Label at the centroid
      const ll = x.polygon[0];
      const label = new g.maps.Marker({
        position: { lat: ll[0], lng: ll[1] },
        map,
        label: { text: x.name, color: '#fff', fontSize: '11px', fontWeight: '600' },
        icon: { path: g.maps.SymbolPath.CIRCLE, scale: 0 }, // invisible marker, label only
      });
      refOverlaysRef.current.push(label);
    });

    // Existing polygon for THIS area
    if (area.polygon && area.polygon.length >= 3) {
      const poly = new g.maps.Polygon({
        paths: area.polygon.map(p => ({ lat: p[0], lng: p[1] })),
        strokeColor: '#2e7d32', strokeWeight: 3, strokeOpacity: 1,
        fillColor: '#2e7d32', fillOpacity: 0.25,
        editable: false, draggable: false,
      });
      poly.setMap(map);
      polygonRef.current = poly;
      const bounds = new g.maps.LatLngBounds();
      area.polygon.forEach(p => bounds.extend({ lat: p[0], lng: p[1] }));
      map.fitBounds(bounds, 40);
    } else {
      polygonRef.current = null;
    }

    setComputedHa(area.polygon ? polygonAreaHa(area.polygon) : 0);

    return () => {
      refOverlaysRef.current.forEach(o => o.setMap(null));
      refOverlaysRef.current = [];
      if (polygonRef.current) { polygonRef.current.setMap(null); polygonRef.current = null; }
      if (drawingManagerRef.current) { drawingManagerRef.current.setMap(null); drawingManagerRef.current = null; }
      if (ndviOverlayRef.current) { ndviOverlayRef.current.setMap(null); ndviOverlayRef.current = null; }
      mapRef.current = null;
    };
  }, [loaded, area.id, area.polygon]);   // eslint-disable-line react-hooks/exhaustive-deps

  // Watch the polygon's path for edits (when editable:true)
  const wireEditListeners = (poly) => {
    if (!poly) return;
    const g = window.google;
    const onChange = () => {
      const path = poly.getPath();
      const pts = [];
      for (let i = 0; i < path.getLength(); i++) {
        const ll = path.getAt(i); pts.push([ll.lat(), ll.lng()]);
      }
      setComputedHa(polygonAreaHa(pts));
      updateArea(area.id, 'polygon', pts);
    };
    const path = poly.getPath();
    g.maps.event.clearListeners(path, 'set_at');
    g.maps.event.clearListeners(path, 'insert_at');
    g.maps.event.clearListeners(path, 'remove_at');
    path.addListener('set_at', onChange);
    path.addListener('insert_at', onChange);
    path.addListener('remove_at', onChange);
  };

  // Drawing mode
  useEffect(() => {
    if (!loaded || !mapRef.current) return;
    const g = window.google;
    const map = mapRef.current;

    if (mode === 'drawing') {
      // Hide any existing committed polygon while drawing fresh
      if (polygonRef.current) { polygonRef.current.setMap(null); }
      const dm = new g.maps.drawing.DrawingManager({
        drawingMode: g.maps.drawing.OverlayType.POLYGON,
        drawingControl: false,
        polygonOptions: {
          strokeColor: '#2e7d32', strokeWeight: 3, strokeOpacity: 1,
          fillColor: '#2e7d32', fillOpacity: 0.25,
          editable: true, draggable: false, clickable: true,
        },
      });
      dm.setMap(map);
      drawingManagerRef.current = dm;
      const onComplete = g.maps.event.addListener(dm, 'polygoncomplete', (poly) => {
        const path = poly.getPath();
        const pts = [];
        for (let i = 0; i < path.getLength(); i++) {
          const ll = path.getAt(i); pts.push([ll.lat(), ll.lng()]);
        }
        if (polygonRef.current) { polygonRef.current.setMap(null); }
        polygonRef.current = poly;
        wireEditListeners(poly);
        updateArea(area.id, 'polygon', pts);
        setComputedHa(polygonAreaHa(pts));
        dm.setDrawingMode(null);
        dm.setMap(null);
        drawingManagerRef.current = null;
        setMode('idle');
      });
      return () => { g.maps.event.removeListener(onComplete); if (drawingManagerRef.current) { drawingManagerRef.current.setMap(null); drawingManagerRef.current = null; } };
    }

    if (mode === 'editing' && polygonRef.current) {
      // Re-show if it was hidden, make editable
      polygonRef.current.setMap(map);
      polygonRef.current.setEditable(true);
      wireEditListeners(polygonRef.current);
      return () => { if (polygonRef.current) polygonRef.current.setEditable(false); };
    }

    // idle: make sure polygon is on the map and read-only
    if (polygonRef.current) {
      polygonRef.current.setMap(map);
      polygonRef.current.setEditable(false);
    }
  }, [mode, loaded, area.id]);   // eslint-disable-line react-hooks/exhaustive-deps

  // NDVI tile overlay
  useEffect(() => {
    if (!loaded || !mapRef.current) return;
    const g = window.google;
    const map = mapRef.current;
    if (ndviOverlayRef.current) { ndviOverlayRef.current.setMap(null); ndviOverlayRef.current = null; }
    if (!showNdvi || !ndviAvailable) return;
    const ndvi = new g.maps.ImageMapType({
      getTileUrl: (coord, zoom) => `/api/ndvi-tile?z=${zoom}&x=${coord.x}&y=${coord.y}`,
      tileSize: new g.maps.Size(256, 256),
      opacity: 0.7,
      name: 'NDVI',
      maxZoom: 18,
    });
    map.overlayMapTypes.push(ndvi);
    ndviOverlayRef.current = ndvi;
  }, [showNdvi, ndviAvailable, loaded]);

  const cancelDrawing = () => {
    if (drawingManagerRef.current) {
      drawingManagerRef.current.setDrawingMode(null);
      drawingManagerRef.current.setMap(null);
      drawingManagerRef.current = null;
    }
    // Restore previous polygon if any
    if (polygonRef.current) polygonRef.current.setMap(mapRef.current);
    setMode('idle');
  };
  const deletePolygon = () => {
    if (!confirm('Delete this polygon? You can draw a new one anytime.')) return;
    if (polygonRef.current) { polygonRef.current.setMap(null); polygonRef.current = null; }
    updateArea(area.id, 'polygon', null);
    setComputedHa(0);
    setMode('idle');
  };

  const recordedHa = Number(area.ha) || 0;
  const haDiff = computedHa > 0 && recordedHa > 0 ? Math.abs(computedHa - recordedHa) / recordedHa : 0;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

      {/* Header / actions */}
      <div style={{ background:"white", borderRadius:12, padding: mobile ? 12 : 16, boxShadow:"0 1px 4px rgba(0,0,0,.07)", display:"flex", flexWrap:"wrap", gap:10, alignItems:"center", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>📍 {area.name} — parcel map <span style={{ fontSize:10, fontWeight:600, color:"#1565c0", background:"#e3f2fd", padding:"2px 6px", borderRadius:6, marginLeft:6 }}>Google Maps</span></div>
          <div style={{ fontSize:11, color:"#666", marginTop:2 }}>
            Recorded: <strong>{recordedHa}ha</strong>
            {area.polygon && computedHa > 0 && (
              <> · From polygon: <strong style={{ color: haDiff > 0.15 ? '#c62828' : '#2e7d32' }}>{computedHa}ha</strong>
                {haDiff > 0.15 && <span style={{ color:'#c62828', fontSize:10 }}> · differs {(haDiff*100).toFixed(0)}%</span>}
              </>
            )}
          </div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {mode === 'idle' && !area.polygon && (
            <button onClick={() => setMode('drawing')} style={{ padding:"10px 16px", borderRadius:8, border:"none", background:"#2e7d32", color:"white", fontSize:13, fontWeight:700, cursor:"pointer" }}>📐 Draw polygon</button>
          )}
          {mode === 'idle' && area.polygon && (
            <button onClick={() => setMode('editing')} style={{ padding:"10px 16px", borderRadius:8, border:"1px solid #ddd", background:"white", color:"#1565c0", fontSize:13, fontWeight:700, cursor:"pointer" }}>✏️ Edit polygon</button>
          )}
          {mode === 'editing' && (
            <button onClick={() => setMode('idle')} style={{ padding:"10px 16px", borderRadius:8, border:"none", background:"#1565c0", color:"white", fontSize:13, fontWeight:700, cursor:"pointer" }}>✓ Done</button>
          )}
          {ndviAvailable && mode !== 'drawing' && (
            <button onClick={() => setShowNdvi(!showNdvi)} style={{ padding:"10px 16px", borderRadius:8, border:"1px solid #ddd", background: showNdvi ? "#2e7d32" : "white", color: showNdvi ? "white" : "#2e7d32", fontSize:13, fontWeight:700, cursor:"pointer" }}>{showNdvi ? "Hide NDVI" : "Show NDVI"}</button>
          )}
        </div>
      </div>

      {/* NDVI imagery date card (same UI as Leaflet variant) */}
      {ndviAvailable && (showNdvi || ndviInfo) && (
        <div style={{ background: "#e8f5e9", borderLeft:"4px solid #2e7d32", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#1b5e20", lineHeight:1.5, display:"flex", flexWrap:"wrap", gap:14, alignItems:"baseline" }}>
          <span style={{ fontWeight:800 }}>🛰️ Sentinel-2 imagery:</span>
          {ndviInfoLoading && <span style={{ color:"#558b2f" }}>checking latest pass…</span>}
          {!ndviInfoLoading && ndviInfo && ndviInfo.date && (() => {
            const d = new Date(ndviInfo.date);
            const daysAgo = Math.round((Date.now() - d.getTime()) / 86400000);
            const dateLabel = d.toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
            const cc = ndviInfo.cloudCoverPercentage;
            return <><span><strong>{dateLabel}</strong> <span style={{ color:"#558b2f" }}>({daysAgo === 0 ? 'today' : daysAgo + ' day' + (daysAgo === 1 ? '' : 's') + ' ago'})</span></span>{cc != null && (<span style={{ color: cc < 10 ? "#2e7d32" : cc < 30 ? "#f9a825" : "#c62828" }}>☁️ {cc.toFixed(0)}% cloud cover {cc < 10 ? "(clear)" : cc < 30 ? "(some clouds)" : "(cloudy — image may be patchy)"}</span>)}{ndviInfo.previousDate && (<span style={{ color:"#888" }}>Previous pass: {new Date(ndviInfo.previousDate).toLocaleDateString('en-PH', { month:'short', day:'numeric' })}</span>)}{ndviInfo.relaxedFromRequest && (<span style={{ color:"#bf360c", fontSize:10 }}>Search widened to {ndviInfo.searchedDays}d / ≤{ndviInfo.searchedMaxCc}% cloud — recent passes were too cloudy.</span>)}</>;
          })()}
          {!ndviInfoLoading && ndviInfo && !ndviInfo.date && !ndviInfo.error && <span style={{ color:"#bf360c" }}>{ndviInfo.message || 'No recent imagery found.'}</span>}
          {!ndviInfoLoading && ndviInfo && ndviInfo.error && <span style={{ color:"#bf360c" }}>Couldn't reach Sentinel Hub catalog.</span>}
        </div>
      )}

      {/* The map */}
      <div ref={mapDivRef} style={{ height: mobile ? 400 : 520, borderRadius:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,.07)", background:"#f0eee5", position:"relative" }}>
        {!loaded && !error && <div style={{ padding:24, color:"#888", fontSize:12 }}>Loading Google Maps…</div>}
        {error === 'auth' && (
          <div style={{ position:"absolute", inset:0, background:"#fffbe7", padding:24, borderRadius:12, zIndex:5, overflow:"auto" }}>
            <div style={{ fontWeight:800, color:"#bf360c", marginBottom:6, fontSize:14 }}>🗝️ Google Maps key needs attention</div>
            <div style={{ fontSize:12, color:"#5d4037", lineHeight:1.5, marginBottom:10 }}>
              Google rejected the API key for this domain. The map can't render until that's fixed. Common causes (most likely first):
            </div>
            <ol style={{ fontSize:12, color:"#5d4037", lineHeight:1.5, paddingLeft:18, margin:0 }}>
              <li><strong>Maps JavaScript API not enabled</strong> on the GCP project. Console → APIs & Services → Library → "Maps JavaScript API" → Enable.</li>
              <li><strong>HTTP referrer restriction</strong> excludes <code>abundance.mak-ct.com/*</code>. Console → APIs & Services → Credentials → your key → Application restrictions.</li>
              <li><strong>Billing not enabled</strong> on the GCP project. Console → Billing.</li>
              <li><strong>Key was regenerated or deleted</strong>. Rotate via <code>wrangler secret put GOOGLE_MAPS_API_KEY</code>.</li>
            </ol>
            <div style={{ fontSize:11, color:"#888", marginTop:10 }}>
              After fixing, hard-refresh this page (⌘⇧R). Everything else on this tab still works — Sentinel-2 imagery and polygon coordinates load independently.
            </div>
          </div>
        )}
        {error && error !== 'auth' && <div style={{ padding:24, color:"#c62828", fontSize:12 }}>Google Maps failed to load: {error}</div>}
      </div>

      {/* Drawing mode banner + action bar */}
      {mode === 'drawing' && (
        <>
          <div style={{ background:"#e3f2fd", borderLeft:"4px solid #1565c0", borderRadius:8, padding:"12px 14px", fontSize:13, color:"#0d47a1", lineHeight:1.4 }}>
            <strong>🖍️ Tap each corner</strong> of your parcel on the satellite map. Tap the first vertex (or double-tap any vertex) to close. Once closed, drag any white handle to adjust.
          </div>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={cancelDrawing} style={{ padding:"10px 16px", borderRadius:8, border:"1px solid #ffcdd2", background:"white", color:"#c62828", fontSize:12, fontWeight:700, cursor:"pointer" }}>✕ Cancel drawing</button>
          </div>
        </>
      )}

      {/* Editing mode banner */}
      {mode === 'editing' && (
        <>
          <div style={{ background:"#fff3e0", borderLeft:"4px solid #ef6c00", borderRadius:8, padding:"12px 14px", fontSize:13, color:"#bf360c", lineHeight:1.4 }}>
            <strong>✏️ Drag any white handle</strong> to move that corner. Drag the smaller mid-edge handles to insert a new vertex. Right-click a vertex to delete it. Tap <strong>✓ Done</strong> above when finished.
          </div>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={deletePolygon} style={{ padding:"10px 16px", borderRadius:8, border:"1px solid #ffcdd2", background:"white", color:"#c62828", fontSize:12, fontWeight:700, cursor:"pointer" }}>🗑 Delete polygon</button>
          </div>
        </>
      )}
    </div>
  );
}

function SprayLog({ areaName, sprayLogs, setSprayLogs, mobile }) {
  const today = new Date().toISOString().slice(0, 10);
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ date: today, type:"herbicide", product:"", dosage:"", target:"", notes:"" });

  const mine = (sprayLogs || []).filter(s => s.area === areaName).sort((a,b) => (b.date || "").localeCompare(a.date || ""));

  const addEntry = () => {
    if (!draft.product.trim()) { alert("Enter a product / brand name."); return; }
    const id = Date.now();
    const entry = { id, area: areaName, date: draft.date, type: draft.type, product: draft.product.trim(), dosage: draft.dosage.trim(), target: draft.target.trim(), notes: draft.notes.trim() };
    setSprayLogs([...(sprayLogs || []), entry]);
    setDraft({ date: today, type:"herbicide", product:"", dosage:"", target:"", notes:"" });
    setShowAdd(false);
  };

  const removeEntry = (id) => {
    if (!confirm("Delete this spray record?")) return;
    setSprayLogs((sprayLogs || []).filter(s => s.id !== id));
  };

  // Summary counts per type
  const counts = SPRAY_TYPES.reduce((acc, t) => { acc[t.key] = mine.filter(s => s.type === t.key).length; return acc; }, {});

  return (
    <div style={{ padding: mobile ? 12 : 18, display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
        <div style={{ fontWeight:800, fontSize:15, color:"#333" }}>💧 Spray records for {areaName}</div>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: showAdd ? "#999" : "#1565c0", color:"white", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>{showAdd ? "Cancel" : "+ Record spray"}</button>
      </div>

      {/* Summary badges */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
        {SPRAY_TYPES.map(t => (
          <div key={t.key} style={{ background: counts[t.key] > 0 ? t.bg : "#fafafa", color: counts[t.key] > 0 ? t.color : "#999", padding:"4px 10px", borderRadius:14, fontSize:11, fontWeight:600 }}>
            {t.emoji} {t.label}: {counts[t.key]}
          </div>
        ))}
      </div>

      {showAdd && (
        <div style={{ background:"#fafafa", borderRadius:12, padding:14, border:"1px solid #eee" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(140px, 1fr))", gap:10 }}>
            <label style={labelStyle}>Date
              <input type="date" value={draft.date} onChange={e => setDraft({ ...draft, date: e.target.value })} style={inputStyle} />
            </label>
            <label style={labelStyle}>Type
              <select value={draft.type} onChange={e => setDraft({ ...draft, type: e.target.value })} style={inputStyle}>
                {SPRAY_TYPES.map(t => <option key={t.key} value={t.key}>{t.emoji} {t.label}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Product / Brand *
              <input value={draft.product} onChange={e => setDraft({ ...draft, product: e.target.value })} placeholder="e.g. Sniper, Solomon, Niloy" style={inputStyle} />
            </label>
            <label style={labelStyle}>Dosage
              <input value={draft.dosage} onChange={e => setDraft({ ...draft, dosage: e.target.value })} placeholder="e.g. 16ml/16L, 1 bottle / ha" style={inputStyle} />
            </label>
            <label style={labelStyle}>Target / Pest
              <input value={draft.target} onChange={e => setDraft({ ...draft, target: e.target.value })} placeholder="e.g. golden kuhol, stem borer, BLB" style={inputStyle} />
            </label>
            <label style={{ ...labelStyle, gridColumn: mobile ? "span 1" : "span 2" }}>Notes
              <input value={draft.notes} onChange={e => setDraft({ ...draft, notes: e.target.value })} placeholder="Weather, applicator, anything to remember..." style={inputStyle} />
            </label>
          </div>
          <button onClick={addEntry} style={{ marginTop:10, background:"#2e7d32", color:"white", border:"none", borderRadius:8, padding:"8px 18px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save spray record</button>
        </div>
      )}

      {mine.length === 0 ? (
        <div style={{ background:"white", borderRadius:12, padding:30, textAlign:"center", color:"#bbb", fontSize:12 }}>
          No spray records yet for this area. Click "+ Record spray" to log a herbicide, insecticide, molluscicide, or fungicide application.
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {mine.map(s => {
            const m = sprayTypeMeta(s.type);
            const d = s.date ? new Date(s.date + 'T12:00:00').toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' }) : '?';
            return (
              <div key={s.id} style={{ background:"white", borderRadius:10, boxShadow:"0 1px 3px rgba(0,0,0,.05)", padding:"10px 14px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", borderLeft:`4px solid ${m.color}` }}>
                <div style={{ flex:1, minWidth:160 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                    <span style={{ fontSize:14 }}>{m.emoji}</span>
                    <span style={{ fontWeight:700, fontSize:13, color: m.color }}>{m.label}</span>
                    <span style={{ fontWeight:600, fontSize:13, color:"#333" }}>· {s.product}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#888", marginTop:2 }}>
                    {d}
                    {s.dosage && <> · 💉 {s.dosage}</>}
                    {s.target && <> · 🎯 {s.target}</>}
                  </div>
                  {s.notes && <div style={{ fontSize:11, color:"#aaa", marginTop:2, fontStyle:"italic" }}>"{s.notes}"</div>}
                </div>
                <button onClick={() => removeEntry(s.id)} title="Delete" style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, fontWeight:700, cursor:"pointer" }}>×</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
// FERTILIZER DATABASE & SUBSTITUTE CALCULATOR
// ============================================================
// PH-common fertilizers with N-P₂O₅-K₂O percentages. Used by the substitute
// calculator to compute equivalent NPK and propose alternative blends when
// the planned product is out of stock.
const FERT_DB = {
  "14-14-14":   { N: 14, P: 14, K: 14, label: "Complete (14-14-14)" },
  "16-20-0":    { N: 16, P: 20, K: 0,  label: "Ammophos / Solophos (16-20-0)" },
  "17-0-17":    { N: 17, P: 0,  K: 17, label: "17-0-17" },
  "1-6-16-8":   { N: 1,  P: 6,  K: 16, label: "Marca Bulaklak (1-6-16-8)" },
  "18-46-0":    { N: 18, P: 46, K: 0,  label: "DAP (18-46-0)" },
  "0-46-0":     { N: 0,  P: 46, K: 0,  label: "Super phosphate (0-46-0)" },
  "21-0-0":     { N: 21, P: 0,  K: 0,  label: "Ammonium Sulfate (21-0-0)" },
  "25-0-0":     { N: 25, P: 0,  K: 0,  label: "Ammonium Chloride (25-0-0)" },
  "46-0-0":     { N: 46, P: 0,  K: 0,  label: "Urea (46-0-0)" },
  "0-0-60":     { N: 0,  P: 0,  K: 60, label: "MOP (0-0-60)" },
  "0-0-50":     { N: 0,  P: 0,  K: 50, label: "SOP (0-0-50)" },
};

// Given a target N/P/K (in kg), suggest two alternative blends:
//  1) "Closest single product" — picks the fertilizer whose ratio is most
//     similar to the target and scales kg to match its dominant nutrient.
//  2) "Exact 3-component blend" — solves for urea (46-0-0) + DAP (18-46-0)
//     + MOP (0-0-60) kg amounts that hit N, P, K exactly.
function suggestSubstitutes(sourceItem, sourceKg) {
  const src = FERT_DB[sourceItem];
  if (!src) return null;
  const targetN = sourceKg * (src.N / 100);
  const targetP = sourceKg * (src.P / 100);
  const targetK = sourceKg * (src.K / 100);
  const fmt = (n) => Math.round(n * 10) / 10;

  const suggestions = [];

  // ----- Hard-coded common substitutions (Filipino farming context) -----
  if (sourceItem === "14-14-14") {
    suggestions.push({
      name: "16-20-0 + 0-0-60",
      detail: `${fmt(sourceKg * 0.5)} kg 16-20-0 + ${fmt(sourceKg * 0.35)} kg 0-0-60`,
      delivers: { N: fmt(sourceKg * 0.5 * 0.16), P: fmt(sourceKg * 0.5 * 0.20), K: fmt(sourceKg * 0.35 * 0.60) },
    });
  }
  if (sourceItem === "1-6-16-8") {
    suggestions.push({
      name: "14-14-14 (Ka Danny's fallback)",
      detail: `${fmt(sourceKg)} kg 14-14-14`,
      delivers: { N: fmt(sourceKg * 0.14), P: fmt(sourceKg * 0.14), K: fmt(sourceKg * 0.14) },
    });
    suggestions.push({
      name: "0-46-0 + 0-0-60 (P and K only)",
      detail: `${fmt(targetP / 0.46)} kg 0-46-0 + ${fmt(targetK / 0.60)} kg 0-0-60`,
      delivers: { N: 0, P: fmt(targetP), K: fmt(targetK) },
    });
  }
  if (sourceItem === "17-0-17") {
    suggestions.push({
      name: "Urea + MOP equivalent",
      detail: `${fmt(targetN / 0.46)} kg 46-0-0 + ${fmt(targetK / 0.60)} kg 0-0-60`,
      delivers: { N: fmt(targetN), P: 0, K: fmt(targetK) },
    });
  }
  if (sourceItem === "21-0-0" || sourceItem === "25-0-0") {
    suggestions.push({
      name: "Urea (more concentrated)",
      detail: `${fmt(targetN / 0.46)} kg 46-0-0`,
      delivers: { N: fmt(targetN), P: 0, K: 0 },
    });
  }
  if (sourceItem === "46-0-0") {
    suggestions.push({
      name: "Ammonium sulfate / chloride",
      detail: `${fmt(targetN / 0.21)} kg 21-0-0 (or ${fmt(targetN / 0.25)} kg 25-0-0)`,
      delivers: { N: fmt(targetN), P: 0, K: 0 },
    });
  }
  if (sourceItem === "0-0-60") {
    suggestions.push({
      name: "17-0-17 (also adds N)",
      detail: `${fmt(targetK / 0.17)} kg 17-0-17`,
      delivers: { N: fmt(targetK / 0.17 * 0.17), P: 0, K: fmt(targetK) },
    });
    suggestions.push({
      name: "0-0-50 (slightly more bulky)",
      detail: `${fmt(targetK / 0.50)} kg 0-0-50`,
      delivers: { N: 0, P: 0, K: fmt(targetK) },
    });
  }

  // ----- Universal: 3-component blend (urea + DAP + MOP) hits exact N-P-K -----
  // DAP = 18-46-0: every kg gives 0.18 N, 0.46 P.
  // Then MOP supplies K, urea makes up remaining N.
  if (targetP > 0) {
    const dapKg = targetP / 0.46;
    const nFromDap = dapKg * 0.18;
    const remainingN = Math.max(0, targetN - nFromDap);
    const ureaKg = remainingN / 0.46;
    const mopKg  = targetK / 0.60;
    suggestions.push({
      name: "Urea + DAP + MOP blend (exact)",
      detail: `${fmt(ureaKg)} kg 46-0-0 + ${fmt(dapKg)} kg 18-46-0${mopKg > 0 ? ` + ${fmt(mopKg)} kg 0-0-60` : ""}`,
      delivers: { N: fmt(ureaKg * 0.46 + nFromDap), P: fmt(dapKg * 0.46), K: fmt(mopKg * 0.60) },
    });
  } else if (targetN > 0 && targetK > 0) {
    suggestions.push({
      name: "Urea + MOP blend",
      detail: `${fmt(targetN / 0.46)} kg 46-0-0 + ${fmt(targetK / 0.60)} kg 0-0-60`,
      delivers: { N: fmt(targetN), P: 0, K: fmt(targetK) },
    });
  }

  return {
    sourceName: src.label,
    sourceKg,
    target: { N: fmt(targetN), P: fmt(targetP), K: fmt(targetK) },
    suggestions,
  };
}

function FertilizerCalculator({ mobile, fertilizerPrices, setFertilizerPrices }) {
  const [item, setItem] = useState("14-14-14");
  const [qty, setQty] = useState(50);   // kg
  const [unit, setUnit] = useState("kg"); // "kg" or "bags" (50kg each)
  const kg = unit === "bags" ? Number(qty || 0) * 50 : Number(qty || 0);
  const result = suggestSubstitutes(item, kg);
  const prices = fertilizerPrices || {};
  const priceFor = (it) => {
    const r = prices[it];
    if (!r) return null;
    return r.pricePerKg != null ? Number(r.pricePerKg)
      : r.pricePerBag != null ? Number(r.pricePerBag) / 50
      : null;
  };
  const sourcePricePerKg = priceFor(item);
  const sourceTotalCost = (sourcePricePerKg != null) ? sourcePricePerKg * kg : null;

  // Cost each suggestion using current prices (sum each component's ₱/kg × kg).
  // Returns null if any required price is missing.
  const costSuggestion = (s) => {
    if (!s || !s.detail) return null;
    // detail string format examples:
    //   "25 kg 16-20-0 + 17.5 kg 0-0-60"
    //   "108.7 kg 46-0-0 + 22.8 kg 18-46-0 + 11.7 kg 0-0-60"
    const parts = s.detail.split('+').map(x => x.trim());
    let total = 0;
    for (const p of parts) {
      const m = p.match(/([\d.]+)\s*kg\s*([\w-]+)/);
      if (!m) return null;
      const partKg = Number(m[1]);
      const partItem = m[2];
      const ppk = priceFor(partItem);
      if (ppk == null) return null;
      total += partKg * ppk;
    }
    return total;
  };

  // Inline price editor for the chosen source item.
  const setInlinePrice = (perBag) => {
    const v = Number(perBag);
    setFertilizerPrices && setFertilizerPrices(prev => ({
      ...(prev || {}),
      [item]: {
        ...((prev || {})[item] || {}),
        pricePerBag: v,
        pricePerKg: Math.round((v / 50) * 100) / 100,
        dateUpdated: new Date().toISOString().slice(0, 10),
        source: 'inline (calculator)',
      },
    }));
  };

  return (
    <div style={{ background:"#fff8e1", borderRadius:12, padding: mobile ? 12 : 16, borderLeft:"4px solid #f9a825" }}>
      <div style={{ fontWeight:800, fontSize:13, color:"#5d4037", marginBottom:8 }}>💡 Fertilizer substitute calculator</div>
      <div style={{ fontSize:11, color:"#777", marginBottom:10 }}>If a product is out of stock or too expensive, this shows what alternative combination gives you the same NPK. Enter current prices to see ₱ savings.</div>
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr 1fr" : "2fr 1fr 1fr", gap:8 }}>
        <label style={labelStyle}>If you can't get
          <select value={item} onChange={e => setItem(e.target.value)} style={inputStyle}>
            {Object.entries(FERT_DB).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
        </label>
        <label style={labelStyle}>Qty
          <input type="number" min="0" step="any" value={qty} onChange={e => setQty(e.target.value)} style={{ ...inputStyle, fontWeight:700 }} />
        </label>
        <label style={labelStyle}>Unit
          <select value={unit} onChange={e => setUnit(e.target.value)} style={inputStyle}>
            <option value="kg">kg</option>
            <option value="bags">bags (50 kg)</option>
          </select>
        </label>
      </div>
      {/* Inline price entry for the source item */}
      {setFertilizerPrices && (
        <div style={{ marginTop:10, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", background:"#fff", borderRadius:8, padding:"8px 10px", border:"1px dashed #ffd54f" }}>
          <span style={{ fontSize:11, color:"#5d4037", fontWeight:700 }}>Current price of {item}:</span>
          <span style={{ fontSize:11, color:"#888" }}>₱</span>
          <input
            type="number" min="0" step="any"
            value={prices[item]?.pricePerBag != null ? prices[item].pricePerBag : ''}
            onChange={e => setInlinePrice(e.target.value)}
            placeholder="per bag (50kg)"
            style={{ ...inputSm, width: 90 }}
          />
          <span style={{ fontSize:11, color:"#888" }}>/ bag</span>
          {sourcePricePerKg != null && (
            <span style={{ fontSize:11, color:"#2e7d32", fontWeight:600 }}>= ₱{sourcePricePerKg.toFixed(2)}/kg</span>
          )}
          {sourceTotalCost != null && (
            <span style={{ fontSize:11, color:"#5d4037", fontWeight:700, marginLeft:'auto' }}>{kg}kg = ₱{sourceTotalCost.toFixed(0)}</span>
          )}
        </div>
      )}

      {result && (
        <div style={{ marginTop:10 }}>
          <div style={{ fontSize:11, color:"#5d4037", marginBottom:6 }}>
            <strong>{result.sourceKg} kg of {result.sourceName}</strong> delivers approximately:
            <span style={{ marginLeft:6, fontFamily:"monospace", color:"#1565c0" }}>N {result.target.N}</span>
            <span style={{ marginLeft:6, fontFamily:"monospace", color:"#7b1fa2" }}>P {result.target.P}</span>
            <span style={{ marginLeft:6, fontFamily:"monospace", color:"#e65100" }}>K {result.target.K}</span>
            <span style={{ marginLeft:4, color:"#888" }}>kg</span>
          </div>
          {result.suggestions.length === 0 ? (
            <div style={{ fontSize:11, color:"#888" }}>No common substitute found for this product yet.</div>
          ) : (() => {
            // Rank suggestions by ₱ when prices are available — cheapest first.
            const enriched = result.suggestions.map(s => ({ ...s, _cost: costSuggestion(s) }));
            const hasPrices = enriched.some(s => s._cost != null);
            const ranked = hasPrices
              ? [...enriched].sort((a, b) => (a._cost ?? Infinity) - (b._cost ?? Infinity))
              : enriched;
            const cheapest = hasPrices ? ranked[0] : null;
            return (
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {ranked.map((s, i) => {
                  const isCheapest = cheapest && s === cheapest && s._cost != null;
                  const savings = (sourceTotalCost != null && s._cost != null) ? sourceTotalCost - s._cost : null;
                  return (
                    <div key={i} style={{ background: isCheapest ? "#e8f5e9" : "white", borderRadius:8, padding:"8px 10px", border: isCheapest ? "2px solid #2e7d32" : "1px solid #ffe0b2" }}>
                      <div style={{ fontSize:12, fontWeight:700, color: isCheapest ? "#1b5e20" : "#5d4037", display:"flex", justifyContent:"space-between", gap:8, alignItems:"center" }}>
                        <span>{isCheapest && "✓ "}{i + 1}. {s.name}</span>
                        {s._cost != null && (
                          <span style={{ fontSize:12, color: isCheapest ? "#1b5e20" : "#5d4037", fontWeight:800 }}>
                            ₱{s._cost.toFixed(0)}
                            {savings != null && savings > 0 && <span style={{ marginLeft:6, fontSize:10, color:"#2e7d32" }}>(save ₱{savings.toFixed(0)})</span>}
                            {savings != null && savings < 0 && <span style={{ marginLeft:6, fontSize:10, color:"#c62828" }}>(+₱{(-savings).toFixed(0)})</span>}
                          </span>
                        )}
                      </div>
                      <div style={{ fontSize:11, color:"#444", marginTop:2 }}>→ {s.detail}</div>
                      <div style={{ fontSize:10, color:"#888", marginTop:2, fontFamily:"monospace" }}>
                        delivers ≈ N {s.delivers.N} · P {s.delivers.P} · K {s.delivers.K} kg
                        {s._cost == null && hasPrices && <span style={{ marginLeft:6, color:"#c62828" }}>(price missing — add it under Inventory → Fert Prices)</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
          <div style={{ fontSize:10, color:"#aaa", marginTop:8, lineHeight:1.4 }}>
            Numbers are calculated from each product's N-P₂O₅-K₂O label %. Blends are guidelines — actual nutrient release depends on soil pH, moisture, application method. ₱ rankings use prices from <em>Inventory → Fert Prices</em>.
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// NPK TRACKER — applied N, P, K per area vs typical irrigated rice rates
// ============================================================
// Walks the area's completed fertilizer tasks and sums N, P (as P2O5), K (as
// K2O) from the elemental percentages on each product:
//   14-14-14 → N 14%, P 14%, K 14%
//   46-0-0  → N 46% (urea)
//   0-0-60  → K 60% (muriate of potash)
//   21-0-0  → N 21% (ammonium sulfate)
// Uses actualInput_* values when entered; otherwise falls back to planned.
// Typical recommended rates per crop (per hectare):
//   Irrigated lowland rice: N 90–120, P2O5 30–60, K2O 30–60
//   Hybrid yellow corn:     N 150–200, P2O5 60–90, K2O 60–90
// Source: PhilRice / DA-BPI hybrid corn extension recommendations.
function NpkTracker({ areaTasks, ha, mobile, fertilizerPrices, setFertilizerPrices, crop }) {
  const stats = useMemo(() => {
    const FERT = {
      "14-14-14": { N: 0.14, P: 0.14, K: 0.14 },
      "46-0-0":   { N: 0.46, P: 0,    K: 0 },
      "0-0-60":   { N: 0,    P: 0,    K: 0.60 },
      "21-0-0":   { N: 0.21, P: 0,    K: 0 },
    };
    let N = 0, P = 0, K = 0;
    const breakdown = [];
    (areaTasks || [])
      .filter(t => (t.status === "Completed" || t.status === "Done") && Array.isArray(t.inputs))
      .forEach(t => {
        for (const inp of t.inputs) {
          const f = FERT[inp.item];
          if (!f) continue;
          const actual = t[`actualInput_${inp.item}`];
          const raw = (actual != null && actual !== "") ? String(actual) : (inp.amount || "");
          if (!raw) continue;
          const num = parseFloat(raw) || 0;
          const amt = raw.toLowerCase();
          const kg = amt.includes("bag") ? num * 50 : num;
          if (!kg) continue;
          N += kg * f.N; P += kg * f.P; K += kg * f.K;
          breakdown.push({ task: t.activity, item: inp.item, kg, N: kg * f.N, P: kg * f.P, K: kg * f.K });
        }
      });
    return { N, P, K, breakdown };
  }, [areaTasks]);

  // Recommended midpoints — crop-aware. Corn needs ~75% more N than rice
  // because each hectare grows ~6-7 t corn vs ~5 t rice, plus corn has higher
  // N uptake per kg of grain.
  const REC = (crop === 'corn')
    ? { N: 175, P: 75, K: 75 }
    : { N: 105, P: 45, K: 45 };
  const perHa = (kg) => ha > 0 ? kg / ha : 0;
  const pct = (kg, rec) => ha > 0 && rec > 0 ? Math.min(100, Math.round((kg / ha) / rec * 100)) : 0;
  const cell = (label, total, rec, color, bg) => {
    const pHa = perHa(total);
    const p = pct(total, rec);
    return (
      <div style={{ flex:"1 1 140px", padding:12, border:`1px solid ${color}33`, borderRadius:T_LIGHT_RADIUS, background:bg }}>
        <div style={{ fontSize:10, color, letterSpacing:".06em", fontWeight:700 }}>{label}</div>
        <div style={{ fontSize:20, fontWeight:800, color, marginTop:2 }}>{total.toFixed(1)} <span style={{ fontSize:11, fontWeight:600 }}>kg</span></div>
        <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{pHa.toFixed(1)} kg/ha {ha > 0 && <span style={{ color:"#888" }}>· {p}% of {rec} kg/ha target</span>}</div>
        {ha > 0 && (
          <div style={{ marginTop:6, background:"#eee", borderRadius:6, height:6, overflow:"hidden" }}>
            <div style={{ width:`${p}%`, height:"100%", background: color, transition:"width .3s" }} />
          </div>
        )}
      </div>
    );
  };
  const T_LIGHT_RADIUS = 10;

  return (
    <div style={{ padding: mobile ? "0 12px 14px" : "0 20px 18px" }}>
      <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding: mobile ? 14 : 18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:8, marginBottom:10 }}>
          <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>🧪 NPK Tracker</div>
          <div style={{ fontSize:11, color:"#888" }}>
            applied so far · {stats.breakdown.length} fertilizer event{stats.breakdown.length === 1 ? "" : "s"}
            {ha > 0 ? <> · over {ha} ha</> : <> · area in ha not set</>}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          {cell("NITROGEN (N)",    stats.N, REC.N, "#1565c0", "#e3f2fd")}
          {cell("PHOSPHORUS (P₂O₅)", stats.P, REC.P, "#7b1fa2", "#f3e5f5")}
          {cell("POTASSIUM (K₂O)", stats.K, REC.K, "#e65100", "#fff3e0")}
        </div>
        {stats.breakdown.length > 0 && (
          <details style={{ marginTop:10 }}>
            <summary style={{ cursor:"pointer", fontSize:11, color:"#666" }}>Breakdown by task ({stats.breakdown.length})</summary>
            <div style={{ marginTop:8, fontSize:11 }}>
              {stats.breakdown.map((b, i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"3px 0", borderBottom: i < stats.breakdown.length - 1 ? "1px dashed #eee" : "none" }}>
                  <span style={{ color:"#555" }}>{b.task} · <span style={{ color:"#888" }}>{b.item} {b.kg}kg{b.item !== 'FAA' && b.kg >= 25 ? ` (${(b.kg/50).toFixed(2)} bags)` : ''}</span></span>
                  <span style={{ fontFamily:"monospace", color:"#777" }}>N {b.N.toFixed(1)} · P {b.P.toFixed(1)} · K {b.K.toFixed(1)}</span>
                </div>
              ))}
            </div>
          </details>
        )}
        {stats.breakdown.length === 0 && (
          <div style={{ marginTop:6, fontSize:11, color:"#999" }}>No completed fertilizer tasks yet. Mark tasks ✓ as you apply fertilizer to see this update.</div>
        )}
        {/* Live fertilizer spend — uses manual prices from Inventory→Fert Prices. */}
        {stats.breakdown.length > 0 && (() => {
          const priceFor = (item) => {
            const rec = (fertilizerPrices || {})[item];
            if (!rec) return null;
            const v = rec.pricePerKg != null ? Number(rec.pricePerKg)
                    : rec.pricePerBag != null ? Number(rec.pricePerBag) / 50
                    : null;
            return (v != null && !isNaN(v) && v > 0) ? v : null;
          };
          let totalCost = 0;
          let pricedKg = 0;
          let unpriced = [];
          stats.breakdown.forEach(b => {
            const ppk = priceFor(b.item);
            if (ppk != null) { totalCost += b.kg * ppk; pricedKg += b.kg; }
            else if (b.item !== 'FAA') unpriced.push(b.item);
          });
          const uniqueUnpriced = [...new Set(unpriced)];
          const perHa = ha > 0 ? totalCost / ha : 0;
          return (
            <div style={{ marginTop:10, padding:"10px 12px", background:"#fff3e0", borderRadius:10, borderLeft:"4px solid #ef6c00" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:8 }}>
                <span style={{ fontSize:12, fontWeight:700, color:"#5d4037" }}>💰 Fertilizer spent (at current prices)</span>
                <span style={{ fontSize:16, fontWeight:800, color:"#e65100" }}>
                  {totalCost > 0 ? `₱${Math.round(totalCost).toLocaleString()}` : '—'}
                  {totalCost > 0 && ha > 0 && <span style={{ fontSize:11, color:"#888", fontWeight:600, marginLeft:6 }}>(₱{Math.round(perHa).toLocaleString()}/ha)</span>}
                </span>
              </div>
              {uniqueUnpriced.length > 0 && (
                <div style={{ fontSize:10, color:"#c62828", marginTop:4 }}>
                  Missing prices for: {uniqueUnpriced.join(', ')} — add them under Inventory → Fert Prices to include in the total.
                </div>
              )}
              {totalCost === 0 && (
                <div style={{ fontSize:10, color:"#888", marginTop:4 }}>
                  No prices entered yet. Open Inventory → Fert Prices to enter ₱/bag for each product.
                </div>
              )}
            </div>
          );
        })()}
        <details style={{ marginTop:12 }}>
          <summary style={{ cursor:"pointer", fontSize:12, color:"#f9a825", fontWeight:700 }}>💡 Fertilizer not available? Get a substitute</summary>
          <div style={{ marginTop:10 }}>
            <FertilizerCalculator mobile={mobile} fertilizerPrices={fertilizerPrices} setFertilizerPrices={setFertilizerPrices} />
          </div>
        </details>
      </div>
    </div>
  );
}

// ============================================================
// SUPERVISORS PANEL — manage who runs each area + their commission rate
// ============================================================
// Supervisors get 10% (or per-supervisor override) of an area's gross harvest
// revenue when crops are sold. Listed here as a registry; the Area form picks
// from this list. Free-text supervisor names from before this feature still
// work — they just show a "not in list" warning until added here.
function SupervisorsPanel({ supervisors, setSupervisors, areas, harvestLogs, mobile, isOwner }) {
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ name: "", contact: "", commissionPct: 10, notes: "" });

  const addSupervisor = () => {
    const name = (draft.name || "").trim();
    if (!name) return;
    if (supervisors.some(s => s.name.toLowerCase() === name.toLowerCase())) { alert("A supervisor with that name already exists."); return; }
    const id = supervisors.length ? Math.max(...supervisors.map(s => s.id || 0)) + 1 : 1;
    setSupervisors([...supervisors, { id, name, contact: draft.contact, commissionPct: Number(draft.commissionPct) || 10, notes: draft.notes }]);
    setDraft({ name: "", contact: "", commissionPct: 10, notes: "" });
    setShowAdd(false);
  };

  const removeSupervisor = (id) => {
    const sup = supervisors.find(s => s.id === id);
    if (!sup) return;
    const inUseAreas = areas.filter(a => a.managedBy === sup.name).map(a => a.name);
    const msg = inUseAreas.length
      ? `Remove ${sup.name}?\n\nThey're currently the supervisor for: ${inUseAreas.join(", ")}\nThose areas will show "${sup.name}" as a free-text name (with a warning) until you reassign them.`
      : `Remove ${sup.name}?`;
    if (!confirm(msg)) return;
    setSupervisors(supervisors.filter(s => s.id !== id));
  };

  const updateField = (id, field, value) => {
    setSupervisors(supervisors.map(s => s.id === id ? { ...s, [field]: field === "commissionPct" ? (Number(value) || 0) : value } : s));
  };

  // Per-supervisor stats: how many areas they manage, total porsiyento earned.
  // Each area can have its own commissionPct override; fall back to supervisor's
  // default rate, then to 10%.
  const stats = useMemo(() => {
    const out = {};
    for (const s of supervisors) {
      const sAreas = areas.filter(a => a.managedBy === s.name);
      let totalRev = 0;
      let totalCommission = 0;
      for (const a of sAreas) {
        const areaRev = (harvestLogs || [])
          .filter(h => h.area === a.name)
          .reduce((sum, h) => sum + ((h.totalKg || 0) * (h.buyerPrice || 0)), 0);
        const defaultPct = s.commissionPct != null ? s.commissionPct : 10;
        const pct = (a.commissionPct != null && a.commissionPct !== '') ? Number(a.commissionPct) : defaultPct;
        totalRev += areaRev;
        totalCommission += areaRev * (pct / 100);
      }
      out[s.id] = {
        areaCount: sAreas.length,
        areaNames: sAreas.map(a => a.name),
