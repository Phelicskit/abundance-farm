<!-- Resilient loader: tries multiple CDNs, no crossorigin attr (avoids file:// CORS issues),
     and makes Recharts optional (only used for one chart on the Dashboard). -->
<script>
(function() {
  var DEPS = [
    { global: 'React',      paths: [
        'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
        'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'
    ], required: true },
    { global: 'ReactDOM',   paths: [
        'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'
    ], required: true },
    { global: 'PropTypes',  paths: [
        'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
        'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js'
    ], required: false },
    { global: 'Recharts',   paths: [
        'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js',
        'https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js'
    ], required: false },
    { global: 'Babel',      paths: [
        'https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.9/babel.min.js',
        'https://unpkg.com/@babel/standalone@7.26.9/babel.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js'
    ], required: true }
  ];
  function loadScript(url) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = url; s.async = false;
      s.onload = function() { resolve(url); };
      s.onerror = function() { reject(new Error('Failed ' + url)); };
      document.head.appendChild(s);
    });
  }
  function tryLoad(dep) {
    var attempts = dep.paths.slice();
    function next() {
      if (!attempts.length) return Promise.reject(new Error(dep.global + ' unreachable'));
      var url = attempts.shift();
      return loadScript(url).then(function() {
        if (typeof window[dep.global] !== 'undefined') return dep.global;
        return next();
      }).catch(next);
    }
    return next();
  }
  (async function() {
    var missing = [];
    try { await tryLoad(DEPS[0]); } catch(e) { missing.push('React'); }
    try { await tryLoad(DEPS[1]); } catch(e) { missing.push('ReactDOM'); }
    await Promise.all(DEPS.slice(2).map(function(d) {
      return tryLoad(d).catch(function() {
        if (d.required) missing.push(d.global);
        if (d.global === 'Recharts') window.Recharts = null;
        if (d.global === 'PropTypes') window.PropTypes = null;
      });
    }));
    if (missing.length) {
      var s = document.getElementById('splash'); if (s) s.remove();
      document.getElementById('root').innerHTML =
        '<div class="ab-error"><h3>Can\u0027t load dependencies</h3>' +
        'Failed to load: <code>' + missing.join(', ') + '</code>. ' +
        'Open this file on a connected device, or host it on any static web server.</div>';
      throw new Error('Dependencies missing: ' + missing.join(', '));
    }
    if (!window.Recharts) {
      var noop = function() { return null; };
      window.Recharts = {
        BarChart: function(p) { return React.createElement('div', { style: { padding:16, textAlign:'center', color:'#8B9684', fontSize:12 } }, 'Chart unavailable (Recharts blocked by network)'); },
        Bar: noop, XAxis: noop, YAxis: noop, Tooltip: noop,
        ResponsiveContainer: function(p) { return React.createElement('div', {}, p.children); }
      };
    }
    // Wait for the HTML body to finish streaming before reading the
    // <script id="app-source"> content. On fast networks the CDN deps
    // (React/Babel) can finish loading before the 370KB body fully arrives,
    // causing this boot to read a truncated script and hit a phantom parse
    // error. Guard against that.
    function whenDocReady() {
      return new Promise(function(resolve) {
        if (document.readyState === 'complete') return resolve();
        window.addEventListener('load', function once() {
          window.removeEventListener('load', once);
          resolve();
        });
      });
    }
    try {
      await whenDocReady();
      var src = document.getElementById('app-source').textContent;
      var out = Babel.transform(src, { presets: ['react'] }).code;
      (new Function(out))();
    } catch(e) {
      var s = document.getElementById('splash'); if (s) s.remove();
      document.getElementById('root').innerHTML =
        '<div class="ab-error"><h3>App failed to start</h3>' +
        '<code style="display:block;white-space:pre-wrap;padding:8px;background:#F5F0E1;border-radius:6px;font-size:11px;overflow:auto;max-height:200px;">' +
        (e && e.stack ? e.stack : String(e)).replace(/</g,'&lt;') +
        '</code></div>';
      console.error(e);
    }
  })();
})();
</script>

<script type="text/plain" id="app-source">
/*
  Abundance Farm — Rice & Corn Operations
  Single-file web app. No build step.
  Original data & design from the Abundance Farm HTML, merged with the
  Rice Farm Operations React app (Dashboard, Areas, Accounting, Equipment,
  Inventory, Breeds). All state persists to localStorage.
*/
// Browser-runtime globals (UMD bundles)
const { useState, useMemo, useCallback, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

// ============================================================
// RESPONSIVE HOOK
// ============================================================
function useIsMobile(breakpoint = 768) {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w < breakpoint;
}

// ============================================================
// DATE HELPERS
// ============================================================
function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d));
}
function addDays(dateStr, n) {
  if (!dateStr) return "";
  const dt = parseDate(dateStr);
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().split("T")[0];
}
function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
// Day-of-week names used by fmtDate to prefix every formatted date.
// Including the day-of-week throughout the app helps supervisors plan around
// market days, government holidays, and weekly rest patterns.
const _WD_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function fmtDate(s) {
  if (!s) return "";
  const [y, m, d] = s.split("-").map(Number);
  // Use a noon UTC anchor to avoid timezone day-shift.
  const dt = new Date(Date.UTC(y, m - 1, d, 12));
  return `${_WD_SHORT[dt.getUTCDay()]}, ${MONTH_NAMES[m - 1]} ${d}, ${y}`;
}
const today = new Date().toISOString().split("T")[0];

// ============================================================
// FIFO COST ENGINE
// Given purchases (sorted by date) and consumption events,
// allocates cost using First-In-First-Out.
// Returns: { costByArea: { areaName: cost }, totalCost, breakdown: [...] }
// ============================================================
// Normalize a purchase list to canonical units (kg for fertilizers / chemicals,
// L for FAA). Consumptions are always in canonical units, so this ensures the
// FIFO pool depletes at the matching rate. Without this, buying 10 bags would
// leave only 10 "remaining" in the pool while a 100kg consumption would deplete
// the entire pool — making every area pay the full purchase price.
function normalizePurchasesToCanonical(purchases, item) {
  return (purchases || []).map(p => {
    const u = (p.unit || '').toLowerCase();
    if (u === 'bags' || u === 'bag') {
      return { ...p, qty: p.qty * 50, unitCost: p.unitCost / 50, _origUnit: u, _origQty: p.qty };
    }
    if (u === 'ml' && item === 'FAA') {
      return { ...p, qty: p.qty / 1000, unitCost: p.unitCost * 1000, _origUnit: u, _origQty: p.qty };
    }
    return p;
  });
}

function computeFifoCost(purchases, consumptions) {
  // purchases: [{ date, qty, unitCost, ...}] — already sorted by date
  // consumptions: [{ date, qty, area, taskName, item }] — sorted by date
  const pool = purchases.map(p => ({ ...p, remaining: p.qty }));
  const breakdown = [];
  let totalCost = 0;
  const costByArea = {};

  consumptions.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  for (const c of consumptions) {
    let needed = c.qty;
    let eventCost = 0;
    const lots = [];

    for (const lot of pool) {
      if (needed <= 0) break;
      if (lot.remaining <= 0) continue;
      const take = Math.min(lot.remaining, needed);
      lot.remaining -= take;
      const cost = take * (lot.unitCost || 0);
      eventCost += cost;
      needed -= take;
      lots.push({ purchaseDate: lot.date, qty: take, unitCost: lot.unitCost, cost, supplier: lot.supplier || "" });
    }

    totalCost += eventCost;
    if (!costByArea[c.area]) costByArea[c.area] = 0;
    costByArea[c.area] += eventCost;
    breakdown.push({ ...c, cost: eventCost, lots });
  }

  return { costByArea, totalCost, breakdown };
}

// Build consumption events from completed tasks across all areas
function buildConsumptionsFromTasks(allTasks) {
  const consumptions = [];
  allTasks.filter(t => t.status === "Completed" && t.inputs).forEach(t => {
    t.inputs.forEach(inp => {
      if (!inp.item || inp.item === "Herbicide" || inp.item === "Fungicide" || inp.item === "Insecticide") return;
      const actualKey = `actualInput_${inp.item}`;
      const actualVal = t[actualKey];
      const rawAmt = (actualVal != null && actualVal !== "") ? String(actualVal) : (inp.amount || "");
      if (!rawAmt) return;
      const num = parseFloat(rawAmt) || 0;
      const amt = rawAmt.toLowerCase();
      // Normalize to canonical units: kg for fertilizers/chemicals, L for FAA.
      let qty = num;
      if (amt.includes("bag")) qty = num * 50;
      // For FAA: amount may be stored as "4600 mL" or "4.6 L". Convert both to L.
      // NOTE: check "ml" BEFORE "l" — "4600 ml".includes("l") is true (matches the
      // L in "ml"), so the old `!amt.includes("l")` check skipped the mL→L
      // conversion and kept the raw mL value as if it were already L (1000× off).
      if (inp.item === "FAA") qty = amt.includes("ml") ? num / 1000 : num;
      consumptions.push({
        date: t.actEnd || t.planEnd || t.planStart,
        qty,
        area: t.area,
        taskName: t.activity,
        item: inp.item,
      });
    });
  });
  return consumptions;
}

// ============================================================
// PROTOCOL FORMULA ENGINE
// Reproduces the exact Excel formula chain from Rice Protocol.xltx
// Key inputs: area (ha), transplantDate (C26), maturity (days)
// Anchor: sowingDate (E16) = transplantDate - 16 days
// All other dates derive from these via the formula chain.
// ============================================================
function computeSchedule(area_ha, transplantDate, maturity, plantingMethod) {
  // plantingMethod: 'transplanting' (default) | 'wet-direct' | 'dry-direct'
  // For direct seeding the seedbed phase is skipped — `transplantDate` is
  // treated as the in-field seeding date, so C26 and E16 collapse to the
  // same day. Seedbed-mgmt tasks are filtered out at the bottom of this fn.
  const isDirect = plantingMethod === 'wet-direct' || plantingMethod === 'dry-direct';
  // C26 = transplantDate (user input). For direct seeding this IS the seeding day.
  const C26 = transplantDate;
  // E16 = C26 - 16 (Sowing date) for transplanting; same day as C26 for direct.
  const E16 = isDirect ? C26 : addDays(C26, -16);
  // B43 = E16 + maturity (Harvest)
  const B43 = addDays(E16, maturity);
  // B37 = B43 - 65 (Panicle Initiation)
  const B37 = addDays(B43, -65);

  // --- Seedling Management ---
  const E11 = addDays(E16, -2);       // Washing/Soaking start
  const F11 = addDays(E11, 1);        // Washing/Soaking end
  const E12 = addDays(E11, 1);        // Germination start
  const F12 = addDays(E12, 1);        // Germination end
  const E13 = E12;                    // Seedbed Prep start = Germination start
  const F13 = addDays(E13, 1);        // Seedbed Prep end
  const E14 = E13;                    // Basal Fert seedbed start
  const F14 = addDays(E14, 1);        // Basal Fert seedbed end
  // E16 = Sowing
  const E17 = addDays(E16, 5);        // Irrigate seedbed (2cm)
  const E18 = addDays(E17, 1);        // Pre-Emergent Herbicide seedbed
  const E20 = addDays(E16, 7);        // Fertilizer 21-0-0
  const E21_start = addDays(E16, 9);  // Irrigate saturated start
  const F21 = addDays(E16, 15);       // Irrigate saturated end
  const E23 = addDays(E16, 16);       // Seedling Pulling

  // --- Land Preparation ---
  const B11 = E11;                    // Rotavator start = Washing start
  const C11 = addDays(B11, 2);        // Rotavator end
  const B12 = E11;                    // Irrigate 5cm start
  const C12 = C11;                    // Irrigate 5cm end
  const B13 = addDays(C12, 2);        // Clean Dikes
  const B15 = addDays(B11, 7);        // 1st Harrow start
  const C15 = addDays(B15, 1);        // 1st Harrow end
  const B16 = B15;                    // Repair Dikes start
  const C16 = C15;                    // Repair Dikes end
  const B17 = addDays(B15, 2);        // Irrigate 5cm
  const B19 = addDays(B11, 14);       // Final Harrow
  const B20 = B19;                    // Water Level 2-3cm
  const B21 = addDays(B20, 3);        // Pre-Emergent Herbicide field
  const B22 = addDays(B21, 1);        // Basal Fertilizer field

  // --- Transplanting & Crop Care ---
  const B26 = addDays(E23, 1);        // Transplanting
  const B27 = addDays(B26, 3);        // Irrigate 2-3cm
  const B28 = addDays(B26, 10);       // 1st FAA Spray start
  const C28 = addDays(B26, 14);       // 1st FAA Spray end
  // B34 = B37-7, B31 = B34-7, B29 = B31-7 (cascade backward from Panicle)
  const B34 = addDays(B37, -7);       // N3K3
  const B31 = addDays(B34, -7);       // N2K2
  const B29 = addDays(B31, -7);       // N1K1
  const B30 = addDays(B29, 4);        // Irrigate start after N1K1
  const C30 = addDays(B29, 6);        // Irrigate end after N1K1
  const G30 = addDays(B26, 21);       // Weed control date
  const B32 = addDays(B31, 4);        // Irrigate start after N2K2
  const C32 = addDays(B31, 6);        // Irrigate end after N2K2
  const B33 = addDays(B37, -10);      // Fungicide Spray 1
  const B35 = addDays(B34, 4);        // Irrigate 5cm start after N3K3
  const C35 = addDays(B34, 6);        // Irrigate 5cm end
  const B36 = addDays(B26, 30);       // 2nd FAA start
  const C36 = addDays(B26, 35);       // 2nd FAA end
  const B38 = addDays(B37, 7);        // K Application
  const B39 = addDays(B26, 45);       // 3rd FAA start
  const C39 = addDays(B26, 50);       // 3rd FAA end
  const B41 = addDays(B37, 27);       // Booting
  const B40 = addDays(B41, -7);       // Fungicide Spray 2
  const B42 = addDays(B41, 9);        // Flowering

  // --- Quantity formulas ---
  const basalSeedbedKg = area_ha * 25;   // G14 = D4*25 & " kg"
  const fert2100Kg = area_ha * 5;        // G20 = D4*5 & " kg"
  const basalFieldBags = `${(area_ha * 250) / 50} bags 14-14-14`; // C22
  const urea_N1K1 = area_ha * 50;        // D29
  const mop_N1K1 = area_ha * 15;         // E29
  const urea_N2K2 = urea_N1K1;           // D31 = D29
  const mop_N2K2 = mop_N1K1;             // E31 = E29
  const urea_N3K3 = urea_N1K1;           // D34 = D31
  const mop_N3K3 = area_ha * 20;         // E34
  const mop_K = area_ha * 50;            // E38
  const faa_mL = area_ha * 2000;         // F28 = D4*2000
  // Totals: D44 = SUM(D29,D31,D34)/50, E44 = SUM(E29,E31,E34,E38)/50, F44 = SUM * 3

  const schedule = {
    sowingDate: E16,
    harvestDate: B43,
    panicleDate: B37,
    tasks: [
      // Land Preparation
      { id:1, activity:"Rotavator", phase:"Land Prep", planStart:B11, planEnd:C11, formula:"E16-2 → E16" },
      { id:2, activity:"Irrigate (5cm)", phase:"Land Prep", planStart:B12, planEnd:C12, formula:"=E11 → =B11+2" },
      { id:3, activity:"Clean Dikes", phase:"Land Prep", planStart:B13, planEnd:B13, formula:"=C12+2" },
      { id:4, activity:"1st Harrow", phase:"Land Prep", planStart:B15, planEnd:C15, formula:"=B11+7 → +1" },
      { id:5, activity:"Repair Dikes", phase:"Land Prep", planStart:B16, planEnd:C16, formula:"=B15 → =C15" },
      { id:6, activity:"Irrigate (5cm)", phase:"Land Prep", planStart:B17, planEnd:B17, formula:"=B15+2" },
      { id:7, activity:"Final Harrow", phase:"Land Prep", planStart:B19, planEnd:B19, formula:"=B11+14" },
      { id:8, activity:"Water Level (2-3cm)", phase:"Land Prep", planStart:B20, planEnd:B20, formula:"=B19" },
      { id:9, activity:"Pre-Emergent Herbicide", phase:"Land Prep", planStart:B21, planEnd:B21, formula:"=B20+3", inputs:[{item:"Herbicide"}] },
      { id:10, activity:"Basal Fertilizer (Field)", phase:"Land Prep", planStart:B22, planEnd:B22, formula:"=B21+1", inputs:[{item:"14-14-14", amount:`${(area_ha*250)/50} bags`}] },
      // Seedling Management
      { id:11, activity:"Washing/Soaking", phase:"Seedling Mgmt", planStart:E11, planEnd:F11, formula:"=E16-2 → +1" },
      { id:12, activity:"Germination", phase:"Growth Stage", planStart:E12, planEnd:F12, formula:"=E11+1 → +1" },
      { id:13, activity:"Seedbed Preparation", phase:"Seedling Mgmt", planStart:E13, planEnd:F13, formula:"=E12 → +1" },

      { id:15, activity:"Sowing", phase:"Seedling Mgmt", planStart:E16, planEnd:E16, formula:"=C26-16 (anchor)" },
      { id:16, activity:"Irrigate Seedbed (2cm)", phase:"Seedling Mgmt", planStart:E17, planEnd:E17, formula:"=E16+5" },

      // AWD (Alternate Wetting and Drying) cycles — safe AWD: re-flood to 5cm,

      { id:101, activity:"AWD Cycle 1 · check field water tube", phase:"Crop Care", planStart:addDays(B26, 7),  planEnd:addDays(B26, 10), formula:"=B26+7", awd:true, awdCycle:1, awdNote:"Water should now be ~10–15cm below soil surface in the tube. If yes → re-flood to 5cm. If still wet → wait 1–2 days." },

      { id:24, activity:"N1K1", phase:"Crop Care", planStart:B29, planEnd:B29, formula:"=B31-7", inputs:[{item:"46-0-0", amount:`${urea_N1K1} kg`},{item:"0-0-60", amount:`${mop_N1K1} kg`}] },

      { id:27, activity:"N2K2", phase:"Crop Care", planStart:B31, planEnd:B31, formula:"=B34-7", inputs:[{item:"46-0-0", amount:`${urea_N2K2} kg`},{item:"0-0-60", amount:`${mop_N2K2} kg`}] },
      { id:28, activity:"Irrigate (2-3cm)", phase:"Crop Care", planStart:B32, planEnd:C32, formula:"=B31+4 → +6" },

      { id:30, activity:"N3K3", phase:"Crop Care", planStart:B34, planEnd:B34, formula:"=B37-7", inputs:[{item:"46-0-0", amount:`${urea_N3K3} kg`},{item:"0-0-60", amount:`${mop_N3K3} kg`}] },
      { id:31, activity:"Irrigate (5cm)", phase:"Crop Care", planStart:B35, planEnd:C35, formula:"=B34+4 → +6" },
      { id:104, activity:"AWD pause · flood for panicle initiation", phase:"Crop Care", planStart:addDays(B37, -3), planEnd:addDays(B37, -1), formula:"=B37−3", awd:true, awdCycle:'end', awdNote:"Stop AWD cycles. Re-flood and keep field flooded from panicle initiation through flowering & early grain-filling (most water-sensitive period)." },
      { id:32, activity:"2nd FAA Spray", phase:"Crop Care", planStart:B36, planEnd:C36, formula:"=B26+30 → +35", inputs:[{item:"FAA", amount:`${faa_mL} mL`}] },
      // Growth Stages
      { id:33, activity:"Panicle Initiation", phase:"Growth Stage", planStart:B37, planEnd:B37, formula:"=B43-65" },
      { id:34, activity:"K Application", phase:"Crop Care", planStart:B38, planEnd:B38, formula:"=B37+7", inputs:[{item:"0-0-60", amount:`${mop_K} kg`}] },
      { id:35, activity:"3rd FAA Spray", phase:"Crop Care", planStart:B39, planEnd:C39, formula:"=B26+45 → +50", inputs:[{item:"FAA", amount:`${faa_mL} mL`}] },
      { id:36, activity:"Fungicide Spray 2", phase:"Crop Care", planStart:B40, planEnd:B40, formula:"=B41-7", inputs:[{item:"Fungicide"}] },
      { id:37, activity:"Booting", phase:"Growth Stage", planStart:B41, planEnd:B41, formula:"=B37+27" },
      { id:38, activity:"Flowering", phase:"Growth Stage", planStart:B42, planEnd:B42, formula:"=B41+9" },
      { id:39, activity:"Harvesting", phase:"Harvest", planStart:B43, planEnd:B43, formula:"=E16+maturity" },
    ],
    quantities: {
      basalSeedbedKg, fert2100Kg, basalFieldBags,
      urea_N1K1, mop_N1K1, urea_N2K2, mop_N2K2, urea_N3K3, mop_N3K3, mop_K, faa_mL,
      totalUreaBags: (urea_N1K1 + urea_N2K2 + urea_N3K3) / 50,
      totalMOPBags: (mop_N1K1 + mop_N2K2 + mop_N3K3 + mop_K) / 50,
      totalFAA_L: faa_mL * 3,
    }
  };
  // For direct-seeded parcels: drop seedbed tasks (raised at the nursery) and
  // the seedling-pulling step, and rename "Transplanting" to "Direct Seeding".
  if (isDirect) {
    const seedlingIds = new Set([11, 12, 13, 14, 16, 17, 18, 19, 20]); // keep id:15 Sowing → repurpose below
    schedule.tasks = schedule.tasks.filter(t => !seedlingIds.has(t.id));
    const sowing = schedule.tasks.find(t => t.id === 15);
    if (sowing) {
      sowing.activity = plantingMethod === 'dry-direct' ? "Direct Seeding (dry-DSR)" : "Direct Seeding (wet-DSR · broadcast)";
      sowing.phase = "Crop Care";
      sowing.formula = "=seeding date (user)";
    }
    const transplant = schedule.tasks.find(t => t.id === 21);
    if (transplant) {
      // Already-anchored sowing covers this — drop the redundant Transplanting row.
      schedule.tasks = schedule.tasks.filter(t => t.id !== 21);
    }
    // Direct seeding uses less basal at "seedbed" because there is no seedbed.
    schedule.quantities.basalSeedbedKg = 0;
    schedule.quantities.fert2100Kg = 0;
  }
  return schedule;
}

// ============================================================
// Ka Danny Bolos protocol — alternative Filipino rice protocol
// ============================================================
// Source: viral Filipino farming guide attributed to Ka Danny Bolos.
// Key differences from the default protocol:
//   • Sowing → transplant on day 18 (vs day 17 default)
//   • Seedbed gets 21-0-0 (ammonium sulfate) at day 8-12 (1 bag/ha)
//   • First field fertilizer: 25-0-0 ammonium chloride 8-13 DAT, 2 bags/ha
//   • Second: marca bulaklak 1-6-16-8 (or 14-14-14 fallback), 5 bags/ha at 18-25 DAT
//   • Third: 17-0-17 or 0-0-60 top-dress at 50-55 days from sowing
//   • Fish amino acid (FAA) applied 10-12 times across the cycle
//   • Recommends 25 kg seed/ha for higher yield potential (vs default 15 kg)
function computeKaDannyBolosSchedule(area_ha, transplantDate, maturity, plantingMethod) {
  const isDirect = plantingMethod === 'wet-direct' || plantingMethod === 'dry-direct';
  const addDays = (date, days) => {
    const d = new Date(date);
    d.setDate(d.getDate() + days);
    return d.toISOString().split("T")[0];
  };

  // Anchor on transplant date (same convention as default protocol).
  // Ka Danny: transplant = sowing + 18 days, so sowing = transplant - 18.
  // For direct seeding: sowing and transplant collapse to the same day (no seedbed).
  const E16 = isDirect ? transplantDate : addDays(transplantDate, -18);
  const B26 = transplantDate;                    // Transplant day (= seeding day for direct)
  const B43 = isDirect ? addDays(B26, maturity) : addDays(B26, maturity - 18);

  // Quantities (per hectare scaled)
  const seedKg     = Math.round(25 * area_ha);          // 25 kg/ha (Ka Danny boosted rate)
  const amSulf21Bags = 1 * area_ha;                     // 21-0-0 seedbed: 1 bag/ha
  const amChlBags  = 2 * area_ha;                       // 25-0-0 field: 2 bags/ha
  const bulaklakBags = 5 * area_ha;                     // 1-6-16-8 or 14-14-14: 5 bags/ha
  const topDressBags = 2 * area_ha;                     // 17-0-17 or 0-0-60: ~2 bags/ha (typical)
  const faa_mL     = Math.round(500 * area_ha);         // ~500ml/ha per FAA application

  // FAA application dates — spaced ~10 days across cycle, 10 applications
  const faaStarts = [];
  for (let i = 0; i < 10; i++) {
    faaStarts.push(addDays(E16, 5 + i * 11));
  }

  const schedule = {
    protocolName: "Ka Danny Bolos",
    transplantDate: B26,
    sowingDate: E16,
    harvestDate: B43,
    panicleDate: addDays(B26, maturity - 65),
    tasks: [
      // Land Prep — same as default (simplified)
      { id:201, activity:"Land Prep — rotavate, harrow, level", phase:"Land Prep", planStart:addDays(B26,-14), planEnd:addDays(B26,-1), formula:"transplant−14 → −1" },
      // Seedling phase
      { id:202, activity:"Sowing (25 kg seed/ha)", phase:"Seedling Mgmt", planStart:E16, planEnd:E16, formula:"transplant−18", inputs:[{ item:"Seed", amount:`${seedKg} kg` }] },
      { id:203, activity:"Apply 21-0-0 (ammonium sulfate) to seedbed", phase:"Seedling Mgmt", planStart:addDays(E16, 8), planEnd:addDays(E16, 12), formula:"sowing+8 → +12", inputs:[{ item:"21-0-0", amount:`${amSulf21Bags} bags` }] },
      { id:204, activity:"Seedling pulling", phase:"Seedling Mgmt", planStart:addDays(B26,-1), planEnd:addDays(B26,-1), formula:"transplant−1" },
      // Crop Care
      { id:205, activity:"Transplanting", phase:"Crop Care", planStart:B26, planEnd:B26, formula:"day 0 (=transplantDate)" },
      { id:206, activity:"Apply 25-0-0 (ammonium chloride)", phase:"Crop Care", planStart:addDays(B26, 8), planEnd:addDays(B26, 13), formula:"transplant+8 → +13", inputs:[{ item:"25-0-0", amount:`${amChlBags} bags` }] },
      { id:207, activity:"Apply 1-6-16-8 (marca bulaklak) — or 14-14-14 if unavailable", phase:"Crop Care", planStart:addDays(B26, 18), planEnd:addDays(B26, 25), formula:"transplant+18 → +25", inputs:[{ item:"14-14-14", amount:`${bulaklakBags} bags` }] },
      { id:208, activity:"Top-dress 17-0-17 (or 0-0-60)", phase:"Crop Care", planStart:addDays(E16, 50), planEnd:addDays(E16, 55), formula:"sowing+50 → +55", inputs:[{ item:"0-0-60", amount:`${topDressBags} bags` }] },
      // FAA applications x10, ~every 11 days
      ...faaStarts.map((d, i) => ({
        id: 210 + i,
        activity: `FAA application ${i + 1} of 10`,
        phase: i < 2 ? "Seedling Mgmt" : (i < 8 ? "Crop Care" : "Growth Stage"),
        planStart: d,
        planEnd: d,
        formula: `sowing+${5 + i * 11}`,
        inputs: [{ item: "FAA", amount: `${faa_mL} mL` }],
      })),
      // Growth Stages
      { id:230, activity:"Panicle Initiation", phase:"Growth Stage", planStart: addDays(B26, maturity - 65), planEnd: addDays(B26, maturity - 65), formula:"transplant + (maturity−65)" },
      { id:231, activity:"Flowering", phase:"Growth Stage", planStart: addDays(B26, maturity - 47), planEnd: addDays(B26, maturity - 47), formula:"transplant + (maturity−47)" },
      { id:232, activity:"Harvesting", phase:"Harvest", planStart: B43, planEnd: B43, formula:"sowing + maturity" },
    ],
    quantities: {
      seedKg,
      amSulf21Bags, amChlBags, bulaklakBags, topDressBags,
      faaApplications: 10,
      faa_mL,
      totalFAA_L: (faa_mL * 10) / 1000,
    },
  };
  // Direct-seeded variant: drop the seedling phase, rename Sowing → Direct Seeding,
  // remove the redundant Transplanting row.
  if (isDirect) {
    const seedlingIds = new Set([203, 204]); // 202 = sowing (we'll repurpose)
    schedule.tasks = schedule.tasks.filter(t => !seedlingIds.has(t.id) && t.id !== 205);
    const sowing = schedule.tasks.find(t => t.id === 202);
    if (sowing) {
      sowing.activity = plantingMethod === 'dry-direct' ? "Direct Seeding (dry-DSR, 25 kg seed/ha)" : "Direct Seeding (wet-DSR, broadcast, 25 kg seed/ha)";
      sowing.phase = "Crop Care";
      sowing.formula = "=seeding date (user)";
    }
  }
  return schedule;
}

// ============================================================
// CORN PROTOCOL ENGINE — Standard PH hybrid corn (default)
// ============================================================
// Reference: PhilMech / DA-BPI hybrid corn recommendations + common
// Cagayan Valley practice. Yellow hybrid corn (Pioneer/Dekalb), ~110 day
// maturity, direct-seeded (no transplanting), rain-fed or pump-irrigated.
//
// Anchor: plantingDate (B26 in the rice engine). All fertilizer side-
// dressings reference DAP (Days After Planting). Quantities are per-ha
// scaled.
//
// Standard hybrid corn fertilizer schedule (per ha):
//   • Basal at planting:    3 bags 14-14-14 (≈ 150 kg)
//   • 1st side-dress 18–22 DAP (V6 / knee-high):  4 bags 46-0-0 (200 kg urea)
//   • 2nd side-dress 38–42 DAP (V12 / pre-tassel): 3 bags 46-0-0 + 1 bag 0-0-60
//
// Total ~7 bags urea + 3 bags complete + 1 bag MOP/ha = standard ~200-90-60
// kg N-P2O5-K2O for hybrid yellow corn targeting 6-7 t/ha.
// ============================================================
function computeCornStandardSchedule(area_ha, plantingDate, maturity, plantingMethod) {
  // For corn, "transplantDate" field is repurposed as plantingDate.
  // plantingMethod is informational only (always direct-seeded in PH practice);
  // 'transplanting' is treated identically.
  const C26 = plantingDate;          // Planting day anchor
  const B43 = addDays(C26, maturity); // Harvest = planting + maturity
  // Reproductive stages (typical hybrid yellow corn, 110d maturity)
  const tassel  = addDays(C26, 55);   // VT — tasseling
  const silk    = addDays(C26, 62);   // R1 — silking / pollination
  const milk    = addDays(C26, 75);   // R3 — milk stage
  const dent    = addDays(C26, 90);   // R5 — dent stage
  // Vegetative milestones
  const v6      = addDays(C26, 20);   // ~knee-high, 1st side-dress window
  const v12     = addDays(C26, 40);   // pre-tassel, 2nd side-dress window

  // Land prep
  const lpStart = addDays(C26, -14);
  const lpEnd   = addDays(C26, -1);

  // Quantity formulas (per ha scaled)
  const basal_14_14_14_bags = Math.round(3 * area_ha * 10) / 10;       // 3 bags/ha
  const basal_14_14_14_kg   = basal_14_14_14_bags * 50;
  const sd1_urea_bags       = Math.round(4 * area_ha * 10) / 10;       // 4 bags/ha urea at V6
  const sd1_urea_kg         = sd1_urea_bags * 50;
  const sd2_urea_bags       = Math.round(3 * area_ha * 10) / 10;       // 3 bags/ha urea at V12
  const sd2_urea_kg         = sd2_urea_bags * 50;
  const sd2_mop_bags        = Math.round(1 * area_ha * 10) / 10;       // 1 bag/ha 0-0-60 at V12
  const sd2_mop_kg          = sd2_mop_bags * 50;
  const seedKg              = Math.round(18 * area_ha);                // ~18 kg seed/ha for hybrid yellow

  const schedule = {
    crop: 'corn',
    protocolName: "Corn Standard (Hybrid)",
    plantingDate: C26,
    sowingDate: C26,
    harvestDate: B43,
    tasselDate: tassel,
    silkDate: silk,
    tasks: [
      // Land Preparation
      { id:301, activity:"Land Prep — plough/rotavate", phase:"Land Prep", planStart:lpStart, planEnd:addDays(lpStart, 5), formula:"planting−14 → −9" },
      { id:302, activity:"Harrow + level", phase:"Land Prep", planStart:addDays(lpStart, 7), planEnd:addDays(lpStart, 10), formula:"planting−7 → −4" },
      { id:303, activity:"Furrowing / row layout (75cm rows)", phase:"Land Prep", planStart:addDays(lpEnd, -2), planEnd:lpEnd, formula:"planting−3 → −1" },
      // Planting & Basal
      { id:304, activity:"Planting (drill or hill, ~20 cm hill spacing)", phase:"Crop Care", planStart:C26, planEnd:C26, formula:"=plantingDate", inputs:[{ item:"Seed", amount:`${seedKg} kg` }] },
      { id:305, activity:"Basal Fertilizer (place 5cm beside seed)", phase:"Crop Care", planStart:C26, planEnd:C26, formula:"=plantingDate", inputs:[{ item:"14-14-14", amount:`${basal_14_14_14_kg} kg` }] },
      { id:306, activity:"Pre-Emergent Herbicide", phase:"Crop Care", planStart:C26, planEnd:addDays(C26, 2), formula:"plant+0 → +2", inputs:[{ item:"Herbicide" }] },
      // Vegetative care
      { id:307, activity:"1st Inter-row Cultivation / Hilling", phase:"Crop Care", planStart:addDays(C26, 14), planEnd:addDays(C26, 16), formula:"plant+14 → +16" },
      { id:308, activity:"1st Side-dress Urea (V6 · knee-high)", phase:"Crop Care", planStart:addDays(C26, 18), planEnd:addDays(C26, 22), formula:"plant+18 → +22", inputs:[{ item:"46-0-0", amount:`${sd1_urea_kg} kg` }] },
      { id:309, activity:"Spot Spray / Weed Control", phase:"Crop Care", planStart:addDays(C26, 25), planEnd:addDays(C26, 27), formula:"plant+25 → +27", inputs:[{ item:"Herbicide" }] },
      { id:310, activity:"2nd Side-dress Urea + MOP (V12 · pre-tassel)", phase:"Crop Care", planStart:addDays(C26, 38), planEnd:addDays(C26, 42), formula:"plant+38 → +42", inputs:[{ item:"46-0-0", amount:`${sd2_urea_kg} kg` },{ item:"0-0-60", amount:`${sd2_mop_kg} kg` }] },
      { id:311, activity:"Fungicide Spray (optional · for southern rust / blight)", phase:"Crop Care", planStart:addDays(C26, 50), planEnd:addDays(C26, 55), formula:"plant+50 → +55", inputs:[{ item:"Fungicide" }] },
      // Reproductive
      { id:312, activity:"Tasseling (VT) — monitor pollination", phase:"Growth Stage", planStart:tassel, planEnd:tassel, formula:"plant+55" },
      { id:313, activity:"Silking (R1) — peak water need", phase:"Growth Stage", planStart:silk, planEnd:silk, formula:"plant+62" },
      { id:314, activity:"Milk Stage (R3)", phase:"Growth Stage", planStart:milk, planEnd:milk, formula:"plant+75" },
      { id:315, activity:"Dent Stage (R5) — taper irrigation", phase:"Growth Stage", planStart:dent, planEnd:dent, formula:"plant+90" },
      { id:316, activity:"Harvesting (35-day air-dry or fresh sell)", phase:"Harvest", planStart:B43, planEnd:addDays(B43, 3), formula:"plant+maturity" },
    ],
    quantities: {
      seedKg,
      basal_14_14_14_bags, basal_14_14_14_kg,
      sd1_urea_bags, sd1_urea_kg,
      sd2_urea_bags, sd2_urea_kg,
      sd2_mop_bags,  sd2_mop_kg,
      totalUreaBags: sd1_urea_bags + sd2_urea_bags,
      totalCompleteBags: basal_14_14_14_bags,
      totalMOPBags: sd2_mop_bags,
    },
  };
  return schedule;
}

// ============================================================
// ALT-FERTILIZER PROTOCOLS — same agronomic schedule, swap to cheaper N-P-K
// ============================================================
// Rationale: 14-14-14 (complete) is typically the most expensive per kg of
// nutrient because you pay for all 3 elements at once. When fertilizer prices
// spike, splitting into single-nutrient products gives the same N-P-K at lower
// ₱/kg-nutrient — at the cost of one extra application pass.
//
// Substitutions used:
//   14-14-14 → 16-20-0 (Ammophos) + 0-0-60 (MOP) at ratio 0.5 / 0.35 of source kg
//   46-0-0   → 21-0-0 (Ammonium Sulfate) when 21-0-0 ₱/kgN is cheaper
//
// We accept a `prices` map { item: pricePerKg } and pick the cheapest path per
// task at compute-time. If `prices` is empty/missing we fall back to a fixed
// "16-20-0 + 0-0-60" alternative.
// ============================================================

// Per-kg nutrient cost helper. Returns ₱ per kg of dominant nutrient (kg-N
// for N-rich products, kg-P2O5 for phosphates, kg-K2O for potash). Used to
// rank substitutes inside the alt-fertilizer protocols.
function pricePerKgNutrient(item, pricePerKg, FERT_DB) {
  const f = FERT_DB[item];
  if (!f || pricePerKg == null) return null;
  const dominant = Math.max(f.N, f.P, f.K);
  return dominant > 0 ? pricePerKg / (dominant / 100) : null;
}

// Build the rice alt-fertilizer protocol by taking the default schedule and
// rewriting fertilizer inputs to cheaper splits. Pure function — does not
// mutate the source schedule.
function computeRiceAltFertSchedule(area_ha, transplantDate, maturity, plantingMethod, prices) {
  const base = computeSchedule(area_ha, transplantDate, maturity, plantingMethod);
  const p = prices || {};

  // Decide N source for top-dress: 46-0-0 vs 21-0-0 vs 25-0-0 — pick cheapest
  // ₱/kgN. Default to 46-0-0 if no prices available.
  const nCandidates = [
    { item: "46-0-0", pctN: 0.46 },
    { item: "21-0-0", pctN: 0.21 },
    { item: "25-0-0", pctN: 0.25 },
  ].filter(c => p[c.item] != null).map(c => ({ ...c, pesoPerKgN: p[c.item] / c.pctN }));
  nCandidates.sort((a, b) => a.pesoPerKgN - b.pesoPerKgN);
  const bestN = nCandidates[0] || { item: "46-0-0", pctN: 0.46 };

  const tasks = base.tasks.map(t => {
    if (!Array.isArray(t.inputs)) return t;
    const newInputs = t.inputs.map(inp => {
      // 14-14-14 → 16-20-0 + 0-0-60 (split)
      if (inp.item === "14-14-14") {
        const kg = parseAmountToKg(inp.amount);
        const ammoKg = Math.round(kg * 0.5 * 10) / 10;
        const mopKg  = Math.round(kg * 0.35 * 10) / 10;
        return [
          { item: "16-20-0", amount: `${ammoKg} kg`, _altSwapFrom: inp.item, _altSwapNote: "Alt-fert: 16-20-0 supplies more P per ₱" },
          { item: "0-0-60",  amount: `${mopKg} kg`, _altSwapFrom: inp.item, _altSwapNote: "Alt-fert: split-out K from 14-14-14" },
        ];
      }
      // 46-0-0 → cheapest available N source (only if alternative is cheaper per kgN)
      if (inp.item === "46-0-0" && bestN.item !== "46-0-0") {
        const kg = parseAmountToKg(inp.amount);
        const targetNkg = kg * 0.46;
        const newKg = Math.round((targetNkg / bestN.pctN) * 10) / 10;
        return [{ item: bestN.item, amount: `${newKg} kg`, _altSwapFrom: inp.item, _altSwapNote: `Alt-fert: ${bestN.item} cheaper per kg-N` }];
      }
      return [inp];
    }).flat();
    return { ...t, inputs: newInputs };
  });

  return {
    ...base,
    protocolName: "Rice Alt-Fertilizer (price-optimised)",
    tasks,
    altFertNote: nCandidates.length === 0
      ? "Using fixed substitutions (no manual prices set yet — add prices to enable price-based optimization)."
      : `Cheapest N source: ${bestN.item} at ₱${(bestN.pesoPerKgN || 0).toFixed(2)}/kg-N.`,
  };
}

// Build the corn alt-fertilizer protocol the same way, starting from the
// standard corn schedule.
function computeCornAltFertSchedule(area_ha, plantingDate, maturity, plantingMethod, prices) {
  const base = computeCornStandardSchedule(area_ha, plantingDate, maturity, plantingMethod);
  const p = prices || {};
  const nCandidates = [
    { item: "46-0-0", pctN: 0.46 },
    { item: "21-0-0", pctN: 0.21 },
    { item: "25-0-0", pctN: 0.25 },
  ].filter(c => p[c.item] != null).map(c => ({ ...c, pesoPerKgN: p[c.item] / c.pctN }));
  nCandidates.sort((a, b) => a.pesoPerKgN - b.pesoPerKgN);
  const bestN = nCandidates[0] || { item: "46-0-0", pctN: 0.46 };

  const tasks = base.tasks.map(t => {
    if (!Array.isArray(t.inputs)) return t;
    const newInputs = t.inputs.map(inp => {
      if (inp.item === "14-14-14") {
        const kg = parseAmountToKg(inp.amount);
        const ammoKg = Math.round(kg * 0.5 * 10) / 10;
        const mopKg  = Math.round(kg * 0.35 * 10) / 10;
        return [
          { item: "16-20-0", amount: `${ammoKg} kg`, _altSwapFrom: inp.item, _altSwapNote: "Alt-fert: 16-20-0 + MOP delivers more P per ₱ than 14-14-14" },
          { item: "0-0-60",  amount: `${mopKg} kg`, _altSwapFrom: inp.item, _altSwapNote: "Alt-fert: split-out K from 14-14-14" },
        ];
      }
      if (inp.item === "46-0-0" && bestN.item !== "46-0-0") {
        const kg = parseAmountToKg(inp.amount);
        const targetNkg = kg * 0.46;
        const newKg = Math.round((targetNkg / bestN.pctN) * 10) / 10;
        return [{ item: bestN.item, amount: `${newKg} kg`, _altSwapFrom: inp.item, _altSwapNote: `Alt-fert: ${bestN.item} cheaper per kg-N` }];
      }
      return [inp];
    }).flat();
    return { ...t, inputs: newInputs };
  });

  return {
    ...base,
    protocolName: "Corn Alt-Fertilizer (price-optimised)",
    tasks,
    altFertNote: nCandidates.length === 0
      ? "Using fixed substitutions (no manual prices set yet — add prices to enable price-based optimization)."
      : `Cheapest N source: ${bestN.item} at ₱${(bestN.pesoPerKgN || 0).toFixed(2)}/kg-N.`,
  };
}

// Tiny helper used by the alt-fert builders to parse "150 kg" / "3 bags" → kg.
function parseAmountToKg(amountStr) {
  if (!amountStr) return 0;
  const s = String(amountStr).toLowerCase();
  const num = parseFloat(s) || 0;
  if (s.includes("bag")) return num * 50;
  return num; // assume kg
}

// Sum the planned ₱ cost of every fertilizer input in a schedule, using the
// given ₱/kg price map. Returns { totalCost, costed, missing } so callers can
// say "X% of inputs priced" and warn if prices are missing. Used by:
//   • Alt-fert savings preview (compare default schedule cost vs alt-fert cost)
//   • Per-field batch optimizer (sum planned spend next 14 days across areas)
function planSchedCost(sched, pricesPerKg) {
  const prices = pricesPerKg || {};
  let totalCost = 0;
  let costedKg = 0;
  const missing = new Set();
  (sched.tasks || []).forEach(t => {
    if (!Array.isArray(t.inputs)) return;
    t.inputs.forEach(inp => {
      const item = inp.item;
      if (!item || item === 'Seed' || item === 'Herbicide' || item === 'Fungicide') return;
      const kg = parseAmountToKg(inp.amount);
      if (kg <= 0) return;
      const ppk = prices[item];
      if (ppk == null || isNaN(ppk) || ppk <= 0) { missing.add(item); return; }
      totalCost += kg * ppk;
      costedKg += kg;
    });
  });
  return { totalCost, costedKg, missing: [...missing] };
}

// ============================================================
// DASHBOARD
// ============================================================
function Dashboard(props) {
  const tasks = props.tasks;
  const areas = props.areas;
  const schedules = props.schedules;
  const purchases = props.purchases;
  const harvestLogs = props.harvestLogs;
  const laborLogs = props.laborLogs;
  const inventoryAlerts = props.inventoryAlerts;
  const mobile = useIsMobile();
  const activeAreas = areas.filter(a => a.name && a.status === "Active");
  const totalHa = areas.reduce((s, a) => s + (a.ha || 0), 0);
  const completed = tasks.filter(t => t.status === "Completed").length;
  const inProgress = tasks.filter(t => t.status === "In Progress").length;
  const totalSpend = purchases.reduce((s, p) => s + ((p.qty || 0) * (p.unitCost || 0)), 0);
  const overallPct = tasks.length ? Math.round(completed / tasks.length * 100) : 0;

  const phaseData = PHASES.map(p => {
    const all = tasks.filter(t => t.phase === p);
    const done = all.filter(t => t.status === "Completed").length;
    return { phase: p, total: all.length, done, pct: all.length ? Math.round(done / all.length * 100) : 0 };
  });

  // Spending by inventory item from purchases
  const itemSpend = {};
  purchases.forEach(p => {
    if (!itemSpend[p.item]) itemSpend[p.item] = 0;
    itemSpend[p.item] += (p.qty || 0) * (p.unitCost || 0);
  });
  const spendData = Object.entries(itemSpend).map(([name, actual]) => ({ name, actual })).filter(c => c.actual > 0);

  // Shared "is task closed" predicate — keep in sync with the badge logic
  // in RootApp.taskAlerts so Dashboard, Areas badge, and Tasks badge agree.
  const _isClosed = (s) => s === "Completed" || s === "Done" || s === "Skipped" || s === "Not Done" || s === "Cancelled";
  const upcoming = tasks.filter(t => t.phase !== "Growth Stage" && !_isClosed(t.status) && t.planStart >= today).sort((a,b) => a.planStart.localeCompare(b.planStart)).slice(0, 8);
  const overdue  = tasks.filter(t => t.phase !== "Growth Stage" && !_isClosed(t.status) && (t.planEnd || t.planStart) < today);

  // FIFO input cost per item per area
  const fifoCosts = useMemo(() => {
    const consumptions = buildConsumptionsFromTasks(tasks);
    const items = [...new Set(consumptions.map(c => c.item))];
    const result = {}; // { itemName: { costByArea, totalCost, breakdown } }
    items.forEach(item => {
      const itemPurchases = normalizePurchasesToCanonical(
        purchases.filter(p => p.item === item).sort((a,b) => (a.date||"").localeCompare(b.date||"")),
        item
      );
      const itemConsumptions = consumptions.filter(c => c.item === item);
      result[item] = computeFifoCost(itemPurchases, itemConsumptions);
    });
    // Aggregate cost by area across all items
    const areaCosts = {};
    const areaBreakdown = {};
    Object.entries(result).forEach(([item, r]) => {
      Object.entries(r.costByArea).forEach(([area, cost]) => {
        if (!areaCosts[area]) areaCosts[area] = 0;
        areaCosts[area] += cost;
      });
      r.breakdown.forEach(b => {
        if (!areaBreakdown[b.area]) areaBreakdown[b.area] = [];
        areaBreakdown[b.area].push(b);
      });
    });
    return { byItem: result, areaCosts, areaBreakdown };
  }, [tasks, purchases]);

  // Compute current phase for each area
  const areaPhaseInfo = areas.filter(a => a.name).map(a => {
    const sched = schedules[a.id];
    if (!sched) return { ...a, currentPhase: "---", nextTask: null, daysToHarvest: null };
    const areaTasks = tasks.filter(t => t.area === a.name);
    const nextTask = areaTasks.filter(t => t.status !== "Completed" && t.status !== "Cancelled" && t.planStart >= today).sort((x,y) => x.planStart.localeCompare(y.planStart))[0];
    const daysToHarvest = daysBetween(today, sched.harvestDate);
    const done = areaTasks.filter(t => t.status === "Completed").length;
    const pct = areaTasks.length ? Math.round(done / areaTasks.length * 100) : 0;
    // Calculate applied inputs from completed tasks (normalized to kg for fert, mL for FAA)
    // Uses actual input amount if entered, otherwise falls back to planned amount
    const appliedKg = { "14-14-14": 0, "46-0-0": 0, "0-0-60": 0, "FAA_mL": 0 };
    areaTasks.filter(t => t.status === "Completed" && t.inputs).forEach(t => {
      t.inputs.forEach(inp => {
        const actualKey = `actualInput_${inp.item}`;
        const actualVal = t[actualKey];
        // Use actual amount if entered, otherwise use planned
        const rawAmt = (actualVal != null && actualVal !== "") ? String(actualVal) : (inp.amount || "");
        if (!rawAmt) return;
        const num = parseFloat(rawAmt) || 0;
        const amt = rawAmt.toLowerCase();
        if (inp.item === "14-14-14") {
          appliedKg["14-14-14"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "46-0-0") {
          appliedKg["46-0-0"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "0-0-60") {
          appliedKg["0-0-60"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "FAA") {
          appliedKg["FAA_mL"] += amt.includes("l") ? num * 1000 : num;
        }
      });
    });
    const applied = appliedKg;
    // Labor cost
    const areaLabor = (laborLogs || []).filter(l => l.area === a.name);
    const laborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);
    const areaHarvests = harvestLogs.filter(h => h.area === a.name);
    const grossRev = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);
    // Supervisor porsiyento: area override > supervisor default > 10%
    const supList = (props.supervisors || []);
    const supRecord = supList.find(s => s.name === a.managedBy);
    const supDefault = supRecord && supRecord.commissionPct != null ? supRecord.commissionPct : 10;
    const supPct = (a.commissionPct != null && a.commissionPct !== '') ? Number(a.commissionPct) : supDefault;
    const mgrShare = grossRev * (supPct / 100);
    const inputCost = fifoCosts.areaCosts[a.name] || 0;
    const inputBreakdown = fifoCosts.areaBreakdown[a.name] || [];
    return { ...a, currentPhase: nextTask?.phase || "Harvest", nextTask, daysToHarvest, pct, done, total: areaTasks.length, applied, laborCost, mgrShare, totalLaborCost: laborCost + mgrShare, inputCost, inputBreakdown };
  });

  // Total input requirements across all areas
  const totalInputs = useMemo(() => {
    const totals = { urea: 0, mop: 0, faa: 0, triple14: 0 };
    Object.values(schedules).forEach(s => {
      totals.urea += s.quantities.totalUreaBags || 0;
      totals.mop += s.quantities.totalMOPBags || 0;
      totals.faa += s.quantities.totalFAA_L || 0;
      totals.triple14 += (s.quantities.basalSeedbedKg + (s.quantities.basalFieldBags ? parseFloat(s.quantities.basalFieldBags) * 50 : 0)) || 0;
    });
    return totals;
  }, [schedules]);

  const cardStyle = { background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)" };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap: mobile ? 12 : 16 }}>

      {/* KPI Row */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: mobile ? 8 : 12 }}>
        <KpiCard label="Active Areas" value={activeAreas.length} icon="🌾" color="#1565c0" sub={`${totalHa} ha total`} />
        <KpiCard label="Overall Progress" value={`${overallPct}%`} icon="📊" color="#2e7d32" sub={`${completed} of ${tasks.length} tasks`} />
        <KpiCard label="In Progress" value={inProgress} icon="🔄" color="#ef6c00" sub={overdue.length > 0 ? `${overdue.length} overdue` : "On track"} />
        <KpiCard label="Total Spend" value={totalSpend > 0 ? `₱${totalSpend.toLocaleString()}` : "---"} icon="💰" color="#d32f2f" sub={purchases.length > 0 ? `${purchases.length} purchases` : "No records yet"} />
      </div>

      {/* Overdue Alert */}
      {overdue.length > 0 && (
        <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", border:"1px solid #ffcc80", borderRadius:14, padding: mobile ? 12 : 16, display:"flex", alignItems:"flex-start", gap:12 }}>
          <span style={{ fontSize:24 }}>⚠️</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, color:"#e65100", fontSize:13, marginBottom:6 }}>Overdue Tasks ({overdue.length})</div>
            {overdue.slice(0, 5).map(t => (
              <div key={`${t.area}-${t.id}`} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", fontSize:12 }}>
                <Badge color="#e65100" bg="#ffe0b2">{t.area}</Badge>
                <span style={{ fontWeight:600, color:"#bf360c" }}>{t.activity}</span>
                {t.inputs && t.inputs.map((inp, i) => <span key={i} style={{ background:"#ffccbc", borderRadius:4, padding:"1px 5px", fontSize:10, fontWeight:600, color:"#bf360c" }}>{inp.item}</span>)}
                <span style={{ color:"#999", fontSize:11, marginLeft:"auto" }}>due {fmtDate(t.planEnd)}</span>
              </div>
            ))}
            {overdue.length > 5 && <div style={{ fontSize:11, color:"#e65100", marginTop:4 }}>+{overdue.length - 5} more</div>}
          </div>
        </div>
      )}

      {/* Inventory Notifications */}
      {(inventoryAlerts.shortages.length > 0 || inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length > 0) && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

          {/* Overall Shortages */}
          {inventoryAlerts.shortages.length > 0 && (
            <div style={{ background:"linear-gradient(135deg,#ffebee,#ffcdd2)", border:"1px solid #ef9a9a", borderRadius:14, padding: mobile ? 12 : 16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                <span style={{ fontSize:20 }}>📦</span>
                <div style={{ fontWeight:800, color:"#c62828", fontSize:13 }}>Inventory Shortage — Stock below what's needed</div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "repeat(auto-fit, minmax(200px, 1fr))", gap:8 }}>
                {inventoryAlerts.shortages.map(s => (
                  <div key={s.item} style={{ background:"white", borderRadius:10, padding:"10px 14px", border:"1px solid #ef9a9a" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontWeight:800, color:"#c62828", fontSize:13 }}>{s.item}</span>
                      <span style={{ fontSize:16 }}>⚠️</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:6, fontSize:11 }}>
                      <div><span style={{ color:"#888" }}>On Hand</span><div style={{ fontWeight:700, color:"#d32f2f" }}>{Math.round(s.stock)} {s.unit}</div></div>
                      <div style={{ textAlign:"center" }}><span style={{ color:"#888" }}>Still Needed</span><div style={{ fontWeight:700, color:"#333" }}>{Math.round(s.needed)} {s.unit}</div></div>
                      <div style={{ textAlign:"right" }}><span style={{ color:"#888" }}>Deficit</span><div style={{ fontWeight:800, color:"#c62828" }}>{Math.round(s.deficit)} {s.unit}</div></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Upcoming Tasks Needing Inputs (next 14 days) */}
          {inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length > 0 && (
            <div style={{ background:"linear-gradient(135deg,#fff8e1,#ffecb3)", border:"1px solid #ffcc80", borderRadius:14, padding: mobile ? 12 : 16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>

                    <span style={{ background:"#ffcdd2", borderRadius:4, padding:"2px 6px", fontSize:10, fontWeight:700, color:"#c62828" }}>have {Math.round(n.stock)} {n.unit}</span>

              <span style={{ fontSize:18 }}>✅</span>

                <div style={{ fontWeight:700, color:"#2e7d32", fontSize:12 }}>Inventory Ready</div>

                      ["Tassel", sched.tasselDate, "🌾"],
                      ["Silk", sched.silkDate, "🌽"],
                      ["Harvest", sched.harvestDate, "🌾"]
                    ] : [
                      ["Sow", sched.sowingDate, "🌱"],
                      ["Transplant", sched.tasks.find(t => t.activity === "Transplanting")?.planStart, "🌾"],
                      ["Panicle", sched.panicleDate, "🌿"],
                      ["Harvest", sched.harvestDate, "🌾"]
                    ]).map(([label, date, icon]) => (
                      <div key={label} style={{ background:"#f5f5f0", borderRadius:8, padding:"4px 10px", fontSize:11, display:"flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontSize:12 }}>{icon}</span>
                        <span style={{ color:"#888" }}>{label}:</span>
                        <span style={{ fontWeight:700, color:"#333" }}>{date ? fmtDate(date).replace(/, \d{4}$/, "") : "---"}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Input Requirements: Applied / Total — protocol-aware.
                    Three input-quantity layouts:
                      • Corn (corn-standard, corn-alt-fert): basal_14_14_14_kg + sd1_urea_kg + sd2_urea_kg + sd2_mop_kg
                      • Ka Danny rice: amSulf21Bags (21-0-0) + amChlBags (25-0-0) + bulaklakBags (14-14-14 fallback) + topDressBags (0-0-60) + FAA
                      • Default rice (default, rice-alt-fert): urea_N1K1/N2K2/N3K3 + mop_K + basal + FAA
                    Detected via sched.crop + sched.protocolName. All additive
                    expressions guard undefined → 0 so we never NaN.    */}
                {sched && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                    {(sched.crop === 'corn' ? [
                      { label:"14-14-14", total: (sched.quantities.basal_14_14_14_kg || 0), applied: a.applied["14-14-14"], fmt: v => `${Math.round(v)} kg`, bg:"#e3f2fd", c:"#1565c0" },
                      { label:"46-0-0", total: ((sched.quantities.sd1_urea_kg || 0) + (sched.quantities.sd2_urea_kg || 0)), applied: a.applied["46-0-0"], fmt: v => `${Math.round(v/50)} bags`, bg:"#e8f5e9", c:"#2e7d32" },
                      { label:"0-0-60", total: (sched.quantities.sd2_mop_kg || 0), applied: a.applied["0-0-60"], fmt: v => `${Math.round(v/50)} bags`, bg:"#fff3e0", c:"#e65100" },
                    ] : /Ka Danny/i.test(sched.protocolName || '') ? [
                      { label:"21-0-0", total: ((sched.quantities.amSulf21Bags || 0) * 50), applied: a.applied["21-0-0"], fmt: v => `${(v/50).toFixed(1)} bags`, bg:"#fff8e1", c:"#bf360c" },
                      { label:"25-0-0", total: ((sched.quantities.amChlBags || 0) * 50), applied: a.applied["25-0-0"], fmt: v => `${(v/50).toFixed(1)} bags`, bg:"#fff8e1", c:"#bf360c" },
                      { label:"14-14-14", total: ((sched.quantities.bulaklakBags || 0) * 50), applied: a.applied["14-14-14"], fmt: v => `${(v/50).toFixed(1)} bags`, bg:"#e3f2fd", c:"#1565c0" },
                      { label:"0-0-60", total: ((sched.quantities.topDressBags || 0) * 50), applied: a.applied["0-0-60"], fmt: v => `${(v/50).toFixed(1)} bags`, bg:"#fff3e0", c:"#e65100" },
                      { label:"FAA", total: (sched.quantities.totalFAA_L || 0), applied: a.applied["FAA_mL"], fmt: v => `${Math.round(v/1000)}L`, bg:"#f3e5f5", c:"#7b1fa2" },
                    ] : [
                      { label:"14-14-14", total: (sched.quantities.basalSeedbedKg || 0) + parseFloat(sched.quantities.basalFieldBags || 0)*50, applied: a.applied["14-14-14"], fmt: v => `${Math.round(v)} kg`, bg:"#e3f2fd", c:"#1565c0" },
                      { label:"46-0-0", total: ((sched.quantities.urea_N1K1 || 0) + (sched.quantities.urea_N2K2 || 0) + (sched.quantities.urea_N3K3 || 0)), applied: a.applied["46-0-0"], fmt: v => `${Math.round(v/50)} bags`, bg:"#e8f5e9", c:"#2e7d32" },
                      { label:"0-0-60", total: ((sched.quantities.mop_N1K1 || 0) + (sched.quantities.mop_N2K2 || 0) + (sched.quantities.mop_N3K3 || 0) + (sched.quantities.mop_K || 0)), applied: a.applied["0-0-60"], fmt: v => `${Math.round(v/50)} bags`, bg:"#fff3e0", c:"#e65100" },
                      { label:"FAA", total: (sched.quantities.totalFAA_L || 0), applied: a.applied["FAA_mL"], fmt: v => `${Math.round(v/1000)}L`, bg:"#f3e5f5", c:"#7b1fa2" },
                    ]).map(inp => {
                      const pct = inp.total > 0 ? Math.round(inp.applied / inp.total * 100) : 0;
                      const isComplete = pct >= 100;
                      return (
                        <span key={inp.label} style={{ background: isComplete ? "#e8f5e9" : inp.bg, borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4, border: isComplete ? "1px solid #a5d6a7" : "1px solid transparent" }}>
                          <span style={{ fontWeight:700, color: isComplete ? "#2e7d32" : inp.c }}>{inp.label}</span>
                          <span style={{ fontWeight:600, color: isComplete ? "#2e7d32" : "#555" }}>{inp.fmt(inp.applied)}/{inp.fmt(inp.total)}</span>
                          {isComplete && <span style={{ fontSize:9 }}>✓</span>}
                        </span>
                      );
                    })}
                  </div>

                {/* Costs: Inputs (FIFO) + Labor + Supervisor */}
                {(a.inputCost > 0 || a.laborCost > 0 || a.mgrShare > 0) && (

                  <td style={{ padding:"6px" }}><Badge color={h.grade === "Premium" ? "#2e7d32" : h.grade === "Good" ? "#1565c0" : "#ef6c00"} bg={h.grade === "Premium" ? "#e8f5e9" : h.grade === "Good" ? "#e3f2fd" : "#fff3e0"}>{h.grade}</Badge></td>
                  <td style={{ padding:"6px", fontWeight:700, color:"#2e7d32" }}>{h.buyerPrice ? `₱${(h.totalKg * h.buyerPrice).toLocaleString()}` : "---"}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* Phase Progress + Spending Chart */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "repeat(2, 1fr)", gap: 12 }}>
        <div style={cardStyle}>
          <h3 style={{ margin:"0 0 14px", color:"#2e7d32", fontSize:14, fontWeight:800 }}>Progress by Phase</h3>
          {phaseData.map(p => (
            <div key={p.phase} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                <span style={{ fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ width:10, height:10, borderRadius:3, background:PHASE_ACCENT[p.phase], display:"inline-block" }} />

        <div style={cardStyle}>
          <h3 style={{ margin:"0 0 14px", color:"#5d4037", fontSize:14, fontWeight:800 }}>Spending by Item</h3>
          {spendData.length > 0 ? (
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={spendData} margin={{ left:5, right:5 }}>
                <XAxis dataKey="name" tick={{ fontSize:9 }} angle={-30} textAnchor="end" height={55} />

          ) : <div style={{ color:"#bbb", textAlign:"center", padding:40, fontSize:13 }}>Record purchases in Inventory to see spending chart</div>}
        </div>
      </div>

      {/* Upcoming Tasks */}
      <div style={{ ...cardStyle, overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
        <h3 style={{ margin:"0 0 14px", color:"#1565c0", fontSize:14, fontWeight:800 }}>Upcoming Tasks</h3>
        {upcoming.length === 0 ? <div style={{ color:"#bbb", fontSize:13, textAlign:"center", padding:16 }}>No upcoming tasks</div> : (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {upcoming.map(t => {
              const da = daysBetween(today, t.planStart);
              const urgentColor = da <= 3 ? "#d32f2f" : da <= 7 ? "#ef6c00" : "#2e7d32";
              return (
                <div key={`${t.area}-${t.id}`} style={{ display:"flex", alignItems:"center", gap: mobile ? 8 : 12, padding:"10px 14px", background:"#fafafa", borderRadius:10, borderLeft:`4px solid ${urgentColor}` }}>
                  <div style={{ minWidth: mobile ? 28 : 40, textAlign:"center" }}>
                    <div style={{ fontWeight:800, fontSize: mobile ? 14 : 18, color:urgentColor, lineHeight:1 }}>{da}</div>
                    <div style={{ fontSize:9, color:"#999", fontWeight:600 }}>days</div>

                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, fontSize:13, color:"#333" }}>{t.activity}</span>
                      <Badge color="#666" bg="#eee">{t.area}</Badge>

                    {t.inputs && t.inputs.length > 0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginTop:3 }}>

                          <span key={i} style={{ background:"#e3f2fd", borderRadius:4, padding:"1px 6px", fontSize:10, fontWeight:600, color:"#1565c0" }}>{inp.item}{inp.amount ? ` · ${formatInputAmount(inp.amount, inp.item)}` : ""}</span>
                        ))}

                    <div style={{ fontSize:12, fontWeight:600, color:"#555" }}>{fmtDate(t.planStart).replace(/, \d{4}$/, "")}</div>
                    <Badge color={PHASE_ACCENT[t.phase]} bg={PHASE_COLORS[t.phase]}>{t.phase}</Badge>

            })}

        )}
      </div>
    </div>
  );
}

  { key: "insecticide",  label: "Insecticide",  color: "#c62828", bg: "#ffcdd2", emoji: "🐛" },

// ============================================================
// FIELD DIAGNOSE — supervisor photographs an issue and Claude vision
// returns a structured diagnosis. Photos + results saved per area.
// ============================================================
function resizeImageToDataURL(file, maxDim = 1280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function FieldDiagnose({ areaName, areaCrop, diagnoses, setDiagnoses, mobile }) {
  const [imageDataUrl, setImageDataUrl] = useState(null);
  const [notes, setNotes] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  // Two hidden inputs: camera (capture=environment) and gallery (no capture)
  const cameraRef = React.useRef(null);
  const galleryRef = React.useRef(null);

  const mine = (diagnoses || []).filter(d => d.area === areaName).sort((a, b) => (b.at || "").localeCompare(a.at || ""));

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setError(null);
    try {
      const dataUrl = await resizeImageToDataURL(file, 1280);
      setImageDataUrl(dataUrl);
    } catch (err) {
      setError("Couldn't read that image. Try another file.");
    }
  };

  // GPS-tag the photo at submit time (NOT at file-pick time, so the user has
  // a chance to walk to the spot they want recorded). Best-effort: failures
  // (no permission, no GPS) don't block the diagnose call.
  const getCurrentGps = () => new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy, at: new Date().toISOString() }),
      () => resolve(null),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 }
    );
  });

  const submit = async () => {
    if (!imageDataUrl) { setError("Take or choose a photo first."); return; }
    setBusy(true); setError(null);
    try {
      // Try to capture GPS in parallel with the upload (don't block on it)
      const gpsPromise = getCurrentGps();
      let token = '';
      try {
        const raw = localStorage.getItem('abundance-farm-auth-v1');
        if (raw) { const p = JSON.parse(raw); token = (p && p.token) || ''; }
      } catch (e) {}
      const resp = await fetch('/api/diagnose', {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'authorization': token ? `Bearer ${token}` : '' },
        body: JSON.stringify({ image: imageDataUrl, areaName, cropType: areaCrop, notes }),
      });
      const json = await resp.json();
      if (!resp.ok) {
        setError(json.error || `Server returned ${resp.status}`);
        setBusy(false);
        return;
      }
      const gps = await gpsPromise;
      const entry = {
        id: Date.now(),
        area: areaName,
        at: json.at || new Date().toISOString(),
        by: json.by || '',
        image: imageDataUrl,
        notes,
        result: json.diagnosis || {},
        gps,        // { lat, lon, accuracy, at } or null
      };
      setDiagnoses(prev => [entry, ...(prev || [])]);
      setImageDataUrl(null);
      setNotes("");
      if (cameraRef.current) cameraRef.current.value = "";
      if (galleryRef.current) galleryRef.current.value = "";
    } catch (e) {
      setError("Network error — try again.");
    } finally {
      setBusy(false);
    }
  };

  const removeEntry = (id) => {
    if (!confirm("Delete this diagnosis entry?")) return;
    setDiagnoses(prev => (prev || []).filter(d => d.id !== id));
  };

  const urgencyColor = (u) => u === "URGENT" ? "#c62828" : "#2e7d32";
  const confColor = (c) => c === "high" ? "#2e7d32" : c === "low" ? "#c62828" : "#e65100";

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

      {/* Capture form */}
      <div style={{ background:"white", borderRadius:12, padding: mobile ? 14 : 18, boxShadow:"0 1px 4px rgba(0,0,0,.07)" }}>
        <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>📸 Field Photo Diagnosis</div>
        <div style={{ fontSize:12, color:"#666", marginBottom:12, lineHeight:1.5 }}>
          Take a clear, well-lit photo of the leaf, pest, or symptom. Claude vision will identify the issue and suggest an action.
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {/* Hidden inputs — buttons below trigger these. Camera input has
              capture=environment so iOS opens the rear camera directly; the
              gallery input has no capture so iOS shows the photo library. */}
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={onFile} style={{ display:"none" }} />
          <input ref={galleryRef} type="file" accept="image/*" onChange={onFile} style={{ display:"none" }} />

          {!imageDataUrl && (
            <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "1fr 1fr", gap:8 }}>
              <button onClick={() => cameraRef.current?.click()} style={{
                padding:"14px 12px", background:"#2e7d32", color:"white", border:"none", borderRadius:10,
                fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8
              }}>📷 Take Photo</button>
              <button onClick={() => galleryRef.current?.click()} style={{
                padding:"14px 12px", background:"#1565c0", color:"white", border:"none", borderRadius:10,
                fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8
              }}>🖼️ Choose File</button>
            </div>
          )}

          {imageDataUrl && (
            <div style={{ position:"relative" }}>
              <img src={imageDataUrl} alt="Field photo" style={{ width:"100%", maxHeight:300, objectFit:"contain", borderRadius:8, background:"#f5f5f0" }} />
              <button onClick={() => {
                setImageDataUrl(null);
                if (cameraRef.current) cameraRef.current.value = "";
                if (galleryRef.current) galleryRef.current.value = "";
              }} style={{
                position:"absolute", top:6, right:6, padding:"4px 10px", background:"rgba(0,0,0,0.7)", color:"white", border:"none", borderRadius:14, fontSize:11, cursor:"pointer"
              }}>Remove</button>
            </div>
          )}
          <textarea
            placeholder="Optional notes — what does the supervisor see? (e.g. 'yellowing leaves on parcel edge', 'small green hopping insects on tillers')"
            value={notes}
            onChange={e => setNotes(e.target.value)}
            rows={2}
            style={{ padding:"8px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, fontFamily:"inherit", resize:"vertical" }}
          />
          {error && (
            <div style={{ background:"#ffebee", color:"#c62828", padding:"8px 12px", borderRadius:6, fontSize:12 }}>{error}</div>
          )}
          <button
            onClick={submit}
            disabled={busy || !imageDataUrl}
            style={{
              padding:"10px 16px", background: busy || !imageDataUrl ? "#bbb" : "#2e7d32", color:"white",
              border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor: busy || !imageDataUrl ? "not-allowed" : "pointer"
            }}>
            {busy ? "Analyzing photo…" : "Diagnose with Claude vision"}
          </button>
        </div>
      </div>

      {/* History */}
      <div style={{ background:"white", borderRadius:12, padding: mobile ? 14 : 18, boxShadow:"0 1px 4px rgba(0,0,0,.07)" }}>
        <div style={{ fontWeight:800, fontSize:13, color:"#333", marginBottom:10 }}>
          Diagnosis history — {areaName} ({mine.length})
        </div>
        {mine.length === 0 ? (
          <div style={{ fontSize:12, color:"#999", padding:"12px 4px" }}>No diagnoses logged yet for this area.</div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {mine.map(d => {
              const r = d.result || {};
              return (
                <div key={d.id} style={{ background:"#f9f7f0", borderRadius:8, padding:12, display:"flex", flexDirection: mobile ? "column" : "row", gap:12 }}>
                  {d.image && (
                    <img src={d.image} alt="" style={{ width: mobile ? "100%" : 180, height: mobile ? 220 : 180, objectFit:"cover", borderRadius:6, flexShrink:0 }} />
                  )}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6, gap:8, flexWrap:"wrap" }}>
                      <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>{r.diagnosis || "(no diagnosis)"}</div>
                      <div style={{ display:"flex", gap:6 }}>
                        {r.confidence && (
                          <span style={{ fontSize:10, fontWeight:700, color:confColor(r.confidence), background:"white", padding:"2px 8px", borderRadius:10, letterSpacing:"0.05em", textTransform:"uppercase" }}>{r.confidence} conf</span>
                        )}
                        {r.urgency && (
                          <span style={{ fontSize:10, fontWeight:700, color:"white", background:urgencyColor(r.urgency), padding:"2px 8px", borderRadius:10, letterSpacing:"0.05em" }}>{r.urgency}</span>
                        )}
                      </div>
                    </div>
                    {r.observation && <div style={{ fontSize:12, color:"#555", marginBottom:6, lineHeight:1.4 }}><em>{r.observation}</em></div>}
                    {r.action && <div style={{ fontSize:13, color:"#222", marginBottom:6, lineHeight:1.4 }}><strong>Action:</strong> {r.action}</div>}
                    {r.notes && <div style={{ fontSize:12, color:"#666", marginBottom:6, lineHeight:1.4 }}>{r.notes}</div>}
                    {r.raw && <div style={{ fontSize:12, color:"#888", whiteSpace:"pre-wrap" }}>{r.raw}</div>}
                    {d.notes && <div style={{ fontSize:11, color:"#888", marginTop:6, fontStyle:"italic" }}>Supervisor noted: "{d.notes}"</div>}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8, flexWrap:"wrap", gap:6 }}>
                      <div style={{ fontSize:10, color:"#999" }}>
                        {new Date(d.at).toLocaleString('en-PH', {weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}
                        {d.by && ` · ${d.by}`}
                        {d.gps && (
                          <span title={`GPS captured at photo upload · ±${Math.round(d.gps.accuracy)}m`} style={{ marginLeft:6, color:"#1976d2" }}>
                            · 📍 <a
                              href={`https://www.google.com/maps?q=${d.gps.lat},${d.gps.lon}`}
                              target="_blank" rel="noopener noreferrer"
                              style={{ color:"#1976d2", textDecoration:"none", fontFamily:"monospace" }}
                            >{d.gps.lat.toFixed(5)}, {d.gps.lon.toFixed(5)}</a> <span style={{ color:"#999" }}>±{Math.round(d.gps.accuracy)}m</span>
                          </span>
                        )}
                      </div>
                      <button onClick={() => removeEntry(d.id)} style={{ background:"none", border:"none", color:"#c62828", fontSize:11, cursor:"pointer", textDecoration:"underline" }}>Delete</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PARCEL MAP — Leaflet + Leaflet.draw, ESRI satellite base
// Lets the owner trace each parcel's boundary on satellite imagery.
// Polygon is stored on the area record as area.polygon = [[lat,lng], ...].
// If the worker is configured with SENTINEL_HUB_INSTANCE_ID and exposes
// /api/ndvi-tile, a "NDVI" layer toggle becomes available.
// ============================================================
function polygonAreaHa(latlngs) {
  if (!latlngs || latlngs.length < 3 || typeof L === 'undefined') return 0;
  try {
    // Use Leaflet's geodesic area helper (returns m²)
    const m2 = L.GeometryUtil ? L.GeometryUtil.geodesicArea(latlngs.map(p => L.latLng(p[0], p[1])))
                              : _haversineAreaM2(latlngs);
    return Math.round((m2 / 10000) * 100) / 100;   // m² → ha, 2 decimals
  } catch (e) { return 0; }
}
function _haversineAreaM2(coords) {
  // Fallback when L.GeometryUtil isn't loaded — spherical excess approximation
  // using the shoelace formula on a sphere. Standard formula:
  //   A = (R²/2) · |Σ (λ_{i+1} − λ_i)(sin φ_i + sin φ_{i+1})|
  const R = 6378137;
  const toRad = (d) => d * Math.PI / 180;
  let area = 0;
  for (let i = 0; i < coords.length; i++) {
    const [lat1, lon1] = coords[i];
    const [lat2, lon2] = coords[(i + 1) % coords.length];
    area += (toRad(lon2) - toRad(lon1)) * (Math.sin(toRad(lat1)) + Math.sin(toRad(lat2)));
  }
  return Math.abs(area * R * R / 2);
}

function ParcelMap({ area, updateArea, allAreas, mobile }) {
  const mapRef = React.useRef(null);
  const mapElRef = React.useRef(null);
  const polygonRef = React.useRef(null);          // the green committed polygon
  const drawLayersRef = React.useRef([]);         // markers + polylines added while in 'drawing' mode
  const editVertexMarkersRef = React.useRef([]);  // draggable vertex markers added while in 'editing' mode
  const gpsLayerRef = React.useRef(null);         // "you are here" marker (Leaflet circleMarker + accuracy circle)
  const [ready, setReady] = useState(false);
  // mode: 'idle' | 'drawing' | 'editing'
  const [mode, setMode] = useState('idle');
  const [drawingPoints, setDrawingPoints] = useState([]);
  // GPS state — { lat, lon, accuracy } | null
  const [gpsPos, setGpsPos] = useState(null);
  const [gpsWatching, setGpsWatching] = useState(false);
  const [gpsError, setGpsError] = useState(null);
  const [gpsBusy, setGpsBusy] = useState(false);
  const gpsWatchIdRef = React.useRef(null);
  const [showNdvi, setShowNdvi] = useState(false);
  const [ndviAvailable, setNdviAvailable] = useState(null); // null=unknown, true/false
  const [ndviInfo, setNdviInfo] = useState(null);            // { date, cloudCoverPercentage, previousDate }
  const [ndviInfoLoading, setNdviInfoLoading] = useState(false);
  const [computedHa, setComputedHa] = useState(area.polygon ? polygonAreaHa(area.polygon) : 0);

  // Wait for Leaflet to load (CDN scripts use defer)
  useEffect(() => {
    let cancelled = false;
    const check = () => {
      if (cancelled) return;
      if (typeof L !== 'undefined') { setReady(true); return; }
      setTimeout(check, 150);
    };
    check();
    return () => { cancelled = true; };
  }, []);

  // Probe NDVI availability, then fetch the most-recent image date
  useEffect(() => {
    fetch('/api/ndvi-tile?probe=1').then(r => {
      const ok = r.ok;
      setNdviAvailable(ok);
      if (ok) {
        // Anchor the query at the parcel's centroid if available, otherwise the farm location
        const center = (area.polygon && area.polygon.length > 0)
          ? area.polygon.reduce((acc, p) => [acc[0] + p[0] / area.polygon.length, acc[1] + p[1] / area.polygon.length], [0, 0])
          : [FARM_LAT, FARM_LON];
