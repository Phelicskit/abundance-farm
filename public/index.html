function ElectricityBillSection({ bills, setBills, mobile }) {
  const [showAdd, setShowAdd] = useState(false);
  const [entry, setEntry] = useState({ month: new Date().getMonth() + 1, year: new Date().getFullYear(), amount: "", kwh: "", notes: "" });
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const labelStyle = { display:"flex", flexDirection:"column", gap:3, fontSize:11, fontWeight:600, color:"#555" };
  const inputStyle = { padding:"8px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, background:"white" };

  const addBill = () => {
    if (!entry.amount) return;
    setBills(prev => [...prev, { ...entry, id: Date.now(), amount: Number(entry.amount) || 0, kwh: Number(entry.kwh) || 0 }]);
    setEntry({ month: new Date().getMonth() + 1, year: new Date().getFullYear(), amount: "", kwh: "", notes: "" });
    setShowAdd(false);
  };

  const totalCost = bills.reduce((s, b) => s + b.amount, 0);

  return (
    <div style={{ background:"#fffde7", borderRadius:12, padding:"14px 18px", border:"1px solid #fff9c4" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
        <div>
          <span style={{ fontWeight:700, fontSize:13, color:"#f57f17" }}>⚡ Electricity Bills (Irrigation)</span>
          {totalCost > 0 && <span style={{ fontSize:11, color:"#f57f17", marginLeft:8 }}>Total: ₱{totalCost.toLocaleString()}</span>}
        </div>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: showAdd ? "#999" : "#f57f17", color:"white", border:"none", borderRadius:6, padding:"5px 12px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
          {showAdd ? "Cancel" : "+ Add Bill"}
        </button>
      </div>

      {showAdd && (
        <div style={{ background:"#fff8e1", borderRadius:10, padding:12, marginBottom:10, border:"1px solid #ffe082" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr 1fr", gap:8 }}>
            <label style={labelStyle}>Month
              <select value={entry.month} onChange={e => setEntry(p => ({...p, month: Number(e.target.value)}))} style={inputStyle}>
                {months.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Year
              <input type="number" value={entry.year} onChange={e => setEntry(p => ({...p, year: e.target.value}))} style={inputStyle} />
            </label>
            <label style={labelStyle}>Amount (₱)
              <input type="number" min="0" value={entry.amount} onChange={e => setEntry(p => ({...p, amount: e.target.value}))} placeholder="e.g. 3500" style={{ ...inputStyle, fontWeight:700, color:"#f57f17" }} />
            </label>
            <label style={labelStyle}>kWh (optional)
              <input type="number" min="0" value={entry.kwh} onChange={e => setEntry(p => ({...p, kwh: e.target.value}))} placeholder="e.g. 450" style={inputStyle} />
            </label>
          </div>
          <button onClick={addBill} disabled={!entry.amount} style={{ marginTop:10, background: entry.amount ? "#f57f17" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"8px 20px", fontSize:12, fontWeight:700, cursor: entry.amount ? "pointer" : "not-allowed" }}>Save Bill</button>
        </div>
      )}

      {bills.length > 0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:4 }}>
          {[...bills].reverse().map(b => (
            <div key={b.id} style={{ background:"white", borderRadius:8, padding:"6px 10px", fontSize:11, border:"1px solid #fff9c4" }}>
              <span style={{ fontWeight:700, color:"#f57f17" }}>₱{b.amount.toLocaleString()}</span>
              <span style={{ color:"#999", marginLeft:4 }}>{months[b.month-1]} {b.year}</span>
              {b.kwh > 0 && <span style={{ color:"#bbb", marginLeft:4 }}>{b.kwh} kWh</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// ACCOUNTING TAB — Per-area P&L, Cash Flow, Farm Summary
// ============================================================
function AccountingTab({ areas, schedules, allTasks, purchases, usages, harvestLogs, laborLogs, cashAdvances, maintenanceLogs, fuelLogs, electricityBills, setElectricityBills, supervisors }) {
  const mobile = useIsMobile();
  const [view, setView] = useState("farm"); // "farm" or area id
  const namedAreas = areas.filter(a => a.name);

  // Compute financials per area
  const areaFinancials = useMemo(() => {
    return namedAreas.map(a => {
      const areaHarvests = harvestLogs.filter(h => h.area === a.name);
      const areaLabor = laborLogs.filter(l => l.area === a.name);
      const areaAdvances = (cashAdvances || []).filter(ca => ca.area === a.name);
      const areaTasks = allTasks.filter(t => t.area === a.name);

      // Revenue
      const totalKg = areaHarvests.reduce((s, h) => s + h.totalKg, 0);
      const grossRevenue = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);

      // COGS: Input costs (FIFO)
      const consumptions = buildConsumptionsFromTasks(areaTasks.filter(t => t.area === a.name));
      const items = [...new Set(consumptions.map(c => c.item))];
      let inputCost = 0;
      const inputDetails = [];
      items.forEach(item => {
        const itemPurchases = normalizePurchasesToCanonical(
          purchases.filter(p => p.item === item).sort((x,y) => (x.date||"").localeCompare(y.date||"")),
          item
        );
        const itemConsumptions = consumptions.filter(c => c.item === item);
        const result = computeFifoCost(itemPurchases, itemConsumptions);
        const cost = result.costByArea[a.name] || 0;
        inputCost += cost;
        if (cost > 0) inputDetails.push({ item, cost });
      });

      // Labor cost
      const laborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);

      // Supervisor porsiyento: area override > supervisor default > 10%
      const supList = (supervisors || []);
      const supRecord = supList.find(s => s.name === a.managedBy);
      const supDefault = supRecord && supRecord.commissionPct != null ? supRecord.commissionPct : 10;
      const supPct = (a.commissionPct != null && a.commissionPct !== '') ? Number(a.commissionPct) : supDefault;
      const mgrShare = grossRevenue * (supPct / 100);

      // Equipment costs: task-linked fuel goes to the task's area, unlinked split evenly
      const areaCount = namedAreas.length || 1;
      const maintCost = (maintenanceLogs || []).reduce((s, m) => s + m.cost, 0) / areaCount;
      const areaFuel = (fuelLogs || []).filter(f => f.taskArea === a.name).reduce((s, f) => s + f.totalCost, 0);
      const unlinkFuel = (fuelLogs || []).filter(f => !f.taskArea).reduce((s, f) => s + f.totalCost, 0) / areaCount;
      const fuelCost = areaFuel + unlinkFuel;
      const equipCost = maintCost + fuelCost;

      // Electricity is one farm-wide bill, allocated to each area by HECTARE
      // ratio. Bigger plots use more irrigation pump time, so they pay
      // proportionally. Fall back to even split if hectares are missing.
      const totalElectricity = (electricityBills || []).reduce((s, b) => s + b.amount, 0);
      const totalHa = namedAreas.reduce((s, x) => s + (Number(x.ha) || 0), 0);
      const electricityCost = (totalHa > 0 && (Number(a.ha) || 0) > 0)
        ? totalElectricity * ((Number(a.ha) || 0) / totalHa)
        : (areaCount > 0 ? totalElectricity / areaCount : 0);

      // Total expenses (per-area, now includes their hectare share of farm overhead)
      const totalExpenses = inputCost + laborCost + mgrShare + equipCost + electricityCost;

      // Net profit
      const netProfit = grossRevenue - totalExpenses;

      // Cash flow
      const totalAdvances = areaAdvances.reduce((s, ca) => s + ca.amount, 0);
      const mgrBalance = mgrShare - totalAdvances;

      // Cash received (from sales)
      const cashReceived = grossRevenue;
      // Per-area cash outflow uses FIFO-allocated input cost — that's the right
      // proxy because purchases aren't tagged to an area, so we attribute them
      // by what each area has actually consumed (FIFO). At the farm-total level
      // we recompute this using actual purchase totals — see farmTotals below.
      const cashPaidOut = laborCost + totalAdvances + inputCost + equipCost + electricityCost;
      const netCashFlow = cashReceived - cashPaidOut;

      return {
        ...a, totalKg, grossRevenue, inputCost, inputDetails, laborCost, mgrShare, equipCost, electricityCost,
        totalExpenses, netProfit, totalAdvances, mgrBalance, cashReceived, cashPaidOut, netCashFlow,
        harvestCount: areaHarvests.length, laborEntries: areaLabor.length, advanceEntries: areaAdvances.length,
        harvests: areaHarvests, laborRecords: areaLabor, advances: areaAdvances,
      };
    });
  }, [namedAreas, allTasks, purchases, harvestLogs, laborLogs, cashAdvances, maintenanceLogs, fuelLogs, electricityBills, supervisors]);

  // Farm-wide totals — sum each area's share. Electricity is already split
  // across areas by hectare ratio inside areaFinancials, so we just add it
  // up here (no double-counting at the farm level).
  const farmTotals = useMemo(() => {
    const t = { grossRevenue:0, inputCost:0, laborCost:0, mgrShare:0, equipCost:0, electricityCost:0, totalExpenses:0, netProfit:0,
      totalKg:0, totalAdvances:0, cashReceived:0, cashPaidOut:0, netCashFlow:0, inputCashPaid:0 };
    areaFinancials.forEach(a => {
      t.grossRevenue += a.grossRevenue; t.inputCost += a.inputCost; t.laborCost += a.laborCost;
      t.mgrShare += a.mgrShare; t.equipCost += a.equipCost; t.electricityCost += a.electricityCost;
      t.totalExpenses += a.totalExpenses; t.netProfit += a.netProfit;
      t.totalKg += a.totalKg; t.totalAdvances += a.totalAdvances;
      t.cashReceived += a.cashReceived;
    });
    // Cash flow uses CASH basis at the farm level — actual peso amounts that
    // left the bank account. The P&L uses FIFO (accrual). Mixing them was the
    // bug: pre-fix, Net Cash Flow only reflected the FIFO-consumed slice of
    // inputs (~₱42k), making the user's balance look healthier than it was
    // (₱-135k actual). Sum the raw purchase line totals here instead.
    t.inputCashPaid = (purchases || []).reduce((s, p) => s + ((p.qty || 0) * (p.unitCost || 0)), 0);
    t.cashPaidOut = t.laborCost + t.totalAdvances + t.inputCashPaid + t.equipCost + t.electricityCost;
    t.netCashFlow = t.cashReceived - t.cashPaidOut;
    return t;
  }, [areaFinancials, purchases]);

  const selectedArea = view !== "farm" ? areaFinancials.find(a => a.id === Number(view)) : null;
  const data = selectedArea || farmTotals;
  const title = selectedArea ? selectedArea.name : "All Areas (Farm Total)";

  const PnlRow = ({ label, value, bold, color, indent, border }) => (
    <div style={{ display:"flex", justifyContent:"space-between", padding: `${border ? "8px" : "4px"} 0`,
      borderTop: border ? "2px solid #e0e0e0" : "none",
      paddingLeft: indent ? 16 : 0,
      fontWeight: bold ? 800 : 400, fontSize: bold ? 14 : 12, color: color || "#333" }}>
      <span>{label}</span>
      <span>₱{(value || 0).toLocaleString()}</span>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

      {/* Area Selector */}
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <button onClick={() => setView("farm")} style={{
          padding:"8px 16px", borderRadius:20, border: view === "farm" ? "2px solid #2e7d32" : "1px solid #ddd",
          background: view === "farm" ? "#e8f5e9" : "white", fontWeight: view === "farm" ? 800 : 500,
          color: view === "farm" ? "#2e7d32" : "#666", fontSize:12, cursor:"pointer"
        }}>Farm Total</button>
        {namedAreas.map(a => (
          <button key={a.id} onClick={() => setView(String(a.id))} style={{
            padding:"8px 16px", borderRadius:20, border: view === String(a.id) ? "2px solid #1565c0" : "1px solid #ddd",
            background: view === String(a.id) ? "#e3f2fd" : "white", fontWeight: view === String(a.id) ? 800 : 500,

// FORECASTS TAB — surfaces the four forecast engines as editable UIs.
// Each sub-tab lets the user inspect, override, and reset assumptions
// that flow downstream into Cashflow.
// ============================================================
function ForecastsTab({ forecastOverrides, setForecastOverrides, purchases, harvestLogs, areas, schedules, breeds }) {
  const mobile = useIsMobile();
  const [subTab, setSubTab] = useState("price");
  const [priceLog, setPriceLog] = useState([]);
  const [nfaFloor, setNfaFloor] = useState(null);
  useEffect(() => {
    fetch('/api/log').then(r => r.ok ? r.json() : null).then(j => setPriceLog((j && j.entries) || [])).catch(() => {});
    fetch('/api/prices/floor').then(r => r.ok ? r.json() : null).then(j => setNfaFloor(j && j.nfa)).catch(() => {});
  }, []);

  const update = (patch) => setForecastOverrides({ ...forecastOverrides, ...patch });

  const SUB_TABS = [
    { key: "price",  label: "💰 Price",  desc: "Per-crop monthly forecast" },
    { key: "input",  label: "📦 Inputs", desc: "Fertilizer/spray unit cost" },
    { key: "labor",  label: "👷 Labor",  desc: "Worker-days per ha" },
    { key: "yield",  label: "🌾 Yield",  desc: "Expected tonnes per area" },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>📊 Forecast Engines</div>
        <div style={{ fontSize:12, color:"#666", marginBottom:12, lineHeight:1.5 }}>
          Tune the four forecasting models that feed into Cashflow. Override any number; leave blank to use the built-in default. Changes apply instantly to the Cashflow projection.
        </div>
        <div className="ab-scroll" style={{ display:"flex", flexWrap:"nowrap", gap:6, overflowX:"auto", WebkitOverflowScrolling:"touch", borderBottom:"2px solid #e0e0e0", paddingBottom:6 }}>
          {SUB_TABS.map(st => (
            <button key={st.key} onClick={() => setSubTab(st.key)} style={{
              padding:"8px 14px", borderRadius:8, border:"none",
              background: subTab === st.key ? "#2e7d32" : "transparent",
              color: subTab === st.key ? "white" : "#666",
              fontWeight: subTab === st.key ? 700 : 500, fontSize:12, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0
            }}>
              {st.label}
              <span style={{ display:"block", fontSize:10, fontWeight:400, opacity:0.8 }}>{st.desc}</span>
            </button>
          ))}
        </div>
      </div>

      {subTab === "price" && <PriceForecastEngine overrides={forecastOverrides} update={update} priceLog={priceLog} nfaFloor={nfaFloor} mobile={mobile} />}
      {subTab === "input" && <InputCostForecastEngine overrides={forecastOverrides} update={update} purchases={purchases} mobile={mobile} />}
      {subTab === "labor" && <LaborForecastEngine overrides={forecastOverrides} update={update} mobile={mobile} />}
      {subTab === "yield" && <YieldForecastEngine overrides={forecastOverrides} update={update} areas={areas} schedules={schedules} breeds={breeds} harvestLogs={harvestLogs} mobile={mobile} />}
    </div>
  );
}

// --- 1. PRICE FORECAST ENGINE ------------------------------------------
function PriceForecastEngine({ overrides, update, priceLog, nfaFloor, mobile }) {
  const MONTH_LABELS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const today = new Date();
  const [crop, setCrop] = useState("rice");
  const seasArr = (crop === 'rice' ? overrides?.priceSeasonality?.rice : overrides?.priceSeasonality?.corn) || (crop === 'rice' ? PALAY_SEASONALITY : CORN_SEASONALITY);
  const defaults = crop === 'rice' ? PALAY_SEASONALITY : CORN_SEASONALITY;
  const usingDefault = !(crop === 'rice' ? overrides?.priceSeasonality?.rice : overrides?.priceSeasonality?.corn);

  const baselineOverride = crop === 'rice' ? overrides?.baselineRice : overrides?.baselineCorn;

  // 12-month forward projection
  const projection = Array.from({ length: 12 }, (_, i) => {
    const d = new Date(today); d.setMonth(d.getMonth() + i); d.setDate(15);
    return { iso: d.toISOString().slice(0,10), label: d.toLocaleDateString('en-PH', { month:'short', year:'2-digit' }), monthIdx: d.getMonth() };
  });

  const predicted = projection.map(p => ({ ...p, price: predictPriceAt(p.iso, crop, priceLog, nfaFloor, overrides) }));

  const updateSeasonality = (monthIdx, value) => {
    const current = [...seasArr];
    current[monthIdx] = value === '' ? defaults[monthIdx] : Number(value);
    update({ priceSeasonality: { ...(overrides.priceSeasonality || {}), [crop]: current } });
  };
  const updateBaseline = (value) => {
    if (crop === 'rice') update({ baselineRice: value === '' ? null : value });
    else                  update({ baselineCorn: value === '' ? null : value });
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", flexWrap:"wrap", gap:10, marginBottom:10 }}>
          <div>
            <div style={{ fontWeight:800, fontSize:14, color:"#333" }}>💰 Price Forecast Engine</div>
            <div style={{ fontSize:12, color:"#666", marginTop:2 }}>Predicted ₱/kg = baseline × monthly seasonality multiplier, clamped to NFA floor.</div>
          </div>
          <div style={{ display:"flex", gap:4 }}>
            {[["rice","🌾 Rice"],["corn","🌽 Corn"]].map(([k,l]) => (
              <button key={k} onClick={() => setCrop(k)} style={{ padding:"6px 14px", borderRadius:8, border: crop === k ? "2px solid #2e7d32" : "1px solid #ddd", background: crop === k ? "#e8f5e9" : "white", color: crop === k ? "#2e7d32" : "#666", fontSize:12, fontWeight: crop === k ? 700 : 500, cursor:"pointer" }}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:14, marginBottom:14 }}>
          <div style={{ background:"#e3f2fd", borderRadius:8, padding:"10px 12px" }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#1565c0", letterSpacing:".06em", textTransform:"uppercase" }}>Current baseline (₱/kg)</div>
            <input type="number" step="0.5" min="0" value={baselineOverride || ''} onChange={e => updateBaseline(e.target.value)} placeholder={`auto (from last 6 PSA entries)`} style={{ marginTop:4, width:"100%", padding:"6px 8px", border:"1px solid #90caf9", borderRadius:6, fontWeight:700, fontSize:14, color:"#0d47a1", background:"white" }} />
            <div style={{ fontSize:10, color:"#666", marginTop:4 }}>Leave blank → auto from your PSA log average. Override to set your own anchor (e.g. current local price).</div>
          </div>
          <div style={{ background:"#fff3e0", borderRadius:8, padding:"10px 12px" }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#e65100", letterSpacing:".06em", textTransform:"uppercase" }}>NFA floor ({crop === 'rice' ? 'palay only' : 'n/a for corn'})</div>
            <div style={{ fontSize:14, fontWeight:700, color:"#bf360c", marginTop:4 }}>
              {crop === 'rice' && nfaFloor && nfaFloor.nfa
                ? `Dry ₱${nfaFloor.nfa.palayDry || '—'}/kg · Fresh ₱${nfaFloor.nfa.palayFresh || '—'}/kg`
                : '—'}
            </div>
            <div style={{ fontSize:10, color:"#666", marginTop:4 }}>Predicted price is never lower than this. Edit on the Prices tab if needed.</div>
          </div>
        </div>

        <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:6 }}>SEASONALITY MULTIPLIER PER MONTH {usingDefault && <span style={{ color:"#888", fontWeight:500, fontSize:10 }}>(default · edit any to override)</span>}</div>
        <div style={{ display:"grid", gridTemplateColumns: mobile ? "repeat(6, 1fr)" : "repeat(12, 1fr)", gap:4, marginBottom:8 }}>
          {MONTH_LABELS.map((m, i) => {
            const isThisMonth = i === today.getMonth();
            return (
              <div key={i} style={{ background: isThisMonth ? "#e8f5e9" : "#fafafa", borderRadius:6, padding:"6px 4px", textAlign:"center" }}>
                <div style={{ fontSize:9, fontWeight:700, color: isThisMonth ? "#2e7d32" : "#888" }}>{m}</div>
                <input type="number" step="0.01" min="0" value={seasArr[i]} onChange={e => updateSeasonality(i, e.target.value)} style={{ marginTop:2, width:"100%", padding:"3px 2px", border:"1px solid #ddd", borderRadius:4, fontSize:11, fontWeight:600, textAlign:"center", background: isThisMonth ? "white" : "#fff" }} />
                <div style={{ fontSize:8, color:"#aaa", marginTop:1 }}>def {defaults[i].toFixed(2)}</div>
              </div>
            );
          })}
        </div>
        {!usingDefault && (
          <button onClick={() => update({ priceSeasonality: { ...(overrides.priceSeasonality || {}), [crop]: null } })} style={{ background:"transparent", color:"#c62828", border:"1px solid #ffcdd2", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>↺ Reset to defaults</button>
        )}
      </div>

      {/* 12-month chart */}
      <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
        <div style={{ fontWeight:800, fontSize:13, color:"#333", marginBottom:6 }}>12-month price forecast ({crop})</div>
        <div style={{ width:"100%", height: mobile ? 220 : 260 }}>
          <Recharts.ResponsiveContainer>
            <Recharts.AreaChart data={predicted} margin={{ top:5, right:8, left:8, bottom:5 }}>
              <Recharts.CartesianGrid stroke="#eee" />
              <Recharts.XAxis dataKey="label" tick={{ fontSize:10 }} />
              <Recharts.YAxis tick={{ fontSize:10 }} tickFormatter={v => "₱" + v.toFixed(0)} domain={['auto', 'auto']} />
              <Recharts.Tooltip formatter={v => "₱" + Number(v).toFixed(2) + "/kg"} />
              <Recharts.Area type="monotone" dataKey="price" stroke="#2e7d32" fill="#a5d6a7" name="Predicted ₱/kg" />
            </Recharts.AreaChart>
          </Recharts.ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// --- 2. INPUT COST FORECAST ENGINE -------------------------------------
function InputCostForecastEngine({ overrides, update, purchases, mobile }) {
  const COMMON_ITEMS = ["14-14-14", "46-0-0", "0-0-60", "21-0-0", "25-0-0", "FAA", "Herbicide", "Insecticide", "Fungicide"];
  const today = new Date().toISOString().slice(0, 10);
  const items = [...new Set([...COMMON_ITEMS, ...purchases.map(p => p.item).filter(Boolean)])];

  const rows = items.map(item => {
    const predicted = predictUnitCost(item, today, purchases, { inputCosts: {} });   // bypass override to see source
    const override = overrides?.inputCosts?.[item];
    const itemPurchases = (purchases || []).filter(p => p.item === item).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const latest = itemPurchases[0];
    return { item, predicted, override, latest, sampleSize: itemPurchases.length };
  });

  const setOverride = (item, value) => {
    const next = { ...(overrides.inputCosts || {}) };
    // Empty, null, or non-positive → treat as "back to auto"
    if (value === '' || value == null || Number(value) <= 0) delete next[item];
    else next[item] = Number(value);
    update({ inputCosts: next });
  };
  const resetOverride = (item) => {
    const next = { ...(overrides.inputCosts || {}) };
    delete next[item];
    update({ inputCosts: next });
  };

  return (
    <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
      <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>📦 Input Cost Forecast Engine</div>
      <div style={{ fontSize:12, color:"#666", marginBottom:12, lineHeight:1.5 }}>
        Predicted ₱/kg (or ₱/L for FAA) per input. Used by Cashflow for projecting outflows on upcoming fertilizer/spray tasks. Source priority: <strong>your override</strong> → 3-month rolling avg of own purchases → most-recent purchase → built-in default.
      </div>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead><tr style={{ background:"#f5f5f0" }}>
          {["Item","Predicted (auto)","Last purchase","Source","Override (₱/kg or ₱/L)"].map(h => (
            <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#666", borderBottom:"2px solid #e0e0e0", fontSize:10 }}>{h}</th>
          ))}

}

// --- 4. YIELD FORECAST ENGINE ------------------------------------------
function YieldForecastEngine({ overrides, update, areas, schedules, breeds, harvestLogs, mobile }) {
  const setYield = (areaId, value) => {
    const next = { ...(overrides.yieldByArea || {}) };
    // Empty / 0 / negative → back to auto (use breed default)
    if (value === '' || value == null || Number(value) <= 0) delete next[areaId];
    else next[areaId] = Number(value);
    update({ yieldByArea: next });
  };
  const resetYield = (areaId) => {
    const next = { ...(overrides.yieldByArea || {}) };
    delete next[areaId];
    update({ yieldByArea: next });
  };

  // Historical actuals per area (avg t/ha)
  const historicalByArea = {};
  (harvestLogs || []).forEach(h => {
    if (!historicalByArea[h.area]) historicalByArea[h.area] = { totalKg: 0, totalHa: 0, count: 0 };
    historicalByArea[h.area].totalKg += (h.totalKg || 0);
    const a = (areas || []).find(x => x.name === h.area);
    historicalByArea[h.area].totalHa += (a?.ha || 0);
    historicalByArea[h.area].count += 1;
  });

  const activeAreas = (areas || []).filter(a => a.status === 'Active' && a.name);
  return (
    <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 18, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
      <div style={{ fontWeight:800, fontSize:14, color:"#333", marginBottom:4 }}>🌾 Yield Forecast Engine</div>
      <div style={{ fontSize:12, color:"#666", marginBottom:12, lineHeight:1.5 }}>
        Expected tonnes per hectare for each active area's <strong>next harvest</strong>. Default = midpoint of the assigned breed's rated yield range. Override with your own number based on historical performance, soil, irrigation quality, etc.
      </div>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead><tr style={{ background:"#f5f5f0" }}>
          {["Area","Breed","Rated yield","Historical avg","Override (t/ha)","Forecast harvest (t)"].map(h => (
            <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#666", borderBottom:"2px solid #e0e0e0", fontSize:10 }}>{h}</th>
          ))}
        </tr></thead>
        <tbody>{activeAreas.length === 0 ? (
          <tr><td colSpan="6" style={{ padding:20, textAlign:"center", color:"#bbb" }}>No active areas</td></tr>
        ) : activeAreas.map(a => {
          const breed = (breeds || []).find(b => b.name === a.breed);
          const yieldStr = String(breed?.yield || '5');
          const yMatch = yieldStr.match(/(\d+(?:\.\d+)?)/g) || ['5'];
          const yMid = yMatch.length > 1 ? (parseFloat(yMatch[0]) + parseFloat(yMatch[1])) / 2 : parseFloat(yMatch[0]);
          const ov = overrides?.yieldByArea?.[a.id];
          const effective = ov != null && ov !== '' ? Number(ov) : yMid;
          const hist = historicalByArea[a.name];
          const histYieldTHa = hist && hist.totalHa > 0 ? (hist.totalKg / hist.totalHa / 1000) : null;
          return (
            <tr key={a.id} style={{ borderBottom:"1px solid #f0f0f0" }}>
              <td style={{ padding:"8px 6px", fontWeight:700 }}>{a.name} <span style={{ fontSize:10, color:"#888", fontWeight:400 }}>{a.ha}ha</span></td>
              <td style={{ padding:"8px 6px", color:"#666" }}>{a.breed || '—'}</td>
              <td style={{ padding:"8px 6px" }}>{breed?.yield || '—'}</td>
              <td style={{ padding:"8px 6px", color: histYieldTHa ? "#2e7d32" : "#bbb" }}>
                {histYieldTHa ? `${histYieldTHa.toFixed(1)} t/ha (${hist.count} harvests)` : "—"}
              </td>
              <td style={{ padding:"8px 6px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <input type="number" step="0.1" min="0" value={ov == null ? '' : ov} onChange={e => setYield(a.id, e.target.value)} placeholder={`auto ${yMid}`} style={{ width: 90, padding:"4px 8px", border: ov != null ? "2px solid #2e7d32" : "1px solid #ddd", borderRadius:6, fontWeight:700, fontSize:12, color: ov != null ? "#2e7d32" : "#333" }} />
                  {ov != null && (
                    <button onClick={() => resetYield(a.id)} title="Back to breed default" style={{ background:"transparent", border:"none", color:"#666", fontSize:11, cursor:"pointer", padding:"2px 4px", textDecoration:"underline" }}>↺ auto</button>
                  )}
                </div>
              </td>
              <td style={{ padding:"8px 6px", fontWeight:700, color:"#2e7d32" }}>{(effective * a.ha).toFixed(1)} t</td>
            </tr>
          );
        })}</tbody>
      </table>
      <div style={{ fontSize:11, color:"#999", marginTop:8 }}>
        After Cashflow's yield-confidence factor (default 0.85), the actual forecast is haircut. e.g. 5 t/ha × 1.7 ha × 0.85 = 7.2 t expected. Override per area = your gut call for this cycle.
      </div>
    </div>
  );
}

// ============================================================
// ADVISORY ENGINE — rule-based recommendations to cut cost + maximize profit.
// Each rule is a pure function: receives the user's full data context and
// returns an array of Advisory objects (or [] if not applicable). Advisories
// are ranked by estimated peso impact and presented as actionable cards.
//
// Advisory shape:
//   { id, category, severity, title, detail, pesoImpact, horizon, link, evidence }
// categories: 'revenue' | 'cost' | 'risk' | 'ops'
// severity:   'high' | 'medium' | 'low'
// ============================================================

function runAdvisoryRules(ctx) {
  const out = [];
  ADVISORY_RULES.forEach(rule => {
    try {
      const results = rule(ctx);
      if (Array.isArray(results)) out.push(...results.filter(Boolean));
      else if (results) out.push(results);
    } catch (e) {
      // rule failed — don't crash the whole advisor
    }
  });
  // Sort: high severity first, then by peso impact desc
  const sev = { high: 0, medium: 1, low: 2 };
  out.sort((a, b) => (sev[a.severity || 'low'] - sev[b.severity || 'low']) || ((b.pesoImpact || 0) - (a.pesoImpact || 0)));
  return out;
}

// ---- Rule registry ----
const ADVISORY_RULES = [

  // === REVENUE rules =====================================================

  // R1: Selling palay below NFA floor → sell to NFA / negotiate
  function nfaFloorOpportunity({ harvestLogs, nfaFloor, areas }) {
    if (!nfaFloor || !nfaFloor.nfa) return null;
    // NFA floor is stored at nfaFloor.nfa.{palayDry,palayFresh} — see Prices tab
    // editor. Older code read .dry / .fresh which never existed and silently
    // defaulted to the constants, making this rule misfire below the real floor.
    const floorDry   = Number(nfaFloor.nfa.palayDry)   || 21;
    const floorFresh = Number(nfaFloor.nfa.palayFresh) || 17;
    // Examine most-recent 3 harvests
    const recent = (harvestLogs || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 3);
    const below = recent.filter(h => {
      const isDry = /dry|milled|14%/i.test(h.notes || '') || h.moisture < 16;
      const floor = isDry ? floorDry : floorFresh;
      return (h.buyerPrice || 0) > 0 && (h.buyerPrice || 0) < floor;
    });
    if (below.length === 0) return null;
    const totalLost = below.reduce((s, h) => {
      const isDry = /dry|milled|14%/i.test(h.notes || '') || h.moisture < 16;
      const floor = isDry ? floorDry : floorFresh;
      return s + (h.totalKg || 0) * Math.max(0, floor - (h.buyerPrice || 0));
    }, 0);
    return {
      id: 'nfa-floor', category: 'revenue', severity: 'high',
      title: 'Sell to NFA at floor price — your recent sales are below the legal floor',
      detail: `${below.length} of your last ${recent.length} harvests sold below NFA floor (₱${floorDry}/kg dry · ₱${floorFresh}/kg fresh). Contact NFA Cagayan branch (RDC2) to register as a palay seller — they buy at floor with no porsiyento or trader cut.`,
      pesoImpact: Math.round(totalLost),
      horizon: 'Next harvest',
      link: 'prices',
      evidence: below.map(h => `${h.area} ${new Date(h.date).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}: ₱${h.buyerPrice}/kg × ${h.totalKg}kg`),
    };
  },

  // R2: Hold palay for seasonal peak (Feb-Apr) if storage allows
  function seasonalHoldingPremium({ harvestLogs, areas, schedules, priceLog }) {
    const today = new Date();
    const currentMonth = today.getMonth();
    // If today is Aug-Oct (glut), suggest holding until Feb-Apr
    if (currentMonth < 7 || currentMonth > 9) return null;
    const upcomingHarvests = (areas || [])
      // Rice-only advisory (corn pricing seasonality is different — handled elsewhere).
      // Prefer explicit a.crop; fall back to breed-substring for areas created before
      // the crop field existed.
      .filter(a => a.status === 'Active' && (
        a.crop ? a.crop === 'rice'
               : (a.breed || '').toLowerCase().match(/rc|rice|palay|mestiso|malagkit|nsic|submarino|dinorado/)
      ))
      .map(a => ({ area: a.name, ha: a.ha, harvestDate: schedules[a.id]?.harvestDate }))
      .filter(x => x.harvestDate);
    if (upcomingHarvests.length === 0) return null;
    // Estimate uplift: glut Sep 0.78 → peak Mar 1.20 = ~54% premium
    const expectedKg = upcomingHarvests.reduce((s, h) => s + (h.ha * 5000 * 0.85), 0); // 5t/ha × 0.85
    const baselinePrice = 23;
    const uplift = expectedKg * baselinePrice * 0.4;  // conservative 40% premium net of storage cost
    return {
      id: 'hold-for-peak', category: 'revenue', severity: 'medium',
      title: 'Hold palay until Feb-Apr for ₱5-8/kg premium',
      detail: `Selling at the current Aug-Oct glut typically gets you ₱18-19/kg. Storing dry palay (≤14% MC) until Feb-Apr captures the lean-season peak of ₱24-30/kg. Net of storage costs and shrinkage (~5%), the premium is roughly 40%.`,
      pesoImpact: Math.round(uplift),
      horizon: '4-6 months',
      link: 'prices',
      evidence: [`${upcomingHarvests.length} upcoming harvests · est ${(expectedKg/1000).toFixed(1)} t to potentially store`],
    };
  },

  // R3: Switch to higher-yielding breed
  function breedSwitch({ areas, breeds }) {
    if (!areas || areas.length === 0 || !breeds || breeds.length === 0) return null;
    const yieldOf = (b) => {
      const s = String(b.yield || '5'); const m = s.match(/(\d+(?:\.\d+)?)/g) || ['5'];
      return m.length > 1 ? (parseFloat(m[0])+parseFloat(m[1]))/2 : parseFloat(m[0]);
    };
    const bestRice = (breeds || []).filter(b => (b.crop || 'rice') === 'rice').sort((a, b) => yieldOf(b) - yieldOf(a))[0];
    if (!bestRice) return null;
    const bestYield = yieldOf(bestRice);
    const candidates = (areas || []).filter(a => a.status === 'Active' && a.breed && a.breed !== bestRice.name);
    const improvements = candidates.map(a => {
      const cur = (breeds || []).find(b => b.name === a.breed);
      if (!cur) return null;
      const curYield = yieldOf(cur);
      const upliftTHa = bestYield - curYield;
      if (upliftTHa <= 0.3) return null;
      const upliftKg = upliftTHa * (a.ha || 0) * 1000;
      const upliftPeso = upliftKg * 23;
      return { area: a.name, ha: a.ha, currentBreed: a.breed, curYield, uplift: upliftTHa, upliftPeso };
    }).filter(Boolean);
    if (improvements.length === 0) return null;
    const totalPeso = improvements.reduce((s, i) => s + i.upliftPeso, 0);
    return {
      id: 'breed-switch', category: 'revenue', severity: 'medium',
      title: `Try ${bestRice.name} next cycle — higher-yielding variety in your catalog`,
      detail: `${bestRice.name} is rated ${bestYield} t/ha (${bestRice.type || 'variety'}) vs your current breeds averaging less. Next planting cycle, consider switching the listed areas. Caveat: actual yield depends on irrigation, soil, weather — pilot on 1 area first.`,
      pesoImpact: Math.round(totalPeso),
      horizon: 'Next cycle',
      link: 'breeds',
      evidence: improvements.slice(0, 5).map(i => `${i.area} (${i.ha}ha) · ${i.currentBreed} ${i.curYield} → ${bestRice.name} ${bestYield} t/ha = +₱${Math.round(i.upliftPeso).toLocaleString()}`),
    };
  },

  // R4: Mill on-farm for revenue uplift
  function millingUplift({ areas, breeds, harvestLogs }) {
    const milledSold = (harvestLogs || []).filter(h => /milled|rice/i.test(h.notes || ''));
    if (milledSold.length > 0) return null;   // already milling
    if (!areas || areas.length === 0) return null;
    const totalHa = areas.filter(a => a.status === 'Active').reduce((s, a) => s + (a.ha || 0), 0);
    if (totalHa < 5) return null;   // not economical below ~5ha
    const annualKg = totalHa * 5000 * 2 * 0.85;  // 5t/ha × 2 cycles × 0.85
    const avgMillingRecovery = 0.66;
    const milledKg = annualKg * avgMillingRecovery;
    const palayPrice = 23, ricePrice = 42;
    const uplift = milledKg * ricePrice - annualKg * palayPrice;
    return {
      id: 'mill-onfarm', category: 'revenue', severity: 'medium',
      title: 'Mill your palay on-farm to sell as rice (+30-40% revenue)',
      detail: `Selling palay yields ₱23/kg; selling milled rice yields ₱42/kg. With ~66% milling recovery, you keep most of the difference. Custom milling fees in Cagayan run ₱2-3/kg of palay. The remaining ~₱15/kg-of-rice goes to you instead of the middleman.`,
      pesoImpact: Math.round(uplift * 0.6),  // conservative 60% of theoretical max after fees, losses
      horizon: 'After next harvest',
      link: 'breeds',
      evidence: [`${totalHa}ha active × 2 cycles × 5 t/ha = ~${Math.round(annualKg/1000)}t palay/yr`, `Milled: ${Math.round(milledKg/1000)}t rice at 66% recovery`],
    };
  },

  // === COST rules ========================================================

  // C1: Buying fertilizer above 3-month avg price
  function inputCostSpike({ purchases }) {
    const items = [...new Set((purchases || []).map(p => p.item))].filter(it => /^\d+-\d+-\d+$/.test(it) || it === 'FAA');
    const advisories = [];
    items.forEach(item => {
      const itemPurchases = (purchases || []).filter(p => p.item === item).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (itemPurchases.length < 3) return;
      const recent = itemPurchases[itemPurchases.length - 1];
      const prior = itemPurchases.slice(0, -1);
      const avgPrior = prior.reduce((s, p) => s + (p.unitCost || 0), 0) / prior.length;
      const spike = (recent.unitCost - avgPrior) / avgPrior;
      if (spike > 0.10) {
        const lostPeso = recent.qty * (recent.unitCost - avgPrior);
        advisories.push({
          id: 'input-spike-' + item, category: 'cost', severity: spike > 0.20 ? 'high' : 'medium',
          title: `${item}: latest purchase ${(spike*100).toFixed(0)}% above 3-month avg`,
          detail: `You paid ₱${recent.unitCost.toFixed(2)} on ${new Date(recent.date).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}. Prior average was ₱${avgPrior.toFixed(2)}. Either local supply tightened, you switched supplier, or there's a quality difference. Worth a phone call to a second supplier before the next purchase.`,
          pesoImpact: Math.round(lostPeso),
          horizon: 'Immediate',
          link: 'inventory',
          evidence: [`Last 5: ${itemPurchases.slice(-5).map(p => `${new Date(p.date).toLocaleDateString('en-PH', { month:'short', day:'numeric' })} ₱${p.unitCost}`).join(' · ')}`],
        });
      }
    });
    return advisories;
  },

  // C1b: Cheapest-N source switch — if a non-alt-fert area would save ≥₱2000
  // by switching its urea applications to 21-0-0 or 25-0-0 (based on the
  // owner's manually-entered prices), surface a card.
  function altFertSavings({ areas, fertilizerPrices }) {
    if (!fertilizerPrices) return null;
    const pricesPerKg = {};
    Object.entries(fertilizerPrices).forEach(([k, rec]) => {
      if (!rec) return;
      const v = rec.pricePerKg != null ? Number(rec.pricePerKg)
              : rec.pricePerBag != null ? Number(rec.pricePerBag) / 50 : null;
      if (v != null && !isNaN(v) && v > 0) pricesPerKg[k] = v;
    });
    if (Object.keys(pricesPerKg).length < 2) return null;
    const eligible = (areas || []).filter(a =>
      a.status === 'Active' && a.name && a.transplantDate && a.maturity && a.ha &&
      !/alt-fert/.test(a.protocol || '')
    );
    if (eligible.length === 0) return null;

    const advisories = [];
    eligible.forEach(area => {
      try {
        const isCorn = (area.crop || 'rice') === 'corn';
        const defaultSched = isCorn
          ? computeCornStandardSchedule(area.ha, area.transplantDate, area.maturity, area.plantingMethod)
          : (area.protocol === 'kadanny'
              ? computeKaDannyBolosSchedule(area.ha, area.transplantDate, area.maturity, area.plantingMethod)
              : computeSchedule(area.ha, area.transplantDate, area.maturity, area.plantingMethod));
        const altSched = isCorn
          ? computeCornAltFertSchedule(area.ha, area.transplantDate, area.maturity, area.plantingMethod, pricesPerKg)
          : computeRiceAltFertSchedule(area.ha, area.transplantDate, area.maturity, area.plantingMethod, pricesPerKg);
        const cur = planSchedCost(defaultSched, pricesPerKg);
        const alt = planSchedCost(altSched, pricesPerKg);
        if (cur.totalCost === 0 || alt.totalCost === 0) return;
        const savings = cur.totalCost - alt.totalCost;
        if (savings < 2000) return; // ignore small wins
        advisories.push({
          id: 'alt-fert-' + area.id,
          category: 'cost', severity: savings > 10000 ? 'high' : 'medium',
          title: `Switch ${area.name} to Alt-Fertilizer protocol — save ₱${Math.round(savings).toLocaleString()}`,
          detail: `Based on your current fertilizer prices, the standard protocol for ${area.name} (${area.ha} ha) would cost ₱${Math.round(cur.totalCost).toLocaleString()} in inputs this cycle. The Alt-Fertilizer protocol delivers the same N-P-K with cheaper N-source splits (16-20-0 + 0-0-60 instead of 14-14-14 basal, and ${altSched.altFertNote || 'cheaper urea alternative'}) for ₱${Math.round(alt.totalCost).toLocaleString()}. To apply: open Areas → ${area.name} → set Protocol to "${isCorn ? 'Corn' : 'Rice'} Alt-Fertilizer".`,
          pesoImpact: Math.round(savings),
          horizon: 'Current cycle',
          link: 'areas',
          evidence: [`Default schedule: ₱${Math.round(cur.totalCost).toLocaleString()}`, `Alt-fert schedule: ₱${Math.round(alt.totalCost).toLocaleString()}`, altSched.altFertNote || ''].filter(Boolean),
        });
      } catch (e) { /* skip this area */ }
    });
    return advisories;
  },

  // C2: AWD irrigation savings (only if any area currently on default flooded protocol AND no AWD tasks done)
  function awdSavings({ areas, allTasks }) {
    const flooded = (areas || []).filter(a => a.status === 'Active' && a.protocol !== 'kadanny' && !(a.plantingMethod || '').includes('direct'));
    if (flooded.length === 0) return null;
    const awdDone = (allTasks || []).some(t => /awd/i.test(t.activity || '') && (t.status === 'Completed' || t.status === 'Done'));
    if (awdDone) return null;
    const ha = flooded.reduce((s, a) => s + (a.ha || 0), 0);
    const pumpFuelPerHaPerCycle = 4500;  // realistic ₱ pump diesel
    const savings = ha * pumpFuelPerHaPerCycle * 0.25;  // AWD saves ~25%
    return {
      id: 'awd', category: 'cost', severity: 'medium',
      title: 'Adopt AWD (Alternate Wetting & Drying) irrigation',
      detail: `Switching from continuous flooding to AWD saves 25-30% on pump diesel/electricity with no yield penalty (IRRI studies). Install a perforated PVC field-water tube; re-flood only when water drops 15cm below soil. Use Crop Guide → AWD videos to brief supervisors.`,
      pesoImpact: Math.round(savings),
      horizon: 'Current cycle',
      link: 'cropguide',
      evidence: [`${flooded.length} areas (${ha}ha) currently on flooded protocol`, `Est ₱${pumpFuelPerHaPerCycle}/ha pump fuel × 25% savings`],
    };
  },

  // C3: Wet-direct seeding saves transplanting labor
  function directSeedingLabor({ areas, settings }) {
    const transplanted = (areas || []).filter(a => a.status === 'Active' && (a.plantingMethod || 'transplanting') === 'transplanting');
    if (transplanted.length === 0) return null;
    const ha = transplanted.reduce((s, a) => s + (a.ha || 0), 0);
    const dailyWage = settings?.dailyWage || 500;
    // Transplant: 8 wd/ha vs direct: 1 wd/ha = save 7 wd/ha
    const savings = ha * 7 * dailyWage;
    return {
      id: 'direct-seed', category: 'cost', severity: 'medium',
      title: 'Switch to wet-direct seeding to save ₱' + savings.toLocaleString() + ' in transplanting labor',
      detail: `Transplanting takes ~8 worker-days/ha at ₱${dailyWage}. Wet direct-seeding (broadcast on puddled field) needs only ~1 worker-day/ha. Trade-off: slightly higher weed pressure (extra herbicide cost ~₱2,000/ha) and 16 fewer days in the field. Net savings ~₱${Math.round((savings - ha * 2000)/transplanted.length).toLocaleString()}/area. Best for fields with good water control.`,
      pesoImpact: Math.round(savings - ha * 2000),
      horizon: 'Next cycle',
      link: 'areas',
      evidence: transplanted.slice(0, 5).map(a => `${a.name} (${a.ha}ha) · currently Transplanted`),
    };
  },

  // C4: Supervisor commission analysis
  function supervisorCommission({ supervisors, areas, harvestLogs }) {
    if (!supervisors || supervisors.length < 2) return null;
    const usage = {};
    (areas || []).forEach(a => {
      if (!a.managedBy) return;
      if (!usage[a.managedBy]) usage[a.managedBy] = { areas: 0, ha: 0, sup: supervisors.find(s => s.name === a.managedBy) };
      usage[a.managedBy].areas += 1;
      usage[a.managedBy].ha    += (a.ha || 0);
    });
    const entries = Object.values(usage).filter(u => u.sup);
    if (entries.length < 2) return null;
    const max = entries.reduce((m, e) => (e.sup.commissionPct || 10) > (m.sup?.commissionPct || 0) ? e : m, entries[0]);
    const min = entries.reduce((m, e) => (e.sup.commissionPct || 10) < (m.sup?.commissionPct || 100) ? e : m, entries[0]);
    if ((max.sup.commissionPct || 10) - (min.sup.commissionPct || 10) < 2) return null;
    const totalRevenueEst = entries.reduce((s, e) => s + (e.ha * 5000 * 23 * 2 * 0.85), 0);
    const peso = totalRevenueEst * ((max.sup.commissionPct || 10) - (min.sup.commissionPct || 10)) / 100;
    return {
      id: 'sup-commission', category: 'cost', severity: 'low',
      title: `Renegotiate supervisor commission rates`,
      detail: `Commission spread between supervisors is ${((max.sup.commissionPct || 10) - (min.sup.commissionPct || 10)).toFixed(1)}%. ${max.sup.name} at ${max.sup.commissionPct}% manages ${max.ha}ha while ${min.sup.name} at ${min.sup.commissionPct}% manages ${min.ha}ha. Align rates based on actual performance (yield, on-time tasks) rather than tenure to motivate the lower performer or save on the higher.`,
      pesoImpact: Math.round(peso),
      horizon: 'Long term',
      link: 'areas',
      evidence: entries.map(e => `${e.sup.name}: ${e.areas} areas / ${e.ha}ha @ ${e.sup.commissionPct || 10}%`),
    };
  },

  // C5: FAA substitution for synthetic N
  function faaSubstitution({ areas, purchases }) {
    const ureaBought = (purchases || []).filter(p => p.item === '46-0-0').reduce((s, p) => s + (p.qty * p.unitCost), 0);
    if (ureaBought < 5000) return null;
    const faaUsed = (purchases || []).some(p => p.item === 'FAA');
    if (faaUsed) return null;  // already using
    const savings = ureaBought * 0.20;  // FAA can substitute ~20% of urea
    return {
      id: 'faa-sub', category: 'cost', severity: 'low',
      title: 'Reduce urea cost with Fish Amino Acid (FAA) foliar spray',
      detail: `FAA fermented from fish trimmings + brown sugar provides foliar N + amino acids. Used as part of Ka Danny Bolos protocol, it can substitute ~20% of synthetic urea applications without yield loss. Material cost: ₱5-15/L homemade vs ₱30/kg urea. Apply at tillering, panicle initiation, grain filling.`,
      pesoImpact: Math.round(savings),
      horizon: 'Current cycle',
      link: 'cropguide',
      evidence: [`Past urea spend: ₱${Math.round(ureaBought).toLocaleString()}`, `Conservative 20% offset`],
    };
  },

  // === RISK rules ========================================================

  // K1: Cash crunch from cashflow forecast
  function cashCrunchWarning({ cashflowForecast }) {
    if (!cashflowForecast || cashflowForecast.lowest.balance >= 0) return null;
    return {
      id: 'cash-crunch', category: 'risk', severity: 'high',
      title: `Working capital shortfall projected by ${new Date(cashflowForecast.lowest.weekStart).toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric' })}`,
      detail: `Cashflow projection shows balance dipping to ${Math.round(cashflowForecast.lowest.balance).toLocaleString()} pesos. Options: (1) defer 1-2 input purchases by 1-2 weeks, (2) advance harvest if possible, (3) draw a short-term LandBank cropping loan (~6% pa), (4) pre-sell to a trader at a small discount for upfront cash.`,
      pesoImpact: Math.round(Math.abs(cashflowForecast.lowest.balance)),
      horizon: 'Immediate',
      link: 'cashflow',
      evidence: cashflowForecast.suggestions.slice(0, 3),
    };
  },

  // K2: Low-yielding area
  function lowYieldArea({ areas, harvestLogs, breeds }) {
    if (!areas || areas.length < 2 || !harvestLogs || harvestLogs.length < 3) return null;
    const histByArea = {};
    (harvestLogs || []).forEach(h => {
      if (!histByArea[h.area]) histByArea[h.area] = { totalKg: 0, totalHa: 0 };
      const a = (areas || []).find(x => x.name === h.area);
      histByArea[h.area].totalKg += (h.totalKg || 0);
      histByArea[h.area].totalHa += (a?.ha || 0);
    });
    const yieldByArea = Object.entries(histByArea).map(([area, h]) => ({ area, yieldTHa: h.totalHa > 0 ? h.totalKg / h.totalHa / 1000 : 0 })).filter(x => x.yieldTHa > 0);
    if (yieldByArea.length < 2) return null;
    const farmAvg = yieldByArea.reduce((s, x) => s + x.yieldTHa, 0) / yieldByArea.length;
    const laggers = yieldByArea.filter(x => x.yieldTHa < farmAvg * 0.85);
    if (laggers.length === 0) return null;
    const totalLost = laggers.reduce((s, x) => {
      const a = (areas || []).find(z => z.name === x.area);
      const gap = (farmAvg - x.yieldTHa) * (a?.ha || 0) * 1000 * 23;
      return s + gap;
    }, 0);
    return {
      id: 'low-yield', category: 'risk', severity: 'medium',
      title: `${laggers.length} area${laggers.length > 1 ? 's are' : ' is'} underperforming vs your farm average`,
      detail: `Your farm average is ${farmAvg.toFixed(1)} t/ha but these areas yield <85% of that. Common causes: poor water access, lower soil fertility, pest pressure, supervisor differences. Soil test (₱500 at DA RFO2 Cagayan) + side-by-side breed comparison next cycle to diagnose.`,
      pesoImpact: Math.round(totalLost),
      horizon: '1-2 cycles',
      link: 'areas',
      evidence: laggers.map(x => `${x.area}: ${x.yieldTHa.toFixed(1)} t/ha (${((x.yieldTHa/farmAvg-1)*100).toFixed(0)}%)`),
    };
  },

  // K3: Overdue tasks accumulating
  function overdueTasks({ allTasks }) {
    const now = new Date().toISOString().slice(0, 10);
    const overdue = (allTasks || []).filter(t => {
      if (t.phase === 'Growth Stage') return false;
      const isDone = ['Completed','Done','Skipped','Cancelled','Not Done'].includes(t.status);
      if (isDone) return false;
      return (t.planEnd || t.planStart) < now;
    });
    if (overdue.length === 0) return null;
    return {
      id: 'overdue', category: 'risk', severity: overdue.length > 5 ? 'high' : 'medium',
      title: `${overdue.length} task${overdue.length > 1 ? 's' : ''} overdue — yield at risk`,
      detail: `Missed-window tasks for fertilizer, irrigation, or pest control can directly reduce yield. Each week of fertilizer delay = ~3% yield loss at critical stages. Review the Tasks tab and close the loop with each supervisor today.`,
      pesoImpact: overdue.length * 3000,
      horizon: 'Immediate',
      link: 'tasks',
      evidence: overdue.slice(0, 5).map(t => `${t.area} · ${t.activity} · was ${new Date(t.planStart).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}`),
    };
  },

  // === OPS rules =========================================================

  // O1: Inventory shortage on upcoming task
  function inventoryShortage({ inventoryAlerts }) {
    const shortages = inventoryAlerts?.upcomingNeeds?.filter(n => !n.sufficient) || [];
    if (shortages.length === 0) return null;
    return {
      id: 'inv-short', category: 'ops', severity: 'high',
      title: `Inventory shortage on ${shortages.length} upcoming task${shortages.length > 1 ? 's' : ''}`,
      detail: `You're missing inputs for tasks scheduled in the next 14 days. Buying at the last minute usually means paying the premium price at the nearest store. Plan a single bulk run to a supplier outside Tuguegarao (San Mariano, Ilagan) for 10-15% lower price.`,
      pesoImpact: shortages.reduce((s, n) => s + (n.deficit * 30), 0) * 0.10,  // 10% saved by bulk buying
      horizon: 'This week',
      link: 'inventory',
      evidence: shortages.slice(0, 5).map(n => `${n.area} · ${n.taskName} · need ${Math.round(n.deficit)} more ${n.unit} of ${n.item}`),
    };
  },

  // === IRRI / PhilRice BEST PRACTICES (PalayCheck-aligned) ==============
  // Sources: IRRI Rice Knowledge Bank, PhilRice PalayCheck 2022, RCM.

  // I1: Seedling age at transplanting — IRRI says 15–21 days for max tillering
  function seedlingAge({ areas, schedules }) {
    const old = (areas || []).filter(a => a.status === 'Active' && (a.plantingMethod || 'transplanting') === 'transplanting' && a.transplantDate)
      .map(a => {
        const sched = schedules[a.id]; if (!sched || !sched.sowingDate) return null;
        const days = Math.round((new Date(a.transplantDate) - new Date(sched.sowingDate)) / 86400000);
        return { name: a.name, ha: a.ha, days };
      })
      .filter(x => x && x.days > 25);
    if (old.length === 0) return null;
    const peso = old.reduce((s, x) => s + (x.ha * 5000 * 23 * 0.25), 0);  // ~25% yield drag from old seedlings
    return {
      id: 'seedling-age', category: 'ops', severity: 'medium',
      title: `Seedlings >25 days old at transplant — tillering will suffer`,
      detail: `IRRI/PhilRice PalayCheck: transplant at 15–21 days old (max 25). Older seedlings tiller 25–40% less and recover slowly from transplant shock. Adjust your seedbed timing so seedling pulling happens by day 20-22 after sowing.`,
      pesoImpact: Math.round(peso),
      horizon: 'Next cycle',
      link: 'areas',
      evidence: old.map(x => `${x.name} (${x.ha}ha) · ${x.days}-day-old seedlings (target 15–21)`),
    };
  },

  // I2: Synchronous planting (within 2 weeks across the farm + barangay)
  function synchronousPlanting({ areas }) {
    const active = (areas || []).filter(a => a.status === 'Active' && a.transplantDate);
    if (active.length < 2) return null;
    const sorted = active.map(a => ({ name: a.name, ha: a.ha, date: a.transplantDate })).sort((a, b) => a.date.localeCompare(b.date));
    const median = sorted[Math.floor(sorted.length / 2)].date;
    const outliers = sorted.filter(x => Math.abs((new Date(x.date) - new Date(median)) / 86400000) > 14);
    if (outliers.length === 0) return null;
    const peso = outliers.reduce((s, x) => s + (x.ha * 5000 * 23 * 0.08), 0);  // 8% tungro/rat exposure
    return {
      id: 'sync-planting', category: 'risk', severity: 'medium',
      title: 'Stagger planting tightens tungro + rat pressure on lone parcels',
      detail: `IRRI tungro management: when neighboring parcels harvest while one is still vegetative, green leafhoppers + rats migrate to the lone parcel. Aim for all parcels (and ideally your whole barangay) to plant within a 2-week window. Co-ordinate with neighbors.`,
      pesoImpact: Math.round(peso),
      horizon: 'Next cycle',
      link: 'areas',
      evidence: outliers.map(x => `${x.name} planted ${new Date(x.date).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })} (median ${new Date(median).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })})`),
    };
  },

  // I3: Combine harvester for parcels ≥1ha — saves 2.3% harvest losses + 16 worker-days
  function combineHarvesterROI({ areas, schedules, settings }) {
    const now = new Date(); const in21d = new Date(now); in21d.setDate(in21d.getDate() + 21);
    const candidates = (areas || []).filter(a => a.status === 'Active' && (a.ha || 0) >= 1.0)
      .map(a => ({ name: a.name, ha: a.ha, harvestDate: schedules[a.id]?.harvestDate }))
      .filter(x => x.harvestDate && new Date(x.harvestDate) >= now && new Date(x.harvestDate) <= in21d);
    if (candidates.length === 0) return null;
    const dailyWage = settings?.dailyWage || 500;
    // Save 16 worker-days/ha labor + 2.3% × 5t/ha × ₱23/kg = ~₱2,650/ha grain saved + ~₱8,000 labor saved
    const peso = candidates.reduce((s, c) => s + (c.ha * (16 * dailyWage + 2650)), 0);
    return {
      id: 'combine-harvester', category: 'cost', severity: 'medium',
      title: `Hire combine harvester for ${candidates.length} upcoming harvest${candidates.length > 1 ? 's' : ''}`,
      detail: `IRRI/PIDS Luzon study: manual cut + thresh = 4.5% post-harvest loss + 19 worker-days/ha. Custom combine = 2.2% loss in 3-hour run. Net: ~140 kg/ha kept + 16 worker-days saved. Custom rate ~8% of paddy output. Best for parcels ≥1ha that you've drained 10–14 days before. Skip combine if >30% lodged.`,
      pesoImpact: Math.round(peso),
      horizon: 'Within 21 days',
      link: 'equipment',
      evidence: candidates.map(c => `${c.name} (${c.ha}ha) · harvest ${new Date(c.harvestDate).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}`),
    };
  },

  // I4: Multi-pass milling — capture +5–8% milling recovery
  function multiPassMilling({ harvestLogs }) {
    const palaySold = (harvestLogs || []).filter(h => !/milled|rice/i.test(h.notes || '')).slice(-3);
    if (palaySold.length === 0) return null;
    const totalKg = palaySold.reduce((s, h) => s + (h.totalKg || 0), 0);
    if (totalKg < 1000) return null;
    // 5% milling recovery uplift × ₱42/kg rice = ~₱2,100 per ton paddy
    const peso = (totalKg / 1000) * 2100;
    return {
      id: 'multi-pass-milling', category: 'revenue', severity: 'low',
      title: 'Mill via multi-pass facility, not kiskisan',
      detail: `PhilRice: rubber-roll husker + 2-stage whitener achieves 65–68% milling recovery vs <60% for kiskisan single-pass. Each 5% recovery gain = ~50 kg more milled rice per ton paddy ≈ ₱2,100. The grader also separates head rice from brokens — head rice sells at ₱5/kg premium.`,
      pesoImpact: Math.round(peso),
      horizon: 'Each harvest',
      link: 'breeds',
      evidence: [`Recent palay sold: ${Math.round(totalKg).toLocaleString()}kg`, `5pp recovery uplift × ₱42/kg rice premium`],
    };
  },

  // I5: Pre-harvest drainage 10–14 days before
  function preHarvestDrainage({ areas, schedules, allTasks }) {
    const now = new Date();
    const within10d = new Date(now); within10d.setDate(within10d.getDate() + 14);
    const needsDrainage = (areas || []).filter(a => a.status === 'Active')
      .map(a => ({ a, sched: schedules[a.id] }))
      .filter(({ a, sched }) => sched && sched.harvestDate && new Date(sched.harvestDate) >= now && new Date(sched.harvestDate) <= within10d)
      .filter(({ a }) => {
        // No "drain" task already scheduled for this area
        const tasks = (allTasks || []).filter(t => t.area === a.name);
        return !tasks.some(t => /drain|drainage|dry.?out/i.test(t.activity || ''));
      });
    if (needsDrainage.length === 0) return null;
    const peso = needsDrainage.reduce((s, x) => s + (x.a.ha * 5000 * 23 * 0.03), 0);  // 3% loss from wet field harvest
    return {
      id: 'pre-harvest-drain', category: 'ops', severity: 'high',
      title: `Drain ${needsDrainage.length} area${needsDrainage.length > 1 ? 's' : ''} 10–14 days before harvest`,
      detail: `IRRI Water Management Key Check: drain when 80–85% of grains are straw-coloured. Harvest on a firm field — combine doesn't sink, grain dries evenly in the panicle, milling recovery improves. Harvesting on a flooded field adds 2–3% field losses (combine wheels sink, shattering) and slows the operation.`,
      pesoImpact: Math.round(peso),
      horizon: 'This week',
      link: 'tasks',
      evidence: needsDrainage.map(({ a, sched }) => `${a.name} · harvest ${new Date(sched.harvestDate).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })} — no drainage task scheduled`),
    };
  },

  // I6: Pre-flowering: keep flooded, don't run AWD during reproductive stage
  function flowerStageFlood({ areas, schedules, allTasks }) {
    const flagged = (areas || []).filter(a => a.status === 'Active')
      .map(a => ({ a, sched: schedules[a.id] }))
      .filter(({ sched }) => sched && sched.panicleDate)
      .filter(({ a, sched }) => {
        // Is there an AWD cycle task scheduled during the flowering window (PI − 3 to PI + 14)?
        const piDate = new Date(sched.panicleDate);
        const start = new Date(piDate); start.setDate(start.getDate() - 3);
        const end   = new Date(piDate); end.setDate(end.getDate() + 14);
        const tasks = (allTasks || []).filter(t => t.area === a.name);
        return tasks.some(t => /awd cycle/i.test(t.activity || '') && t.planStart >= start.toISOString().slice(0,10) && t.planStart <= end.toISOString().slice(0,10) && (t.status !== 'Completed' && t.status !== 'Done' && t.status !== 'Cancelled' && t.status !== 'Skipped'));
      });
    if (flagged.length === 0) return null;
    return {
      id: 'flower-flood', category: 'risk', severity: 'high',
      title: 'Suspend AWD during flowering — keep continuous flood',
      detail: `IRRI: heat-induced spikelet sterility rises sharply above 35°C at anthesis. Maintain 5 cm standing water from booting through 1 week post-flowering. Each AWD dry-down during this window risks 10% sterility per degree of stress. The protocol's AWD cycles already pause; double-check no extra "AWD Cycle" task overlaps the panicle-initiation week.`,
      pesoImpact: flagged.reduce((s, x) => s + (x.a.ha * 5000 * 23 * 0.10), 0),
      horizon: 'Immediate',
      link: 'areas',
      evidence: flagged.map(({ a, sched }) => `${a.name} · panicle init ${new Date(sched.panicleDate).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}`),
    };
  },

  // I7: BPH/stem-borer weekly scouting reminder
  function pestScoutCadence({ areas, schedules, sprayLogs, allTasks }) {
    const within = (areas || []).filter(a => a.status === 'Active' && a.transplantDate)
      .filter(a => {
        const dAT = (new Date() - new Date(a.transplantDate)) / 86400000;
        return dAT >= 30 && dAT <= 110;  // 30 DAT to ~harvest
      });
    if (within.length === 0) return null;
    const oneWeekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
    const recentSprays = (sprayLogs || []).filter(s => s.date >= oneWeekAgo);
    const unmonitored = within.filter(a => !recentSprays.some(s => s.area === a.name));
    if (unmonitored.length === 0) return null;
    return {
      id: 'scout-cadence', category: 'ops', severity: 'medium',
      title: `Weekly pest scouting needed on ${unmonitored.length} area${unmonitored.length > 1 ? 's' : ''}`,
      detail: `IRRI Action Thresholds: BPH ≥5 hoppers/hill warrants spraying; stem borer ≥10% deadheart in vegetative or 5% whitehead in reproductive. Calendar-spraying instead of scouting wastes ₱800–1,500/ha per cycle AND triggers BPH resurgence. Walk a diagonal, tap 20 hills, count. No sign-of-trouble in your spray log this week.`,
      pesoImpact: unmonitored.reduce((s, a) => s + (a.ha * 1200), 0),  // 1 wasted spray + outbreak risk
      horizon: 'This week',
      link: 'areas',
      evidence: unmonitored.map(a => `${a.name} (${a.ha}ha) · no spray log in last 7 days`),
    };
  },

  // I8: Climate-resilient variety for flood-prone parcels
  function climateResilientVariety({ areas, breeds }) {
    const NON_RESILIENT_HINT = /rc 222|rc 218|rc 216|mestizo 19|mestizo 20|psb rc/i;
    const RESILIENT = /rc 480|rc 686|rc 740|rc 732|sub1|salinas|inpari/i;
    const candidates = (areas || []).filter(a => a.status === 'Active' && a.breed);
    const flagged = candidates.filter(a => NON_RESILIENT_HINT.test(a.breed) && !RESILIENT.test(a.breed) && /flood|low|riverside|riparian|magat|cagayan/i.test((a.notes || '') + ' ' + (a.name || '')));
    if (flagged.length === 0) return null;
    return {
      id: 'climate-variety', category: 'risk', severity: 'medium',
      title: `Switch to flood-tolerant variety on flood-prone parcels`,
      detail: `PhilRice climate-resilient releases: NSIC Rc 480 (drought+submergence+saline, "Green Super Rice 8"), Rc 686/Rc 740 (combo tolerance), Rc 732 (saline+submergence). A single typhoon-class flood with a non-Sub1 variety = total loss. Sub1 varieties can survive 14+ days submergence and recover 4–5 t/ha.`,
      pesoImpact: flagged.reduce((s, a) => s + (a.ha * 5000 * 23 * 0.30), 0),  // 30% probability × full loss
      horizon: 'Next cycle',
      link: 'breeds',
      evidence: flagged.map(a => `${a.name} (${a.ha}ha) currently ${a.breed} — name/notes suggest flood-prone`),
    };
  },

  // I9: 24-hour drying after harvest — alert if wet weather + harvest imminent
  function dryingAlert({ areas, schedules }) {
    const now = new Date();
    const in7d = new Date(now); in7d.setDate(in7d.getDate() + 7);
    const imminent = (areas || []).filter(a => a.status === 'Active')
      .map(a => ({ a, sched: schedules[a.id] }))
      .filter(({ sched }) => sched && sched.harvestDate && new Date(sched.harvestDate) >= now && new Date(sched.harvestDate) <= in7d);
    if (imminent.length === 0) return null;
    return {
      id: 'drying-alert', category: 'ops', severity: 'medium',
      title: `Plan dryer access — ${imminent.length} harvest${imminent.length > 1 ? 's' : ''} within 7 days`,
      detail: `FAO/PhilRice: begin drying within 24 h of harvest. Target 14% MC for 8–12 month storage; 10% for >1 year. Use a flat-bed dryer at ≤43°C (higher temps fracture kernels → broken rice → milling recovery drops 5–10pp). Pavement/road drying is fine ONLY when grain is still ≥18% MC; below that it surface-dries and fissures.`,
      pesoImpact: imminent.reduce((s, x) => s + (x.a.ha * 5000 * 23 * 0.07), 0),
      horizon: 'This week',
      link: 'equipment',
      evidence: imminent.map(({ a, sched }) => `${a.name} (${a.ha}ha) · harvest ${new Date(sched.harvestDate).toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' })}`),
    };
  },

  // I10: Stale seedbed / level field at land prep
  function staleSeedbedReminder({ areas, allTasks }) {
    const upcoming = (areas || []).filter(a => a.status === 'Planning' || (a.status === 'Active' && (() => {
      // active but transplant hasn't happened yet (within 14 days from today)
      if (!a.transplantDate) return false;
      const d = (new Date(a.transplantDate) - new Date()) / 86400000;
      return d >= 0 && d <= 14;
    })()));
    if (upcoming.length === 0) return null;
    return {
      id: 'stale-seedbed', category: 'ops', severity: 'low',
      title: `Practice stale seedbed before final harrow on ${upcoming.length} upcoming parcel${upcoming.length > 1 ? 's' : ''}`,
      detail: `PhilRice PalayCheck Land Prep Key Check: flood the field 1–2 weeks before final harrow to germinate weed seeds, then harrow them under just before transplanting. Reduces herbicide need by 20–30% and gives the crop a head start vs weeds. Combined with laser/precision levelling (2 cm grade max), it also makes AWD work properly.`,
      pesoImpact: upcoming.reduce((s, a) => s + (a.ha * 2500), 0),  // ~₱2,500/ha herbicide saved + yield
      horizon: 'Pre-plant',
      link: 'cropguide',
      evidence: upcoming.map(a => `${a.name} (${a.ha}ha) · ${a.status === 'Planning' ? 'in planning' : 'transplant in ' + Math.round((new Date(a.transplantDate) - new Date()) / 86400000) + ' days'}`),
    };
  },

  // I11: Certified seed reminder for next cycle
  function certifiedSeedReminder({ areas }) {
    const active = (areas || []).filter(a => a.status === 'Active');
    if (active.length === 0) return null;
    // Heuristic: if any area's notes mention "saved" or "previous harvest" seed source
    // OR if we've been on the same breed >2 cycles (we don't track cycles directly)
    // Surface as informational reminder
    return {
      id: 'certified-seed', category: 'revenue', severity: 'low',
      title: 'Use certified seed (or RCEF free seed) for the next cycle',
      detail: `PhilRice: certified seed yields ~10% more than farmer-saved seed (less off-types, higher vigor, lower weed-rice contamination). NSIC Rc 506 averaged 7.76 t/ha across 2022 RCEF demos. RCEF gives free certified inbred seed to qualifying farmers — check with DA RFO2 Cagayan for your eligibility. Otherwise certified inbred is ~₱1,200–1,800/bag.`,
      pesoImpact: Math.round(active.reduce((s, a) => s + (a.ha * 5000 * 23 * 0.10), 0)),
      horizon: 'Next cycle',
      link: 'breeds',
      evidence: ['Apply via DA RFO2 Cagayan Valley · https://cagayanvalley.da.gov.ph/'],
    };
  },

  // I12: Leaf Color Chart adoption (SSNM)
  function leafColorChartAdoption({ areas, sprayLogs, laborLogs }) {
    const active = (areas || []).filter(a => a.status === 'Active');
    if (active.length === 0) return null;
    // No way to detect actual LCC usage from current data — surface as universal nudge
    // unless we already see LCC mentions in notes
    const mentioned = (sprayLogs || []).some(s => /lcc|leaf colou?r|chlorophyll/i.test(s.notes || '')) || (laborLogs || []).some(l => /lcc|leaf colou?r/i.test(l.notes || ''));
    if (mentioned) return null;
    const totalHa = active.reduce((s, a) => s + (a.ha || 0), 0);
    const ureaSaved = totalHa * 20 * 30;  // 20kg urea/ha × ₱30/kg
    return {
      id: 'lcc-ssnm', category: 'cost', severity: 'low',
      title: 'Adopt Leaf Color Chart (LCC) for site-specific N',
      detail: `IRRI SSNM: weekly LCC reading from 14 DAT to flowering, top-dress urea only when reading <4 (transplanted) or <3 (DSR). Cuts urea use by 15–25 kg/ha with no yield loss, raising N-use efficiency from ~30% to 45%+. The chart costs ~₱150 from PhilRice / IRRI; one supervisor can monitor all parcels weekly in <1 hour.`,
      pesoImpact: Math.round(ureaSaved),
      horizon: 'Current + next cycle',
      link: 'cropguide',
      evidence: [`${totalHa}ha active across ${active.length} parcels`, `Conservative saving: 20kg urea/ha × ₱30/kg`],
    };
  },

  // O2: Photo journal coverage (encourage discipline)
  function photoCoverageNudge({ diagnoses, areas }) {
    const active = (areas || []).filter(a => a.status === 'Active');
    if (active.length === 0) return null;
    const withDiagnoses = new Set((diagnoses || []).map(d => d.area));
    const uncovered = active.filter(a => !withDiagnoses.has(a.name));
    if (uncovered.length === 0) return null;
    if (uncovered.length < active.length / 2) return null;  // only nudge if mostly uncovered
    return {
      id: 'photo-coverage', category: 'ops', severity: 'low',
      title: 'Train supervisors to photo-document weekly via the Diagnose tab',
      detail: `Regular field photos detect pest outbreaks ~7-10 days earlier than visual inspection alone, and the AI diagnosis turns it into an actionable next-step. Aim for 1 photo per area per week. Early detection of stem borer or tungro can save the entire crop.`,
      pesoImpact: uncovered.reduce((s, a) => s + (a.ha || 0) * 5000 * 23 * 0.05, 0),  // 5% yield saved per ha
      horizon: 'Ongoing',
      link: 'areas',
      evidence: [`${uncovered.length} of ${active.length} active areas have no diagnosis history yet`],
    };
  },
];
