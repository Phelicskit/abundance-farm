function AreaTaskTracker({ tasks, taskMeta, setTaskMeta, areaName, mobile, customTasks, setCustomTasks, harvestLogs, setHarvestLogs, areaData, equipment, fuelLogs, setFuelLogs }) {
  const [filterPhase, setFilterPhase] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [expandedId, setExpandedId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newTask, setNewTask] = useState({ activity:"", phase:"Crop Care", planStart:"", planEnd:"", notes:"" });
  const [showHarvestForm, setShowHarvestForm] = useState(false);
  const [harvestEntry, setHarvestEntry] = useState({ date: today, bags: "", weightPerBag: 50, moisture: "", buyerPrice: "", grade: "Good", notes: "" });

  const filtered = tasks.filter(t =>
    (filterPhase === "All" || t.phase === filterPhase) &&
    (filterStatus === "All" || t.status === filterStatus)
  );

  const updateMeta = (id, field, value) => {
    const key = `${areaName}-${id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), [field]: value } }));
  };

  const quickComplete = (t) => {
    const key = `${areaName}-${t.id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), status: "Completed", actEnd: (prev[key]?.actEnd) || today } }));
  };
  const markNotDone = (t) => {
    const key = `${areaName}-${t.id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), status: "Not Done", actEnd: (prev[key]?.actEnd) || today } }));
  };
  const markSkipped = (t) => {
    const key = `${areaName}-${t.id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), status: "Skipped", actEnd: (prev[key]?.actEnd) || today } }));
  };

  const addTask = () => {
    if (!newTask.activity || !newTask.planStart) return;
    const existing = customTasks[areaName] || [];
    const maxId = existing.length > 0 ? Math.max(...existing.map(t => t.id)) : 1000;
    const task = {
      id: maxId + 1,
      activity: newTask.activity,
      phase: newTask.phase,
      planStart: newTask.planStart,
      planEnd: newTask.planEnd || newTask.planStart,
      status: "Not Started",
      notes: newTask.notes,
      isCustom: true,
    };
    setCustomTasks(prev => ({ ...prev, [areaName]: [...(prev[areaName] || []), task] }));
    setNewTask({ activity:"", phase:"Crop Care", planStart:"", planEnd:"", notes:"" });
    setShowAdd(false);
  };

  const removeCustomTask = (taskId) => {
    setCustomTasks(prev => ({
      ...prev,
      [areaName]: (prev[areaName] || []).filter(t => t.id !== taskId),
    }));
    const key = `${areaName}-${taskId}`;
    setTaskMeta(prev => {
      const next = { ...prev };
      delete next[key];
      return next;
    });
  };

  const recordHarvest = () => {
    if (!harvestEntry.bags || !harvestEntry.date) return;
    const bags = Number(harvestEntry.bags) || 0;
    const wpb = Number(harvestEntry.weightPerBag) || 50;
    const totalKg = bags * wpb;
    const log = {
      id: Date.now(),
      area: areaName,
      season: areaData?.season || "",
      breed: areaData?.breed || "",
      ha: areaData?.ha || 0,
      date: harvestEntry.date,
      bags,
      weightPerBag: wpb,
      totalKg,
      moisture: harvestEntry.moisture ? Number(harvestEntry.moisture) : null,
      buyerPrice: harvestEntry.buyerPrice ? Number(harvestEntry.buyerPrice) : null,
      grade: harvestEntry.grade,
      notes: harvestEntry.notes,
      yieldPerHa: areaData?.ha ? Math.round(totalKg / areaData.ha) : null,
    };
    setHarvestLogs(prev => [...prev, log]);
    setHarvestEntry({ date: today, bags: "", weightPerBag: 50, moisture: "", buyerPrice: "", grade: "Good", notes: "" });
    setShowHarvestForm(false);
  };

  const areaHarvests = harvestLogs.filter(h => h.area === areaName);

  return (
    <div style={{ padding: mobile ? 10 : 16, display:"flex", flexDirection:"column", gap:10 }}>
      {/* Filters + Add button */}
      <div style={{ display:"flex", flexWrap:"wrap", gap: mobile ? 6 : 10, alignItems:"center" }}>
        <select value={filterPhase} onChange={e => setFilterPhase(e.target.value)} style={{ ...filterStyle, fontSize: mobile ? 11 : 13, padding: mobile ? "6px 8px" : "8px 12px" }}>
          <option value="All">All Phases</option>
          {PHASES.map(p => <option key={p}>{p}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ ...filterStyle, fontSize: mobile ? 11 : 13, padding: mobile ? "6px 8px" : "8px 12px" }}>
          <option value="All">All Statuses</option>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <span style={{ fontSize: mobile ? 10 : 12, color:"#999" }}>{filtered.length} tasks</span>
        <button onClick={() => printSupervisorSheet(filtered, areaName, areaData)} title="Open a printable task sheet for the field supervisor" style={{ marginLeft:"auto", background:"#5d4037", color:"white", border:"none", borderRadius:8, padding: mobile ? "6px 12px" : "8px 14px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>🖨️ Print sheet</button>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: showAdd ? "#999" : "#1565c0", color:"white", border:"none", borderRadius:8, padding: mobile ? "6px 12px" : "8px 16px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>{showAdd ? "Cancel" : "+ Add Task"}</button>
      </div>

      {/* Add Task Form */}
      {showAdd && (
        <div style={{ background:"#e3f2fd", borderRadius:14, padding: mobile ? 12 : 18, border:"2px solid #90caf9" }}>
          <h4 style={{ margin:"0 0 10px", fontSize:14, color:"#1565c0" }}>New Custom Task</h4>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
            <label style={labelStyle}>Activity Name *
              <input value={newTask.activity} onChange={e => setNewTask(p => ({...p, activity: e.target.value}))} placeholder="e.g. Apply insecticide" style={inputStyle} />
            </label>
            <label style={labelStyle}>Phase
              <select value={newTask.phase} onChange={e => setNewTask(p => ({...p, phase: e.target.value}))} style={inputStyle}>
                {PHASES.filter(p => p !== "Growth Stage").map(p => <option key={p}>{p}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Planned Start *
              <input type="date" value={newTask.planStart} onChange={e => setNewTask(p => ({...p, planStart: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#bbdefb" }} />
            </label>
            <label style={labelStyle}>Planned End
              <input type="date" value={newTask.planEnd} onChange={e => setNewTask(p => ({...p, planEnd: e.target.value}))} style={inputStyle} />
            </label>
            <label style={{ ...labelStyle, gridColumn: mobile ? "span 1" : "span 2" }}>Notes
              <input value={newTask.notes} onChange={e => setNewTask(p => ({...p, notes: e.target.value}))} placeholder="Optional details..." style={inputStyle} />
            </label>
          </div>
          <button onClick={addTask} disabled={!newTask.activity || !newTask.planStart} style={{ marginTop:12, background: newTask.activity && newTask.planStart ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: newTask.activity && newTask.planStart ? "pointer" : "not-allowed" }}>Save Task</button>
        </div>
      )}

      {/* Task list */}
      {filtered.length === 0 && !showAdd && (
        <div style={{ padding:30, textAlign:"center", color:"#bbb", fontSize:13 }}>No tasks found. {tasks.length === 0 ? "Fill in area details to generate tasks, or add a custom task." : "Try changing the filters."}</div>
      )}

      {filtered.map(t => {
        const isGrowthStage = t.phase === "Growth Stage";
        const isExp = expandedId === t.id;
        const status = t.status || "Not Started";
        const delay = daysBetween(t.planEnd, t.actEnd);

        if (isGrowthStage) {
          return (
            <div key={t.id} style={{ background:"linear-gradient(135deg,#f3e5f5,#e1bee7)", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderLeft:`5px solid #7b1fa2`, overflow:"hidden", display:"flex", alignItems:"center", gap:12, padding:"13px 18px" }}>
              <span style={{ fontSize:20 }}>🌱</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:800, fontSize:14, color:"#4a148c" }}>{t.activity}</div>
                <div style={{ fontSize:11, color:"#7b1fa2", marginTop:2 }}>{fmtDate(t.planStart)}{t.planEnd !== t.planStart ? ` → ${fmtDate(t.planEnd)}` : ""}</div>
              </div>
              <Badge color="#7b1fa2" bg="#e1bee7">Growth Stage</Badge>
            </div>
          );
        }

        return (
          <div key={t.id} style={{ background: t.awd ? "#e0f2f1" : (t.isCustom ? "#fffde7" : "white"), borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderLeft:`5px solid ${t.awd ? "#00838f" : (t.isCustom ? "#ff8f00" : (PHASE_COLORS[t.phase] || "#ccc"))}`, overflow:"hidden", border:"1px solid #f0f0f0" }}>
            <div onClick={() => setExpandedId(isExp ? null : t.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"13px 16px", cursor:"pointer" }}>
              <span style={{ fontWeight:700, color:"#aaa", fontSize:12, minWidth:30 }}>#{t.id}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:13, color:"#333", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                  {t.awd && <span title="Alternate Wetting & Drying" style={{ fontSize:14 }}>💧</span>}
                  {t.activity}
                  {t.awd && <Badge color="#00838f" bg="#b2dfdb">AWD</Badge>}
                  {t.isCustom && <Badge color="#ff8f00" bg="#fff3e0">Custom</Badge>}
                </div>
                {t.awdNote && (
                  <div style={{ fontSize:11, color:"#00695c", marginTop:4, fontStyle:"italic", lineHeight:1.4 }}>↻ {t.awdNote}</div>
                )}
                {t.inputs && t.inputs.length > 0 && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
                    {t.inputs.map((inp, idx) => {
                      const actualVal = t[`actualInput_${inp.item}`];
                      const hasActual = actualVal != null && actualVal !== "";
                      return (
                      <span key={idx} style={{ display:"inline-flex", alignItems:"center", gap:4, background: hasActual ? "#e8f5e9" : "#e3f2fd", border:`1px solid ${hasActual ? "#a5d6a7" : "#bbdefb"}`, borderRadius:6, padding:"2px 8px", fontSize:11 }}>
                        <span style={{ fontWeight:700, color: hasActual ? "#2e7d32" : "#1565c0" }}>{inp.item}</span>
                        {hasActual ? (
                          <span style={{ color:"#2e7d32", fontWeight:600 }}>{formatInputAmount(actualVal, inp.item)}<span style={{ color:"#999", fontWeight:400 }}> / {formatInputAmount(inp.amount, inp.item)}</span></span>
                        ) : (
                          inp.amount && <span style={{ color:"#555", fontWeight:600 }}>{formatInputAmount(inp.amount, inp.item)}</span>
                        )}
                      </span>
                      );})}
                  </div>
                )}
                <div style={{ fontSize:11, color:"#aaa", marginTop:3 }}>{fmtDate(t.planStart)} → {fmtDate(t.planEnd)}{t.notes ? ` · ${t.notes}` : ""}</div>
              </div>
              <StatusBadge status={status} />
              <div style={{ display:"inline-flex", gap:4 }} onClick={e => e.stopPropagation()}>
                <button
                  onClick={() => quickComplete(t)}
                  title="Done — task was completed"
                  disabled={status === "Completed" || status === "Done"}
                  style={{
                    background: (status === "Completed" || status === "Done") ? "#a5d6a7" : "#2e7d32",
                    color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700,
                    cursor: (status === "Completed" || status === "Done") ? "default" : "pointer",
                    opacity: (status === "Completed" || status === "Done") ? 0.6 : 1
                  }}
                >✓</button>
                <button
                  onClick={() => markNotDone(t)}
                  title="Not Done — task should have happened but didn't"
                  disabled={status === "Not Done"}
                  style={{
                    background: status === "Not Done" ? "#ef9a9a" : "#c62828",
                    color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700,
                    cursor: status === "Not Done" ? "default" : "pointer",
                    opacity: status === "Not Done" ? 0.6 : 1
                  }}
                >✗</button>
                <button
                  onClick={() => markSkipped(t)}
                  title="X — task skipped or not applicable"
                  disabled={status === "Skipped"}
                  style={{
                    background: status === "Skipped" ? "#bdbdbd" : "#616161",
                    color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700,
                    cursor: status === "Skipped" ? "default" : "pointer",
                    opacity: status === "Skipped" ? 0.6 : 1
                  }}
                >X</button>
              </div>
              <span style={{ fontSize:16, color:"#ccc", transform: isExp ? "rotate(180deg)" : "none", transition:"transform .2s" }}>▼</span>
            </div>

            {isExp && (
              <div style={{ padding: mobile ? "0 10px 12px" : "0 16px 16px", borderTop:"1px solid #f5f5f5", display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10, paddingTop:12 }}>
                <label style={labelStyle}>Status
                  <select value={status} onChange={e => updateMeta(t.id, "status", e.target.value)} style={inputStyle}>
                    {STATUSES.map(s => <option key={s}>{s}</option>)}
                  </select>
                </label>
                <label style={labelStyle}>Actual Start
                  <input type="date" value={t.actStart || ""} onChange={e => updateMeta(t.id, "actStart", e.target.value)} style={inputStyle} />
                </label>
                <label style={labelStyle}>Actual End
                  <input type="date" value={t.actEnd || ""} onChange={e => updateMeta(t.id, "actEnd", e.target.value)} style={inputStyle} />
                </label>
                <label style={labelStyle}>Assigned To
                  <input value={t.assignedTo || ""} onChange={e => updateMeta(t.id, "assignedTo", e.target.value)} placeholder="Worker" style={inputStyle} />
                </label>
                <label style={{ ...labelStyle, gridColumn: mobile ? "span 1" : "span 2" }}>Remarks
                  <input value={t.remarks || ""} onChange={e => updateMeta(t.id, "remarks", e.target.value)} placeholder="Notes..." style={inputStyle} />
                </label>
                {t.inputs && t.inputs.length > 0 && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3", background:"#fafafa", borderRadius:10, padding:"10px 14px" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#666", marginBottom:8 }}>Actual Inputs Applied</div>
                    <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : `repeat(${Math.min(t.inputs.length, 3)}, 1fr)`, gap:8 }}>
                      {t.inputs.map((inp, idx) => {
                        const metaKey = `actualInput_${inp.item}`;
                        const planned = inp.amount || "";
                        return (
                          <label key={idx} style={labelStyle}>
                            <span style={{ display:"flex", alignItems:"center", gap:4 }}>
                              <span style={{ fontWeight:700, color:"#1565c0" }}>{inp.item}</span>
                              <span style={{ fontSize:10, color:"#999" }}>planned: {planned}</span>
                            </span>
                            <input
                              value={t[metaKey] ?? ""}
                              onChange={e => updateMeta(t.id, metaKey, e.target.value)}
                              placeholder={planned || "Amount applied..."}
                              style={{ ...inputStyle, fontWeight:700, color:"#2e7d32", background:"#e8f5e9" }}
                            />
                          </label>
                        );
                      })}
                    </div>
                  </div>
                )}
                {/* Fuel / Equipment Cost — only for tasks that use equipment */}
                {["Rotavator","Repair Dikes","Final Harrow","Harvesting"].includes(t.activity) && (
                  <TaskFuelSection task={t} areaName={areaName} equipment={equipment || []} fuelLogs={fuelLogs || []} setFuelLogs={setFuelLogs} mobile={mobile} />
                )}

                {delay > 0 && <div style={{ gridColumn: mobile ? "span 1" : "span 3", color:"#d32f2f", fontSize:12, fontWeight:600 }}>Delayed by {delay} day(s)</div>}
                {t.isCustom && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3" }}>
                    <button onClick={() => removeCustomTask(t.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:8, padding:"6px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Remove Task</button>
                  </div>
                )}
                {/* Harvest recording button */}
                {t.phase === "Harvest" && t.activity === "Harvesting" && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3" }}>
                    <button onClick={() => setShowHarvestForm(!showHarvestForm)} style={{ background: showHarvestForm ? "#999" : "#f9a825", color: showHarvestForm ? "white" : "#333", border:"none", borderRadius:8, padding:"8px 20px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                      {showHarvestForm ? "Cancel" : "🌾 Record Harvest Output"}
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Harvest Recording Form */}
      {showHarvestForm && (
        <div style={{ background:"linear-gradient(135deg,#fff9c4,#fff3e0)", borderRadius:14, padding: mobile ? 14 : 20, border:"2px solid #f9a825" }}>
          <h4 style={{ margin:"0 0 12px", fontSize:14, color:"#f57f17", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:20 }}>🌾</span> Record Harvest — {areaName}
          </h4>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
            <label style={labelStyle}>Harvest Date *
              <input type="date" value={harvestEntry.date} onChange={e => setHarvestEntry(p => ({...p, date: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#e65100", background:"white" }} />
            </label>
            <label style={labelStyle}>Number of Bags *
              <input type="number" min="0" value={harvestEntry.bags} onChange={e => setHarvestEntry(p => ({...p, bags: e.target.value}))} placeholder="e.g. 200" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32", background:"white" }} />
            </label>
            <label style={labelStyle}>Weight per Bag (kg)
              <input type="number" min="0" value={harvestEntry.weightPerBag} onChange={e => setHarvestEntry(p => ({...p, weightPerBag: e.target.value}))} style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Total Weight
              <div style={{ padding:"9px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, marginTop:4, background:"#e8f5e9", fontWeight:800, color:"#2e7d32" }}>
                {((Number(harvestEntry.bags) || 0) * (Number(harvestEntry.weightPerBag) || 50)).toLocaleString()} kg
              </div>
            </label>
            <label style={labelStyle}>Moisture (%)
              <input type="number" min="0" max="100" step="0.1" value={harvestEntry.moisture} onChange={e => setHarvestEntry(p => ({...p, moisture: e.target.value}))} placeholder="e.g. 14" style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Buyer Price (₱/kg)
              <input type="number" min="0" step="0.01" value={harvestEntry.buyerPrice} onChange={e => setHarvestEntry(p => ({...p, buyerPrice: e.target.value}))} placeholder="e.g. 21" style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Grade
              <select value={harvestEntry.grade} onChange={e => setHarvestEntry(p => ({...p, grade: e.target.value}))} style={{ ...inputStyle, background:"white" }}>
                {["Premium","Good","Fair","Reject"].map(g => <option key={g}>{g}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Notes
              <input value={harvestEntry.notes} onChange={e => setHarvestEntry(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={{ ...inputStyle, background:"white" }} />
            </label>
          </div>
          {harvestEntry.bags && harvestEntry.buyerPrice && (
            <div style={{ marginTop:10, padding:"8px 14px", background:"#e8f5e9", borderRadius:8, fontSize:13 }}>
              Estimated Revenue: <strong style={{ color:"#2e7d32", fontSize:15 }}>₱{((Number(harvestEntry.bags) || 0) * (Number(harvestEntry.weightPerBag) || 50) * (Number(harvestEntry.buyerPrice) || 0)).toLocaleString()}</strong>
            </div>
          )}
          <button onClick={recordHarvest} disabled={!harvestEntry.bags || !harvestEntry.date} style={{ marginTop:12, background: harvestEntry.bags && harvestEntry.date ? "#f9a825" : "#ccc", color: harvestEntry.bags && harvestEntry.date ? "#333" : "#999", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: harvestEntry.bags && harvestEntry.date ? "pointer" : "not-allowed" }}>Save Harvest Record</button>
        </div>
      )}

      {/* Harvest History for this Area */}
      {areaHarvests.length > 0 && (
        <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#fff9c4,#fffde7)", padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h4 style={{ margin:0, fontSize:14, color:"#f57f17", display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:16 }}>📋</span> Harvest Records ({areaHarvests.length})
            </h4>
            <span style={{ fontSize:12, fontWeight:700, color:"#2e7d32" }}>
              Total: {areaHarvests.reduce((s, h) => s + h.totalKg, 0).toLocaleString()} kg ({areaHarvests.reduce((s, h) => s + h.bags, 0).toLocaleString()} bags)
            </span>
          </div>
          <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize: mobile ? 11 : 12, minWidth: mobile ? 600 : "auto" }}>
              <thead><tr style={{ background:"#fffde7" }}>
                {["Date","Season","Breed","Bags","Wt/Bag","Total (kg)","Yield/ha","Moisture","Grade","Price","Revenue",""].map(h => (
                  <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#f57f17", borderBottom:"2px solid #ffecb3", fontSize:10 }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{[...areaHarvests].reverse().map(h => (
                <tr key={h.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                  <td style={{ padding:"7px 6px", whiteSpace:"nowrap" }}>{fmtDate(h.date)}</td>
                  <td style={{ padding:"7px 6px" }}><Badge color="#1565c0" bg="#e3f2fd">{h.season}</Badge></td>
                  <td style={{ padding:"7px 6px" }}>{h.breed}</td>
                  <td style={{ padding:"7px 6px", fontWeight:700 }}>{h.bags.toLocaleString()}</td>
                  <td style={{ padding:"7px 6px" }}>{h.weightPerBag} kg</td>
                  <td style={{ padding:"7px 6px", fontWeight:800, color:"#2e7d32" }}>{h.totalKg.toLocaleString()}</td>
                  <td style={{ padding:"7px 6px", fontWeight:600, color:"#1565c0" }}>{h.yieldPerHa ? `${h.yieldPerHa.toLocaleString()} kg/ha` : "---"}</td>
                  <td style={{ padding:"7px 6px" }}>{h.moisture ? `${h.moisture}%` : "---"}</td>
                  <td style={{ padding:"7px 6px" }}><Badge color={h.grade === "Premium" ? "#2e7d32" : h.grade === "Good" ? "#1565c0" : h.grade === "Fair" ? "#ef6c00" : "#d32f2f"} bg={h.grade === "Premium" ? "#e8f5e9" : h.grade === "Good" ? "#e3f2fd" : h.grade === "Fair" ? "#fff3e0" : "#ffcdd2"}>{h.grade}</Badge></td>
                  <td style={{ padding:"7px 6px" }}>{h.buyerPrice ? `₱${h.buyerPrice}` : "---"}</td>
                  <td style={{ padding:"7px 6px", fontWeight:700, color:"#2e7d32" }}>{h.buyerPrice ? `₱${(h.totalKg * h.buyerPrice).toLocaleString()}` : "---"}</td>
                  <td style={{ padding:"7px 6px" }}><button onClick={() => setHarvestLogs(prev => prev.filter(x => x.id !== h.id))} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>x</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function printProtocolSheet(rows, sched, areaName, areaData) {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  const today = new Date().toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const ha = areaData?.ha || 0;
  const breed = areaData?.breed || "—";
  const supervisor = areaData?.managedBy || "—";
  const season = areaData?.season || "—";
  const fmtD = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
    return isNaN(d.getTime()) ? iso : d.toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' });
  };

  // Aggregate totals (canonical: kg / L) from each row's "amount" string.
  // Skip Growth-Stage rows (no inputs).
  const totals = {};
  rows.forEach(r => {
    if (r.type === "Growth Stage" || !r.input || r.input === "---" || !r.amount || r.amount === "---") return;
    // amount can contain multiple items like "85kg + 25kg" — parse them paired with input
    // Inputs like "46-0-0 + 0-0-60" with amount "85kg + 25kg" — split on +
    const inputs = String(r.input).split(/\s*\+\s*/);
    const amounts = String(r.amount).split(/\s*\+\s*/);
    inputs.forEach((it, i) => {
      const amt = amounts[i] || amounts[0] || "";
      const canon = inputAmountToCanonical(amt, it.trim());
      if (canon > 0) totals[it.trim()] = (totals[it.trim()] || 0) + canon;
    });
  });

  const tableRows = rows.map(r => `
    <tr>
      <td>${esc(fmtD(r.date))}</td>
      <td><strong>${esc(r.activity)}</strong></td>
      <td>${esc(r.type)}</td>
      <td>${r.input !== "---" ? esc(r.input) : "—"}</td>
      <td>${r.amount !== "---" ? esc(formatInputAmount(r.amount, r.input)) : "—"}</td>
    </tr>
  `).join("");

  const totalsPills = Object.entries(totals).map(([item, total]) => {
    if (item === 'FAA') {
      return `<span class="pill"><strong>${esc(item)}:</strong> ${total.toFixed(2)} L (${Math.round(total * 1000)} mL)</span>`;
    }
    return `<span class="pill"><strong>${esc(item)}:</strong> ${total.toLocaleString(undefined, {maximumFractionDigits: 0})} kg (${(total/50).toFixed(1)} bags)</span>`;
  }).join("");

  const html = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Protocol — ${esc(areaName)}</title>
<style>
  * { box-sizing: border-box; }
  @page { size: A4; margin: 8mm; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color:#222; padding: 6mm 8mm; font-size: 9pt; line-height: 1.25; }
  h1 { margin:0 0 2px; font-size: 13pt; }
  h2 { font-size: 9pt; color:#1b5e20; border-bottom:1px solid #2e7d32; padding-bottom:2px; margin: 8pt 0 3pt; }
  .meta { display:flex; gap:10px 14px; flex-wrap:wrap; font-size: 8pt; color:#555; margin-bottom:6px; padding-bottom:4px; border-bottom:1.5px solid #2e7d32; }
  .meta strong { color:#222; }
  table { width:100%; border-collapse:collapse; font-size: 8pt; }
  th, td { border:0.5px solid #999; padding: 2.5pt 5pt; vertical-align:top; text-align:left; }
  th { background:#e8f5e9; font-weight:700; color:#1b5e20; font-size: 7pt; text-transform:uppercase; }
  .totals-pills { display:flex; gap:6pt; flex-wrap:wrap; margin-top:4pt; font-size:8pt; }
  .totals-pills .pill { background:#e8f5e9; padding:2pt 6pt; border-radius:4pt; }
  .totals-pills .pill strong { color:#1b5e20; }
  .footer { margin-top:8pt; font-size:7pt; color:#666; display:flex; justify-content:space-between; }
  @media print {
    .noprint, .toolbar { display:none !important; }
    tr { page-break-inside: avoid; }
  }
  .noprint { background:#2e7d32; color:white; padding:8px 16px; border:none; border-radius:6px; font-weight:700; cursor:pointer; margin-bottom:12px; }
  .noprint.close { background:#c62828; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
</style></head><body>
<div class="toolbar">
  <button class="noprint" onclick="window.print()">🖨️ Print this page</button>
  <button class="noprint close" onclick="try{window.close();}catch(e){} setTimeout(function(){location.href='https://abundance.mak-ct.com/';}, 80);">✕ Close / Back to app</button>
</div>
<h1>Protocol Schedule · ${esc(areaName)}</h1>
<div class="meta">
  <div>Printed: <strong>${esc(today)}</strong></div>
  <div>Area: <strong>${esc(areaName)}</strong> (${ha} ha)</div>
  <div>Supervisor: <strong>${esc(supervisor)}</strong></div>
  <div>Breed: <strong>${esc(breed)}</strong></div>
  <div>Season: <strong>${esc(season)}</strong></div>
  <div>${sched.crop === 'corn' ? 'Planted' : 'Sowing'}: <strong>${esc(fmtD(sched.sowingDate))}</strong></div>
  <div>Harvest: <strong>${esc(fmtD(sched.harvestDate))}</strong></div>
</div>
<table>
  <thead><tr><th>Date</th><th>Activity</th><th>Type</th><th>Input</th><th>Amount</th></tr></thead>
  <tbody>${tableRows}</tbody>
</table>
${totalsPills ? `
<div class="totals-pills">
  <strong style="color:#1b5e20;">Total inputs (${ha} ha):</strong>
  ${totalsPills}
</div>` : ''}
<div class="footer">
  <span>Abundance Farm · abundance.mak-ct.com</span>
  <span>Verify against current soil test before applying.</span>
</div>
</body></html>`;
  const w = window.open("", "_blank", "width=900,height=700");
  if (!w) { alert("Pop-up blocked — please allow pop-ups for abundance.mak-ct.com and try again."); return; }
  w.document.open(); w.document.write(html); w.document.close();
}

function ProtocolDetail({ sched, mobile, areaName, areaData, taskMeta, setTaskMeta, customTasks, setCustomTasks, fertilizerPrices }) {
  // Driven directly off sched.tasks so it works for any protocol (rice, corn, alt-fert).
  // Manual overrides (date / inputs / hide) are persisted into taskMeta keyed
  // by `${areaName}-${task.id}` — the same key space the AreaTaskTracker uses
  // for status. The schedule compute (in App) reads these and applies them
  // before render, so any change here is reflected everywhere immediately.
  const [editingId, setEditingId] = useState(null);
  const [showAddStep, setShowAddStep] = useState(false);
  const [draft, setDraft] = useState(null);
  const FERT_DB_LOCAL = {
    "14-14-14":   "14-14-14 (Complete)",
    "16-20-0":    "16-20-0 (Ammophos)",
    "17-0-17":    "17-0-17",
    "1-6-16-8":   "1-6-16-8 (Bulaklak)",
    "18-46-0":    "18-46-0 (DAP)",
    "0-46-0":     "0-46-0 (Super Phosphate)",
    "21-0-0":     "21-0-0 (Amm. Sulfate)",
    "25-0-0":     "25-0-0 (Amm. Chloride)",
    "46-0-0":     "46-0-0 (Urea)",
    "0-0-60":     "0-0-60 (MOP)",
    "0-0-50":     "0-0-50 (SOP)",
    "FAA":        "FAA",
    "Herbicide":  "Herbicide",
    "Fungicide":  "Fungicide",
    "Seed":       "Seed",
  };

  const typeColors = {
    "Fertilizer": { c:"#1565c0", bg:"#e3f2fd" },
    "Herbicide":  { c:"#ef6c00", bg:"#fff3e0" },
    "Organic":    { c:"#2e7d32", bg:"#e8f5e9" },
    "Fungicide":  { c:"#7b1fa2", bg:"#f3e5f5" },
    "Growth Stage":{ c:"#ad1457", bg:"#fce4ec" },
    "Land Prep":  { c:"#1565c0", bg:"#bbdefb" },
    "Seedling Mgmt":{ c:"#e65100", bg:"#ffe0b2" },
    "Crop Care":  { c:"#2e7d32", bg:"#c8e6c9" },
    "Harvest":    { c:"#f57f17", bg:"#fff9c4" },
  };

  // Derive a "type" badge from task content (for the legacy print sheet).
  const typeOf = (t) => {
    if (t.phase === "Growth Stage" || t.phase === "Harvest") return "Growth Stage";
    if (Array.isArray(t.inputs)) {
      const items = t.inputs.map(i => i.item);
      if (items.some(x => /^\d+-\d+-\d+$/.test(x))) return "Fertilizer";
      if (items.includes("FAA")) return "Organic";
      if (items.includes("Herbicide")) return "Herbicide";
      if (items.includes("Fungicide")) return "Fungicide";
    }
    return t.phase || "Crop Care";
  };

  // Build display rows from sched.tasks + per-area custom tasks. Sorted by date.
  const ct = (customTasks && customTasks[areaName]) || [];
  const allRows = useMemo(() => {
    const rows = [];
    sched.tasks.forEach(t => {
      const inputsStr = Array.isArray(t.inputs)
        ? t.inputs.map(i => i.item).join(" + ")
        : "";
      const amountStr = Array.isArray(t.inputs)
        ? t.inputs.map(i => i.amount || "").filter(Boolean).join(" + ")
        : "";
      rows.push({
        id: t.id,
        isCustom: false,
        activity: t.activity,
        phase: t.phase,
        type: typeOf(t),
        input: inputsStr || "---",
        amount: amountStr || "---",
        date: t.planStart,
        endDate: t.planEnd,
        inputs: t.inputs || [],
        inputsOverridden: t._inputsOverridden,
        formula: t.formula,
        awd: t.awd, awdNote: t.awdNote,
        altSwap: Array.isArray(t.inputs) ? t.inputs.find(i => i._altSwapFrom) : null,
      });
    });
    ct.forEach(t => {
      rows.push({
        id: t.id,
        isCustom: true,
        activity: t.activity,
        phase: t.phase || "Crop Care",
        type: typeOf(t),
        input: Array.isArray(t.inputs) ? t.inputs.map(i => i.item).join(" + ") : "---",
        amount: Array.isArray(t.inputs) ? t.inputs.map(i => i.amount || "").filter(Boolean).join(" + ") : "---",
        date: t.planStart,
        endDate: t.planEnd,
        inputs: t.inputs || [],
        formula: "(custom)",
      });
    });
    return rows.filter(r => r.date).sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  }, [sched, ct]);

  // ---- Override helpers (act on taskMeta keyed by areaName-id) ----
  const metaKey = (id) => `${areaName}-${id}`;
  const overrideForId = (id) => (taskMeta && taskMeta[metaKey(id)]) || {};
  const setOverride = (id, patch) => {
    setTaskMeta(prev => {
      const k = metaKey(id);
      const next = { ...(prev || {}) };
      next[k] = { ...(next[k] || {}), ...patch };
      return next;
    });
  };
  const clearOverride = (id, fields) => {
    setTaskMeta(prev => {
      const k = metaKey(id);
      const cur = (prev || {})[k] || {};
      const next = { ...cur };
      fields.forEach(f => { delete next[f]; });
      return { ...(prev || {}), [k]: next };
    });
  };
  const hideTask = (id) => {
    if (!confirm("Hide this task from the protocol? You can restore it from the row's ⋯ menu.")) return;
    setOverride(id, { _protocolHidden: true });
  };
  // Tail-after-prefix is the task id; reject keys whose tail contains a dash
  // (those belong to a different area whose name happens to have us as prefix).
  const tailIsOurTaskId = (k) => {
    if (!k.startsWith(`${areaName}-`)) return false;
    return !k.slice(areaName.length + 1).includes('-');
  };

  const showHiddenTasks = () => {
    // Find any meta entry with _protocolHidden for this area and clear it
    if (!taskMeta) return;
    const updates = {};
    Object.entries(taskMeta).forEach(([k, v]) => {
      if (tailIsOurTaskId(k) && v && v._protocolHidden) {
        updates[k] = { ...v, _protocolHidden: false };
      }
    });
    if (Object.keys(updates).length === 0) { alert("No hidden tasks for this area."); return; }
    setTaskMeta(prev => ({ ...(prev || {}), ...updates }));
  };

  // Count of hidden tasks (for the "show hidden" button label)
  const hiddenCount = useMemo(() => {
    if (!taskMeta) return 0;
    return Object.entries(taskMeta).filter(([k, v]) => tailIsOurTaskId(k) && v && v._protocolHidden).length;
  }, [taskMeta, areaName]);

  // ---- Add custom step ----
  const addCustomStep = () => {
    const d = draft;
    if (!d || !d.activity || !d.date) { alert("Activity and date are required."); return; }
    const existing = (customTasks && customTasks[areaName]) || [];
    const nextId = existing.length > 0 ? Math.max(...existing.map(x => Number(x.id) || 0)) + 1 : 9001;
    const newTask = {
      id: nextId,
      activity: d.activity,
      phase: d.phase || "Crop Care",
      planStart: d.date,
      planEnd: d.endDate || d.date,
      inputs: (d.item ? [{ item: d.item, amount: d.qty ? `${d.qty} ${d.unit || 'kg'}` : '' }] : []),
      isCustom: true,
    };
    setCustomTasks(prev => ({ ...(prev || {}), [areaName]: [...((prev || {})[areaName] || []), newTask] }));
    setShowAddStep(false);
    setDraft(null);
  };
  const removeCustomStep = (id) => {
    if (!confirm("Delete this custom step?")) return;
    setCustomTasks(prev => ({ ...(prev || {}), [areaName]: ((prev || {})[areaName] || []).filter(x => x.id !== id) }));
  };

  // Per-row inputs editor (renders inside the expanded row)
  const InputsEditor = ({ row }) => {
    const ov = overrideForId(row.id);
    const initial = ov._overrideInputs || row.inputs || [];
    const [lines, setLines] = useState(initial.length > 0 ? initial : [{ item: "14-14-14", amount: "0 kg" }]);
    const updLine = (i, field, val) => setLines(L => L.map((x, idx) => idx === i ? { ...x, [field]: val } : x));
    const addLine = () => setLines(L => [...L, { item: "46-0-0", amount: "0 kg" }]);
    const rmLine  = (i) => setLines(L => L.filter((_, idx) => idx !== i));
    const save = () => {
      const cleaned = lines.filter(l => l.item && l.amount);
      setOverride(row.id, { _overrideInputs: cleaned });
      setEditingId(null);
    };
    const reset = () => {
      clearOverride(row.id, ['_overrideInputs']);
      setEditingId(null);
    };
    return (
      <div style={{ padding:"10px", background:"#fff8e1", borderRadius:8 }}>
        <div style={{ fontSize:11, fontWeight:700, color:"#5d4037", marginBottom:6 }}>Edit fertilizer / inputs for this task</div>
        {lines.map((l, i) => (
          <div key={i} style={{ display:"flex", gap:6, marginBottom:6, alignItems:"center" }}>
            <select value={l.item} onChange={e => updLine(i, 'item', e.target.value)} style={{ ...inputSm, width:140 }}>
              {Object.entries(FERT_DB_LOCAL).map(([k, label]) => <option key={k} value={k}>{label}</option>)}
            </select>
            <input value={l.amount} onChange={e => updLine(i, 'amount', e.target.value)} placeholder="e.g. 50 kg or 2 bags" style={{ ...inputSm, width:160 }} />
            <button onClick={() => rmLine(i)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>×</button>
          </div>
        ))}
        <div style={{ display:"flex", gap:6, marginTop:4 }}>
          <button onClick={addLine} style={{ background:"#fff", color:"#5d4037", border:"1px dashed #ffd54f", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>+ Add input</button>
          <button onClick={save} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:6, padding:"4px 12px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Save override</button>
          <button onClick={reset} style={{ background:"#fff", color:"#666", border:"1px solid #ddd", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>Reset to protocol</button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
      {/* Toolbar: print + add custom step + show hidden */}
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8, gap:8, flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          <button onClick={() => setShowAddStep(s => !s)} style={{ background: showAddStep ? "#fff" : "#1565c0", color: showAddStep ? "#1565c0" : "white", border: showAddStep ? "1px solid #1565c0" : "none", borderRadius:8, padding: mobile ? "6px 12px" : "8px 14px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer" }}>{showAddStep ? "Cancel" : "+ Add custom step"}</button>
          {hiddenCount > 0 && (
            <button onClick={showHiddenTasks} title="Restore tasks you've hidden from the protocol" style={{ background:"#fff", color:"#5d4037", border:"1px solid #ffd54f", borderRadius:8, padding: mobile ? "6px 12px" : "8px 14px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer" }}>🙈 Show {hiddenCount} hidden</button>
          )}
        </div>
        <button onClick={() => printProtocolSheet(allRows, sched, areaName, areaData)} title="Print this protocol to A4" style={{ background:"#5d4037", color:"white", border:"none", borderRadius:8, padding: mobile ? "6px 12px" : "8px 14px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer" }}>🖨️ Print protocol</button>
      </div>

      {/* Protocol name + alt-fert note */}
      <div style={{ marginBottom:8, fontSize:11, color:"#5d4037" }}>
        <strong>{sched.protocolName || (sched.crop === 'corn' ? "Corn Standard (Hybrid)" : "Default rice protocol")}</strong>
        {sched.altFertNote && <span style={{ marginLeft:8, color:"#ef6c00" }}>· {sched.altFertNote}</span>}
      </div>

      {/* Alt-fert savings preview — only show when prices are available + we're
          on the default protocol so user knows what they'd save by switching. */}
      {(() => {
        const isAltAlready = /alt-fert/.test(areaData?.protocol || '');
        const isCorn = (areaData?.crop || 'rice') === 'corn';
        if (isAltAlready) return null;
        // Build the alt-fert version of the same area parameters
        const pricesPerKg = {};
        Object.entries(fertilizerPrices || {}).forEach(([k, rec]) => {
          if (!rec) return;
          const v = rec.pricePerKg != null ? Number(rec.pricePerKg)
                  : rec.pricePerBag != null ? Number(rec.pricePerBag) / 50 : null;
          if (v != null && !isNaN(v) && v > 0) pricesPerKg[k] = v;
        });
        if (Object.keys(pricesPerKg).length === 0) return null;
        const altSched = isCorn
          ? computeCornAltFertSchedule(areaData.ha, areaData.transplantDate, areaData.maturity, areaData.plantingMethod, pricesPerKg)
          : computeRiceAltFertSchedule(areaData.ha, areaData.transplantDate, areaData.maturity, areaData.plantingMethod, pricesPerKg);
        const cur = planSchedCost(sched, pricesPerKg);
        const alt = planSchedCost(altSched, pricesPerKg);
        const savings = cur.totalCost - alt.totalCost;
        if (cur.totalCost === 0 || alt.totalCost === 0) return null;
        const pct = (savings / cur.totalCost) * 100;
        if (Math.abs(savings) < 50) return null; // ignore noise
        const positive = savings > 0;
        return (
          <div style={{ marginBottom:10, padding:"10px 12px", background: positive ? "#e8f5e9" : "#fff3e0", borderLeft: `4px solid ${positive ? "#2e7d32" : "#ef6c00"}`, borderRadius:8, fontSize:12, color: positive ? "#1b5e20" : "#5d4037" }}>
            <strong>{positive ? "💰 Switching to Alt-Fertilizer would save" : "⚠ Alt-Fertilizer is currently more expensive by"} ₱{Math.abs(Math.round(savings)).toLocaleString()}</strong> this cycle ({pct.toFixed(0)}% {positive ? 'less' : 'more'}). Default ₱{Math.round(cur.totalCost).toLocaleString()} vs Alt-Fert ₱{Math.round(alt.totalCost).toLocaleString()}.
            {cur.missing.length > 0 && <span style={{ fontSize:10, color:"#c62828", marginLeft:6 }}>(prices missing for: {cur.missing.join(', ')})</span>}
          </div>
        );
      })()}

      {/* Add custom step form */}
      {showAddStep && (
        <div style={{ background:"#e3f2fd", borderRadius:10, padding:12, marginBottom:10, border:"1px solid #90caf9" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "2fr 1fr 1fr 1fr 1fr 1fr auto", gap:8, alignItems:"end" }}>
            <label style={labelStyle}>Activity *
              <input value={draft?.activity || ''} onChange={e => setDraft(d => ({ ...(d||{}), activity: e.target.value }))} placeholder="e.g. Apply chicken manure" style={inputStyle} />
            </label>
            <label style={labelStyle}>Date *
              <input type="date" value={draft?.date || ''} onChange={e => setDraft(d => ({ ...(d||{}), date: e.target.value }))} style={inputStyle} />
            </label>
            <label style={labelStyle}>Phase
              <select value={draft?.phase || 'Crop Care'} onChange={e => setDraft(d => ({ ...(d||{}), phase: e.target.value }))} style={inputStyle}>
                {["Land Prep","Seedling Mgmt","Crop Care","Growth Stage","Harvest"].map(p => <option key={p}>{p}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Input
              <select value={draft?.item || ''} onChange={e => setDraft(d => ({ ...(d||{}), item: e.target.value }))} style={inputStyle}>
                <option value="">— none —</option>
                {Object.entries(FERT_DB_LOCAL).map(([k, label]) => <option key={k} value={k}>{label}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Qty
              <input type="number" min="0" step="any" value={draft?.qty || ''} onChange={e => setDraft(d => ({ ...(d||{}), qty: e.target.value }))} style={inputStyle} />
            </label>
            <label style={labelStyle}>Unit
              <select value={draft?.unit || 'kg'} onChange={e => setDraft(d => ({ ...(d||{}), unit: e.target.value }))} style={inputStyle}>
                <option value="kg">kg</option>
                <option value="bags">bags</option>
                <option value="L">L</option>
                <option value="mL">mL</option>
              </select>
            </label>
            <button onClick={addCustomStep} style={{ background:"#1565c0", color:"white", border:"none", borderRadius:8, padding:"10px 18px", fontSize:12, fontWeight:700, cursor:"pointer", height:36 }}>+ Save</button>
          </div>
        </div>
      )}

      <table style={{ width:"100%", borderCollapse:"collapse", fontSize: mobile ? 11 : 12, minWidth: mobile ? 560 : "auto" }}>
        <thead><tr style={{ background:"#e8f5e9" }}>
          {["Date","Activity","Type","Input","Amount", ""].map(h => (
            <th key={h} style={{ padding:"7px 8px", textAlign:"left", fontWeight:700, color:"#2e7d32", borderBottom:"2px solid #a5d6a7", fontSize: mobile ? 10 : 11 }}>{h}</th>
          ))}
        </tr></thead>
        <tbody>
          {allRows.map((r) => {
            const tc = typeColors[r.type] || { c:"#666", bg:"#eee" };
            const isStage = r.type === "Growth Stage";
            const ov = overrideForId(r.id);
            const hasDateOverride = !!ov._overrideStart;
            const hasInputOverride = r.inputsOverridden;
            const editing = editingId === r.id;
            return (
              <React.Fragment key={`${r.isCustom?'c':'p'}-${r.id}`}>
                <tr style={{ borderBottom:"1px solid #f0f0f0", background: isStage ? "#fce4ec08" : r.isCustom ? "#e3f2fd44" : "white" }}>
                  <td style={{ padding:"6px 8px", whiteSpace:"nowrap" }}>
                    {editing && !isStage ? (
                      <input type="date" value={ov._overrideStart || r.date} onChange={e => setOverride(r.id, { _overrideStart: e.target.value })} style={{ ...inputSm, width:130 }} />
                    ) : (
                      <span style={{ color: hasDateOverride ? "#ef6c00" : "inherit", fontWeight: hasDateOverride ? 700 : 500 }} title={hasDateOverride ? `Overridden — protocol date was ${r.formula || ''}` : r.formula}>
                        {fmtDate(r.date)}{hasDateOverride && <span style={{ marginLeft:4, fontSize:9 }}>✎</span>}
                      </span>
                    )}
                  </td>
                  <td style={{ padding:"6px 8px", fontWeight: isStage ? 800 : 600, color: isStage ? "#ad1457" : "#333" }}>
                    {isStage ? `● ${r.activity}` : r.activity}
                    {r.isCustom && <span style={{ marginLeft:6, fontSize:9, color:"#1565c0", fontWeight:700 }}>CUSTOM</span>}
                    {r.altSwap && <span title={r.altSwap._altSwapNote} style={{ marginLeft:6, fontSize:9, color:"#c2185b", fontWeight:700 }}>ALT-FERT</span>}
                  </td>
                  <td style={{ padding:"6px 8px" }}><Badge color={tc.c} bg={tc.bg}>{r.type}</Badge></td>
                  <td style={{ padding:"6px 8px", color: hasInputOverride ? "#ef6c00" : "inherit", fontWeight: hasInputOverride ? 700 : 400 }}>{r.input !== "---" ? r.input : ""}</td>
                  <td style={{ padding:"6px 8px", fontWeight:700, color: hasInputOverride ? "#ef6c00" : "#2e7d32" }}>
                    {r.amount !== "---" ? formatInputAmount(r.amount, r.input) : ""}
                    {hasInputOverride && <span style={{ marginLeft:4, fontSize:9 }}>✎</span>}
                  </td>
                  <td style={{ padding:"6px 8px", whiteSpace:"nowrap" }}>
                    {!isStage && !r.isCustom && (
                      <>
                        <button onClick={() => setEditingId(editing ? null : r.id)} title="Edit inputs / quantities for this task" style={{ background:"#fff", color:"#5d4037", border:"1px solid #ddd", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer", marginRight:4 }}>✎</button>
                        <button onClick={() => hideTask(r.id)} title="Hide this task from the protocol" style={{ background:"#fff", color:"#999", border:"1px solid #ddd", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>🙈</button>
                      </>
                    )}
                    {r.isCustom && (
                      <button onClick={() => removeCustomStep(r.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>×</button>
                    )}
                    {(hasDateOverride || hasInputOverride) && !r.isCustom && (
                      <button onClick={() => { clearOverride(r.id, ['_overrideStart','_overrideEnd','_overrideInputs']); setEditingId(null); }} title="Reset to protocol defaults" style={{ background:"#fff", color:"#666", border:"1px solid #ddd", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer", marginLeft:4 }}>↺</button>
                    )}
                  </td>
                </tr>
                {editing && !isStage && !r.isCustom && (
                  <tr>
                    <td colSpan={6} style={{ padding:"6px 10px", background:"#fffde7" }}>
                      <InputsEditor row={r} />
                    </td>
                  </tr>
                )}
              </React.Fragment>
            );
          })}
          <tr style={{ background:"#f5f5f5", fontWeight:700 }}>
            <td style={{ padding:"8px" }} colSpan={3}>Totals</td>
            <td style={{ padding:"8px", fontSize: mobile ? 10 : 11 }} colSpan={3}>
              {sched.quantities?.totalUreaBags != null && <>46-0-0: {(+(sched.quantities.totalUreaBags || 0).toFixed(2))} bags</>}
              {sched.quantities?.totalCompleteBags != null && <> · 14-14-14: {(+(sched.quantities.totalCompleteBags || 0).toFixed(2))} bags</>}
              {sched.quantities?.totalMOPBags != null && <> · 0-0-60: {(+(sched.quantities.totalMOPBags || 0).toFixed(2))} bags</>}
              {sched.quantities?.totalFAA_L != null && <> · FAA: {(sched.quantities.totalFAA_L/1000).toFixed(0)}L</>}
            </td>
          </tr>
        </tbody>
      </table>

      <div style={{ marginTop:10, fontSize:10, color:"#999", lineHeight:1.5 }}>
        ✎ icon = override active for this row. ↺ resets it back to the protocol default. 🙈 hides a task. Use <strong>+ Add custom step</strong> for activities the protocol doesn't include (e.g., chicken-manure side-dress, ad-hoc spray). Manual overrides sync across devices and feed back into the Tasks tab.
      </div>
    </div>
  );
}

// ============================================================
// BREED MANAGER (Protocol tab — rice breed database)
// ============================================================
function BreedManager({ breeds, setBreeds }) {
  const mobile = useIsMobile();
  const [showAdd, setShowAdd] = useState(false);
  const [newBreed, setNewBreed] = useState({ name: "", maturity: 0, type: "Inbred", crop: "rice", millingRecovery: "", notes: "" });
  const [cropFilter, setCropFilter] = useState("all");  // "all" | "rice" | "corn"
  const [populateResult, setPopulateResult] = useState(null);

  const RICE_TYPES = ["Inbred", "Hybrid", "Glutinous", "Aromatic", "Other"];
  const CORN_TYPES = ["Yellow Hybrid", "White Hybrid", "Yellow OPV", "White OPV", "Sweet", "Glutinous Corn", "Other"];
  const typeOptions = newBreed.crop === "corn" ? CORN_TYPES : RICE_TYPES;

  const addBreed = () => {
    if (!newBreed.name || !newBreed.maturity) return;
    const id = breeds.length > 0 ? Math.max(...breeds.map(b => b.id)) + 1 : 1;
    const mr = (newBreed.crop === "rice" && newBreed.millingRecovery !== "" && newBreed.millingRecovery != null)
      ? Number(newBreed.millingRecovery) || null : null;
    setBreeds(prev => [...prev, { ...newBreed, id, maturity: Number(newBreed.maturity), millingRecovery: mr }]);
    setNewBreed({ name: "", maturity: 0, type: "Inbred", crop: "rice", millingRecovery: "", notes: "" });
    setShowAdd(false);
  };

  const removeBreed = (id) => setBreeds(prev => prev.filter(b => b.id !== id));

  const updateBreed = (id, field, value) => {
    setBreeds(prev => prev.map(b => {
      if (b.id !== id) return b;
      let coerced = value;
      if (field === "maturity") coerced = Number(value) || 0;
      if (field === "millingRecovery") coerced = value === "" || value == null ? null : (Number(value) || 0);
      return { ...b, [field]: coerced };
    }));
  };

  // Populate common Philippine varieties from CURATED_BREEDS.
  // - Adds any curated varieties not already in the user's list (matched by name, case-insensitive).
  // - Also BACKFILLS missing fields on existing breeds (millingRecovery, notes, type).
  //   This is the path that fills "—" milling values for users who populated
  //   from an older version of the curated list before milling was included.
  const populateCommon = () => {
    const curatedByName = new Map(CURATED_BREEDS.map(b => [b.name.toLowerCase().trim(), b]));
    let nextId = breeds.length > 0 ? Math.max(...breeds.map(b => b.id)) + 1 : 1;

    // Backfill pass — non-destructive merge for existing rows.
    let backfilled = 0;
    const merged = breeds.map(b => {
      const ref = curatedByName.get((b.name || "").toLowerCase().trim());
      if (!ref) return b;
      const next = { ...b };
      let changed = false;
      if ((b.millingRecovery == null || b.millingRecovery === "") && ref.millingRecovery != null) {
        next.millingRecovery = ref.millingRecovery; changed = true;
      }
      if (!b.notes && ref.notes) { next.notes = ref.notes; changed = true; }
      if (!b.type && ref.type)  { next.type  = ref.type;  changed = true; }
      if (changed) backfilled++;
      return next;
    });

    // Add pass — new curated entries not already in the user's list.
    const existingNames = new Set(merged.map(b => (b.name || "").toLowerCase().trim()));
    const toAdd = [];
    for (const b of CURATED_BREEDS) {
      if (existingNames.has(b.name.toLowerCase().trim())) continue;
      toAdd.push({ ...b, id: nextId++ });
    }

    if (toAdd.length === 0 && backfilled === 0) {
      setPopulateResult({ added: 0, skipped: CURATED_BREEDS.length, message: "All curated varieties are already in your list and complete." });
      return;
    }

    setBreeds([...merged, ...toAdd]);
    const parts = [];
    if (toAdd.length > 0)     parts.push(`Added ${toAdd.length} new varieties`);
    if (backfilled > 0)       parts.push(`backfilled milling/notes on ${backfilled} existing`);
    setPopulateResult({ added: toAdd.length, skipped: CURATED_BREEDS.length - toAdd.length, message: parts.join(", ") + "." });
  };

  // Filter breeds for display
  const cropOf = (b) => (b.crop || "rice").toLowerCase();
  const filtered = cropFilter === "all" ? breeds : breeds.filter(b => cropOf(b) === cropFilter);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ background:"linear-gradient(135deg,#1565c0,#0d47a1)", borderRadius:14, padding: mobile ? 14 : 20, color:"white", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ margin:"0 0 4px", fontSize: mobile ? 16 : 18, fontWeight:800 }}>Rice &amp; Corn Breeds</h2>
          <p style={{ margin:0, fontSize: mobile ? 11 : 13, opacity:.85 }}>{breeds.length} variet{breeds.length !== 1 ? "ies" : "y"} in database. These appear as options when adding areas.</p>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button onClick={populateCommon} title="Add common PH rice + corn varieties (skips duplicates)" style={{ background:"rgba(255,255,255,0.15)", color:"white", border:"1px solid rgba(255,255,255,0.4)", borderRadius:10, padding: mobile ? "8px 12px" : "10px 16px", fontSize: mobile ? 11 : 13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>+ Populate common</button>
          <button onClick={() => setShowAdd(!showAdd)} style={{ background:"white", color:"#1565c0", border:"none", borderRadius:10, padding: mobile ? "8px 14px" : "10px 20px", fontSize: mobile ? 12 : 14, fontWeight:800, cursor:"pointer", whiteSpace:"nowrap" }}>{showAdd ? "Cancel" : "+ Add Breed"}</button>
        </div>
      </div>

      {populateResult && (
        <div style={{ background: populateResult.added > 0 ? "#e8f5e9" : "#fff3e0", border:`1px solid ${populateResult.added > 0 ? "#a5d6a7" : "#ffe0b2"}`, borderRadius:10, padding:"10px 14px", fontSize:12, color:"#333", display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
          <span>✓ {populateResult.message}</span>
          <button onClick={() => setPopulateResult(null)} style={{ background:"transparent", border:"none", fontSize:16, color:"#888", cursor:"pointer", padding:0 }}>×</button>
        </div>
      )}

      {/* Crop filter pills */}
      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
        <span style={{ fontSize:11, color:"#888", letterSpacing:".06em", fontWeight:600 }}>SHOW:</span>
        {[
          { key:"all",  label:`All (${breeds.length})` },
          { key:"rice", label:`Rice (${breeds.filter(b => cropOf(b)==="rice").length})` },
          { key:"corn", label:`Corn (${breeds.filter(b => cropOf(b)==="corn").length})` },
        ].map(opt => {
          const active = cropFilter === opt.key;
          return (
            <button key={opt.key} onClick={() => setCropFilter(opt.key)} style={{
              padding:"5px 12px", borderRadius:16, fontSize:11, fontWeight:700, cursor:"pointer", border:"1px solid",
              background: active ? "#1565c0" : "white", color: active ? "white" : "#666",
              borderColor: active ? "#1565c0" : "#ddd",
            }}>{opt.label}</button>
          );
        })}
      </div>

      {showAdd && (
        <div style={{ background:"#e3f2fd", borderRadius:14, padding: mobile ? 14 : 18 }}>
          <h3 style={{ margin:"0 0 10px", fontSize:14, color:"#1565c0" }}>New Variety</h3>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(140px, 1fr))", gap:10 }}>
            <label style={labelStyle}>Crop
              <select value={newBreed.crop} onChange={e => setNewBreed(b => ({...b, crop: e.target.value, type: e.target.value === "corn" ? "Yellow Hybrid" : "Inbred"}))} style={inputStyle}>
                <option value="rice">Rice</option>
                <option value="corn">Corn</option>
              </select>
            </label>
            <label style={labelStyle}>Variety Name <input value={newBreed.name} onChange={e => setNewBreed(b => ({...b, name: e.target.value}))} placeholder={newBreed.crop === "corn" ? "e.g. DK 9132" : "e.g. NSIC Rc 222"} style={inputStyle} /></label>
            <label style={labelStyle}>Maturity (days) <input type="number" value={newBreed.maturity || ""} onChange={e => setNewBreed(b => ({...b, maturity: e.target.value}))} placeholder="e.g. 114" style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#bbdefb" }} /></label>
            <label style={labelStyle}>Type <select value={newBreed.type} onChange={e => setNewBreed(b => ({...b, type: e.target.value}))} style={inputStyle}>{typeOptions.map(t => <option key={t}>{t}</option>)}</select></label>
            {newBreed.crop === "rice" && (
              <label style={labelStyle}>Milling recovery %
                <input type="number" min="0" max="100" step="0.5" value={newBreed.millingRecovery} onChange={e => setNewBreed(b => ({...b, millingRecovery: e.target.value}))} placeholder="e.g. 67" style={inputStyle} />
              </label>
            )}
            <label style={labelStyle}>Notes <input value={newBreed.notes} onChange={e => setNewBreed(b => ({...b, notes: e.target.value}))} placeholder="Optional..." style={inputStyle} /></label>
          </div>
          <button onClick={addBreed} style={{ marginTop:10, background:"#1565c0", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save Variety</button>
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {filtered.length === 0 ? (
          <div style={{ background:"white", borderRadius:14, padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>
            {breeds.length === 0
              ? `No varieties yet. Click "+ Populate common" to load common PH rice + corn varieties, or "+ Add Breed" to add your own.`
              : `No varieties match the "${cropFilter}" filter.`}
          </div>
        ) : filtered.map(b => {
          const isCorn = cropOf(b) === "corn";
          const accent  = isCorn ? "#e65100" : "#1565c0";
          const accentBg = isCorn ? "#fff3e0" : "#e3f2fd";
          return (
            <div key={b.id} style={{ background:"white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding: mobile ? "10px 12px" : "14px 18px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", borderLeft:`4px solid ${accent}` }}>
              <div style={{ flex:1, minWidth:120 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:14 }}>{isCorn ? "🌽" : "🌾"}</span>
                  <input value={b.name} onChange={e => updateBreed(b.id, "name", e.target.value)} style={{ border:"none", background:"transparent", fontSize: mobile ? 14 : 16, fontWeight:800, color:"#333", outline:"none", width:"100%" }} />
                </div>
                <div style={{ display:"flex", gap:10, marginTop:4, flexWrap:"wrap", alignItems:"center" }}>
                  <span style={{ fontSize:11, color:"#888" }}>Maturity: <input type="number" value={b.maturity || ""} onChange={e => updateBreed(b.id, "maturity", e.target.value)} style={{ border:"none", borderBottom:"1px solid #ddd", background:"transparent", width:45, fontSize:11, fontWeight:700, color:accent, textAlign:"center" }} /> days</span>
                  <Badge color={accent} bg={accentBg}>{b.type}</Badge>
                  {!isCorn && (
                    <span style={{ fontSize:11, color:"#888" }}>
                      Milling: <input type="number" min="0" max="100" step="0.5" value={b.millingRecovery == null ? "" : b.millingRecovery} onChange={e => updateBreed(b.id, "millingRecovery", e.target.value)} placeholder="—" style={{ border:"none", borderBottom:"1px solid #ddd", background:"transparent", width:42, fontSize:11, fontWeight:700, color:accent, textAlign:"center" }} />%
                    </span>
                  )}
                  {b.notes && <span style={{ fontSize:11, color:"#aaa" }}>{b.notes}</span>}
                </div>
              </div>
              <button onClick={() => removeBreed(b.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:8, padding:"5px 10px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Remove</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ============================================================
// CAMERA / PHOTO CAPTURE BUTTON
// ============================================================
function CameraButton({ label, photo, onCapture, onClear, mobile }) {
  const fileRef = useCallback((node) => {
    if (node) node._ref = node;
  }, []);

  const handleCapture = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => onCapture(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      <span style={{ fontSize:12, color:"#757575", fontWeight:600 }}>{label}</span>
      {photo ? (
        <div style={{ position:"relative", display:"inline-block" }}>
          <img src={photo} alt={label} style={{ width: mobile ? 70 : 90, height: mobile ? 70 : 90, objectFit:"cover", borderRadius:10, border:"2px solid #a5d6a7", cursor:"pointer" }} onClick={() => onCapture && false} />
          <button onClick={onClear} style={{ position:"absolute", top:-6, right:-6, background:"#d32f2f", color:"white", border:"none", borderRadius:"50%", width:20, height:20, fontSize:11, fontWeight:700, cursor:"pointer", lineHeight:"18px", textAlign:"center" }}>x</button>
        </div>
      ) : (
        <label style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4, width: mobile ? 70 : 90, height: mobile ? 70 : 90, borderRadius:10, border:"2px dashed #bbb", background:"#fafafa", cursor:"pointer", fontSize:11, color:"#999", textAlign:"center", flexDirection:"column" }}>
          <span style={{ fontSize:22 }}>📷</span>
          <span>Tap</span>
          <input type="file" accept="image/*" capture="environment" onChange={handleCapture} ref={fileRef} style={{ display:"none" }} />
        </label>
      )}
    </div>
  );
}
