        totalRevenue: totalRev,
        commission: totalCommission,
      };
    }
    return out;
  }, [supervisors, areas, harvestLogs]);

  return (
    <div style={{ marginTop:12 }}>
      {!showAdd && (
        <button onClick={() => setShowAdd(true)} style={{ background:"#1565c0", color:"white", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer", marginBottom:10 }}>+ Add supervisor</button>
      )}
      {showAdd && (
        <div style={{ background:"#e3f2fd", borderRadius:10, padding:12, marginBottom:10 }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "1fr 1fr 1fr 1fr", gap:8 }}>
            <label style={labelStyle}>Name *
              <input value={draft.name} onChange={e => setDraft({ ...draft, name: e.target.value })} placeholder="e.g. Jerry Santos" style={inputStyle} />
            </label>
            <label style={labelStyle}>Contact (optional)
              <input value={draft.contact} onChange={e => setDraft({ ...draft, contact: e.target.value })} placeholder="phone, etc." style={inputStyle} />
            </label>
            <label style={labelStyle}>Porsiyento %
              <input type="number" min="0" max="100" step="0.5" value={draft.commissionPct} onChange={e => setDraft({ ...draft, commissionPct: e.target.value })} style={{ ...inputStyle, fontWeight:700, color:"#1565c0" }} />
            </label>
            <label style={labelStyle}>Notes
              <input value={draft.notes} onChange={e => setDraft({ ...draft, notes: e.target.value })} placeholder="Optional..." style={inputStyle} />
            </label>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <button onClick={addSupervisor} style={{ background:"#1565c0", color:"white", border:"none", borderRadius:8, padding:"8px 18px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save</button>
            <button onClick={() => { setShowAdd(false); setDraft({ name:"", contact:"", commissionPct:10, notes:"" }); }} style={{ background:"#f5f5f5", color:"#555", border:"none", borderRadius:8, padding:"8px 18px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Cancel</button>
          </div>
        </div>
      )}

      {supervisors.length === 0 ? (
        <div style={{ fontSize:12, color:"#999", padding:"8px 4px" }}>No supervisors yet. Add one above so you can assign them to areas and track their 10% porsiyento at harvest time.</div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {supervisors.map(s => {
            const st = stats[s.id] || { areaCount:0, areaNames:[], totalRevenue:0, commission:0 };
            return (
              <div key={s.id} style={{ background:"#fafafa", borderRadius:8, padding:"8px 10px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", borderLeft:"3px solid #1565c0" }}>
                <div style={{ flex:1, minWidth:140 }}>
                  <input value={s.name} onChange={e => updateField(s.id, "name", e.target.value)} style={{ border:"none", background:"transparent", fontSize:13, fontWeight:700, color:"#333", outline:"none", width:"100%" }} />
                  <div style={{ fontSize:10, color:"#888", marginTop:1 }}>
                    {st.areaCount > 0
                      ? `${st.areaCount} area${st.areaCount>1?"s":""}: ${st.areaNames.join(", ")}`
                      : "no areas assigned yet"}
                    {s.contact && <> · 📞 {s.contact}</>}
                  </div>
                </div>
                <label style={{ fontSize:10, color:"#666", display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap" }}>
                  <input type="number" min="0" max="100" step="0.5" value={s.commissionPct || 10} onChange={e => updateField(s.id, "commissionPct", e.target.value)} style={{ width:48, padding:"2px 4px", border:"1px solid #ddd", borderRadius:4, fontWeight:700, color:"#1565c0", textAlign:"center", fontSize:12 }} />%
                </label>
                {st.commission > 0 && (
                  <div style={{ fontSize:11, fontWeight:700, color:"#2e7d32", whiteSpace:"nowrap" }} title={`Total revenue across this supervisor's areas: ₱${st.totalRevenue.toLocaleString()}`}>
                    earned ₱{Math.round(st.commission).toLocaleString()}
                  </div>
                )}
                {isOwner && (
                  <button onClick={() => removeSupervisor(s.id)} title="Remove supervisor" style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Remove</button>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AreasManager({ areas, setAreas, schedules, breeds, taskMeta, setTaskMeta, customTasks, setCustomTasks, harvestLogs, setHarvestLogs, laborLogs, setLaborLogs, purchases, cashAdvances, setCashAdvances, equipment, fuelLogs, setFuelLogs, auth, supervisors, setSupervisors, sprayLogs, setSprayLogs, diagnoses, setDiagnoses, mapsConfig, fertilizerPrices, setFertilizerPrices }) {

      if (a.id !== id) return a;
      let coerced = value;
      if (field === "ha" || field === "maturity") coerced = Number(value) || 0;
      // commissionPct: null means "use supervisor default"; numbers are stored as-is
      if (field === "commissionPct") coerced = value == null ? null : (Number(value) || 0);
      return { ...a, [field]: coerced };
    }));
  };

  const addArea = () => {
    setAreas(prev => {
      const nextId = prev.length > 0 ? Math.max(...prev.map(a => a.id)) + 1 : 1;
      const newArea = { id: nextId, name:"", ha:0, managedBy:"", commissionPct: null, crop:"rice", breed:"", maturity:114, season:"Dry 2026", transplantDate:"", status:"Planning", notes:"", protocol:"default", plantingMethod:"transplanting" };
      setSelectedId(nextId);
      return [...prev, newArea];
    });

  const removeArea = (id) => {
    setAreas(prev => {
      const next = prev.filter(a => a.id !== id);
      if (selectedId === id && next.length > 0) setSelectedId(next[0].id);
      return next;
    });
  };

  const a = areas.find(x => x.id === selectedId);
  const sched = a ? schedules[a.id] : null;

  // Tasks for the selected area (protocol + custom)
  const areaTasks = useMemo(() => {
    if (!a?.name) return [];

      ...t,
      area: a.name,
      isCustom: false,
      status: taskMeta[`${a.name}-${t.id}`]?.status || "Not Started",
      ...(taskMeta[`${a.name}-${t.id}`] || {}),

    const custom = (customTasks[a.name] || []).map(t => ({
      ...t,
      area: a.name,
      isCustom: true,
      status: taskMeta[`${a.name}-${t.id}`]?.status || t.status || "Not Started",
      ...(taskMeta[`${a.name}-${t.id}`] || {}),

    { key:"info", label:"Info", icon:"ℹ️" },
    { key:"map", label:"Map", icon:"📍" },
    { key:"protocol", label:"Protocol", icon:"📋" },
    { key:"tasks", label:"Tasks", icon:"✅" },
    { key:"sprays", label:"Sprays", icon:"💧" },
    { key:"inputs", label:"Inputs", icon:"📦" },
    { key:"labor", label:"Labor", icon:"👷" },
    { key:"diagnose", label:"Diagnose", icon:"📸" },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* Supervisors panel — collapsible */}
      <div style={{ background:"white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding: mobile ? "10px 12px" : "12px 16px" }}>
        <button
          onClick={() => setShowSupervisors(!showSupervisors)}
          style={{ background:"transparent", border:"none", padding:0, cursor:"pointer", fontSize:13, fontWeight:700, color:"#555", display:"flex", alignItems:"center", gap:8, width:"100%", justifyContent:"space-between" }}
        >
          <span>{showSupervisors ? "▾" : "▸"} Area Supervisors ({supervisors.length})</span>
          <span style={{ fontSize:11, color:"#999", fontWeight:500 }}>10% porsiyento per harvest by default</span>
        </button>
        {showSupervisors && (
          <SupervisorsPanel supervisors={supervisors} setSupervisors={setSupervisors} areas={areas} harvestLogs={harvestLogs} mobile={mobile} isOwner={isOwner} />
        )}
      </div>

      {/* Area Menu Bar */}
      <div style={{ background:"white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding: mobile ? 6 : 10, display:"flex", alignItems:"center", gap: mobile ? 6 : 8, overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
        {areas.map(ar => {
          const isActive = ar.id === selectedId;

              background: isActive ? "#e8f5e9" : "#f5f5f5",

            </button>
          );
        })}
        <button onClick={addArea} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:10, padding: mobile ? "6px 12px" : "8px 16px", fontSize: mobile ? 11 : 13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>+ Add</button>

      {/* Selected Area Detail */}

                  // Switch protocol + sensible maturity default when crop changes.

                  // Corn → switch to corn-standard, default maturity 110d.
                  const curProto = a.protocol || 'default';
                  const isRiceProto = ['default','kadanny','rice-alt-fert'].includes(curProto);
                  const isCornProto = ['corn-standard','corn-alt-fert'].includes(curProto);
                  setAreas(prev => prev.map(x => {

                    if (nextCrop === 'corn' && !isCornProto) {

                      if (!x.maturity || x.maturity === 114) next.maturity = 110;

                    if (nextCrop === 'rice' && !isRiceProto) {
                      next.protocol = 'default';
                      if (!x.maturity || x.maturity === 110) next.maturity = 114;

                    return next;

                title="Crop type — controls available protocols"
                style={{ ...inputSm, width: mobile ? 80 : 100, fontWeight:700, color:"#5d4037", background: (a.crop === 'corn') ? "#fff3e0" : "#e8f5e9" }}

                <option value="rice">🌾 Rice</option>
                <option value="corn">🌽 Corn</option>
              </select>
              <select
                value={a.protocol || "default"}

                    <option value="corn-standard">🌽 Corn Standard (Hybrid)</option>

                    <option value="default">🌾 Default protocol</option>

              </select>
              <select value={a.status} onChange={e => updateArea(a.id, "status", e.target.value)} style={{ ...inputSm, width: mobile ? 90 : 110 }}>

                      if (a.name) {

              <div style={{ flex:1 }}><ProgressBar pct={progressPct} color="#2e7d32" h={6} /></div>

            borderBottom:"2px solid #e0e0e0", padding:"0 4px", background:"#fafafa",

            scrollbarWidth:"none"   // hide scrollbar on Firefox
          }}>
            {SUB_TABS.map(st => (
              <button key={st.key} onClick={() => setSubTab(st.key)} style={{
                padding: mobile ? "8px 12px" : "10px 18px", background:"none", border:"none",
                borderBottom: subTab === st.key ? "3px solid #2e7d32" : "3px solid transparent",
                color: subTab === st.key ? "#2e7d32" : "#999", fontWeight: subTab === st.key ? 700 : 500,
                fontSize: mobile ? 11 : 13, cursor:"pointer",

            ))}
          </div>

          {/* Sub-tab: Info */}
          {subTab === "info" && (
            <div style={{ padding: mobile ? "12px" : "18px 20px", display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(130px, 1fr))", gap:10 }}>
              <label style={labelStyle}>Area (ha)
                <input type="number" value={a.ha || ""} onChange={e => updateArea(a.id, "ha", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
              </label>
              <label style={labelStyle}>{

                <input type="date" value={a.transplantDate || ""} onChange={e => updateArea(a.id, "transplantDate", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />

              {/* Planting method is rice-specific. Corn is always direct-seeded

                <label style={labelStyle}>Planting Method
                  <select value={a.plantingMethod || "transplanting"} onChange={e => updateArea(a.id, "plantingMethod", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#5d4037", background:"#fff8e1" }}>
                    <option value="transplanting">Transplanted (TPR)</option>
                    <option value="wet-direct">Wet Direct-Seeded (broadcast)</option>
                    <option value="dry-direct">Dry Direct-Seeded (drum/drill)</option>
                  </select>
                  <span style={{ fontSize:10, color:"#888", marginTop:2 }}>
                    {(() => {
                      const m = a.plantingMethod || "transplanting";
                      if (m === "transplanting") return "Seedbed prep + transplanting tasks included. Day-zero = transplant date.";
                      if (m === "wet-direct") return "Skips seedbed; field is puddled then seed broadcast. Day-zero = seeding date.";
                      return "Skips seedbed; seed dropped on dry/moist soil with drum/drill. Day-zero = seeding date.";
                    })()}
                  </span>
                </label>

              <label style={labelStyle}>Breed

                  if (match) updateArea(a.id, "maturity", match.maturity);
                }} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }}>
                  <option value="">Select breed...</option>
                  {(() => {
                    // Sort breeds by usage frequency across your areas, then by name.

                    const cmpName = (x, y) => (x.name || '').localeCompare(y.name || '');

                      .filter(b => usage[b.name] > 0)
                      .sort((x, y) => (usage[y.name] - usage[x.name]) || cmpName(x, y));
                    const unused = breeds
                      .filter(b => !usage[b.name])
                      .sort((x, y) => {
                        // Group rice first then corn, then alphabetical within crop
                        const cx = (x.crop || 'rice'), cy = (y.crop || 'rice');
                        if (cx !== cy) return cx === 'rice' ? -1 : 1;

                    return (
                      <>
                        {used.length > 0 && (
                          <optgroup label={`In use on your farm (${used.length})`}>

                        <optgroup label={used.length > 0 ? "Other varieties" : "All varieties"}>
                          {unused.map(opt)}

                </select>
              </label>
              <label style={labelStyle}>Maturity (days)
                <input type="number" value={a.maturity || ""} onChange={e => updateArea(a.id, "maturity", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />

                        value={override == null ? "" : override}

                        placeholder={`default ${defaultRate}%`}
                        style={{ ...inputStyle, fontWeight:700, color: hasOverride ? "#e65100" : "#1565c0", background: hasOverride ? "#fff3e0" : "#e3f2fd" }}
                      />
                      <span style={{ fontSize:10, color:"#888", marginTop:2 }}>
                        {hasOverride
                          ? `Overrides ${a.managedBy || "supervisor"}'s default of ${defaultRate}%`
                          : a.managedBy
                            ? `Using ${a.managedBy}'s default rate (${defaultRate}%). Type a number to override just for this area.`

                      </span>
                    </>

                })()}
              </label>
              <label style={labelStyle}>Season
                <input value={a.season} onChange={e => updateArea(a.id, "season", e.target.value)} style={inputStyle} />
              </label>
              <label style={{ ...labelStyle, gridColumn: mobile ? "span 2" : "span 1" }}>Crop
                <select
                  value={a.crop || "rice"}

                    const isCornProto = ['corn-standard','corn-alt-fert'].includes(curProto);
                    setAreas(prev => prev.map(x => {

                      if (nextCrop === 'corn' && !isCornProto) {
                        next.protocol = 'corn-standard';
                        if (!x.maturity || x.maturity === 114) next.maturity = 110;
                      }
                      if (nextCrop === 'rice' && !isRiceProto) {

                  ) : (
                    <>
                      <option value="default">Default (5-stage NPK · PSB/PhilRice-aligned)</option>
                      <option value="kadanny">Ka Danny Bolos (21-0-0 → 25-0-0 → 1-6-16-8 → 17-0-17 + FAA)</option>
                      <option value="rice-alt-fert">Rice Alt-Fertilizer (cheaper N-P-K splits, price-driven)</option>
                    </>

                </select>
                <span style={{ fontSize:10, color:"#888", marginTop:2 }}>Changes the fertilizer schedule for this area. Alt-fertilizer protocols use cheapest N source from your fertilizer prices (Inventory → Fert Prices).</span>

              laborLogs={laborLogs}
              harvestLogs={harvestLogs}
              purchases={purchases}

          {/* Sub-tab: Labor */}
          {subTab === "labor" && a.name && (
            <LaborCostTracker areaName={a.name} areaTasks={areaTasks} harvestLogs={harvestLogs} laborLogs={laborLogs} setLaborLogs={setLaborLogs} managedBy={a.managedBy} mobile={mobile} purchases={purchases} cashAdvances={cashAdvances} setCashAdvances={setCashAdvances} supervisors={supervisors} areaCommissionPct={a.commissionPct} />
          )}

          {/* Sub-tab: Field photo diagnosis */}
          {subTab === "diagnose" && a.name && (
            <FieldDiagnose areaName={a.name} areaCrop={a.crop || ((a.breed || '').toLowerCase().includes('corn') ? 'corn' : 'rice')} diagnoses={diagnoses} setDiagnoses={setDiagnoses} mobile={mobile} />
          )}

          {/* Sub-tab: Parcel map */}
          {subTab === "map" && a.name && (
            mapsConfig?.googleMapsApiKey
              ? <GoogleParcelMap area={a} updateArea={updateArea} allAreas={areas} apiKey={mapsConfig.googleMapsApiKey} mobile={mobile} />
              : <ParcelMap       area={a} updateArea={updateArea} allAreas={areas} mobile={mobile} />
          )}
        </div>
      ) : (
        <div style={{ background:"white", borderRadius:14, padding:40, textAlign:"center", color:"#bbb", fontSize:14 }}>
          Select an area or add a new one.
        </div>
      )}
    </div>
  );
}

// ============================================================
// Shared per-area cost calculation — used by Inputs, Labor, and Info summary
// ============================================================
// Returns FIFO input cost, labor cost, supervisor commission, and grand total
// for a given area. All three sub-tabs that show costs use this so the
// numbers are consistent.
function useAreaCosts({ areaName, areaTasks, laborLogs, harvestLogs, purchases, supervisors, areaCommissionPct, managedBy }) {
  return useMemo(() => {
    // FIFO input cost
    const consumptions = [];
    (areaTasks || [])
      .filter(t => (t.status === "Completed" || t.status === "Done") && Array.isArray(t.inputs))
      .forEach(t => {
        t.inputs.forEach(inp => {
          const actualKey = `actualInput_${inp.item}`;
          const actualVal = t[actualKey];
          const rawAmt = (actualVal != null && actualVal !== "") ? String(actualVal) : (inp.amount || "");
          if (!rawAmt) return;
          const num = parseFloat(rawAmt) || 0;
          const amt = rawAmt.toLowerCase();
          let qty = num;
          if (amt.includes("bag")) qty = num * 50;
          // FAA: amount may be "4600 mL" or "4.6 L" — normalize to L.
          // Check "ml" before "l" because "ml".includes("l") is true.
          if (inp.item === "FAA") qty = amt.includes("ml") ? num / 1000 : num;
          consumptions.push({ date: t.actEnd || t.planEnd || t.planStart, qty, area: areaName, item: inp.item, taskName: t.activity });
        });
      });
    let totalInputCost = 0;
    const itemCosts = [];
    const items = [...new Set(consumptions.map(c => c.item))];
    items.forEach(item => {
      const itemPurchases = normalizePurchasesToCanonical(
        (purchases || []).filter(p => p.item === item).sort((x, y) => (x.date || "").localeCompare(y.date || "")),
        item
      );
      const itemConsumptions = consumptions.filter(c => c.item === item);
      const result = computeFifoCost(itemPurchases, itemConsumptions);
      let areaCost = 0;
      result.breakdown.forEach(b => {
        if (b.area === areaName) areaCost += b.cost;
      });
      totalInputCost += areaCost;
      if (areaCost > 0 || result.breakdown.some(b => b.area === areaName)) {
        itemCosts.push({ item, cost: areaCost, breakdown: result.breakdown.filter(b => b.area === areaName) });
      }
    });

    // Labor
    const areaLabor = (laborLogs || []).filter(l => l.area === areaName);
    const totalLaborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);

    // Harvest revenue + supervisor porsiyento
    const areaHarvests = (harvestLogs || []).filter(h => h.area === areaName);
    const grossRevenue = areaHarvests.reduce((s, h) => s + ((h.totalKg || 0) * (h.buyerPrice || 0)), 0);
    const supRecord = (supervisors || []).find(s => s.name === managedBy);
    const supDefault = supRecord && supRecord.commissionPct != null ? supRecord.commissionPct : 10;
    const supervisorPct = (areaCommissionPct != null && areaCommissionPct !== '') ? Number(areaCommissionPct) : supDefault;
    const supervisorPctIsOverride = (areaCommissionPct != null && areaCommissionPct !== '' && Number(areaCommissionPct) !== supDefault);
    const managerShare = grossRevenue * (supervisorPct / 100);

    return {
      fifoCost: { totalInputCost, itemCosts },
      areaLabor,
      totalLaborCost,
      grossRevenue,
      managerShare,
      supervisorPct,
      supervisorPctIsOverride,
      grandTotal: totalInputCost + totalLaborCost + managerShare,
    };
  }, [areaName, areaTasks, laborLogs, harvestLogs, purchases, supervisors, areaCommissionPct, managedBy]);
}

// ============================================================
// INPUT COSTS TRACKER (new "Inputs" sub-tab)
// ============================================================
// Shows the area's FIFO-computed input cost: which fertilizer/chemical was
// applied, from which purchases (FIFO lots), and the per-task breakdown.
function InputCostsTracker({ areaName, areaTasks, purchases, mobile }) {
  // We don't need labor/harvest data here — just FIFO costs.
  const costs = useAreaCosts({ areaName, areaTasks, laborLogs: [], harvestLogs: [], purchases, supervisors: [], areaCommissionPct: null, managedBy: "" });
  const { fifoCost } = costs;
  return (
    <div style={{ padding: mobile ? 12 : 20, display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ background:"linear-gradient(135deg,#e8eaf6,#c5cae9)", borderRadius:12, padding:"14px 18px" }}>
        <div style={{ fontSize:10, fontWeight:700, color:"#283593", textTransform:"uppercase" }}>Input Cost (FIFO)</div>
        <div style={{ fontSize:24, fontWeight:800, color:"#1a237e", marginTop:4 }}>₱{fifoCost.totalInputCost.toLocaleString()}</div>
        <div style={{ fontSize:11, color:"#3949ab", marginTop:2 }}>{fifoCost.itemCosts.length} items applied to {areaName}</div>
      </div>

      <div style={{ background:"#e8eaf6", borderRadius:12, padding:"14px 18px", border:"1px solid #c5cae9" }}>
        <div style={{ fontWeight:700, fontSize:13, color:"#283593", marginBottom:6 }}>Input Cost — FIFO from Purchases</div>
        <div style={{ fontSize:10, color:"#9fa8da", marginBottom:8 }}>Pulls earliest-purchased lots first. Mark fertilizer/spray tasks ✓ in Tasks to consume inventory.</div>
        {fifoCost.itemCosts.length > 0 ? (
          <div style={{ fontSize:12, color:"#555" }}>
            {fifoCost.itemCosts.map(ic => (
              <div key={ic.item} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700, marginBottom:4 }}>
                  <span style={{ color:"#283593" }}>{ic.item}</span>
                  <span style={{ color:"#1a237e" }}>₱{ic.cost.toLocaleString()}</span>
                </div>
                {ic.breakdown.map((b, i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"2px 0 2px 12px", fontSize:11, borderBottom: i < ic.breakdown.length - 1 ? "1px dashed #c5cae9" : "none" }}>
                    <div>
                      <span style={{ color:"#666" }}>{b.taskName}</span>
                      <span style={{ color:"#999", marginLeft:6 }}>{b.qty} {ic.item === "FAA" ? "L" : "kg"}{ic.item !== "FAA" && b.qty >= 25 ? ` (${(b.qty/50).toFixed(2)} bags)` : ''}</span>
                    </div>
                    <div>
                      {b.lots.map((lot, li) => (
                        <span key={li} style={{ marginLeft:6, fontSize:10, color:"#888" }}>
                          {/* show 1 decimal when the value isn't a whole number, otherwise no decimals — */}
                          {/* prevents "42.5kg" being rendered as "43kg" while the math uses 42.5 */}
                          {Number.isInteger(lot.qty) ? lot.qty : lot.qty.toFixed(1)}{ic.item === "FAA" ? "L" : "kg"} @ ₱{lot.unitCost.toFixed(2)}/{ic.item === "FAA" ? "L" : "kg"}
                          {lot.supplier ? ` (${lot.supplier})` : ""}
                        </span>
                      ))}
                      <span style={{ fontWeight:600, color:"#283593", marginLeft:6 }}>₱{b.cost.toLocaleString()}</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
            <div style={{ borderTop:"2px solid #c5cae9", marginTop:8, paddingTop:8, display:"flex", justifyContent:"space-between", fontWeight:800 }}>
              <span>Total Input Cost</span>
              <span style={{ color:"#1a237e", fontSize:14 }}>₱{fifoCost.totalInputCost.toLocaleString()}</span>
            </div>
          </div>
        ) : (
          <div style={{ color:"#9fa8da", fontSize:11 }}>No input costs yet. Costs appear when tasks with inputs are completed AND matching purchases exist in Inventory.</div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// LABOR COST TRACKER (embedded per area inside AreasManager)
// ============================================================
function LaborCostTracker({ areaName, areaTasks, harvestLogs, laborLogs, setLaborLogs, managedBy, mobile, purchases, cashAdvances, setCashAdvances, supervisors, areaCommissionPct }) {
  const [showAdd, setShowAdd] = useState(false);
  const [entry, setEntry] = useState({ taskId:"", date: today, workers: 1, dailyWage: 500, days: 1, notes:"" });
  const [showAddCA, setShowAddCA] = useState(false);
  const [caEntry, setCaEntry] = useState({ date: today, amount: "", purpose: "", notes: "" });

  const areaLabor = laborLogs.filter(l => l.area === areaName);
  const areaHarvests = harvestLogs.filter(h => h.area === areaName);

  // FIFO input cost for this area
  const fifoCost = useMemo(() => {
    const consumptions = buildConsumptionsFromTasks(areaTasks.filter(t => t.area === areaName));
    const items = [...new Set(consumptions.map(c => c.item))];
    let totalInputCost = 0;
    const itemCosts = [];
    items.forEach(item => {
      const itemPurchases = normalizePurchasesToCanonical(
        (purchases || []).filter(p => p.item === item).sort((a,b) => (a.date||"").localeCompare(b.date||"")),
        item
      );
      const itemConsumptions = consumptions.filter(c => c.item === item);
      const result = computeFifoCost(itemPurchases, itemConsumptions);
      const areaCost = result.costByArea[areaName] || 0;
      totalInputCost += areaCost;
      if (areaCost > 0 || result.breakdown.length > 0) {
        itemCosts.push({ item, cost: areaCost, breakdown: result.breakdown.filter(b => b.area === areaName) });
      }
    });
    return { totalInputCost, itemCosts };
  }, [areaTasks, areaName, purchases]);

  // Gross harvest revenue
  const grossRevenue = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);
  // Supervisor porsiyento: per-area override > supervisor default > 10% fallback.
  const supervisorRecord = (Array.isArray(supervisors) ? supervisors : []).find(s => s.name === managedBy);
  const supervisorDefaultPct = supervisorRecord && supervisorRecord.commissionPct != null ? supervisorRecord.commissionPct : 10;
  const supervisorPct = (areaCommissionPct != null && areaCommissionPct !== '') ? Number(areaCommissionPct) : supervisorDefaultPct;
  const supervisorPctIsOverride = (areaCommissionPct != null && areaCommissionPct !== '' && Number(areaCommissionPct) !== supervisorDefaultPct);
  const managerShare = grossRevenue * (supervisorPct / 100);

  // Total additional labor cost
  const totalLaborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);

  // Cash advances for this area's manager
  const areaAdvances = (cashAdvances || []).filter(ca => ca.area === areaName);
  const totalAdvances = areaAdvances.reduce((s, ca) => s + ca.amount, 0);
  const mgrBalance = managerShare - totalAdvances; // positive = still owed, negative = over-advanced

  // Grand total = additional labor + manager share + inputs
  const grandTotal = totalLaborCost + managerShare + fifoCost.totalInputCost;

  const addLabor = () => {
    if (!entry.workers || !entry.dailyWage) return;
    const task = areaTasks.find(t => String(t.id) === String(entry.taskId));
    const totalCost = (Number(entry.workers) || 0) * (Number(entry.dailyWage) || 0) * (Number(entry.days) || 1);
    setLaborLogs(prev => [...prev, {
      id: Date.now(),
      area: areaName,
      taskId: entry.taskId || null,
      taskName: task ? task.activity : (entry.taskId ? entry.taskId : "General"),
      date: entry.date,
      workers: Number(entry.workers) || 0,
      dailyWage: Number(entry.dailyWage) || 0,
      days: Number(entry.days) || 1,
      totalCost,
      notes: entry.notes,
    }]);
    setEntry({ taskId:"", date: today, workers: 1, dailyWage: 500, days: 1, notes:"" });
    setShowAdd(false);
  };

  const addCashAdvance = () => {
    if (!caEntry.amount) return;
    setCashAdvances(prev => [...prev, {
      id: Date.now(),
      area: areaName,
      date: caEntry.date,
      amount: Number(caEntry.amount) || 0,
      purpose: caEntry.purpose || "Cash advance",
      notes: caEntry.notes,
    }]);
    setCaEntry({ date: today, amount: "", purpose: "", notes: "" });
    setShowAddCA(false);
  };

  return (
    <div style={{ padding: mobile ? 12 : 20, display:"flex", flexDirection:"column", gap:14 }}>

      {/* Summary Cards — Labor + Supervisor only (Inputs is its own sub-tab; Total is on Info) */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:10 }}>
        <div style={{ background:"linear-gradient(135deg,#e3f2fd,#bbdefb)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#1565c0", textTransform:"uppercase" }}>Additional Labor</div>
          <div style={{ fontSize:20, fontWeight:800, color:"#0d47a1", marginTop:4 }}>₱{totalLaborCost.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#1976d2", marginTop:2 }}>{areaLabor.length} entries</div>
        </div>
        <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#e65100", textTransform:"uppercase" }}>
            Supervisor Porsiyento ({supervisorPct}%){supervisorPctIsOverride && <span style={{ marginLeft:4, fontSize:8, background:"#ffe0b2", color:"#bf360c", padding:"1px 4px", borderRadius:4 }}>OVERRIDE</span>}
          </div>
          <div style={{ fontSize:20, fontWeight:800, color:"#bf360c", marginTop:4 }}>₱{managerShare.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#e65100", marginTop:2 }}>{managedBy || "No supervisor assigned"}</div>
          {totalAdvances > 0 && (
            <div style={{ fontSize:10, color: mgrBalance >= 0 ? "#2e7d32" : "#c62828", marginTop:2, fontWeight:700 }}>
              Advances: ₱{totalAdvances.toLocaleString()} · {mgrBalance >= 0 ? `Balance: ₱${mgrBalance.toLocaleString()}` : `Over: ₱${Math.abs(mgrBalance).toLocaleString()}`}
            </div>
          )}
        </div>
      </div>

      {/* Add Labor Entry */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>Labor Records</div>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: showAdd ? "#999" : "#1565c0", color:"white", border:"none", borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
          {showAdd ? "Cancel" : "+ Add Labor"}
        </button>
      </div>

      {showAdd && (
        <div style={{ background:"#f5f9ff", borderRadius:12, padding:16, border:"1px solid #bbdefb" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
            <label style={labelStyle}>Task (optional)
              <select value={entry.taskId} onChange={e => setEntry(p => ({...p, taskId: e.target.value}))} style={inputStyle}>
                <option value="">General / No task</option>
                {areaTasks.filter(t => t.phase !== "Growth Stage").map(t => (
                  <option key={t.id} value={t.id}>#{t.id} {t.activity}</option>
                ))}
              </select>
            </label>
            <label style={labelStyle}>Date
              <input type="date" value={entry.date} onChange={e => setEntry(p => ({...p, date: e.target.value}))} style={inputStyle} />
            </label>
            <label style={labelStyle}>No. of Workers
              <input type="number" min="1" value={entry.workers} onChange={e => setEntry(p => ({...p, workers: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>Daily Wage (₱)
              <input type="number" min="0" value={entry.dailyWage} onChange={e => setEntry(p => ({...p, dailyWage: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>No. of Days
              <input type="number" min="1" value={entry.days} onChange={e => setEntry(p => ({...p, days: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>Notes
              <input value={entry.notes} onChange={e => setEntry(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={inputStyle} />
            </label>
          </div>
          {entry.workers && entry.dailyWage && (
            <div style={{ marginTop:10, fontSize:12, color:"#555" }}>
              Subtotal: <strong style={{ color:"#1565c0", fontSize:14 }}>₱{((Number(entry.workers)||0) * (Number(entry.dailyWage)||0) * (Number(entry.days)||1)).toLocaleString()}</strong>
              <span style={{ marginLeft:8, color:"#999" }}>({entry.workers} worker{entry.workers > 1 ? "s" : ""} × ₱{Number(entry.dailyWage).toLocaleString()} × {entry.days} day{entry.days > 1 ? "s" : ""})</span>
            </div>
          )}
          <button onClick={addLabor} disabled={!entry.workers || !entry.dailyWage} style={{ marginTop:12, background: entry.workers && entry.dailyWage ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: entry.workers && entry.dailyWage ? "pointer" : "not-allowed" }}>Save Labor Entry</button>
        </div>
      )}

      {/* Labor Log Table */}
      {areaLabor.length > 0 ? (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead><tr style={{ background:"#f5f9ff" }}>
              {["Date","Task","Workers","Wage","Days","Total","Notes",""].map(h => (
                <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#1565c0", borderBottom:"2px solid #bbdefb", fontSize:10 }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{[...areaLabor].reverse().map(l => (
              <tr key={l.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                <td style={{ padding:"7px 6px", whiteSpace:"nowrap" }}>{fmtDate(l.date)}</td>
                <td style={{ padding:"7px 6px" }}><Badge color="#1565c0" bg="#e3f2fd">{l.taskName}</Badge></td>
                <td style={{ padding:"7px 6px", fontWeight:700 }}>{l.workers}</td>
                <td style={{ padding:"7px 6px" }}>₱{l.dailyWage.toLocaleString()}</td>
                <td style={{ padding:"7px 6px" }}>{l.days}</td>
                <td style={{ padding:"7px 6px", fontWeight:800, color:"#1565c0" }}>₱{l.totalCost.toLocaleString()}</td>
                <td style={{ padding:"7px 6px", color:"#888" }}>{l.notes || "---"}</td>
                <td style={{ padding:"7px 6px" }}><button onClick={() => setLaborLogs(prev => prev.filter(x => x.id !== l.id))} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>x</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      ) : (
        <div style={{ padding:20, textAlign:"center", color:"#bbb", fontSize:12 }}>No labor records yet. Click "+ Add Labor" to log workers.</div>
      )}

      {/* Input cost FIFO breakdown lives on the Inputs sub-tab now */}

      {/* Supervisor Compensation & Cash Advances */}
      <div style={{ background:"#fff8e1", borderRadius:12, padding:"14px 18px", border:"1px solid #ffe082" }}>
        <div style={{ fontWeight:700, fontSize:13, color:"#f57f17", marginBottom:6 }}>Supervisor Compensation — {supervisorPct}% of Sold Rice</div>
        <div style={{ fontSize:12, color:"#555", lineHeight:1.6 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
            <span>Supervisor: <strong>{managedBy || "Not assigned"}</strong></span>
            <span style={{ fontSize:10, color:"#999" }}>Rate: 10% of selling price/kg</span>
          </div>
          {areaHarvests.length > 0 ? (
            <div style={{ background:"#fffde7", borderRadius:8, padding:"8px 10px", marginBottom:8 }}>
              {areaHarvests.map((h, i) => {
                const sellPrice = h.buyerPrice || 0;
                const mgrRate = sellPrice * 0.10;
                const mgrPay = h.totalKg * mgrRate;
                return (
                  <div key={h.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom: i < areaHarvests.length - 1 ? "1px dashed #ffe082" : "none" }}>
                    <div>
                      <span style={{ fontWeight:600 }}>{fmtDate(h.date)}</span>
                      <span style={{ color:"#999", marginLeft:6, fontSize:11 }}>{h.totalKg.toLocaleString()} kg × ₱{sellPrice}/kg × 10%</span>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontSize:10, color:"#888", marginRight:6 }}>₱{mgrRate.toFixed(2)}/kg</span>
                      <span style={{ fontWeight:700, color:"#e65100" }}>₱{mgrPay.toLocaleString()}</span>
                    </div>
                  </div>
                );
              })}

// ============================================================
// AREA TASK TRACKER (embedded per area inside AreasManager)
// ============================================================
// Generate a printable HTML page listing the area's tasks so a field
// supervisor can take the printout, manually check boxes, write actual
// amounts applied, and add notes. Opens a new window and triggers print.
// Convert "85 kg" or "1.7 bags" or "2000 mL" to a friendly "bags + kg" string.
// For FAA shows L + mL. Used by the supervisor print sheet.
function formatInputAmount(rawAmount, item) {
  if (!rawAmount) return '—';
  const str = String(rawAmount).trim();
  const m = str.match(/^([\d.]+)\s*(bag|bags|kg|l|ml)?/i);
  if (!m) return str;
  const num = parseFloat(m[1]);
  const unit = (m[2] || 'kg').toLowerCase();
  if (item === 'FAA') {
    if (unit === 'ml') return `${num} mL (${(num/1000).toFixed(2)} L)`;
    if (unit === 'l')  return `${num} L (${Math.round(num*1000)} mL)`;
    return str;
  }
  if (unit === 'bag' || unit === 'bags') return `${num} bags (${(num*50).toLocaleString()} kg)`;
  if (unit === 'kg') {
    const bags = num / 50;
    return `${num.toLocaleString()} kg (${bags.toFixed(2)} bags)`;
  }
  return str;
}

// Parse a raw amount string into canonical kg (or L for FAA)
function inputAmountToCanonical(rawAmount, item) {
  if (!rawAmount) return 0;
  const m = String(rawAmount).trim().match(/^([\d.]+)\s*(bag|bags|kg|l|ml)?/i);
  if (!m) return 0;
  const num = parseFloat(m[1]) || 0;
  const unit = (m[2] || 'kg').toLowerCase();
  if (item === 'FAA') return unit === 'ml' ? num / 1000 : num;   // → L
  return (unit === 'bag' || unit === 'bags') ? num * 50 : num;    // → kg
}

// ============================================================
// CASHFLOW ENGINE
// Pure function — takes all the data, returns a 90-day forecast.
// Stages 1-5 from the design spec:
//   1. Historical position from actuals
//   2. Project harvest inflows
//   3. Project task/labor/overhead outflows
//   4. Bucket by week
//   5. Decision support (low-water mark, runway, per-area ROI)
// ============================================================

// PSA monthly price seasonality multipliers for Region 2 palay
// (derived from Kit's historical observation: Mar–Apr peak, Aug–Oct glut)
const PALAY_SEASONALITY = [
  /*Jan*/ 1.10, /*Feb*/ 1.15, /*Mar*/ 1.20, /*Apr*/ 1.18, /*May*/ 1.05,
  /*Jun*/ 0.98, /*Jul*/ 0.92, /*Aug*/ 0.82, /*Sep*/ 0.78, /*Oct*/ 0.85,
  /*Nov*/ 0.95, /*Dec*/ 1.05,
];
const CORN_SEASONALITY = [
  /*Jan*/ 1.05, /*Feb*/ 1.08, /*Mar*/ 1.10, /*Apr*/ 1.12, /*May*/ 1.20,
  /*Jun*/ 1.15, /*Jul*/ 1.00, /*Aug*/ 0.90, /*Sep*/ 0.92, /*Oct*/ 0.95,
  /*Nov*/ 0.98, /*Dec*/ 1.02,
];

// Predict price (₱/kg) for a crop on a given future date. Uses three signals
// already on the device: PSA monthly aggregates (priceLog), DA-AMAD prevailing
// SMS prices, and NFA floor as a hard lower bound.
function predictPriceAt(targetDate, crop, priceLog, nfaFloor, overrides) {
  const isRice = (crop || 'rice') === 'rice';
  const ov = overrides || {};

  // Baseline: user override → 6-most-recent PSA logs → sensible default
  let currentBaseline;
  if (isRice && ov.baselineRice != null && ov.baselineRice !== '') currentBaseline = Number(ov.baselineRice);
  else if (!isRice && ov.baselineCorn != null && ov.baselineCorn !== '') currentBaseline = Number(ov.baselineCorn);
  else {
    const field = isRice ? 'palayDry' : 'cornDry';
    const recent = (priceLog || [])
      .filter(p => p && p.date)
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
      .slice(0, 6)
      .map(e => Number(e[field]) || 0).filter(n => n > 0);
    currentBaseline = recent.length > 0 ? recent.reduce((s, n) => s + n, 0) / recent.length : (isRice ? 23 : 18);
  }

  // Seasonality: user override 12-array → built-in defaults
  const monthIdx = new Date(targetDate).getMonth();
  const seasonalityArr = (isRice ? ov.priceSeasonality?.rice : ov.priceSeasonality?.corn) || (isRice ? PALAY_SEASONALITY : CORN_SEASONALITY);
  const seasonality = Number(seasonalityArr[monthIdx]) || 1;

  const predicted = currentBaseline * seasonality;
  // Read NFA floor from the same nested shape the Prices tab uses
  // (nfaFloor.nfa.palayDry / .palayFresh). The previous code read
  // nfaFloor.dry / .fresh which never existed, so the floor silently
  // defaulted to ₱17 — making the "never lower than NFA" guarantee a no-op
  // when the actual ₱21 dry floor was set.
  const nfa = (nfaFloor && nfaFloor.nfa) || {};
  const floor = isRice ? Math.max(Number(nfa.palayDry) || 0, Number(nfa.palayFresh) || 0) : 0;
  return Math.max(floor, predicted);
}

// Predict unit cost (₱/kg or ₱/L) for an input on a given date.
// 3-month rolling average of own purchases for that item, normalised to kg/L.
// Falls back to last-known cost or a sensible default.
function predictUnitCost(item, asOfDate, purchases, overrides) {
  // 1. User override wins
  const ov = (overrides && overrides.inputCosts && overrides.inputCosts[item]);
  if (ov != null && ov !== '' && Number(ov) > 0) return Number(ov);

  // 2. 3-month rolling avg of own purchases for that item
  const ref = new Date(asOfDate);
  const threeMonthsAgo = new Date(ref); threeMonthsAgo.setMonth(ref.getMonth() - 3);
  const window = (purchases || [])
    .filter(p => p.item === item && p.date && new Date(p.date) >= threeMonthsAgo && new Date(p.date) <= ref);
  let totalCanonQty = 0, totalCost = 0;
  window.forEach(p => {
    const u = (p.unit || '').toLowerCase();
    const canonQty = (u === 'bag' || u === 'bags') ? p.qty * 50 : (u === 'ml' && item === 'FAA') ? p.qty / 1000 : p.qty;
    totalCanonQty += canonQty;
    totalCost += p.qty * p.unitCost;
  });
  if (totalCanonQty > 0) return totalCost / totalCanonQty;

  // 3. Most recent purchase
  const latest = (purchases || []).filter(p => p.item === item).sort((a,b) => (b.date||'').localeCompare(a.date||''))[0];
  if (latest) {
    const u = (latest.unit || '').toLowerCase();
    const canonQty = (u === 'bag' || u === 'bags') ? latest.qty * 50 : (u === 'ml' && item === 'FAA') ? latest.qty / 1000 : latest.qty;
    return canonQty > 0 ? (latest.qty * latest.unitCost) / canonQty : 0;
  }

  // 4. Sensible defaults
  const defaults = { "14-14-14": 32, "46-0-0": 30, "0-0-60": 35, "21-0-0": 22, "FAA": 50 };
  return defaults[item] || 25;
}

// Labor heuristic with user-overridable worker-days per pattern.
// Default heuristics from PhilRice / DA-BPI budget guides.
const LABOR_HEURISTIC_DEFAULTS = {
  transplant:  8,    // worker-days per ha (rice manual transplant)
  plant_corn:  2,    // corn drill/hill planting — much less than rice transplant
  side_dress:  1.5,  // corn side-dress with hilling — slightly higher than basal
  harvest:     6,
  spray:       1,
  fertilizer:  1,
  landprep:    0.5,
  irrigation:  0.3,
  weed:        3,
  cultivation: 3,    // corn inter-row cultivation = weeding equivalent
  other:       0.5,
};
function classifyTaskForLabor(task) {
  const a = task.activity || '';
  const phase = task.phase || '';
  // Corn-specific patterns first (more specific than rice equivalents)
  if (/inter.?row cultivation|hilling/i.test(a)) return 'cultivation';
  if (/side.?dress/i.test(a)) return 'side_dress';
  if (/^planting/i.test(a)) return 'plant_corn';  // matches "Planting (drill or hill...)" but not "Pre-Planting"
  // Rice + generic patterns
  if (/transplant|seedling pulling|sowing|direct seed/i.test(a)) return 'transplant';
  if (/harvest/i.test(a)) return 'harvest';
  if (/spray|fungicide|herbicide|insecticide/i.test(a)) return 'spray';
  if (/fertilizer|n[123]k[123]|basal|top.?dress|k applic|fert/i.test(a)) return 'fertilizer';
  if (/rotavate|harrow|land prep|plough|plow|furrow/i.test(a)) return 'landprep';
  if (/irrigat|water|dike/i.test(a)) return 'irrigation';
  if (/weed/i.test(a)) return 'weed';
  if (phase === "Growth Stage") return null; // no labor
  return 'other';
}

// Labor estimate for a task. Worker-days from user overrides or defaults.
function estimateLaborForTask(task, area_ha, dailyWage, overrides) {
  const cls = classifyTaskForLabor(task);
  if (!cls) return 0;
  const wdPerHa = (overrides && overrides.laborWorkerDays && overrides.laborWorkerDays[cls] != null)
    ? Number(overrides.laborWorkerDays[cls])
    : LABOR_HEURISTIC_DEFAULTS[cls];
  const ha = Number(area_ha) || 1;
  return Math.round(wdPerHa * ha * dailyWage);
}

function computeCashflowForecast({
  openingCash, purchases, laborLogs, harvestLogs, cashAdvances, fuelLogs, maintenanceLogs, electricityBills,
  areas, schedules, breeds, allTasks, priceLog, nfaFloor, recurringObligations, settings, overrides,
}) {
  const yieldFactor   = (settings && settings.yieldFactor)   || 0.85;
  const dailyWage     = (settings && settings.dailyWage)     || 500;
  const horizonWeeks  = (settings && settings.horizonWeeks)  || 13;
  const horizonDays   = horizonWeeks * 7;

  const today = new Date(); today.setHours(0,0,0,0);
  const horizonEnd = new Date(today); horizonEnd.setDate(horizonEnd.getDate() + horizonDays);
  const isoToday = today.toISOString().slice(0, 10);

  // ---------- STAGE 1: historical position ----------
  const histInflows  = (harvestLogs || []).reduce((s, h) => s + (h.totalKg || 0) * (h.buyerPrice || 0), 0);
  const histOutflows = (purchases || []).reduce((s, p) => s + (p.qty || 0) * (p.unitCost || 0), 0)
                      + (laborLogs || []).reduce((s, l) => s + (l.totalCost || 0), 0)
                      + (cashAdvances || []).reduce((s, a) => s + (a.amount || 0), 0)
                      + (fuelLogs || []).reduce((s, f) => s + (f.totalCost || 0), 0)
                      + (maintenanceLogs || []).reduce((s, m) => s + (m.cost || 0), 0)
                      + (electricityBills || []).reduce((s, b) => s + (b.amount || 0), 0);
  const balanceToday = ((openingCash && openingCash.amount) || 0) + histInflows - histOutflows;

  // ---------- Build the weekly buckets ----------
  const buckets = [];
  for (let w = 0; w < horizonWeeks; w++) {
    const start = new Date(today); start.setDate(start.getDate() + w * 7);
    const end   = new Date(start); end.setDate(end.getDate() + 6);
    buckets.push({
      week: w + 1, weekStart: start.toISOString().slice(0, 10), weekEnd: end.toISOString().slice(0, 10),
      label: start.toLocaleDateString('en-PH', { month:'short', day:'numeric' }),
      events: [], netIn: 0, netOut: 0, balance: 0,
    });
  }
  const bucketForDate = (iso) => {
    if (!iso) return null;
    const d = new Date(iso); d.setHours(0,0,0,0);
    if (d < today || d > horizonEnd) return null;
    const idx = Math.floor((d - today) / (1000 * 60 * 60 * 24 * 7));
    return buckets[Math.min(idx, buckets.length - 1)];
  };

  // ---------- STAGE 2: harvest inflows ----------
  const perAreaProfit = [];
  (areas || []).filter(a => a.status === 'Active' && a.name).forEach(area => {
    const sched = schedules[area.id]; if (!sched || !sched.harvestDate) return;
    const harvestBucket = bucketForDate(sched.harvestDate);
    const breed = (breeds || []).find(b => b.name === area.breed);
    const ha = Number(area.ha) || 0;
    // breed.yield is sometimes a string like "5-6 t/ha"; pull the midpoint
    // Per-area yield override wins over breed default
    const areaYieldOv = overrides?.yieldByArea?.[area.id];
    let yMid;
    if (areaYieldOv != null && areaYieldOv !== '' && Number(areaYieldOv) > 0) {
      yMid = Number(areaYieldOv);
    } else {
      const yieldStr = String(breed?.yield || '5');
      const yMatch = yieldStr.match(/(\d+(?:\.\d+)?)/g) || ['5'];
      yMid = yMatch.length > 1 ? (parseFloat(yMatch[0]) + parseFloat(yMatch[1])) / 2 : parseFloat(yMatch[0]);
    }
    const expectedKg = yMid * ha * 1000 * yieldFactor;
    const crop = area.crop || ((area.breed || '').toLowerCase().includes('corn') ? 'corn' : 'rice');
    const pricePerKg = predictPriceAt(sched.harvestDate, crop, priceLog, nfaFloor, overrides);
    const gross = expectedKg * pricePerKg;
    const supervisorPct = (area.commissionPct != null && area.commissionPct !== '') ? Number(area.commissionPct) : 10;
    const supervisorShare = gross * supervisorPct / 100;
    const netInflow = gross - supervisorShare;
    if (harvestBucket) {
      harvestBucket.events.push({ kind: 'inflow', date: sched.harvestDate, type: 'harvest', area: area.name, label: `🌾 ${area.name} harvest`, amount: netInflow, kg: expectedKg, pricePerKg, confidence: 'estimated' });
    }
    perAreaProfit.push({
      areaId: area.id, areaName: area.name, ha, crop, breed: area.breed,
      harvestDate: sched.harvestDate, expectedKg, pricePerKg, gross, supervisorShare, netInflow,
      // costs computed below
    });
  });

  // ---------- STAGE 3: future task outflows ----------
  const tasksByArea = {};
  (allTasks || []).forEach(t => {
    if (!t.area) return;
    if (!tasksByArea[t.area]) tasksByArea[t.area] = [];
    tasksByArea[t.area].push(t);
  });

  (areas || []).filter(a => a.status === 'Active' && a.name).forEach(area => {
    const tasks = tasksByArea[area.name] || [];
    let projectedAreaCost = 0;
    tasks.forEach(task => {
      const done = task.status === 'Completed' || task.status === 'Done' || task.status === 'Cancelled' || task.status === 'Skipped' || task.status === 'Not Done';
      if (done) return;
      if (!task.planStart) return;
      const b = bucketForDate(task.planStart); if (!b) return;
      // Inputs
      (task.inputs || []).forEach(inp => {
        if (!inp.amount) return;
        const canon = inputAmountToCanonical(inp.amount, inp.item);
        if (canon <= 0) return;
        const unitCost = predictUnitCost(inp.item, task.planStart, purchases, overrides);
        const cost = canon * unitCost;
        projectedAreaCost += cost;
        b.events.push({ kind: 'outflow', date: task.planStart, type: 'input', area: area.name, label: `📦 ${task.activity} · ${inp.item}`, amount: cost });
      });
      // Labor (only if no existing log for this task)
      const hasLaborLog = (laborLogs || []).some(l => l.area === area.name && (l.taskId === task.id || l.taskName === task.activity));
      if (!hasLaborLog) {
        const laborCost = estimateLaborForTask(task, area.ha, dailyWage, overrides);
        if (laborCost > 0) {
          projectedAreaCost += laborCost;
          b.events.push({ kind: 'outflow', date: task.planStart, type: 'labor', area: area.name, label: `👷 ${task.activity} labor`, amount: laborCost });
        }
      }
    });
    // Attach projected cost to the perAreaProfit row
    const row = perAreaProfit.find(p => p.areaId === area.id);
    if (row) {
      row.projectedRemainingCost = projectedAreaCost;
      row.netProfit = row.netInflow - row.projectedRemainingCost;
      row.roiPct = row.projectedRemainingCost > 0 ? (row.netProfit / row.projectedRemainingCost) * 100 : null;
    }
  });

  // ---------- Recurring overhead ----------
  // Electricity rolling 3-month average, posted on 15th of each month in horizon
  const elecPast3 = (electricityBills || []).slice(-3);
  const avgMonthlyElec = elecPast3.length > 0 ? elecPast3.reduce((s, b) => s + (b.amount || 0), 0) / elecPast3.length : 0;
  for (let m = 0; m < Math.ceil(horizonWeeks / 4.3); m++) {
    const elecDate = new Date(today); elecDate.setMonth(elecDate.getMonth() + m); elecDate.setDate(15);
    const elecIso = elecDate.toISOString().slice(0, 10);
    const b = bucketForDate(elecIso);
    if (b && avgMonthlyElec > 0) {
      b.events.push({ kind: 'outflow', date: elecIso, type: 'overhead', area: 'farm', label: `⚡ Electricity (est.)`, amount: avgMonthlyElec });
    }
  }
  // User-defined recurring obligations
  (recurringObligations || []).forEach(ob => {
    if (!ob.monthlyAmount) return;
    for (let m = 0; m < Math.ceil(horizonWeeks / 4.3) + 1; m++) {
      const d = new Date(today); d.setMonth(d.getMonth() + m); d.setDate(Math.min(28, ob.dayOfMonth || 1));
      const iso = d.toISOString().slice(0, 10);
      if (ob.startDate && iso < ob.startDate) continue;
      if (ob.endDate && iso > ob.endDate) continue;
      const b = bucketForDate(iso); if (!b) continue;
      b.events.push({ kind: 'outflow', date: iso, type: 'recurring', area: 'farm', label: `📅 ${ob.name || 'Recurring'}`, amount: Number(ob.monthlyAmount) });
    }
  });

  // ---------- STAGE 4: walk weeks chronologically ----------
  let running = balanceToday;
  buckets.forEach(b => {
    b.events.forEach(e => {
      if (e.kind === 'inflow') b.netIn += e.amount;
      else                     b.netOut += e.amount;
    });
    running += b.netIn - b.netOut;
    b.balance = running;
  });

  // ---------- STAGE 5: decision support ----------
  const lowest = buckets.reduce((m, b) => b.balance < m.balance ? { week: b.label, weekStart: b.weekStart, balance: b.balance } : m, { week: null, weekStart: null, balance: balanceToday });
  const maxWeeklyOut = buckets.reduce((m, b) => Math.max(m, b.netOut), 0);
  const suggestedReserve = Math.round(maxWeeklyOut * 1.5);
  // Days of runway at current 30-day burn
  const thirtyDayBurn = buckets.slice(0, 5).reduce((s, b) => s + b.netOut, 0);
  const dailyBurn = thirtyDayBurn / 30;
  const runwayDays = dailyBurn > 0 ? Math.floor(balanceToday / dailyBurn) : null;

  // Cash-crunch suggestions
  const suggestions = [];
  if (lowest.balance < 0) {
    const shortage = Math.abs(lowest.balance);
    // Look for deferrable purchases in the weeks before lowest
    const lowestIdx = buckets.findIndex(b => b.weekStart === lowest.weekStart);
    const upcomingInputs = buckets.slice(0, lowestIdx + 1).flatMap(b => b.events.filter(e => e.type === 'input')).sort((a, b) => b.amount - a.amount).slice(0, 3);
    upcomingInputs.forEach(ev => {
      suggestions.push(`Defer "${ev.label}" (₱${Math.round(ev.amount).toLocaleString()}) by 1 week → frees ${Math.round(100 * ev.amount / shortage)}% of shortage`);
    });
    // Suggest harvest acceleration
    const earlyHarvests = perAreaProfit.filter(p => new Date(p.harvestDate) > new Date(lowest.weekStart));
    earlyHarvests.forEach(p => {
      suggestions.push(`Bring forward "${p.areaName}" harvest if possible (was Sun ${new Date(p.harvestDate).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })}, gross ₱${Math.round(p.gross).toLocaleString()})`);
    });
    if (suggestions.length === 0) {
      suggestions.push(`Need ₱${Math.round(shortage).toLocaleString()} additional working capital by ${new Date(lowest.weekStart).toLocaleDateString('en-PH', { weekday: 'short', month: 'short', day: 'numeric' })}.`);
    }
  }

  return {
    balanceToday, histInflows, histOutflows,
    buckets, lowest, suggestedReserve, runwayDays,
    perAreaProfit,
    suggestions,
    horizonEnd: horizonEnd.toISOString().slice(0, 10),
  };
}

function printSupervisorSheet(tasks, areaName, areaData) {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  const today = new Date().toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const ha = areaData?.ha || 0;
  const breed = areaData?.breed || "—";
  const supervisor = areaData?.managedBy || "—";
  const season = areaData?.season || "—";
  const transplantDate = areaData?.transplantDate
    ? new Date(areaData.transplantDate + 'T12:00:00').toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric', year:'numeric' })
    : "—";
  const methodLabel = (() => {
    const m = areaData?.plantingMethod || "transplanting";
    if (m === "wet-direct") return "Wet Direct-Seeded (broadcast)";
    if (m === "dry-direct") return "Dry Direct-Seeded (drum/drill)";
    return "Transplanted";
  })();
  const dateLabel = (areaData?.plantingMethod && areaData.plantingMethod !== "transplanting") ? "Seeding date" : "Transplant date";
  const fmtDateShort = (iso) => {
    if (!iso) return "";
    const d = new Date(iso.length === 10 ? iso + 'T12:00:00' : iso);
    return isNaN(d.getTime()) ? iso : d.toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' });
  };
  // Aggregate input totals across all tasks (canonical units: kg + L)
  const totals = {};
  (tasks || []).forEach(t => {
    (t.inputs || []).forEach(inp => {
      const canon = inputAmountToCanonical(inp.amount, inp.item);
      if (canon > 0) totals[inp.item] = (totals[inp.item] || 0) + canon;
    });
  });

  const rows = tasks.map(t => {
    const planRange = t.planStart === t.planEnd
      ? fmtDateShort(t.planStart)
      : `${fmtDateShort(t.planStart)} – ${fmtDateShort(t.planEnd)}`;
    const inputsPlanned = (t.inputs || []).map(inp => `${esc(inp.item)}: ${esc(formatInputAmount(inp.amount, inp.item))}`).join("<br>");
    const inputsActualBlanks = (t.inputs || []).map(inp => `${esc(inp.item)}: <span class="blank"></span>`).join("<br>") || `<span class="blank"></span>`;
    const phase = t.phase || "";
    return `
      <tr>
        <td class="checkbox">☐</td>
        <td class="actno">#${esc(t.id)}</td>
        <td>
          <div class="activity">${esc(t.activity)}</div>
          <div class="phase">${esc(phase)}</div>
        </td>
        <td class="date">${esc(planRange)}</td>
        <td class="inputs">${inputsPlanned || "—"}</td>
        <td class="actual">${inputsActualBlanks}</td>
        <td class="notes"></td>
      </tr>
    `;
  }).join("");

  // Totals as inline pills under the table — compact for single-page A4.
  const totalsPills = Object.entries(totals).map(([item, totalCanon]) => {
    if (item === 'FAA') {
      return `<span class="pill"><strong>${esc(item)}:</strong> ${totalCanon.toFixed(2)} L (${Math.round(totalCanon * 1000)} mL)</span>`;
    }
    return `<span class="pill"><strong>${esc(item)}:</strong> ${totalCanon.toLocaleString(undefined, {maximumFractionDigits: 0})} kg (${(totalCanon/50).toFixed(1)} bags)</span>`;
  }).join("");

  const html = `<!DOCTYPE html>

  const w = window.open("", "_blank", "width=900,height=700");
