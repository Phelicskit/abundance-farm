// ============================================================
// PRICE FEED — auto-fetch CSV from a Google Sheet (or any public URL)
// CSV format: header row "date,palayFresh,palayDry,cornFresh,cornDry"
// then one row per day. Any field may be blank.
// ============================================================
function parsePriceCsv(text) {
  if (!text) return [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];
  const header = lines[0].toLowerCase().split(',').map(h => h.trim());
  const idx = (name) => header.indexOf(name);
  const di = idx('date'), pfi = idx('palayfresh'), pdi = idx('palaydry'), cfi = idx('cornfresh'), cdi = idx('corndry');
  if (di === -1) return [];
  const out = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',').map(c => c.trim());
    const dateStr = cells[di];
    if (!dateStr) continue;
    const d = new Date(dateStr.length === 10 ? dateStr + 'T12:00:00' : dateStr);
    if (isNaN(d.getTime())) continue;
    const toNum = (i) => i >= 0 && cells[i] ? (parseFloat(cells[i]) || null) : null;
    const row = {
      date: d.toISOString(),
      palayFresh: toNum(pfi), palayDry: toNum(pdi),
      cornFresh: toNum(cfi), cornDry: toNum(cdi),
      _source: 'feed'
    };
    if (row.palayFresh != null || row.palayDry != null || row.cornFresh != null || row.cornDry != null) out.push(row);
  }
  return out;
}

function usePriceFeed() {
  // Two sources of truth:
  //   1) Worker endpoint at /api/prices.json (same-origin; preferred if reachable)
  //   2) Google Sheet CSV URL (fallback / manual override)
  const [config, setConfig] = usePersistedState('abundance-farm-feed-config', { url: '', autoDaily: true, preferWorker: true });
  const [state, setState] = useState({ status: 'idle', data: [], error: null, fetchedAt: null, source: null });
  const CACHE_KEY = 'abundance-farm-feed-cache';
  const WORKER_ENDPOINT = '/api/prices.json';

  const normalizeUrl = (u) => {
    if (!u) return '';
    const m = u.match(/docs\.google\.com\/spreadsheets\/d\/([A-Za-z0-9_-]+)/);
    if (m) {
      const id = m[1];
      const gidMatch = u.match(/[#&?]gid=(\d+)/);
      const gid = gidMatch ? gidMatch[1] : '0';
      return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
    }
    return u;
  };

  const tryWorker = async () => {
    try {
      const res = await fetch(WORKER_ENDPOINT, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const ct = res.headers.get('content-type') || '';
      if (!ct.includes('json')) throw new Error('not json (probably no Worker here)');
      const json = await res.json();
      if (!json || !Array.isArray(json.rows)) throw new Error('malformed worker response');
      return {
        data: json.rows,
        fetchedAt: json.fetchedAt ? new Date(json.fetchedAt).getTime() : Date.now(),
        source: { type: 'worker', note: json.source && json.source.note, url: WORKER_ENDPOINT }
      };
    } catch(e) {
      return null;
    }
  };

  const trySheet = async () => {
    const effective = normalizeUrl(config.url);
    if (!effective) return null;
    const res = await fetch(effective);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    return {
      data: parsePriceCsv(text),
      fetchedAt: Date.now(),
      source: { type: 'sheet', note: 'Google Sheet CSV', url: effective }
    };
  };

  const load = useCallback(async (force = false) => {
    // Cache check
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached && !force) {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.ts < 6 * 3600 * 1000) {
          setState({ status: 'ok', data: parsed.data, error: null, fetchedAt: parsed.ts, source: parsed.source });
          return;
        }
      }
    } catch(e) {}

    setState(s => ({ ...s, status: 'loading' }));
    try {
      let result = null;
      if (config.preferWorker) result = await tryWorker();
      if (!result) result = await trySheet();
      if (!result) {
        setState({ status: 'idle', data: [], error: null, fetchedAt: null, source: null });
        return;
      }
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: result.fetchedAt, data: result.data, source: result.source })); } catch(e) {}
      setState({ status: 'ok', data: result.data, error: null, fetchedAt: result.fetchedAt, source: result.source });
    } catch(err) {
      setState({ status: 'error', data: [], error: err.message || String(err), fetchedAt: null, source: null });
    }
  }, [config.url, config.preferWorker]);

  useEffect(() => { if (config.autoDaily) load(false); }, [load, config.autoDaily]);

  return { config, setConfig, state, reload: () => load(true), normalizeUrl };
}

// ============================================================
// useLoggedPrices — server-synced farmgate price log (auth-gated)
// ============================================================
// Server is source of truth; local cache for offline reads.
// All writes go through auth.authedFetch (Authorization: Bearer <token>).
function useLoggedPrices(auth) {
  const LEGACY_KEY = 'abundance-farm-prices-v2';        // pre-sync localStorage entries
  const CACHE_KEY  = 'abundance-farm-log-cache-v1';     // mirror of server log
  const QUEUE_KEY  = 'abundance-farm-log-queue-v1';     // pending writes when offline
  const LOG_ENDPOINT = '/api/log';

  const [entries, setEntries] = useState(() => {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) return JSON.parse(raw);
      const legacy = localStorage.getItem(LEGACY_KEY);
      if (legacy) {
        const parsed = JSON.parse(legacy);
        return Array.isArray(parsed) ? parsed : [];
      }
    } catch(e) {}
    return [];
  });
  // phase: idle | loading | ok | offline | error
  const [status, setStatus] = useState({ phase: 'idle', error: null, lastSync: null, pending: 0 });

  useEffect(() => {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(entries)); } catch(e) {}
  }, [entries]);

  const queueLen = () => {
    try { return (JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]') || []).length; } catch(e) { return 0; }
  };

  const refresh = useCallback(async () => {
    setStatus(s => ({ ...s, phase: 'loading' }));
    try {
      const res = await fetch(LOG_ENDPOINT, { cache: 'no-cache' });
      const ct = res.headers.get('content-type') || '';
      if (!res.ok || !ct.includes('json')) throw new Error('Worker not reachable (HTTP ' + res.status + ')');
      const j = await res.json();
      if (!Array.isArray(j.entries)) throw new Error('Malformed response');
      setEntries(prev => {
        const pendingLocal = prev.filter(e => e && (e._pending || (typeof e.id === 'string' && e.id.startsWith('tmp_'))));
        return [...pendingLocal, ...j.entries];
      });
      setStatus({ phase: 'ok', error: null, lastSync: Date.now(), pending: queueLen() });
    } catch(err) {
      setStatus(s => ({ ...s, phase: 'offline', error: err.message || String(err), pending: queueLen() }));
    }
  }, []);

  const flushQueue = useCallback(async () => {
    if (!auth || !auth.token) return;
    let queue = [];
    try { queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]') || []; } catch(e) {}
    if (!queue.length) return;
    const remaining = [];
    for (const item of queue) {
      try {
        const url = item.path ? (LOG_ENDPOINT + item.path) : LOG_ENDPOINT;
        const res = await auth.authedFetch(url, {
          method: item.method || 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: item.body ? JSON.stringify(item.body) : undefined,
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
      } catch(e) {
        remaining.push(item);
      }
    }
    try { localStorage.setItem(QUEUE_KEY, JSON.stringify(remaining)); } catch(e) {}
    if (remaining.length < queue.length) refresh();
  }, [auth, refresh]);

  useEffect(() => { refresh(); }, [refresh]);
  useEffect(() => { if (auth && auth.token) flushQueue(); }, [auth && auth.token, flushQueue]);

  const addEntry = useCallback(async (entry) => {
    if (!auth || !auth.token) throw new Error('Not signed in.');
    try {
      const res = await auth.authedFetch(LOG_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry),
      });
      if (res.status === 401) throw new Error('Session expired — sign in again');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await refresh();
      return { ok: true };
    } catch(err) {
      try {
        const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]') || [];
        q.push({ method: 'POST', body: entry });
        localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
      } catch(e) {}
      const tempId = 'tmp_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
      const stamp = { ...entry, id: tempId, _pending: true, author: auth.user && auth.user.email, authorName: auth.user && auth.user.name };
      setEntries(prev => [stamp, ...prev]);
      setStatus(s => ({ ...s, phase: 'offline', error: err.message || String(err), pending: queueLen() }));
      throw err;
    }
  }, [auth, refresh]);

  const deleteEntry = useCallback(async (id) => {
    if (!id) return;
    if (typeof id === 'string' && id.startsWith('tmp_')) {
      setEntries(prev => prev.filter(e => e.id !== id));
      return;
    }
    if (!auth || !auth.token) throw new Error('Not signed in.');
    const res = await auth.authedFetch(LOG_ENDPOINT + '/' + encodeURIComponent(id), {
      method: 'DELETE',
    });
    if (res.status === 401) throw new Error('Session expired — sign in again');
    if (res.status === 403) throw new Error('Managers can only delete their own entries');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    await refresh();
  }, [auth, refresh]);

  const migrateLegacy = useCallback(async () => {
    if (!auth || !auth.token) throw new Error('Not signed in.');
    let legacy = [];
    try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || '[]') || []; } catch(e) {}
    legacy = legacy.filter(e => e && e.date);
    if (!legacy.length) return { migrated: 0 };
    let migrated = 0;
    for (const e of legacy) {
      try {
        const res = await auth.authedFetch(LOG_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(e),
        });
        if (res.ok) migrated++;
      } catch(err) { /* keep going */ }
    }
    if (migrated > 0) {
      try { localStorage.removeItem(LEGACY_KEY); } catch(e) {}
      await refresh();
    }
    return { migrated, total: legacy.length };
  }, [auth, refresh]);

  return { entries, status, addEntry, deleteEntry, refresh, flushQueue, migrateLegacy };
}

// ============================================================
// useOnline — periodic /api/health probe; reflects worker reachability
// ============================================================
function useOnline() {
  const [online, setOnline] = useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  const ping = useCallback(async () => {
    try {
      const res = await fetch('/api/health', { cache: 'no-cache' });
      setOnline(res.ok);
    } catch (e) { setOnline(false); }
  }, []);
  useEffect(() => {
    ping();
    const id = setInterval(ping, 30000);
    const onUp = () => ping();
    const onDown = () => setOnline(false);
    const onFocus = () => ping();
    if (typeof window !== 'undefined') {
      window.addEventListener('online', onUp);
      window.addEventListener('offline', onDown);
      window.addEventListener('focus', onFocus);
    }
    return () => {
      clearInterval(id);
      if (typeof window !== 'undefined') {
        window.removeEventListener('online', onUp);
        window.removeEventListener('offline', onDown);
        window.removeEventListener('focus', onFocus);
      }
    };
  }, [ping]);
  return online;
}

// ============================================================
// colorForEmail — stable accent color from a string hash
// ============================================================
const AVATAR_PALETTE = [T.rice, T.corn, '#5b6e8c', '#7a4f8a', '#3a7a72', '#a64a4a', '#7c6a3f', '#3f6f8a'];
function colorForEmail(email) {
  if (!email) return T.inkMute;
  let h = 0;
  for (let i = 0; i < email.length; i++) h = ((h << 5) - h + email.charCodeAt(i)) | 0;
  return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
}

// ============================================================
// AvatarBadge — small initial circle. Used in header chip and price log rows.
// ============================================================
function AvatarBadge({ user, size, color, dot, dotColor, title }) {
  const sz = size || 28;
  const initial = ((user && (user.name || user.email)) || '?').slice(0,1).toUpperCase();
  const bg = color || colorForEmail(user && user.email);
  const computedTitle = title || (user ? ((user.name ? user.name + ' ' : '') + '<' + (user.email || '') + '>') : '');
  return (
    <span title={computedTitle} style={{ position:'relative', display:'inline-flex', flex:'none' }}>
      <span style={{
        width:sz, height:sz, borderRadius:'50%', background:bg, color:'white',
        display:'flex', alignItems:'center', justifyContent:'center',
        fontWeight:700, fontSize: Math.max(9, Math.round(sz * 0.45)),
        lineHeight: 1,
      }}>{initial}</span>
      {dot && (
        <span aria-hidden="true" style={{
          position:'absolute', right:-1, bottom:-1,
          width: Math.max(8, Math.round(sz * 0.32)),
          height: Math.max(8, Math.round(sz * 0.32)),
          borderRadius:'50%', background: dotColor || T.safe,
          border: '2px solid ' + (T.bg || '#F5F0E1'),
        }}></span>
      )}
    </span>
  );
}

// ============================================================
// AccountMenu — small avatar + dropdown in the page header
// ============================================================
function AccountMenu({ auth, onOpenUsers, onChangePassword, compact, openSignal }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef ? React.useRef(null) : { current: null };
  const isOwner = auth.user.role === 'owner';
  const online = useOnline();
  const opsStatus = useOpsStatus();
  // Tri-state: orange (offline), amber (pending), green (synced)
  const dotColor =
    !online || opsStatus.phase === 'offline' ? (T.warn || '#c87a00') :
    opsStatus.pending ? '#d4a24c' :
    T.safe;
  const dotTitle =
    !online ? 'Offline — changes are queued locally'
    : opsStatus.phase === 'offline' ? 'Server unreachable — changes queued locally'
    : opsStatus.pending ? 'Saving…'
    : opsStatus.lastSync ? 'Synced ' + new Date(opsStatus.lastSync).toLocaleTimeString('en-PH', { hour:'numeric', minute:'2-digit' })
    : 'Online';

  // Allow parent to programmatically open via shortcut (g a)
  useEffect(() => { if (openSignal) setOpen(true); }, [openSignal]);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(o => !o)} title={auth.user.email + ' · ' + dotTitle} style={{
        display:'flex', alignItems:'center', gap: compact ? 0 : 8, padding: compact ? 2 : '4px 10px 4px 4px',
        background: open ? T.bgElev : 'transparent',
        border: `1px solid ${open ? T.lineStrong : (compact ? 'transparent' : T.line)}`,
        borderRadius: 999, cursor:'pointer', fontFamily: T.fontBody,
      }}>
        <AvatarBadge
          user={auth.user}
          size={compact ? 32 : 28}
          color={isOwner ? T.rice : T.corn}
          dot
          dotColor={dotColor}
          title={(auth.user.name || auth.user.email) + ' · ' + dotTitle}
        />
        {!compact && (
          <>
            <span style={{ fontSize:12, color:T.ink, fontWeight:600 }}>{auth.user.name || auth.user.email.split('@')[0]}</span>
            <span style={{ fontSize:9, color: isOwner ? T.rice : T.corn, fontWeight:700, letterSpacing:'.05em', textTransform:'uppercase' }}>
              {auth.user.role}
            </span>
          </>
        )}
      </button>
      {open && (
        <div style={{
          position:'absolute', right:0, top:'100%', marginTop:6, minWidth:240,
          background:'white', borderRadius: T.radiusSm, boxShadow:'0 8px 24px rgba(0,0,0,0.12)',
          border:`1px solid ${T.line}`, zIndex:200, fontFamily:T.fontBody, overflow:'hidden',
        }}>
          <div style={{ padding:'12px 14px', borderBottom:`1px solid ${T.line}` }}>
            <div style={{ fontWeight:600, color:T.ink, fontSize:13 }}>{auth.user.name || 'Unnamed'}</div>
            <div style={{ color:T.inkMute, fontSize:11, marginTop:2, wordBreak:'break-all' }}>{auth.user.email}</div>
          </div>
          {isOwner && (
            <button onClick={() => { setOpen(false); onOpenUsers(); }} style={menuItem()}>
              <span>Manage users</span>
              <span style={{ fontSize:10, color:T.inkMute }}>Owner</span>
            </button>
          )}
          <button onClick={() => { setOpen(false); onChangePassword(); }} style={menuItem()}>
            Change password
          </button>
          <button onClick={() => { setOpen(false); auth.logout(); }} style={menuItem({ color: T.danger, borderTop:`1px solid ${T.line}` })}>
            Sign out
          </button>
        </div>
      )}
    </div>
  );
}
function menuItem(extra) {
  return Object.assign({
    width:'100%', textAlign:'left', padding:'10px 14px',
    background:'transparent', border:'none', cursor:'pointer',
    fontFamily: T.fontBody, fontSize:13, color: T.ink,
    display:'flex', justifyContent:'space-between', alignItems:'center',
  }, extra || {});
}

      position:'fixed', inset:0, zIndex:300, background:'rgba(31,45,30,0.45)',

      // home-indicator, and landscape side-notches.

// ============================================================
// ChangePasswordForm
// ============================================================
function ChangePasswordForm({ auth, onDone }) {
  const [cur, setCur] = useState('');
  const [next, setNext] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);
  const [ok, setOk] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    setBusy(true); setErr(null); setOk(false);
    try {
      await auth.changePassword(cur, next);
      setOk(true); setCur(''); setNext('');
      setTimeout(onDone, 800);
    } catch(error) {
      setErr(error.message || String(error));
    } finally { setBusy(false); }
  };
  const inp = { width:'100%', padding:'10px 12px', borderRadius:T.radiusSm, border:`1px solid ${T.line}`, fontSize:14, marginBottom:10, boxSizing:'border-box', fontFamily:T.fontBody };
  return (
    <form onSubmit={submit}>
      <input type="password" placeholder="Current password" value={cur} onChange={e=>setCur(e.target.value)} style={inp} autoComplete="current-password" required />
      <input type="password" placeholder="New password (min 8)" value={next} onChange={e=>setNext(e.target.value)} style={inp} autoComplete="new-password" required />
      {err && <div style={{ background: T.dangerSoft, color:T.danger, padding:'8px 10px', borderRadius:T.radiusSm, fontSize:12, marginBottom:10 }}>{err}</div>}
      {ok && <div style={{ background: T.safeSoft, color:T.safe, padding:'8px 10px', borderRadius:T.radiusSm, fontSize:12, marginBottom:10 }}>Password updated.</div>}
      <button type="submit" disabled={busy} style={{ width:'100%', padding:'10px 12px', background:T.rice, color:'white', border:'none', borderRadius:T.radiusSm, fontWeight:600, fontSize:14, cursor: busy ? 'wait' : 'pointer' }}>
        {busy ? 'Saving…' : 'Update password'}
      </button>
    </form>
  );
}

// ============================================================
// UsersAdmin — Owner-only user management UI
// ============================================================
function UsersAdmin({ auth }) {
  const [users, setUsers] = useState(null); // null = loading
  const [error, setError] = useState(null);
  const [creating, setCreating] = useState(false);
  const [draft, setDraft] = useState({ email:'', name:'', role:'manager', password:'' });
  const [editFor, setEditFor] = useState(null); // email being edited
  const [editDraft, setEditDraft] = useState({ name:'', role:'manager', password:'' });

  const load = useCallback(async () => {
    setError(null);
    try {
      const res = await auth.authedFetch('/api/users');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const j = await res.json();
      setUsers(Array.isArray(j.users) ? j.users : []);
    } catch(err) {
      setError(err.message || String(err));
      setUsers([]);
    }
  }, [auth]);

  useEffect(() => { load(); }, [load]);

  const create = async () => {
    if (!draft.email || !draft.password) { alert('Email and password required'); return; }
    if (draft.password.length < 8) { alert('Password must be at least 8 characters'); return; }
    setCreating(true);
    try {
      const res = await auth.authedFetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(draft),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(j.error || 'Failed');
      setDraft({ email:'', name:'', role:'manager', password:'' });
      await load();
    } catch(err) {
      alert('Create failed: ' + (err.message || err));
    } finally { setCreating(false); }
  };

  const startEdit = (u) => {
    setEditFor(u.email);
    setEditDraft({ name: u.name || '', role: u.role || 'manager', password: '' });
  };

  const saveEdit = async () => {
    try {
      const body = { name: editDraft.name, role: editDraft.role };
      if (editDraft.password && editDraft.password.length >= 8) body.password = editDraft.password;
      else if (editDraft.password) { alert('New password must be at least 8 characters'); return; }
      const res = await auth.authedFetch('/api/users/' + encodeURIComponent(editFor), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(j.error || 'Failed');
      setEditFor(null);
      await load();
    } catch(err) {
      alert('Save failed: ' + (err.message || err));
    }
  };

  const remove = async (email) => {
    if (!confirm('Delete user ' + email + '? This cannot be undone.')) return;
    try {
      const res = await auth.authedFetch('/api/users/' + encodeURIComponent(email), { method: 'DELETE' });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(j.error || 'Failed');
      await load();
    } catch(err) {
      alert('Delete failed: ' + (err.message || err));
    }
  };

  const inputStyle = { padding:'8px 10px', borderRadius:T.radiusSm, border:`1px solid ${T.line}`, fontSize:13, background:'white', boxSizing:'border-box', fontFamily:T.fontBody };

}

function PricesView({ monthIdx, purchases, auth }) {
  const log = useLoggedPrices(auth);
  const priceHistory = log.entries;
  const [entry, setEntry] = useState({ date: new Date().toISOString().split('T')[0], palayFreshLow:'', palayFreshHigh:'', palayDryLow:'', palayDryHigh:'', cornFreshLow:'', cornFreshHigh:'', cornDryLow:'', cornDryHigh:'', source:'', note:'' });

  // ---- DA AMAD SMS importer ----
  // Kit gets prevailing-price SMS from CagValBPMT2 (DA AMAD RFO2). Format is
  // perfectly consistent — paste the message text and we extract date + palay
  // + corn into log entries with source='DA AMAD RFO2 SMS'.
  const [smsExpanded, setSmsExpanded] = useState(false);
  const [smsText, setSmsText] = useState('');
  const [smsPreview, setSmsPreview] = useState([]);
  const [smsImporting, setSmsImporting] = useState(false);
  const [smsResult, setSmsResult] = useState(null);
  const parseAmadSms = (text) => {
    if (!text) return [];
    const cleaned = text.replace(/[–—]/g, '-');
    const headerRe = /(?:Prevailing Prices of[\s\S]*?as of\s+([A-Za-z]+\s+\d{1,2},?\s*\d{4}))/gi;
    const chunks = [];
    let m, lastIdx = 0, lastDate = null;
    while ((m = headerRe.exec(cleaned)) !== null) {
      if (lastDate) chunks.push({ date: lastDate, body: cleaned.slice(lastIdx, m.index) });
      lastDate = m[1];
      lastIdx = m.index + m[0].length;
    }
    if (lastDate) chunks.push({ date: lastDate, body: cleaned.slice(lastIdx) });
    const out = [];
    for (const { date: dateStr, body } of chunks) {
      const dateMs = Date.parse(dateStr.replace(/,?\s+/, ', '));
      if (isNaN(dateMs)) continue;
      const isoDate = new Date(dateMs + 12 * 3600 * 1000).toISOString();
      const palay = body.match(/Palay\s+Fresh\s+([\d.]+)\s*-\s*([\d.]+)\s+Dry\s+([\d.]+)\s*-\s*([\d.]+)/i);
      const corn  = body.match(/(?:Yellow\s+)?Corn\s+Fresh\s+([\d.]+)\s*-\s*([\d.]+)\s+Dry\s+([\d.]+)\s*-\s*([\d.]+)/i);
      if (!palay && !corn) continue;
      const avg = (a, b) => Math.round(((parseFloat(a) + parseFloat(b)) / 2) * 100) / 100;
      const parts = [];
      if (palay) parts.push(`palay ${palay[1]}-${palay[2]} / ${palay[3]}-${palay[4]}`);
      if (corn)  parts.push(`corn ${corn[1]}-${corn[2]} / ${corn[3]}-${corn[4]}`);
      out.push({
        date: isoDate,
        dateLabel: dateStr,
        palayFresh: palay ? avg(palay[1], palay[2]) : null,
        palayDry:   palay ? avg(palay[3], palay[4]) : null,
        cornFresh:  corn  ? avg(corn[1],  corn[2])  : null,
        cornDry:    corn  ? avg(corn[3],  corn[4])  : null,
        source: 'DA AMAD RFO2 SMS',
        note:   parts.join(' · '),
      });
    }
    return out;
  };
  const previewSms = () => {
    const parsed = parseAmadSms(smsText);
    setSmsPreview(parsed);
    setSmsResult(parsed.length ? null : { error: 'no entries found — check the message format includes a "Palay/Corn Fresh/Dry" block' });
  };
  const importSms = async () => {
    if (!smsPreview.length) return;
    setSmsImporting(true);
    setSmsResult(null);
    let ok = 0, dup = 0, fail = 0;
    // Check existing log dates to skip duplicates by (date, source)
    const existing = new Set((priceHistory || [])
      .filter(p => p.source === 'DA AMAD RFO2 SMS')
      .map(p => String(p.date).slice(0, 10)));
    for (const e of smsPreview) {
      const day = String(e.date).slice(0, 10);
      if (existing.has(day)) { dup++; continue; }
      try {
        await log.addEntry({
          date: e.date,
          palayFresh: e.palayFresh, palayDry: e.palayDry,
          cornFresh: e.cornFresh, cornDry: e.cornDry,
          source: e.source,
          note: e.note,
        });
        ok++;
      } catch (err) {
        fail++;
      }
    }
    setSmsImporting(false);
    setSmsResult({ imported: ok, duplicates: dup, failed: fail });
    if (ok > 0) {
      // Clear text on success
      setSmsText('');
      setSmsPreview([]);
    }
  };
  const [calc, setCalc] = useState({ qty:'', price:'', cost:'' });
  const feed = usePriceFeed();
  const isOwner = auth && auth.user && auth.user.role === 'owner';
  const myEmail = auth && auth.user && auth.user.email;

  // Merge logged + feed entries for signal computation.
  // Exclude PSA market reference data — those are national/regional averages,
  // not the prices you'd actually sell at. Signals stay grounded in your own
  // logged entries plus anything you maintain in the Sheet.
  const mergedHistory = useMemo(() => {
    const feedForSignals = (feed.state.data || []).filter(r => r.source !== 'psa');
    return [...priceHistory, ...feedForSignals];
  }, [priceHistory, feed.state.data]);

  // Market reference: latest PSA prices per region (psa-sourced rows only).
  const marketReference = useMemo(() => {
    const psaRows = (feed.state.data || []).filter(r => r.source === 'psa');
    if (psaRows.length === 0) return null;
    const pickLatest = (region) => {
      const rs = psaRows.filter(r => (r.region || 'PH') === region);
      if (rs.length === 0) return null;
      return [...rs].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    };
    return {
      national: pickLatest('PH'),
      cagayanValley: pickLatest('02'),
    };
  }, [feed.state.data]);

  // NFA government floor price — fetched once on mount, editable by Owner.
  const [nfaFloor, setNfaFloor] = useState(null);
  const [nfaEditing, setNfaEditing] = useState(false);
  const [nfaDraft, setNfaDraft] = useState({ palayFresh:'', palayDry:'', palayPremium:'', cagayanDry:'' });
  const [nfaSaving, setNfaSaving] = useState(false);
  const [nfaError, setNfaError] = useState(null);
  const loadNfaFloor = useCallback(() => {
    return fetch('/api/prices/floor', { cache: 'no-cache' })
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (data && data.nfa) setNfaFloor(data); return data; })
      .catch(() => null);
  }, []);
  useEffect(() => { loadNfaFloor(); }, [loadNfaFloor]);
  const beginNfaEdit = () => {
    if (!nfaFloor || !nfaFloor.nfa) return;
    setNfaDraft({
      palayFresh:   nfaFloor.nfa.palayFresh   != null ? String(nfaFloor.nfa.palayFresh)   : '',
      palayDry:     nfaFloor.nfa.palayDry     != null ? String(nfaFloor.nfa.palayDry)     : '',
      palayPremium: nfaFloor.nfa.palayPremium != null ? String(nfaFloor.nfa.palayPremium) : '',
      cagayanDry:   nfaFloor.nfa.cagayanDry   != null ? String(nfaFloor.nfa.cagayanDry)   : '',
    });
    setNfaError(null);
    setNfaEditing(true);
  };
  const saveNfaEdit = async () => {
    if (!auth || !auth.token) { setNfaError('not signed in'); return; }
    setNfaSaving(true);
    setNfaError(null);
    try {
      const res = await fetch('/api/prices/floor', {
        method: 'PATCH',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + auth.token },
        body: JSON.stringify({ nfa: nfaDraft }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.error || 'HTTP ' + res.status);
      }
      const data = await res.json();
      if (data && data.nfa) setNfaFloor(data);
      setNfaEditing(false);
    } catch (e) {
      setNfaError(e.message || String(e));
    } finally {
      setNfaSaving(false);
    }
  };

  // Live signals derived from user data + price feed
  const sellSignals = [
    { key:'palayFresh', label:'Palay · Fresh', crop:'palay', bm: PALAY_PRICES, accent: T.rice },
    { key:'palayDry',   label:'Palay · Dry',   crop:'palay', bm: PALAY_PRICES, accent: T.rice },
    { key:'cornFresh',  label:'Corn · Fresh',  crop:'corn',  bm: CORN_PRICES,  accent: T.corn },
    { key:'cornDry',    label:'Corn · Dry',    crop:'corn',  bm: CORN_PRICES,  accent: T.corn },
  ].map(s => ({ ...s, signal: computeSellSignal(mergedHistory, s.bm, monthIdx, s.key, s.label) }));

  const commonInputs = ['14-14-14', '46-0-0', '0-0-60', '21-0-0', 'FAA', 'Diesel', 'Seeds'];
  const buySignals = commonInputs
    .map(item => ({ item, signal: computeBuySignal(purchases, item) }))
    .filter(x => x.signal);

  const pairAvg = (lo, hi) => {
    const a = parseFloat(lo), b = parseFloat(hi);
    const aok = !isNaN(a), bok = !isNaN(b);
    if (!aok && !bok) return null;
    if (aok && !bok) return a;
    if (!aok && bok) return b;
    return (a + b) / 2;
  };

  const logPrice = async () => {
    const pf = pairAvg(entry.palayFreshLow, entry.palayFreshHigh);
    const pd = pairAvg(entry.palayDryLow, entry.palayDryHigh);
    const cf = pairAvg(entry.cornFreshLow, entry.cornFreshHigh);
    const cd = pairAvg(entry.cornDryLow, entry.cornDryHigh);
    if (pf == null && pd == null && cf == null && cd == null) { alert('Enter at least one price'); return; }
    if (!entry.date) { alert('Select a date'); return; }
    const date = new Date(entry.date + 'T12:00:00').toISOString();
    const payload = {

    try {

  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;

  const qty = parseFloat(calc.qty) || 0;

                {feed.state.fetchedAt && <span style={{ color:T.inkMute }}> · {new Date(feed.state.fetchedAt).toLocaleString('en-PH', { weekday:'long', month:'long', day:'numeric', hour:'numeric', minute:'2-digit' })}</span>}
              </span>
            )}
            {feed.state.status === 'loading' && <span style={{ fontSize:11, color:T.inkMute }}>Syncing…</span>}

            {feed.state.status === 'idle' && <span style={{ fontSize:11, color:T.inkMute }}>idle</span>}
          </div>
          <button onClick={feed.reload} disabled={feed.state.status === 'loading'} style={{
            padding:'6px 12px', background: T.rice, color:'white', border:'none', borderRadius:T.radiusSm,

          }}>{feed.state.status === 'loading' ? '…' : 'Fetch now'}</button>
        </div>

            <input

              placeholder="Google Sheet CSV URL (fallback)..."
              value={feed.config.url}
              onChange={e => feed.setConfig({ ...feed.config, url: e.target.value })}
              style={{ width:'100%', padding:'8px 10px', borderRadius:T.radiusSm, border:`1px solid ${T.line}`, fontSize:12, fontFamily:T.fontMono, background:'white', boxSizing:'border-box', marginBottom:8 }}

                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:8 }}>
                  <span style={{ display:'inline-flex', alignItems:'center', gap:6, color:T.inkMute, minWidth:90 }}>
                    {p.author && <AvatarBadge user={{ name: p.authorName || '', email: p.author }} size={18} />}
                    <span>
                      {ds}{pending && <span title="Pending sync" style={{ marginLeft:4, fontSize:9, color:T.warn || '#c87a00' }}>⟳</span>}
                    </span>
                  </span>
                  <span style={{ fontFamily:T.fontMono, flex:1, textAlign:'right', display:'flex', justifyContent:'flex-end', gap:8, flexWrap:'wrap' }}>{parts.reduce((acc, el, idx) => idx === 0 ? [el] : [...acc, ' ', el], [])}</span>
                  <button onClick={() => deletePrice(p.id)} disabled={!canDelete} title={deleteTitle} style={{ background:'transparent', border:'none', color:canDelete ? T.inkMute : T.line, fontSize:18, width:28, height:28, borderRadius:'50%', cursor: canDelete ? 'pointer' : 'not-allowed', padding:0, lineHeight:1 }}>×</button>
                </div>
                {(hasIntel || noteText) && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6, paddingLeft:24, fontSize:10, color:T.inkMute }}>
                    {hasIntel && (
                      <span style={{ background: T.bg2 || '#EBE3CC', color: T.inkSoft || T.ink, padding:'1px 6px', borderRadius:8, letterSpacing:'.02em' }}>
                        ↻ {p.source}
                      </span>
                    )}
                    {noteText && <span style={{ fontStyle:'italic' }}>“{noteText}”</span>}
                  </div>
                )}
              </div>;
            })}
          </div>
        )}
      </AbCard>

      {/* Profit calculator */}
      <AbCard>
        <AbLabel>Quick profit calculator</AbLabel>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginTop:6 }}>
          <div>
            <div style={{ fontSize:10, color:T.inkMute, marginBottom:3 }}>Qty (kg)</div>
            <input type="number" value={calc.qty} onChange={e=>setCalc({...calc, qty:e.target.value})} style={inputStyle} />
          </div>
          <div>
            <div style={{ fontSize:10, color:T.inkMute, marginBottom:3 }}>Sell ₱/kg</div>
            <input type="number" value={calc.price} onChange={e=>setCalc({...calc, price:e.target.value})} style={inputStyle} />
          </div>
          <div>
            <div style={{ fontSize:10, color:T.inkMute, marginBottom:3 }}>Cost ₱/kg</div>
            <input type="number" value={calc.cost} onChange={e=>setCalc({...calc, cost:e.target.value})} style={inputStyle} />
          </div>
        </div>
        <div style={{ marginTop:14, padding:14, background: profit >= 0 ? T.safeSoft : T.dangerSoft, borderRadius:T.radiusSm, textAlign:'center' }}>
          <div style={{ fontSize:11, color:T.inkMute, letterSpacing:'0.1em', textTransform:'uppercase' }}>Profit</div>
          <div style={{ fontFamily:T.fontDisplay, fontSize:32, fontWeight:500, color: profit >= 0 ? T.safe : T.danger }}>{fmtPHP(profit)}</div>
          <div style={{ fontSize:12, color:T.inkSoft, marginTop:4 }}>{qty === 0 || pr === 0 ? 'Enter values above' : `Revenue ${fmtPHP(revenue)} · Margin ${margin.toFixed(0)}%`}</div>
        </div>
      </AbCard>
    </div>
  );
}

function WeatherView({ weather, monthIdx }) {

  const windows = findWindows(weather?.data);
  const risk = RISK_LEVELS[monthIdx];

  return (
    <div className="ab-fade">
      <div style={{ padding:'18px 4px 10px', display:'flex', alignItems:'baseline', justifyContent:'space-between' }}>
        <div style={{ fontFamily:T.fontDisplay, fontWeight:500, fontSize:24, letterSpacing:'-0.02em' }}>Weather & Risk</div>
        <button onClick={weather.reload} className="ab-btn-reset" style={{ fontSize:11, color:T.inkMute, letterSpacing:'0.05em', textTransform:'uppercase' }}>↻ Refresh</button>
      </div>

      {/* Current */}
      <div style={{ background:'linear-gradient(135deg, #1F2D1E 0%, #2D4A2B 100%)', color:'#F5F0E1', borderRadius:T.radius, padding:24, marginBottom:14 }}>
        <div style={{ fontSize:10, letterSpacing:'0.2em', opacity:0.7, fontWeight:600 }}>SANTA MARIA · ISABELA</div>
        <div style={{ fontFamily:T.fontDisplay, fontSize:44, fontWeight:500, marginTop:8, letterSpacing:'-0.02em' }}>
          {c ? <>{Math.round(c.temperature_2m)}°<span style={{ fontSize:22, color:'rgba(245,240,225,0.6)' }}> · {wmoText(c.weather_code)}</span></> : 'Loading...'}
        </div>
        <div style={{ fontSize:13, opacity:0.75, marginTop:6 }}>
          {c ? `Humidity ${c.relative_humidity_2m}% · Wind ${Math.round(c.wind_speed_10m)} km/h · Rain now ${c.precipitation.toFixed(1)}mm` : (weather.status === 'error' ? 'Offline — connect to fetch forecast' : '')}
        </div>
        <div style={{ marginTop:14 }}><RiskPill level={risk} /></div>
      </div>

      {/* Smart windows */}
      <AbCard>
        <AbLabel>14-day field windows</AbLabel>
        {(() => {
          const items = [];
          if (windows.dryStreaks.length > 0) items.push({ color: T.safe, title:'Land Prep Windows (3+ dry days)', detail: windows.dryStreaks.map(w => `${w.start}–${w.end} (${w.days}d)`).join(' · ') });
          if (windows.plantingDays.length > 0) items.push({ color: T.corn, title:'Best Corn Planting Days', detail: `Dry day with light rain within 48h: ${windows.plantingDays.join(', ')}` });
          if (windows.heavyRain.length > 0) items.push({ color: T.danger, title:'Avoid Field Work (heavy rain ≥30mm)', detail: windows.heavyRain.join(', ') });
          if (items.length === 0) return <div style={{ color:T.inkMute, fontSize:13 }}>No clear windows in next 14 days — monitor daily.</div>;
          return items.map((it, i) => (
            <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 0', borderBottom: i < items.length-1 ? `1px solid ${T.line}` : 'none' }}>
              <div style={{ width:8, height:8, borderRadius:'50%', background:it.color, marginTop:6, flexShrink:0 }} />
              <div>
                <div style={{ fontWeight:600, fontSize:13 }}>{it.title}</div>
                <div style={{ fontSize:12, color:T.inkSoft, marginTop:2 }}>{it.detail}</div>
              </div>
            </div>
          ));
        })()}
      </AbCard>

      {/* Full 14-day forecast */}
      <AbCard>
        <AbLabel>14-day forecast</AbLabel>
        {d ? d.time.map((iso, i) => {
          const date = new Date(iso);
          const dayName = date.toLocaleDateString('en-PH',{weekday:'long', month:'long', day:'numeric'});
          const rain = d.precipitation_sum[i];
          const prob = d.precipitation_probability_max[i];
          const tmax = Math.round(d.temperature_2m_max[i]);
          const tmin = Math.round(d.temperature_2m_min[i]);
          const wind = Math.round(d.wind_speed_10m_max[i]);
          const code = d.weather_code[i];
          const rainColor = rain >= 30 ? T.danger : rain >= 10 ? T.warn : rain >= 1 ? T.rice : T.inkMute;
          return <div key={i} style={{ display:'grid', gridTemplateColumns:'1fr auto auto', gap:10, padding:'10px 0', borderBottom:`1px solid ${T.line}`, alignItems:'center' }}>
            <div>
              <div style={{ fontWeight:600, fontSize:13 }}>{dayName}</div>
              <div style={{ fontSize:11, color:T.inkMute }}>{wmoText(code)} · wind {wind} km/h</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily:T.fontMono, fontSize:13, fontWeight:600, color:rainColor }}>{rain.toFixed(0)}mm</div>
              <div style={{ fontSize:10, color:T.inkMute }}>{prob}% chance</div>
            </div>
            <div style={{ textAlign:'right', fontFamily:T.fontMono, fontSize:13, color:T.inkSoft, minWidth:50 }}>{tmax}°/{tmin}°</div>
          </div>;
        }) : <div style={{ color:T.inkMute, fontSize:13, padding:8 }}>Loading forecast...</div>}
      </AbCard>

      {/* Typhoon history */}
      <AbCard>
        <AbLabel>Typhoon impact history · Cagayan Valley</AbLabel>
        {TYPHOONS.map((t, i) => (
          <div key={i} style={{ display:'grid', gridTemplateColumns:'70px 1fr', gap:14, padding:'12px 0', borderBottom: i < TYPHOONS.length-1 ? `1px solid ${T.line}` : 'none' }}>
            <div>
              <div style={{ fontFamily:T.fontDisplay, fontSize:18, fontWeight:500, color:T.danger }}>{t.year}</div>
              <div style={{ fontSize:10, color:T.inkMute, letterSpacing:'0.08em', textTransform:'uppercase' }}>{t.month}</div>
            </div>
            <div>
              <div style={{ fontWeight:600, fontSize:14, color:T.ink }}>{t.name}</div>
              <div style={{ fontSize:12, color:T.inkSoft, marginTop:3, lineHeight:1.4 }}>{t.impact}</div>
            </div>
          </div>
        ))}
      </AbCard>
    </div>
  );
}

// ============================================================
// TASKS VIEW (monthly checklist, Abundance style)
// ============================================================
// Small toggle for desktop notifications. Asks the browser for permission
// on the first opt-in. Permission isn't reversible from the page — user
// has to revoke via the browser's site settings — so we just disable our
// own flag and show a hint if permission is denied.
function NotificationToggle({ notifPref, setNotifPref }) {
  const supported = typeof Notification !== "undefined";
  if (!supported) return <div style={{ fontSize:10, color:"#bbb" }}>Browser doesn't support notifications.</div>;
  const permission = Notification.permission;
  const toggle = async () => {
    if (notifPref.enabled) {
      setNotifPref({ ...notifPref, enabled: false });
      return;
    }
    let perm = permission;
    if (perm === "default") {
      try { perm = await Notification.requestPermission(); } catch (e) { perm = "denied"; }
    }
    if (perm !== "granted") {
      alert("Notifications were blocked. Enable them for abundance.mak-ct.com in your browser settings, then try again.");
      return;
    }
    setNotifPref({ ...notifPref, enabled: true });
  };
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, color:"#555" }}>
      <span>🔔 Desktop alerts</span>
      <button onClick={toggle} style={{
        padding:"3px 10px", borderRadius:14, border:"1px solid",
        background: notifPref.enabled ? "#2e7d32" : "white",
        color: notifPref.enabled ? "white" : "#666",
        borderColor: notifPref.enabled ? "#2e7d32" : "#ddd",
        fontSize:10, fontWeight:700, cursor:"pointer",
      }}>{notifPref.enabled ? "ON" : "OFF"}</button>
      {notifPref.enabled && (
        <label style={{ fontSize:10, color:"#888" }}>
          threshold:
          <input type="number" min="1" max="50" value={notifPref.threshold || 1}
            onChange={e => setNotifPref({ ...notifPref, threshold: Math.max(1, Number(e.target.value) || 1) })}
            style={{ width:36, marginLeft:4, padding:"1px 4px", border:"1px solid #ddd", borderRadius:4, fontSize:10, fontWeight:700, color:"#1565c0", textAlign:"center" }}
          />
        </label>
      )}
      {permission === "denied" && <span style={{ fontSize:10, color:"#c62828" }}>(blocked in browser)</span>}
    </div>
  );
}

// ============================================================
// ACTIVE TASKS VIEW — aggregates real area tasks across all areas
// ============================================================
// Distinct from the "Tips" tab (which is monthly seasonal advisory).
// Shows overdue / due this week / today / in progress so you know what
// the farm actually owes right now without drilling into each area.
function ActiveTasksView({ allTasks, taskMeta, setTaskMeta, areas, setTab, supervisors, notifPref, setNotifPref }) {
  const today = new Date().toISOString().slice(0, 10);
  const weekAhead = new Date(); weekAhead.setDate(weekAhead.getDate() + 7);
  const soon = weekAhead.toISOString().slice(0, 10);
  const [filter, setFilter] = useState("active");   // active | overdue | thisWeek | inProgress | all | completed
  const [areaFilter, setAreaFilter] = useState("all");

  const isDone = (s) => s === "Completed" || s === "Done" || s === "Skipped" || s === "Not Done" || s === "Cancelled";

  // Tag each task with derived state
  const tagged = useMemo(() => allTasks
    .filter(t => t.phase !== "Growth Stage")    // these are calendar markers not real tasks
    .map(t => {
      let bucket = "future";
      if (isDone(t.status)) bucket = "done";
      else if ((t.planEnd || t.planStart) < today) bucket = "overdue";
      else if (t.planStart <= today && t.planEnd >= today) bucket = "today";
      else if (t.planStart > today && t.planStart <= soon) bucket = "thisWeek";
      return { ...t, _bucket: bucket };
    }), [allTasks, today, soon]);

  const filtered = tagged.filter(t => {
    if (areaFilter !== "all" && t.area !== areaFilter) return false;
    if (filter === "all") return true;
    if (filter === "active") return ["overdue", "today", "thisWeek"].includes(t._bucket) || t.status === "In Progress";
    if (filter === "overdue") return t._bucket === "overdue";
    if (filter === "thisWeek") return ["today", "thisWeek"].includes(t._bucket);
    if (filter === "inProgress") return t.status === "In Progress";
    if (filter === "completed") return t._bucket === "done";
    return true;
  }).sort((a, b) => (a.planStart || "").localeCompare(b.planStart || ""));

  // Stats for header chips
  const counts = useMemo(() => ({
    overdue:    tagged.filter(t => t._bucket === "overdue").length,
    today:      tagged.filter(t => t._bucket === "today").length,
    thisWeek:   tagged.filter(t => t._bucket === "thisWeek").length,
    inProgress: tagged.filter(t => t.status === "In Progress").length,
    completed:  tagged.filter(t => t._bucket === "done").length,
    total:      tagged.length,
  }), [tagged]);

  // Per-supervisor overdue + due-soon breakdown
  const supervisorStats = useMemo(() => {
    const areaToSup = {};
    for (const a of (areas || [])) areaToSup[a.name] = a.managedBy || "(unassigned)";
    const buckets = {};
    for (const t of tagged) {
      if (t._bucket === "done") continue;
      const sup = areaToSup[t.area] || "(unassigned)";
      if (!buckets[sup]) buckets[sup] = { overdue: 0, dueSoon: 0, inProgress: 0, areas: new Set() };
      if (t._bucket === "overdue") buckets[sup].overdue++;
      else if (t._bucket === "today" || t._bucket === "thisWeek") buckets[sup].dueSoon++;
      if (t.status === "In Progress") buckets[sup].inProgress++;
      buckets[sup].areas.add(t.area);
    }
    return Object.entries(buckets)
      .map(([name, s]) => ({ name, ...s, areas: [...s.areas], total: s.overdue + s.dueSoon }))
      .filter(s => s.total > 0)
      .sort((a, b) => b.overdue - a.overdue || b.dueSoon - a.dueSoon);
  }, [tagged, areas]);

  const quickStatus = (t, status) => {
    const key = `${t.area}-${t.id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), status, actEnd: (prev[key]?.actEnd) || today } }));
  };

  const fmtDate = (iso) => {
    if (!iso) return "?";
    const d = new Date(iso.length === 10 ? iso + "T12:00:00" : iso);
    return d.toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric' });
  };

  const bucketLabel = (b) => ({ overdue: "OVERDUE", today: "TODAY", thisWeek: "THIS WEEK", future: "LATER", done: "DONE" })[b] || b;
  const bucketColor = (b) => ({ overdue: "#c62828", today: "#e65100", thisWeek: "#1565c0", future: "#888", done: "#2e7d32" })[b] || "#888";

  return (
    <div style={{ padding:"18px 4px 80px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:8, marginBottom:14 }}>
        <div>
          <div style={{ fontFamily:T.fontDisplay, fontWeight:500, fontSize:24, letterSpacing:'-0.02em' }}>{
            ({ active:"Active Tasks", overdue:"Overdue Tasks", thisWeek:"This Week's Tasks", inProgress:"In Progress", completed:"Completed Tasks", all:"All Tasks" })[filter] || "Tasks"
          }</div>
          <div style={{ fontSize:11, color:T.inkMute, letterSpacing:'0.1em', textTransform:'uppercase', marginTop:4 }}>
            {filter === 'completed' ? "What you've finished · across all areas" : "What the farm owes you right now · across all areas"}
          </div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
          <NotificationToggle notifPref={notifPref} setNotifPref={setNotifPref} />
          <div style={{ fontSize:11, color:T.inkMute }}>
            For monthly seasonal tips, see the <button onClick={() => setTab("tips")} style={{ background:"none", border:"none", color:"#1565c0", textDecoration:"underline", cursor:"pointer", padding:0, fontSize:11 }}>💡 Monthly Tips</button> tab.
          </div>
        </div>
      </div>

      {/* Status filter chips */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
        {[
          { key:"active",     label:"Active",      count: counts.overdue + counts.today + counts.thisWeek + counts.inProgress, color:"#e65100" },
          { key:"overdue",    label:"Overdue",     count: counts.overdue,    color:"#c62828" },
          { key:"thisWeek",   label:"This week",   count: counts.today + counts.thisWeek, color:"#1565c0" },
          { key:"inProgress", label:"In progress", count: counts.inProgress, color:"#7b1fa2" },
          { key:"completed",  label:"Completed",   count: counts.completed,  color:"#2e7d32" },
          { key:"all",        label:"All",         count: counts.total,      color:"#555" },
        ].map(opt => {
          const active = filter === opt.key;
          return (
            <button key={opt.key} onClick={() => setFilter(opt.key)} style={{
              padding:"6px 12px", borderRadius:16, border:"1px solid",
              background: active ? opt.color : "white",
              color: active ? "white" : opt.color,
              borderColor: opt.color,
              fontSize:11, fontWeight:700, cursor:"pointer",
            }}>{opt.label} {opt.count > 0 && <span style={{ marginLeft:4, opacity: active ? 1 : 0.7 }}>· {opt.count}</span>}</button>
          );
        })}
      </div>

      {/* Area filter */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
        <span style={{ fontSize:11, color:"#888", letterSpacing:'.06em', fontWeight:600, alignSelf:"center" }}>AREA:</span>
        {[{ name:"all", label:"All areas" }, ...areas.map(a => ({ name: a.name, label: a.name || "Unnamed" }))].map(opt => {
          const active = areaFilter === opt.name;
          return (
            <button key={opt.name} onClick={() => setAreaFilter(opt.name)} style={{
              padding:"4px 10px", borderRadius:14, border:"1px solid",
              background: active ? "#2e7d32" : "white", color: active ? "white" : "#666",
              borderColor: active ? "#2e7d32" : "#ddd",
              fontSize:10, fontWeight:600, cursor:"pointer",
            }}>{opt.label}</button>
          );
        })}
      </div>

      {/* Per-supervisor overdue breakdown — only when there's something to show and area filter is "all" */}
      {areaFilter === "all" && supervisorStats.length > 0 && (filter === "active" || filter === "overdue") && (
        <div style={{ background:"white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding:"12px 14px", marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#666", letterSpacing:".06em", marginBottom:8 }}>BY SUPERVISOR</div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {supervisorStats.slice(0, 6).map(s => (
              <div key={s.name} style={{ flex:"1 1 180px", minWidth:180, background:"#fafafa", borderRadius:8, padding:"8px 12px", borderLeft:`3px solid ${s.overdue > 0 ? "#c62828" : "#1565c0"}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                  <span style={{ fontWeight:700, fontSize:13, color:"#222" }}>{s.name}</span>
                  <span style={{ fontSize:10, color:"#888" }}>{s.areas.length} area{s.areas.length !== 1 ? "s" : ""}</span>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:4, fontSize:11 }}>
                  {s.overdue  > 0 && <span style={{ color:"#c62828", fontWeight:700 }}>{s.overdue} overdue</span>}
                  {s.dueSoon  > 0 && <span style={{ color:"#1565c0" }}>{s.dueSoon} due soon</span>}
                  {s.overdue === 0 && s.dueSoon === 0 && <span style={{ color:"#2e7d32" }}>✓ caught up</span>}
                </div>
                <div style={{ fontSize:10, color:"#999", marginTop:2 }}>{s.areas.join(", ")}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{ background:"white", borderRadius:14, padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>
          {filter === "active" && counts.total > 0 ? "✅ All caught up — nothing overdue or due this week." : "No tasks match this filter."}
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {filtered.map(t => {
            const planRange = t.planStart === t.planEnd ? fmtDate(t.planStart) : `${fmtDate(t.planStart)} → ${fmtDate(t.planEnd)}`;
            return (
              <div key={`${t.area}-${t.id}`} style={{
                background: "white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)",
                padding:"10px 14px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap",
                borderLeft:`5px solid ${bucketColor(t._bucket)}`
              }}>
                <div style={{ minWidth:80 }}>
                  <span style={{ fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:4, background: bucketColor(t._bucket) + "22", color: bucketColor(t._bucket), letterSpacing:".05em" }}>
                    {bucketLabel(t._bucket)}
                  </span>
                </div>
                <div style={{ flex:1, minWidth:180 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:"#222", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                    {t.awd && <span title="AWD" style={{ fontSize:13 }}>💧</span>}
                    {t.activity}
                    <span style={{ fontSize:10, color:"#999", fontWeight:500 }}>#{t.id}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#888", marginTop:2 }}>
                    {t.area} · {t.phase} · <span style={{ color: t._bucket === "overdue" ? "#c62828" : "#666" }}>{planRange}</span>
                  </div>
                  {t.inputs && t.inputs.length > 0 && (
                    <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:4 }}>
                      {t.inputs.map((inp, i) => (
                        <span key={i} style={{ background:"#e3f2fd", color:"#1565c0", padding:"1px 6px", borderRadius:4, fontSize:10 }}>
                          {inp.item} {inp.amount ? formatInputAmount(inp.amount, inp.item) : ""}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ display:"inline-flex", gap:4 }}>
                  <button onClick={() => quickStatus(t, "Completed")} disabled={t.status === "Completed" || t.status === "Done"} title="Done" style={{
                    background: (t.status === "Completed" || t.status === "Done") ? "#a5d6a7" : "#2e7d32",
                    color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700,
                    cursor: (t.status === "Completed" || t.status === "Done") ? "default" : "pointer",
                  }}>✓</button>
                  <button onClick={() => quickStatus(t, "Not Done")} disabled={t.status === "Not Done"} title="Not Done" style={{
                    background: t.status === "Not Done" ? "#ef9a9a" : "#c62828",

// ============================================================
// useAuth — login session against the Worker
// ============================================================
// Stores { token, user } in localStorage under abundance-farm-auth-v1.
// On mount, validates the session against /api/me. Exposes login / logout / register / changePassword.
function useAuth() {
  const STORAGE_KEY = 'abundance-farm-auth-v1';
  const [authState, setAuthState] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.token && parsed.user) return { token: parsed.token, user: parsed.user };
      }
    } catch(e) {}
    return { token: null, user: null };
  });
  // phase: loading | ready | error
  const [phase, setPhase] = useState('loading');
  // null = unknown, true/false once /api/me resolves. Replaces an older
  // `userCount` integer (which leaked the total user count to anonymous
  // requests). All the frontend ever cares about is the boolean.
  const [needsBootstrap, setNeedsBootstrap] = useState(null);
  const [error, setError] = useState(null);

  const persist = useCallback((next) => {
    try {
      if (next && next.token && next.user) localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      else localStorage.removeItem(STORAGE_KEY);
    } catch(e) {}
    setAuthState(next || { token: null, user: null });
  }, []);

  const checkMe = useCallback(async () => {
    setPhase('loading');
    try {
      const headers = {};
      if (authState.token) headers['Authorization'] = 'Bearer ' + authState.token;
      const res = await fetch('/api/me', { headers, cache: 'no-cache' });
      const ct = res.headers.get('content-type') || '';
      if (!res.ok || !ct.includes('json')) throw new Error('Worker not reachable (HTTP ' + res.status + ')');
      const j = await res.json();
      if (j.user) {
        persist({ token: authState.token, user: j.user });
        setNeedsBootstrap(false);
      } else {
        // Token rejected or none; remember whether any users exist (bootstrap hint)
        if (authState.token) persist(null);
        // Accept new boolean shape or fall back to legacy userCount===0 if old worker.
        setNeedsBootstrap(typeof j.needsBootstrap === 'boolean' ? j.needsBootstrap : (j.userCount === 0));
      }
      setPhase('ready');
      setError(null);
    } catch(err) {
      setPhase('error');
      setError(err.message || String(err));
    }
  }, [authState.token, persist]);

  // Validate on mount + whenever the token changes
  useEffect(() => { checkMe(); /* eslint-disable-next-line */ }, []);

  const login = useCallback(async (email, password) => {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || 'Login failed');
    persist({ token: j.token, user: j.user });
    setNeedsBootstrap(false);
    setPhase('ready');
    return j.user;
  }, [persist]);

  const logout = useCallback(async () => {
    try {
      if (authState.token) {
        await fetch('/api/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authState.token },
        });
      }
    } catch(e) {}
    persist(null);
    // After logout, ask the server if there are still any users
    try {
      const r = await fetch('/api/me'); const j = await r.json().catch(() => ({}));
      setNeedsBootstrap(typeof j.needsBootstrap === 'boolean' ? j.needsBootstrap : (j.userCount === 0));
    } catch(e) {}
  }, [authState.token, persist]);

  const bootstrapFirstOwner = useCallback(async ({ email, name, password, adminSecret }) => {
    const res = await fetch('/api/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': adminSecret },
      body: JSON.stringify({ email, name, password, role: 'owner' }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || 'Could not create first owner');
    // Then immediately log in
    return login(email, password);
  }, [login]);

  const changePassword = useCallback(async (currentPassword, newPassword) => {
    if (!authState.token) throw new Error('Not signed in');
    const res = await fetch('/api/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authState.token },
      body: JSON.stringify({ currentPassword, newPassword }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || 'Password change failed');
    return true;
  }, [authState.token]);

  // Helper: fetch with our token (for downstream hooks)
  const authedFetch = useCallback((url, opts = {}) => {
    const headers = Object.assign({}, opts.headers || {});
    if (authState.token) headers['Authorization'] = 'Bearer ' + authState.token;
    return fetch(url, { ...opts, headers });
  }, [authState.token]);

  return {
    user: authState.user,
    token: authState.token,
    phase,
    error,
    needsBootstrap,
    // Legacy alias — some downstream consumers still test `userCount === 0`.
    userCount: needsBootstrap === true ? 0 : (needsBootstrap === false ? 1 : null),
    login,
    logout,
    bootstrapFirstOwner,
    changePassword,
    authedFetch,
    refresh: checkMe,
  };
}
