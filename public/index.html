// LoginScreen — shown when not authenticated
// ============================================================
// ============================================================
// OpsProvider + useSyncedState — server-synced operational data
// ============================================================
// Single 'ops' KV blob on the Worker holds areas, harvest logs, equipment,
// breeds, accounting, etc. Each component still uses [value, setValue] like
// useState; writes are debounced and batched into a single PATCH per cycle.
// On first load the existing localStorage values get uploaded so nothing is
// lost during migration.
const SYNCED_KEYS = [
  'rfops-areas', 'rfops-taskMeta', 'rfops-purchases', 'rfops-usages',
  'rfops-breeds', 'rfops-customTasks', 'rfops-inventoryItems',
  'rfops-harvestLogs', 'rfops-laborLogs', 'rfops-cashAdvances',
  'rfops-equipment', 'rfops-maintenanceLogs', 'rfops-fuelLogs',
  'rfops-toolInventory', 'rfops-electricityBills', 'abundance-farm-tasks',
  'rfops-supervisors',
  'rfops-sprayLogs',
  'rfops-diagnoses',
  'rfops-openingCash',          // { amount, asOf, note }
  'rfops-recurringObligations', // [{ id, name, monthlyAmount, dayOfMonth, startDate, endDate, notes }]
  'rfops-cashflowSettings',     // { yieldFactor, dailyWage, horizonWeeks }
  'rfops-forecastOverrides',    // { priceSeasonality{rice[12], corn[12]}, baselineRice, baselineCorn, inputCosts{[item]: ₱/kg}, laborWorkerDays{[pattern]: days/ha}, yieldByArea{[areaId]: t/ha} }
];
const OpsContext = React.createContext(null);

function OpsProvider({ auth, children }) {
  // Seed from localStorage so the UI never flashes empty on first paint.
  const [ops, setOps] = useState(() => {
    const seed = {};
    for (const k of SYNCED_KEYS) {
      try {
        const raw = localStorage.getItem(k);
        if (raw != null) seed[k] = JSON.parse(raw);
      } catch (e) {}
    }
    return seed;
  });
  // phase: loading | ok | offline ; pending: bool ; lastSync: ms
  const [status, setStatus] = useState({ phase: 'loading', lastSync: null, error: null, pending: false, savingFor: 0 });
  const pendingRef = React.useRef({});
  const flushTimerRef = React.useRef(null);

  const flush = useCallback(async () => {
    const patch = pendingRef.current;
    if (!patch || Object.keys(patch).length === 0) {
      setStatus(s => ({ ...s, pending: false }));
      return;
    }
    pendingRef.current = {};
    try {
      const res = await auth.authedFetch('/api/ops', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setStatus(s => ({ ...s, phase: 'ok', lastSync: Date.now(), error: null, pending: Object.keys(pendingRef.current).length > 0 }));
    } catch (err) {
      // Re-queue
      Object.assign(pendingRef.current, patch);
      setStatus(s => ({ ...s, phase: 'offline', error: err.message || String(err), pending: true }));
    }
  }, [auth]);

  const update = useCallback((key, value) => {
    setOps(prev => ({ ...prev, [key]: value }));
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    pendingRef.current[key] = value;
    setStatus(s => ({ ...s, pending: true }));
    clearTimeout(flushTimerRef.current);
    flushTimerRef.current = setTimeout(flush, 1500);
  }, [flush]);

  // Initial fetch from server + first-run migration of any local-only data.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await auth.authedFetch('/api/ops');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const j = await res.json();
        const serverOps = (j && j.ops && typeof j.ops === 'object') ? j.ops : {};
        if (cancelled) return;

        const merged = {};
        const migration = {};
        for (const key of SYNCED_KEYS) {
          if (serverOps[key] !== undefined) {
            merged[key] = serverOps[key];
            try { localStorage.setItem(key, JSON.stringify(serverOps[key])); } catch (e) {}
          } else {
            // Server has nothing for this key — promote any local value.
            try {
              const raw = localStorage.getItem(key);
              if (raw != null) {
                const parsed = JSON.parse(raw);
                merged[key] = parsed;
                migration[key] = parsed;
              }
            } catch (e) {}
          }
        }
        setOps(merged);
        if (j && j.updatedAt) lastServerUpdatedAt.current = j.updatedAt;
        setStatus({ phase: 'ok', lastSync: Date.now(), error: null, pending: false, savingFor: 0 });
        if (Object.keys(migration).length > 0) {
          // Push the migration up. Don't wait.
          pendingRef.current = { ...pendingRef.current, ...migration };
          flush();
        }
      } catch (err) {
        if (!cancelled) setStatus(s => ({ ...s, phase: 'offline', error: err.message || String(err) }));
      }
    })();
    return () => { cancelled = true; };
  }, [auth, flush]);

  // Flush on tab close / before navigating away
  useEffect(() => {
    const onUnload = () => {
      if (Object.keys(pendingRef.current).length > 0) {
        // Best-effort sync flush via sendBeacon — survives unload
        try {
          const blob = new Blob([JSON.stringify(pendingRef.current)], { type: 'application/json' });
          // sendBeacon doesn't accept custom headers, so the Worker accepts the auth via query param fallback.
          // For now we just try a regular fetch with keepalive.
          if (auth.token) {
            fetch('/api/ops', {
              method: 'PATCH',
              keepalive: true,
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + auth.token },
              body: JSON.stringify(pendingRef.current),
            });
          }
        } catch (e) {}
      }
    };
    window.addEventListener('beforeunload', onUnload);
    return () => window.removeEventListener('beforeunload', onUnload);
  }, [auth]);

  // ---- Periodic cross-device pull ----
  // Every 30s (and whenever the tab regains focus) re-fetch /api/ops and pull
  // down any newer data. We compare the server's `updatedAt` against our
  // last-known sync time. If we have local writes pending we skip — they'll
  // flush first; if they conflict, last write to /api/ops wins (PATCH-level).
  const lastServerUpdatedAt = React.useRef(null);
  useEffect(() => {
    if (!auth || !auth.token) return;
    let cancelled = false;
    let timer = null;

    const pullIfNewer = async () => {
      if (cancelled) return;
      if (Object.keys(pendingRef.current).length > 0) return; // local writes will land first
      if (document.visibilityState === 'hidden') return;       // don't poll a hidden tab
      try {
        const res = await auth.authedFetch('/api/ops');
        if (!res.ok) return;
        const j = await res.json();
        const serverUpdatedAt = j && j.updatedAt;
        if (!serverUpdatedAt) return;
        if (lastServerUpdatedAt.current && serverUpdatedAt <= lastServerUpdatedAt.current) return;
        lastServerUpdatedAt.current = serverUpdatedAt;
        const serverOps = (j.ops && typeof j.ops === 'object') ? j.ops : {};
        const next = {};
        for (const key of SYNCED_KEYS) {
          if (serverOps[key] !== undefined) {
            next[key] = serverOps[key];
            try { localStorage.setItem(key, JSON.stringify(serverOps[key])); } catch (e) {}
          }
        }
        if (Object.keys(next).length > 0) {
          setOps(prev => ({ ...prev, ...next }));
          setStatus(s => ({ ...s, phase: 'ok', lastSync: Date.now(), error: null }));
        }
      } catch (e) { /* offline; the next tick will try again */ }
    };

    const schedule = () => { clearTimeout(timer); timer = setTimeout(tick, 30000); };
    const tick = async () => { await pullIfNewer(); if (!cancelled) schedule(); };
    schedule();
    const onVisible = () => { if (document.visibilityState === 'visible') pullIfNewer(); };
    document.addEventListener('visibilitychange', onVisible);
    return () => { cancelled = true; clearTimeout(timer); document.removeEventListener('visibilitychange', onVisible); };
  }, [auth]);

  return React.createElement(OpsContext.Provider, { value: { ops, status, update, flush } }, children);
}

function useSyncedState(key, defaultValue) {
  const ctx = React.useContext(OpsContext);
  // Defensive fallback — if used outside the provider, behave like usePersistedState.
  if (!ctx) return usePersistedState(key, defaultValue);
  const value = ctx.ops[key] !== undefined
    ? ctx.ops[key]
    : (typeof defaultValue === 'function' ? defaultValue() : defaultValue);
  // Live ref so multiple setValue calls within the same event handler see
  // each other's updates instead of all reading the stale render-time value.
  // Without this, chained updates like setBreed + setMaturity in a dropdown
  // onChange will have the second call overwrite the first.
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const setValue = useCallback((next) => {
    const base = valueRef.current;
    const resolved = typeof next === 'function' ? next(base) : next;
    valueRef.current = resolved;     // optimistic — subsequent calls in this tick see it
    ctx.update(key, resolved);
  }, [ctx, key]);
  return [value, setValue];
}

function useOpsStatus() {
  const ctx = React.useContext(OpsContext);
  return ctx ? ctx.status : { phase: 'idle', pending: false, lastSync: null, error: null };
}

function LoginScreen({ auth }) {
  const [mode, setMode] = useState(auth.userCount === 0 ? 'bootstrap' : 'login');
  // Switch modes if userCount changes after mount (e.g. after first /api/me)
  useEffect(() => { if (auth.userCount === 0) setMode('bootstrap'); }, [auth.userCount]);

  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [adminSecret, setAdminSecret] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const submit = async (e) => {
    e && e.preventDefault();
    setBusy(true); setErr(null);
    try {
      if (mode === 'bootstrap') {
        await auth.bootstrapFirstOwner({ email, name: name || 'Owner', password, adminSecret });
      } else {
        await auth.login(email, password);
      }
    } catch(error) {
      setErr(error.message || String(error));
    } finally {
      setBusy(false);
    }
  };

  const card = {
    background: 'white', borderRadius: T.radiusLg || 12, padding: 24, boxShadow: '0 4px 20px rgba(0,0,0,0.08)',
    maxWidth: 380, width: '90%', boxSizing: 'border-box', fontFamily: T.fontBody,
  };
  const input = { width:'100%', padding:'10px 12px', borderRadius:T.radiusSm, border:`1px solid ${T.line}`, fontSize:14, marginBottom:10, boxSizing:'border-box', fontFamily: T.fontBody };
  const button = { width:'100%', padding:'12px 14px', background:T.rice, color:'white', border:'none', borderRadius:T.radiusSm, fontWeight:600, fontSize:14, cursor: busy ? 'wait' : 'pointer', fontFamily: T.fontBody };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background: T.bg || '#f5f0e6', padding: 16 }}>
      <div style={card}>
        <div style={{ fontFamily:T.fontDisplay, fontSize:22, fontWeight:500, letterSpacing:'-0.02em', marginBottom:4 }}>Abundance Farm</div>
        <div style={{ fontSize:11, color:T.inkMute, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:18 }}>
          {mode === 'bootstrap' ? 'First-time setup · create the Owner account' : 'Sign in to continue'}
        </div>
        {auth.phase === 'error' && (
          <div style={{ background: T.dangerSoft || '#fde8e8', color:T.danger, padding:'8px 10px', borderRadius:T.radiusSm, fontSize:12, marginBottom:10 }}>
            Can't reach the Worker: {auth.error}
          </div>
        )}
        <form onSubmit={submit}>
          <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={input} autoComplete="username" required />
          {mode === 'bootstrap' && (
            <input type="text" placeholder="Display name (optional)" value={name} onChange={e=>setName(e.target.value)} style={input} autoComplete="name" />
          )}
          <input type="password" placeholder={mode === 'bootstrap' ? 'Choose a password (min 8 chars)' : 'Password'} value={password} onChange={e=>setPassword(e.target.value)} style={input} autoComplete={mode === 'bootstrap' ? 'new-password' : 'current-password'} required />
          {mode === 'bootstrap' && (
            <>
              <input type="password" placeholder="Worker ADMIN_SECRET (one-time)" value={adminSecret} onChange={e=>setAdminSecret(e.target.value)} style={input} autoComplete="off" required />
              <div style={{ fontSize:11, color:T.inkMute, marginBottom:10, lineHeight:1.4 }}>
                The very first user becomes the Owner. After this, only the Owner can create more users.
              </div>
            </>
          )}
          {err && <div style={{ background: T.dangerSoft || '#fde8e8', color:T.danger, padding:'8px 10px', borderRadius:T.radiusSm, fontSize:12, marginBottom:10 }}>{err}</div>}
          <button type="submit" disabled={busy} style={button}>
            {busy ? 'Working…' : (mode === 'bootstrap' ? 'Create Owner & sign in' : 'Sign in')}
          </button>
        </form>
        {auth.userCount === 0 && mode === 'login' && (
          <div style={{ marginTop:12, fontSize:12, color:T.inkSoft, textAlign:'center' }}>
            No users yet — <button onClick={() => setMode('bootstrap')} style={{ background:'none', border:'none', color:T.rice, fontWeight:600, cursor:'pointer', padding:0, fontSize:12 }}>set up the first Owner</button>.
          </div>
        )}
        {mode === 'bootstrap' && auth.userCount !== 0 && (
          <div style={{ marginTop:12, fontSize:12, color:T.inkSoft, textAlign:'center' }}>
            Already have an account? <button onClick={() => setMode('login')} style={{ background:'none', border:'none', color:T.rice, fontWeight:600, cursor:'pointer', padding:0, fontSize:12 }}>Sign in</button>.
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const auth = useAuth();
  const mobile = useIsMobile();
  // While we're checking the existing session, show nothing (the splash is already on screen).
  if (auth.phase === 'loading') return null;
  if (!auth.user) return <LoginScreen auth={auth} />;
  return (
    <OpsProvider auth={auth}>
      <AppShell auth={auth} mobile={mobile} />
    </OpsProvider>
  );
}

function AppShell({ auth, mobile }) {
  const [tab, setTab] = usePersistedState("rfops-tab", "today");
  const [usersOpen, setUsersOpen] = useState(false);
  const [pwOpen, setPwOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [acctOpenSignal, setAcctOpenSignal] = useState(0);

  // Global keyboard shortcuts
  useEffect(() => {
    let prefix = null;       // for "g then a" combos
    let prefixTimer = null;
    const isTyping = (el) => {
      if (!el) return false;
      const tag = (el.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
      if (el.isContentEditable) return true;
      return false;
    };
    const onKey = (e) => {
      if (isTyping(e.target)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      // ? -> help
      if (e.key === '?') { setHelpOpen(true); e.preventDefault(); return; }
      // / -> focus the first input on the page
      if (e.key === '/') {
        const first = document.querySelector('input:not([type=hidden]), textarea');
        if (first) { first.focus(); e.preventDefault(); }
        return;
      }
      // 1..9 -> jump to tab
      if (/^[1-9]$/.test(e.key)) {
        const idx = parseInt(e.key, 10) - 1;
        if (TABS[idx]) { setTab(TABS[idx].key); return; }
      }
      // g then a -> open account menu
      if (prefix === 'g' && e.key === 'a') {
        setAcctOpenSignal(n => n + 1);
        prefix = null;
        return;
      }
      if (e.key === 'g') {
        prefix = 'g';
        clearTimeout(prefixTimer);
        prefixTimer = setTimeout(() => { prefix = null; }, 800);
      } else {
        prefix = null;
      }
    };
    window.addEventListener('keydown', onKey);
    return () => { window.removeEventListener('keydown', onKey); clearTimeout(prefixTimer); };
  }, [setTab]);
  // Operations state — all persisted to localStorage
  // Server-synced operational data (via OpsProvider). Same [value, setValue] interface
  // as before; updates are batched and PATCH'd to /api/ops with 1.5s debounce.
  const [areas, setAreas] = useSyncedState("rfops-areas", DEFAULT_AREAS);
  const [taskMeta, setTaskMeta] = useSyncedState("rfops-taskMeta", {});
  const [purchases, setPurchases] = useSyncedState("rfops-purchases", []);
  const [usages, setUsages] = useSyncedState("rfops-usages", []);
  const [breeds, setBreeds] = useSyncedState("rfops-breeds", DEFAULT_BREEDS);
  const [customTasks, setCustomTasks] = useSyncedState("rfops-customTasks", {});
  const [inventoryItems, setInventoryItems] = useSyncedState("rfops-inventoryItems", DEFAULT_INVENTORY_ITEMS);
  const [harvestLogs, setHarvestLogs] = useSyncedState("rfops-harvestLogs", []);
  const [laborLogs, setLaborLogs] = useSyncedState("rfops-laborLogs", []);
  const [cashAdvances, setCashAdvances] = useSyncedState("rfops-cashAdvances", []);
  const [equipment, setEquipment] = useSyncedState("rfops-equipment", []);
  const [maintenanceLogs, setMaintenanceLogs] = useSyncedState("rfops-maintenanceLogs", []);
  const [fuelLogs, setFuelLogs] = useSyncedState("rfops-fuelLogs", []);
  const [toolInventory, setToolInventory] = useSyncedState("rfops-toolInventory", []);
  const [electricityBills, setElectricityBills] = useSyncedState("rfops-electricityBills", []);
  const [supervisors, setSupervisors] = useSyncedState("rfops-supervisors", []);
  const [sprayLogs, setSprayLogs] = useSyncedState("rfops-sprayLogs", []);
  const [diagnoses, setDiagnoses] = useSyncedState("rfops-diagnoses", []);
  const [openingCash, setOpeningCash] = useSyncedState("rfops-openingCash", { amount: 0, asOf: today, note: "" });
  const [recurringObligations, setRecurringObligations] = useSyncedState("rfops-recurringObligations", []);
  const [cashflowSettings, setCashflowSettings] = useSyncedState("rfops-cashflowSettings", {
    yieldFactor: 0.85,   // confidence haircut on breed.yield (kg/ha)
    dailyWage: 500,      // ₱/day per worker
    horizonWeeks: 13,    // ~90 days
  });
  const [forecastOverrides, setForecastOverrides] = useSyncedState("rfops-forecastOverrides", {
    priceSeasonality: { rice: null, corn: null }, // null = use defaults
    baselineRice: null,                            // override ₱/kg for current rice price baseline
    baselineCorn: null,
    inputCosts: {},                                // { "14-14-14": 32, ... } — override predicted ₱/kg
    laborWorkerDays: {},                           // { transplant: 8, harvest: 6, ... } days/ha
    yieldByArea: {},                               // { areaId: t/ha override }
  });
  // Manually-entered current fertilizer prices. Shape:
  //   { "14-14-14": { pricePerBag: 1850, pricePerKg: 37, dateUpdated: "2026-05-25", source: "manual", notes: "..." } }
  // Either pricePerBag or pricePerKg is enough — the schedule compute and
  // substitute calculator normalise to ₱/kg. These feed the *-alt-fert
  // protocols (cheapest N source picker) and the inline calculator pricing.
  const [fertilizerPrices, setFertilizerPrices] = useSyncedState("rfops-fertilizerPrices", {});
  // Append-only price history. Shape:
  //   { "14-14-14": [{ date: "2026-05-25", pricePerBag: 1850 }, { date: "2026-05-12", pricePerBag: 1820 }, ...] }
  // Sorted newest-first. Last 12 entries kept per item (~3 months at weekly cadence).
  // Auto-appended whenever the user edits a price.
  const [fertilizerPriceHistory, setFertilizerPriceHistory] = useSyncedState("rfops-fertilizerPriceHistory", {});

  // Abundance Farm state — also server-synced
  const [taskState, setTaskState] = useSyncedState("abundance-farm-tasks", {});
  const weather = useWeather();
  // Maps config — fetched once. When googleMapsApiKey is set, the Map sub-tab
  // uses Google Maps; otherwise the Leaflet fallback renders.
  const [mapsConfig, setMapsConfig] = useState(null);
  useEffect(() => {
    if (!auth || !auth.token) return;
    fetch('/api/maps-config', { headers: { 'Authorization': 'Bearer ' + auth.token } })
      .then(r => r.ok ? r.json() : null)
      .then(j => setMapsConfig(j))
      .catch(() => setMapsConfig({}));
  }, [auth && auth.token]);   // eslint-disable-line react-hooks/exhaustive-deps
  const monthIdx = new Date().getMonth();
  const toggleAbTask = (mi, ti) => setTaskState(s => ({ ...s, [`${mi}-${ti}`]: !s[`${mi}-${ti}`] }));
  const resetAbMonth = (mi) => {
    if (!confirm('Clear all checkboxes for this month?')) return;
    setTaskState(s => {
      const next = { ...s };
      (MONTHLY_TASKS[mi]||[]).forEach((_, i) => { delete next[`${mi}-${i}`]; });
      return next;
    });
  };

  // Compute schedules for all named areas.
  // Protocol selection map (see ProtocolDropdown for the matching UI list):
  //   default            → rice, standard 5-stage NPK
  //   kadanny            → rice, Ka Danny Bolos
  //   rice-alt-fert      → rice, price-optimised fertilizer substitutions
  //   corn-standard      → corn, standard PH hybrid corn (basal + 2 side-dress)
  //   corn-alt-fert      → corn, price-optimised fertilizer substitutions
  // Manual price map is read from fertilizerPrices state (defaults to {} if
  // no prices have been entered).
  const fertPricesPerKg = useMemo(() => {
    const out = {};
    Object.entries(fertilizerPrices || {}).forEach(([item, rec]) => {
      if (rec && rec.pricePerKg != null && rec.pricePerKg !== '') {
        const v = Number(rec.pricePerKg);
        if (!isNaN(v) && v > 0) out[item] = v;
      } else if (rec && rec.pricePerBag != null && rec.pricePerBag !== '') {
        const v = Number(rec.pricePerBag) / 50;
        if (!isNaN(v) && v > 0) out[item] = v;
      }
    });
    return out;
  }, [fertilizerPrices]);

  const schedules = useMemo(() => {
    const out = {};
    areas.forEach(a => {
      if (a.name && a.transplantDate && a.maturity && a.ha) {
        const proto = a.protocol || 'default';
        let sched;
        if (proto === 'corn-standard') {
          sched = computeCornStandardSchedule(a.ha, a.transplantDate, a.maturity, a.plantingMethod);
        } else if (proto === 'corn-alt-fert') {
          sched = computeCornAltFertSchedule(a.ha, a.transplantDate, a.maturity, a.plantingMethod, fertPricesPerKg);
        } else if (proto === 'rice-alt-fert') {
          sched = computeRiceAltFertSchedule(a.ha, a.transplantDate, a.maturity, a.plantingMethod, fertPricesPerKg);
        } else if (proto === 'kadanny') {
          sched = computeKaDannyBolosSchedule(a.ha, a.transplantDate, a.maturity, a.plantingMethod);
        } else {
          sched = computeSchedule(a.ha, a.transplantDate, a.maturity, a.plantingMethod);
        }
        // Apply per-task manual overrides (dates / item-qty swaps / hide) from
        // taskMeta. This runs after the protocol compute so overrides win.
        // The taskMeta key format is `${areaName}-${id}` where id is always
        // a number (or a number prefixed by 'c' for custom). To avoid the
        // prefix-collision bug (area "Plot" picking up "Plot-2-305" keys),
        // we validate the sliced tail is a clean numeric id and skip anything
        // that contains another dash.
        const overridesForArea = {};
        Object.entries(taskMeta || {}).forEach(([k, v]) => {
          if (!k.startsWith(`${a.name}-`)) return;
          const tid = k.slice(a.name.length + 1);
          // Skip keys whose tail contains a dash (e.g. "2-305") — they belong
          // to an area whose name happens to have us as a prefix.
          if (tid.includes('-')) return;
          overridesForArea[tid] = v;
        });
        sched.tasks = sched.tasks
          .filter(t => !(overridesForArea[t.id] && overridesForArea[t.id]._protocolHidden))
          .map(t => {
            const ov = overridesForArea[t.id];
            if (!ov) return t;
            const next = { ...t };
            if (ov._overrideStart) next.planStart = ov._overrideStart;
            if (ov._overrideEnd)   next.planEnd   = ov._overrideEnd;
            if (Array.isArray(ov._overrideInputs) && ov._overrideInputs.length) {
              next.inputs = ov._overrideInputs;
              next._inputsOverridden = true;
            }
            return next;
          });
        out[a.id] = sched;
      }
    });
    return out;
  }, [areas, fertPricesPerKg, taskMeta]);

  // Flatten all tasks across areas (protocol + custom)
  const allTasks = useMemo(() => {
    const tasks = [];
    areas.forEach(a => {
      const sched = schedules[a.id];
      if (sched) {
        sched.tasks.forEach(t => {
          const meta = taskMeta[`${a.name}-${t.id}`] || {};
          tasks.push({ ...t, area: a.name, status: meta.status || "Not Started", ...meta });
        });
      }
      // Include custom tasks for this area
      const ct = customTasks[a.name] || [];
      ct.forEach(t => {
        const meta = taskMeta[`${a.name}-${t.id}`] || {};
        tasks.push({ ...t, area: a.name, status: meta.status || t.status || "Not Started", ...meta });
      });
    });
    return tasks;
  }, [areas, schedules, taskMeta, customTasks]);

  // Desktop notification preferences (used by the effect below; taskAlerts is
  // computed first so the effect's deps don't hit the temporal dead zone).
  const [notifPref, setNotifPref] = usePersistedState("rfops-notif-pref", { enabled: false, threshold: 1 });
  const lastNotifiedRef = React.useRef({ count: 0, dayKey: "" });

  // Task alerts: count overdue + due-soon across all areas (excludes completed/skipped/cancelled)
  const taskAlerts = useMemo(() => {
    const now = new Date().toISOString().slice(0, 10);
    const weekAhead = new Date(); weekAhead.setDate(weekAhead.getDate() + 7);
    const soon = weekAhead.toISOString().slice(0, 10);
    const isDone = (s) => s === "Completed" || s === "Done" || s === "Skipped" || s === "Not Done" || s === "Cancelled";
    const overdue = allTasks.filter(t => t.phase !== "Growth Stage" && !isDone(t.status) && (t.planEnd || t.planStart) < now);
    const dueSoon = allTasks.filter(t => t.phase !== "Growth Stage" && !isDone(t.status) && (t.planStart >= now) && (t.planStart <= soon));
    const inProgress = allTasks.filter(t => t.status === "In Progress");
    return { overdue, dueSoon, inProgress, total: overdue.length + dueSoon.length };
  }, [allTasks]);

  // Auto-fire desktop notification when overdue count rises past threshold.
  // Throttled: only re-notifies on a new day or when count INCREASES.
  useEffect(() => {
    if (!notifPref.enabled) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const dayKey = new Date().toISOString().slice(0, 10);
    const count = taskAlerts.overdue.length;
    const crossed = count >= (notifPref.threshold || 1);
    const isFreshDay = lastNotifiedRef.current.dayKey !== dayKey;
    const countWentUp = count > lastNotifiedRef.current.count;
    if (crossed && (isFreshDay || countWentUp)) {
      try {
        new Notification("Abundance Farm — tasks need attention", {
          body: `${count} overdue task${count === 1 ? "" : "s"} across your areas. Open the Tasks tab.`,
          tag: "abundance-overdue",
        });
        lastNotifiedRef.current = { count, dayKey };
      } catch (e) { /* notification can throw if focus is wrong, ignore */ }
    } else if (count < lastNotifiedRef.current.count) {
      lastNotifiedRef.current = { ...lastNotifiedRef.current, count };
    }
  }, [notifPref, taskAlerts.overdue.length]);

  // Weather alerts: compute critical alerts and fire one desktop
  // notification per alert per day (deduped by key+date in localStorage).
  const wxAlertsTop = useMemo(() => computeWeatherAlerts(weather?.data, areas), [weather?.data, areas]);
  useEffect(() => {
    if (!notifPref.enabled) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const dayKey = new Date().toISOString().slice(0, 10);
    let fired;
    try { fired = JSON.parse(localStorage.getItem("abundance-farm-wx-fired") || "{}"); } catch (e) { fired = {}; }
    const critical = wxAlertsTop.filter(a => a.severity === "critical");
    let changed = false;
    critical.forEach(a => {
      const stamp = `${a.key}-${dayKey}`;
      if (fired[stamp]) return;
      try {
        new Notification(`${a.icon} ${a.title}`, {
          body: a.message,
          tag: `abundance-wx-${a.key}`,
        });
        fired[stamp] = 1;
        changed = true;
      } catch (e) { /* ignore */ }
    });
    if (changed) {
      try { localStorage.setItem("abundance-farm-wx-fired", JSON.stringify(fired)); } catch (e) {}
    }
  }, [notifPref.enabled, wxAlertsTop]);

  // Inventory monitoring: compute stock on-hand and compare to upcoming task needs
  const inventoryAlerts = useMemo(() => {
    // 1. Compute current on-hand per item (purchases − manual usage − task-driven consumption)
    //    All values normalised to canonical units (kg for ferts, L for FAA) so
    //    bag-purchases (1 bag = 50 kg) line up with task consumption.
    const toCanonical = (qty, unit, item) => {
      const u = (unit || '').toLowerCase();
      if (u === 'bags' || u === 'bag') return qty * 50;
      if (u === 'ml' && item === 'FAA') return qty / 1000;
      return qty;
    };
    const onHand = {};
    purchases.forEach(p => {
      if (!onHand[p.item]) onHand[p.item] = 0;
      onHand[p.item] += toCanonical(p.qty, p.unit, p.item);
    });
    usages.forEach(u => {
      if (!onHand[u.item]) onHand[u.item] = 0;
      onHand[u.item] -= toCanonical(u.qty, u.unit, u.item);
    });
    // Auto-deduct based on completed tasks (already in canonical units)
    buildConsumptionsFromTasks(allTasks).forEach(c => {
      if (!onHand[c.item]) onHand[c.item] = 0;
      onHand[c.item] -= c.qty;
    });

    // 2. Compute total needed per item across all areas (full protocol)
    const totalNeeded = {};
    areas.forEach(a => {
      const sched = schedules[a.id];
      if (!sched) return;
      const q = sched.quantities;
      const add = (item, qty) => { if (!totalNeeded[item]) totalNeeded[item] = 0; totalNeeded[item] += qty; };
      add("14-14-14", q.basalSeedbedKg + (parseFloat(q.basalFieldBags) || 0) * 50);
      add("46-0-0", q.urea_N1K1 + q.urea_N2K2 + q.urea_N3K3);
      add("0-0-60", q.mop_N1K1 + q.mop_N2K2 + q.mop_N3K3 + q.mop_K);
      add("21-0-0", q.fert2100Kg);
      add("FAA", q.totalFAA_L / 1000); // convert mL to L
    });

    // 3. Compute already-applied per item from completed tasks
    //    (mirrors buildConsumptionsFromTasks logic — prefers actualInput override)
    const applied = {};
    buildConsumptionsFromTasks(allTasks).forEach(c => {
      if (!applied[c.item]) applied[c.item] = 0;
      applied[c.item] += c.qty;
    });

    // 4. Remaining needed = total - applied
    const remaining = {};
    Object.keys(totalNeeded).forEach(item => {
      remaining[item] = Math.max(0, (totalNeeded[item] || 0) - (applied[item] || 0));
    });

    // 5. Upcoming tasks with inputs (next 14 days)
    const twoWeeks = addDays(today, 14);
    const upcomingNeeds = [];
    allTasks.filter(t =>
      t.status !== "Completed" && t.status !== "Cancelled" &&
      t.inputs && t.inputs.length > 0 &&
      t.planStart >= today && t.planStart <= twoWeeks
    ).sort((a,b) => a.planStart.localeCompare(b.planStart)).forEach(t => {
      t.inputs.forEach(inp => {
        if (!inp.amount) return;
        const num = parseFloat(inp.amount) || 0;
        const amt = (inp.amount || "").toLowerCase();
        let qty = num;
        let unit = "kg";
        if (amt.includes("bag")) { qty = num * 50; unit = "kg"; }
        // FAA: amount may be "4600 mL" or "4.6 L" — normalize to L.
        // Check "ml" before "l": "ml".includes("l") is true (the L in mL),
        // which is why the previous check spuriously treated mL as L (1000× off).
        if (inp.item === "FAA") { unit = "L"; qty = amt.includes("ml") ? num / 1000 : num; }
        const stock = onHand[inp.item] || 0;
        const sufficient = stock >= qty;
        upcomingNeeds.push({
          area: t.area, taskName: t.activity, date: t.planStart,
          item: inp.item, qty, unit, stock, sufficient,
          deficit: sufficient ? 0 : qty - stock,
        });
      });
    });

    // 6. Items where remaining > on-hand (overall shortage)
    const shortages = [];
    Object.keys(remaining).forEach(item => {
      const stock = onHand[item] || 0;
      const need = remaining[item];
      if (need > 0 && stock < need) {
        shortages.push({
          item, stock, needed: need, deficit: need - stock,
          unit: item === "FAA" ? "L" : "kg",
        });
      }
    });

    return { onHand, totalNeeded, applied, remaining, upcomingNeeds, shortages };
  }, [allTasks, areas, schedules, purchases, usages]);

  const riskLevel = RISK_LEVELS[monthIdx];
  const todayDate = new Date().toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric' });

  return (
    <div style={{ minHeight:"100vh", background: T.bg, color: T.ink, fontFamily: T.fontBody, maxWidth:"100vw", overflowX:"hidden", boxSizing:"border-box", paddingBottom: mobile ? 80 : 0 }}>
      <AbundanceGlobalStyles />

      {/* Header — Abundance Farm brand */}
      <header style={{
        position:"sticky", top:0, zIndex:50,
        // padding-top adds env(safe-area-inset-top) so the title clears the
        // iOS Dynamic Island / notch / status bar (viewport-fit=cover is set
        // on the viewport meta, which enables the inset).
        padding: mobile
          ? "calc(14px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px)) 12px calc(16px + env(safe-area-inset-left, 0px))"
          : "calc(18px + env(safe-area-inset-top, 0px)) calc(28px + env(safe-area-inset-right, 0px)) 14px calc(28px + env(safe-area-inset-left, 0px))",
        background: T.bg, borderBottom:`1px solid ${T.line}`
      }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap: 12 }}>
          <div>
            <div style={{ fontFamily: T.fontDisplay, fontWeight: 600, fontSize: mobile ? 20 : 24, letterSpacing:"-0.01em", color: T.ink, lineHeight: 1 }}>
              Abundance <span style={{ color: T.corn, fontStyle:"italic" }}>Farm</span>
            </div>
            <div style={{ fontFamily: T.fontBody, fontSize: 10, color: T.inkMute, letterSpacing: "0.12em", textTransform:"uppercase", marginTop: 4 }}>
              MAK-CT · Rice & Corn Operations · {todayDate}
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            {!mobile && <RiskPill level={riskLevel} />}
            <AccountMenu
              auth={auth}
              compact={mobile}
              openSignal={acctOpenSignal}
              onOpenUsers={() => setUsersOpen(true)}
              onChangePassword={() => setPwOpen(true)}
            />
          </div>
        </div>
      </header>

      <AppModal open={usersOpen} title="Users" onClose={() => setUsersOpen(false)} maxWidth={620}>
        {auth.user.role === 'owner'
          ? <UsersAdmin auth={auth} />
          : <div style={{ fontSize:13, color:T.inkSoft }}>Only Owners can manage users.</div>}
      </AppModal>

      <AppModal open={pwOpen} title="Change password" onClose={() => setPwOpen(false)} maxWidth={420}>
        <ChangePasswordForm auth={auth} onDone={() => setPwOpen(false)} />
      </AppModal>

      <HelpOverlay open={helpOpen} onClose={() => setHelpOpen(false)} tabs={TABS} />

      {/* Desktop: Top nav — horizontally scrollable */}
      {!mobile && (
        <nav className="ab-scroll" style={{ display:"flex", background: T.bgElev, borderBottom:`1px solid ${T.line}`, padding:"0 12px", overflowX:"auto", gap: 2 }}>
          {TABS.map(t => {
            const badge =
              t.key === "inventory" ? inventoryAlerts.shortages.length :
              t.key === "dashboard" ? inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length :
              t.key === "tasks"     ? (taskAlerts.overdue.length + taskAlerts.dueSoon.length) :
              // Badge on Areas counts areas with at least one overdue task, not
              // raw overdue-task count — the previous label was misleading
              // (e.g. "Areas 5" with only 2 areas registered).
              t.key === "areas"     ? new Set(taskAlerts.overdue.map(t => t.area)).size :
              0;
            const active = tab === t.key;
            const accent = t.group === "abundance" ? T.rice : T.corn;
            return (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                padding:"14px 16px", background:"none", border:"none",
                borderBottom: active ? `3px solid ${accent}` : "3px solid transparent",
                color: active ? accent : T.inkSoft,
                fontFamily: T.fontBody, fontWeight: active ? 700 : 500, fontSize: 13,
                cursor:"pointer", display:"flex", alignItems:"center", gap: 6,
                whiteSpace:"nowrap", position:"relative", letterSpacing:"0.02em"
              }}>
                <span style={{ fontSize: 15 }}>{t.icon}</span>{t.label}
                {badge > 0 && <span style={{ background: T.danger, color:"white", borderRadius: 10, padding:"1px 6px", fontSize: 9, fontWeight: 700, marginLeft: 4, lineHeight: "14px" }}>{badge}</span>}
              </button>
            );
          })}
        </nav>
      )}

      {/* Mobile: Horizontal-scrollable bottom nav */}
      {mobile && (
        <nav className="ab-scroll" style={{
          position:"fixed", bottom: 0, left: 0, right: 0, zIndex: 999,
          display:"flex", overflowX:"auto",
          background: T.bgCard, borderTop: `1px solid ${T.line}`,
          boxShadow: "0 -2px 10px rgba(31,45,30,0.06)",
          // iOS safe-area: bottom for home-indicator (already present), left/right for landscape side-notches.
          padding: "6px calc(8px + env(safe-area-inset-right, 0px)) calc(6px + env(safe-area-inset-bottom, 0px)) calc(8px + env(safe-area-inset-left, 0px))",
          gap: 2
        }}>
          {TABS.map(t => {
            const active = tab === t.key;
            const badge =
              t.key === "inventory" ? inventoryAlerts.shortages.length :
              t.key === "dashboard" ? inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length :
              t.key === "tasks"     ? (taskAlerts.overdue.length + taskAlerts.dueSoon.length) :
              // Areas badge = areas-with-overdue-tasks, not raw overdue-task count.
              t.key === "areas"     ? new Set(taskAlerts.overdue.map(t => t.area)).size :
              0;
            const accent = t.group === "abundance" ? T.rice : T.corn;
            return (
              <button key={t.key} onClick={() => { setTab(t.key); window.scrollTo(0,0); }} style={{
                flex:"0 0 auto", minWidth: 68,
                display:"flex", flexDirection:"column", alignItems:"center", gap: 2,
                background: active ? T.bgElev : "none", border: "none", padding: "8px 10px",
                borderRadius: T.radiusSm, position: "relative",
                color: active ? accent : T.inkMute, cursor:"pointer",
                fontFamily: T.fontBody
              }}>
                <span style={{ fontSize: 18, lineHeight: 1, position:"relative" }}>
                  {t.icon}
                  {badge > 0 && <span style={{ position:"absolute", top:-4, right:-8, background: T.danger, color:"white", borderRadius: 8, padding:"0 4px", fontSize: 8, fontWeight: 700, lineHeight: "14px", minWidth: 14, textAlign:"center" }}>{badge}</span>}
                </span>
                <span style={{ fontSize: 9, fontWeight: active ? 700 : 500, letterSpacing: "0.05em" }}>{t.label}</span>
                {active && <div style={{ width: 20, height: 2, borderRadius: 1, background: accent, marginTop: 1 }} />}
              </button>
            );
          })}
        </nav>
      )}

      <main style={{ maxWidth: 960, margin:"0 auto", padding: mobile ? "8px 16px 32px" : "12px 24px 40px", boxSizing:"border-box", overflowX:"hidden" }}>
        {tab === "today" && <TodayView monthIdx={monthIdx} weather={weather} taskState={taskState} toggleTask={toggleAbTask} areas={areas} inventoryAlerts={inventoryAlerts} allTasks={allTasks} />}
        {tab === "calendar" && <CalendarView monthIdx={monthIdx} />}
        {tab === "dashboard" && <Dashboard tasks={allTasks} areas={areas} schedules={schedules} purchases={purchases} harvestLogs={harvestLogs} laborLogs={laborLogs} inventoryAlerts={inventoryAlerts} supervisors={supervisors} />}
        {tab === "areas" && <AreasManager areas={areas} setAreas={setAreas} schedules={schedules} breeds={breeds} taskMeta={taskMeta} setTaskMeta={setTaskMeta} customTasks={customTasks} setCustomTasks={setCustomTasks} harvestLogs={harvestLogs} setHarvestLogs={setHarvestLogs} laborLogs={laborLogs} setLaborLogs={setLaborLogs} purchases={purchases} cashAdvances={cashAdvances} setCashAdvances={setCashAdvances} equipment={equipment} fuelLogs={fuelLogs} setFuelLogs={setFuelLogs} auth={auth} supervisors={supervisors} setSupervisors={setSupervisors} sprayLogs={sprayLogs} setSprayLogs={setSprayLogs} diagnoses={diagnoses} setDiagnoses={setDiagnoses} mapsConfig={mapsConfig} fertilizerPrices={fertilizerPrices} setFertilizerPrices={setFertilizerPrices} />}
        {tab === "cropguide" && <CropsView />}
        {tab === "prices" && <PricesView monthIdx={monthIdx} purchases={purchases} auth={auth} />}
        {tab === "weather" && <WeatherView weather={weather} monthIdx={monthIdx} />}
        {tab === "tips"  && <TasksView monthIdx={monthIdx} taskState={taskState} toggleTask={toggleAbTask} resetMonth={resetAbMonth} />}
        {tab === "tasks" && <ActiveTasksView allTasks={allTasks} taskMeta={taskMeta} setTaskMeta={setTaskMeta} areas={areas} setTab={setTab} supervisors={supervisors} notifPref={notifPref} setNotifPref={setNotifPref} />}
        {tab === "accounting" && <AccountingTab areas={areas} schedules={schedules} allTasks={allTasks} purchases={purchases} usages={usages} harvestLogs={harvestLogs} laborLogs={laborLogs} cashAdvances={cashAdvances} maintenanceLogs={maintenanceLogs} fuelLogs={fuelLogs} electricityBills={electricityBills} setElectricityBills={setElectricityBills} supervisors={supervisors} />}
        {tab === "cashflow" && <CashflowTab
          openingCash={openingCash} setOpeningCash={setOpeningCash}
          recurringObligations={recurringObligations} setRecurringObligations={setRecurringObligations}
          cashflowSettings={cashflowSettings} setCashflowSettings={setCashflowSettings}
          forecastOverrides={forecastOverrides}
          purchases={purchases} laborLogs={laborLogs} harvestLogs={harvestLogs}
          cashAdvances={cashAdvances} fuelLogs={fuelLogs} maintenanceLogs={maintenanceLogs} electricityBills={electricityBills}
          areas={areas} schedules={schedules} breeds={breeds} allTasks={allTasks}
        />}
        {tab === "forecasts" && <ForecastsTab
          forecastOverrides={forecastOverrides} setForecastOverrides={setForecastOverrides}
          purchases={purchases} harvestLogs={harvestLogs}
          areas={areas} schedules={schedules} breeds={breeds}
        />}
        {tab === "advisor" && <AdvisorTab
          purchases={purchases} harvestLogs={harvestLogs} laborLogs={laborLogs} cashAdvances={cashAdvances} fuelLogs={fuelLogs} maintenanceLogs={maintenanceLogs} electricityBills={electricityBills}
          areas={areas} schedules={schedules} breeds={breeds} allTasks={allTasks} supervisors={supervisors} diagnoses={diagnoses} inventoryAlerts={inventoryAlerts}
          openingCash={openingCash} recurringObligations={recurringObligations} cashflowSettings={cashflowSettings} forecastOverrides={forecastOverrides}
        />}
        {tab === "equipment" && <EquipmentTab equipment={equipment} setEquipment={setEquipment} maintenanceLogs={maintenanceLogs} setMaintenanceLogs={setMaintenanceLogs} fuelLogs={fuelLogs} setFuelLogs={setFuelLogs} toolInventory={toolInventory} setToolInventory={setToolInventory} />}
        {tab === "inventory" && <InventoryTracker
          purchases={purchases} setPurchases={setPurchases}
          usages={usages} setUsages={setUsages}
          areas={areas} allTasks={allTasks}
          inventoryItems={inventoryItems} setInventoryItems={setInventoryItems}
          fertilizerPrices={fertilizerPrices} setFertilizerPrices={setFertilizerPrices}
          fertilizerPriceHistory={fertilizerPriceHistory} setFertilizerPriceHistory={setFertilizerPriceHistory}
          /* Threading every setter through so the Demo Data panel at the bottom
             of the Inventory tab can populate (and wipe) all synced state. */
          demoStateBag={{
            purchases, setPurchases, usages, setUsages,
            areas, setAreas, supervisors, setSupervisors, harvestLogs, setHarvestLogs,
            laborLogs, setLaborLogs, cashAdvances, setCashAdvances,
            equipment, setEquipment, fuelLogs, setFuelLogs,
            maintenanceLogs, setMaintenanceLogs, electricityBills, setElectricityBills,
            sprayLogs, setSprayLogs, diagnoses, setDiagnoses,
            fertilizerPrices, setFertilizerPrices,
            fertilizerPriceHistory, setFertilizerPriceHistory,
            /* priceLog is server-backed via /api/log, not synced state — skip it */
            recurringObligations, setRecurringObligations,
            customTasks, setCustomTasks, taskMeta, setTaskMeta,
            toolInventory, setToolInventory,
          }}
        />}
        {tab === "breeds" && <BreedManager breeds={breeds} setBreeds={setBreeds} />}
      </main>
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
setTimeout(() => { const s = document.getElementById('splash'); if (s) s.classList.add('hide'); }, 50);

</script>

</body>
</html>
