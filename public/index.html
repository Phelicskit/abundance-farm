                    {pesoPerKgNutrient != null
                      ? `₱${pesoPerKgNutrient.toFixed(2)}/kg-${domLabel}`
                      : dominant > 0 ? '—' : 'n/a'}
                  </td>
                  <td style={{ padding:"8px" }}>
                    {(() => {
                      const hist = (fertilizerPriceHistory || {})[item] || [];
                      if (hist.length < 2) return <span style={{ fontSize:10, color:"#bbb" }}>—</span>;
                      const newest = hist[0].pricePerBag;
                      const oldest = hist[hist.length - 1].pricePerBag;
                      const delta = newest - oldest;
                      const pct = oldest > 0 ? (delta / oldest * 100) : 0;
                      return (
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <PriceSparkline history={hist} />
                          <span title={`${hist.length} entries, oldest ${hist[hist.length-1].date}`} style={{ fontSize:10, color: delta > 0 ? "#c62828" : delta < 0 ? "#2e7d32" : "#888", fontWeight:700 }}>
                            {delta > 0 ? '↑' : delta < 0 ? '↓' : '→'} {Math.abs(pct).toFixed(0)}%
                          </span>
                        </div>
                      );
                    })()}
                  </td>
                  <td style={{ padding:"8px", color:"#888", fontSize:11 }}>{rec.dateUpdated || '—'}</td>
                  <td style={{ padding:"8px", color:"#888", fontSize:11 }}>{rec.source || (rec.pricePerBag ? 'manual' : '—')}</td>
                  <td style={{ padding:"8px", fontSize:11 }}>
                    {lp ? (
                      <button onClick={() => useLastPurchase(item)} title={`Copy ₱${Math.round(lp.pricePerBag)}/bag from ${lp.date}${lp.supplier ? ' · ' + lp.supplier : ''}`} style={{ background:"#e8f5e9", color:"#2e7d32", border:"1px solid #c8e6c9", borderRadius:6, padding:"4px 8px", fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
                        📥 ₱{Math.round(lp.pricePerBag)}
                      </button>
                    ) : <span style={{ color:"#ccc" }}>no record</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {/* Ranking preview: show cheapest N source across the table */}
      {(() => {
        const nProducts = ['46-0-0','21-0-0','25-0-0']
          .map(item => {
            const rec = (fertilizerPrices || {})[item];
            const ppk = rec?.pricePerKg ?? (rec?.pricePerBag ? rec.pricePerBag / 50 : null);
            if (ppk == null) return null;
            const pct = FERT_PCT[item];
            return { item, perKgN: ppk / (pct.N / 100), perKg: ppk };
          })
          .filter(Boolean)
          .sort((a, b) => a.perKgN - b.perKgN);
        if (nProducts.length === 0) {
          return (
            <div style={{ background:"#e3f2fd", borderRadius:8, padding:"10px 14px", fontSize:11, color:"#0d47a1" }}>
              Enter prices for at least one of 46-0-0 / 21-0-0 / 25-0-0 to enable price-driven N-source optimisation in the Alt-Fertilizer protocols.
            </div>
          );
        }
        const best = nProducts[0];
        return (
          <div style={{ background:"#e8f5e9", borderLeft:"4px solid #2e7d32", borderRadius:8, padding:"10px 14px", fontSize:12, color:"#1b5e20" }}>
            <strong>✓ Cheapest N source right now: {best.item}</strong> at ₱{best.perKgN.toFixed(2)}/kg-N. The Alt-Fertilizer protocols will use this product anywhere the default schedule called for urea (46-0-0).
            {nProducts.length > 1 && (
              <div style={{ fontSize:11, color:"#555", marginTop:4 }}>
                Ranking: {nProducts.map(n => `${n.item} ₱${n.perKgN.toFixed(2)}/kgN`).join(' · ')}
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ============================================================
// UPCOMING FERTILIZER NEEDS (14-day batch buy list)
// ============================================================
// Walks every active area's task list, finds fertilizer tasks scheduled
// within the next 14 days, and groups by product so the owner sees one
// consolidated "buy this much before next Friday" list. Cross-references
// current stock + price to estimate what's still needed and the ₱ cost.
function UpcomingFertilizerNeeds({ areas, allTasks, stockMap, fertilizerPrices, mobile }) {
  const today = new Date().toISOString().slice(0, 10);
  const fortnight = new Date(); fortnight.setDate(fortnight.getDate() + 14);
  const cutoff = fortnight.toISOString().slice(0, 10);

  // Build a list of (item, kg, area, task, date) rows
  const needs = useMemo(() => {
    const rows = [];
    (allTasks || []).forEach(t => {
      if (!Array.isArray(t.inputs)) return;
      const d = t.planStart || t.planEnd;
      if (!d || d < today || d > cutoff) return;
      if (t.status === 'Completed' || t.status === 'Done' || t.status === 'Skipped' || t.status === 'Cancelled') return;
      t.inputs.forEach(inp => {
        if (!inp.item || inp.item === 'Seed' || inp.item === 'Herbicide' || inp.item === 'Fungicide') return;
        const kg = parseAmountToKg(inp.amount);
        if (kg <= 0) return;
        rows.push({ item: inp.item, kg, area: t.area, task: t.activity, date: d });
      });
    });
    return rows;
  }, [allTasks, today, cutoff]);

  if (needs.length === 0) {
    return null; // Don't render if nothing upcoming
  }

  // Group by item
  const byItem = {};
  needs.forEach(r => {
    if (!byItem[r.item]) byItem[r.item] = { totalKg: 0, areas: new Set(), events: [] };
    byItem[r.item].totalKg += r.kg;
    byItem[r.item].areas.add(r.area);
    byItem[r.item].events.push(r);
  });

  const priceFor = (item) => {
    const rec = (fertilizerPrices || {})[item];
    if (!rec) return null;
    const v = rec.pricePerKg != null ? Number(rec.pricePerKg)
            : rec.pricePerBag != null ? Number(rec.pricePerBag) / 50 : null;
    return (v != null && !isNaN(v) && v > 0) ? v : null;
  };

  const rows = Object.entries(byItem).map(([item, v]) => {
    const onHand = (stockMap[item]?.purchased || 0) - (stockMap[item]?.manualUsed || 0) - (stockMap[item]?.taskUsed || 0);
    const shortKg = Math.max(0, v.totalKg - Math.max(0, onHand));
    const ppk = priceFor(item);
    const purchaseCost = ppk != null ? shortKg * ppk : null;
    return { item, ...v, onHand: Math.max(0, onHand), shortKg, ppk, purchaseCost };
  }).sort((a, b) => b.totalKg - a.totalKg);

  const totalPurchaseCost = rows.reduce((s, r) => s + (r.purchaseCost || 0), 0);
  const anyPriced = rows.some(r => r.ppk != null);

  return (
    <div style={{ background:"linear-gradient(135deg,#e8f5e9,#fff8e1)", borderRadius:14, padding: mobile ? 14 : 18, borderLeft:"4px solid #2e7d32" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10, gap:8, flexWrap:"wrap" }}>
        <div style={{ fontWeight:800, fontSize:14, color:"#1b5e20" }}>🛒 Next 14 days · consolidated fertilizer shopping list</div>
        {anyPriced && totalPurchaseCost > 0 && (
          <div style={{ fontSize:13, fontWeight:800, color:"#1b5e20" }}>
            Need to buy: ₱{Math.round(totalPurchaseCost).toLocaleString()}
          </div>
        )}
      </div>
      <div style={{ fontSize:11, color:"#555", marginBottom:10 }}>
        Groups scheduled fertilizer tasks across all your active areas so you can buy in one trip. Existing on-hand stock is subtracted from the total needed.
      </div>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize: mobile ? 11 : 12 }}>
        <thead><tr style={{ background:"rgba(255,255,255,0.6)" }}>
          {["Product","Total needed","On hand","Need to buy","₱ to buy","Areas","First due"].map(h => (
            <th key={h} style={{ padding:"7px 8px", textAlign:"left", fontWeight:700, color:"#1b5e20", borderBottom:"1px solid #c8e6c9", fontSize:11 }}>{h}</th>
          ))}
        </tr></thead>
        <tbody>{rows.map(r => {
          const firstDue = [...r.events].sort((a, b) => a.date.localeCompare(b.date))[0]?.date;
          return (
            <tr key={r.item} style={{ borderBottom:"1px solid rgba(0,0,0,0.05)", background: r.shortKg > 0 ? "rgba(255,224,178,0.3)" : "transparent" }}>
              <td style={{ padding:"6px 8px", fontWeight:700, color:"#5d4037" }}>{r.item}</td>
              <td style={{ padding:"6px 8px" }}>{Math.round(r.totalKg)} kg <span style={{ color:"#888", fontSize:10 }}>({(r.totalKg/50).toFixed(1)} bags)</span></td>
              <td style={{ padding:"6px 8px", color: r.onHand >= r.totalKg ? "#2e7d32" : r.onHand > 0 ? "#ef6c00" : "#c62828" }}>{Math.round(r.onHand)} kg</td>
              <td style={{ padding:"6px 8px", fontWeight:800, color: r.shortKg > 0 ? "#c62828" : "#2e7d32" }}>
                {r.shortKg > 0 ? `${Math.round(r.shortKg)} kg (${Math.ceil(r.shortKg/50)} bags)` : "—"}
              </td>
              <td style={{ padding:"6px 8px", fontWeight:700, color:"#1b5e20" }}>
                {r.purchaseCost != null ? `₱${Math.round(r.purchaseCost).toLocaleString()}` : <span style={{ color:"#bbb", fontWeight:400 }}>no price</span>}
              </td>
              <td style={{ padding:"6px 8px", fontSize:11, color:"#555" }}>{[...r.areas].join(', ')}</td>
              <td style={{ padding:"6px 8px", fontSize:11, color:"#888" }}>{firstDue ? fmtDate(firstDue).replace(/, \d{4}$/, "") : "—"}</td>
            </tr>
          );
        })}</tbody>
      </table>
      {!anyPriced && (
        <div style={{ fontSize:10, color:"#888", marginTop:8 }}>
          Add fertilizer prices under the <strong>Fert Prices</strong> sub-tab to see ₱ totals.
        </div>
      )}
    </div>
  );
}

// ============================================================
// DEMO DATA PANEL — collapsed at the bottom of the Inventory tab
// ============================================================
// Lets the user load ~6 years of simulated farm operations to stress-test
// every part of the app (Dashboard advisors, Cashflow, Accounting, Tasks,
// NPK Tracker, etc.) without entering anything by hand. All demo records
// carry _demo:true so the "Delete" button can wipe them cleanly without
// touching real data.
function DemoDataPanel({ bag, mobile }) {
  const [busy, setBusy] = useState(false);
  const [open, setOpen] = useState(false);

  // Count demo records across current state. Re-renders whenever the
  // underlying state changes.
  const demoCount = useMemo(() => {
    const state = {};
    Object.entries(bag || {}).forEach(([k, v]) => {
      if (typeof v !== 'function') state[k] = v;
    });
    return countDemoRecords(state);
  }, [bag]);

  // Mapping from `generateDemoData()` keys → setter names in `bag`.
  const keyToSetter = {
    areas: 'setAreas', supervisors: 'setSupervisors', harvestLogs: 'setHarvestLogs',
    purchases: 'setPurchases', laborLogs: 'setLaborLogs', cashAdvances: 'setCashAdvances',
    equipment: 'setEquipment', fuelLogs: 'setFuelLogs', maintenanceLogs: 'setMaintenanceLogs',
    electricityBills: 'setElectricityBills', sprayLogs: 'setSprayLogs', diagnoses: 'setDiagnoses',
    fertilizerPrices: 'setFertilizerPrices', fertilizerPriceHistory: 'setFertilizerPriceHistory',
    recurringObligations: 'setRecurringObligations',
    customTasks: 'setCustomTasks', taskMeta: 'setTaskMeta',
    toolInventory: 'setToolInventory', usages: 'setUsages',
  };

  const loadDemo = async () => {
    if (!confirm('Load ~6 years of demo data?\n\nThis will ADD demo records alongside your existing real data. Every demo record is tagged with _demo:true so you can delete them later without touching real entries.\n\nProceed?')) return;
    setBusy(true);
    const data = generateDemoData({ today: new Date(), yearsBack: 6 });
    let added = 0;
    Object.entries(data).forEach(([key, value]) => {
      const setterName = keyToSetter[key];
      if (!setterName || !bag[setterName]) return;
      const setter = bag[setterName];
      if (Array.isArray(value)) {
        setter(prev => {
          const existingIds = new Set((prev || []).map(x => x && x.id));
          const newOnes = value.filter(v => v && !existingIds.has(v.id));
          added += newOnes.length;
          return [...(prev || []), ...newOnes];
        });
      } else if (value && typeof value === 'object') {
        // Object/dict shape (fertilizerPrices, fertilizerPriceHistory, customTasks, taskMeta)
        setter(prev => {
          const next = { ...(prev || {}) };
          Object.entries(value).forEach(([k, v]) => {
            // For customTasks / fertilizerPriceHistory: merge arrays
            if (Array.isArray(v)) {
              const existing = next[k] || [];
              const existingIds = new Set(existing.map(x => x && x.id));
              const newOnes = v.filter(x => x && !existingIds.has(x.id));
              added += newOnes.length;
              next[k] = [...existing, ...newOnes];
            } else {
              // For fertilizerPrices: only add if no real entry exists
              if (next[k] && !next[k]._demo) return; // preserve real data
              next[k] = v;
              if (v && v._demo) added += 1;
            }
          });
          return next;
        });
      }
    });
    setTimeout(() => {
      setBusy(false);
      alert(`✓ Demo data loaded — ${added} records added across ${Object.keys(data).length} categories.\n\nOpen Dashboard, Areas, Cashflow, Accounting, etc. to see all functions populated.\n\nTo remove later, use the Delete button on this panel.`);
    }, 200);
  };

  const deleteDemo = async () => {
    if (!confirm(`Delete ALL demo data (${demoCount} records)?\n\nThis only removes records tagged with _demo:true — your real data is untouched.\n\nProceed?`)) return;
    setBusy(true);
    Object.values(keyToSetter).forEach(setterName => {
      const setter = bag[setterName];
      if (!setter) return;
      setter(prev => {
        if (Array.isArray(prev)) return prev.filter(x => !(x && x._demo));
        if (prev && typeof prev === 'object') {
          const next = {};
          Object.entries(prev).forEach(([k, v]) => {
            if (Array.isArray(v)) {
              const filtered = v.filter(x => !(x && x._demo));
              if (filtered.length > 0) next[k] = filtered;
              // else drop empty key
            } else if (v && typeof v === 'object' && v._demo) {
              // drop this dict entry
            } else {
              next[k] = v;
            }
          });
          return next;
        }
        return prev;
      });
    });
    setTimeout(() => {
      setBusy(false);
      alert(`✓ Demo data deleted. Your real data is untouched.`);
    }, 200);
  };

  return (
    <div style={{ marginTop:16, background:"#f5f5f5", borderRadius:12, padding: mobile ? "10px 12px" : "12px 16px", border:"1px dashed #bdbdbd" }}>
      <div onClick={() => setOpen(!open)} style={{ cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <span style={{ fontWeight:700, fontSize:13, color:"#555" }}>
          {open ? "▾" : "▸"} 🧪 Demo / Sample Data
          {demoCount > 0 && (
            <span style={{ marginLeft:8, background:"#fff8e1", color:"#bf360c", padding:"2px 8px", borderRadius:10, fontSize:11, fontWeight:700 }}>
              {demoCount.toLocaleString()} demo records loaded
            </span>
          )}
        </span>
        <span style={{ fontSize:10, color:"#999" }}>For stress-testing — safe to leave or remove</span>
      </div>
      {open && (
        <div style={{ marginTop:10, fontSize:12, color:"#555", lineHeight:1.5 }}>
          <p style={{ margin:"4px 0 10px" }}>
            Load <strong>6 years of simulated farm operations</strong> to stress-test every tab without entering data by hand. Generates 5 areas (4 rice + 1 corn), ~60 harvests, ~200 purchases, ~150 labor logs, fertilizer price history, diagnoses, supervisors, equipment + fuel + maintenance, electricity bills, custom tasks, and more.
          </p>
          <p style={{ margin:"4px 0 10px" }}>
            Every demo record is tagged with <code style={{ background:"#fff", padding:"1px 4px", borderRadius:3, fontSize:11 }}>_demo: true</code> and named with a <code style={{ background:"#fff", padding:"1px 4px", borderRadius:3, fontSize:11 }}>[DEMO]</code> prefix. The <strong>Delete</strong> button removes only those, leaving your real data alone.
          </p>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:12 }}>
            <button onClick={loadDemo} disabled={busy} style={{ padding:"10px 18px", borderRadius:8, border:"none", background: busy ? "#bbb" : "#2e7d32", color:"white", fontSize:13, fontWeight:700, cursor: busy ? "wait" : "pointer" }}>
              {busy ? "⏳ Working…" : "📥 Load 6 years of demo data"}
            </button>
            <button onClick={deleteDemo} disabled={busy || demoCount === 0} style={{ padding:"10px 18px", borderRadius:8, border: "1px solid " + (demoCount === 0 ? "#ddd" : "#ffcdd2"), background:"white", color: demoCount === 0 ? "#bbb" : "#c62828", fontSize:13, fontWeight:700, cursor: busy || demoCount === 0 ? "not-allowed" : "pointer" }}>
              🗑 Delete all demo data {demoCount > 0 && `(${demoCount})`}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function InventoryTracker({ purchases, setPurchases, usages, setUsages, areas, allTasks, inventoryItems, setInventoryItems, fertilizerPrices, setFertilizerPrices, fertilizerPriceHistory, setFertilizerPriceHistory, demoStateBag }) {
  const mobile = useIsMobile();
  const [showAddPurchase, setShowAddPurchase] = useState(false);
  const [showAddUsage, setShowAddUsage] = useState(false);
  // Multi-line receipt: shared date/supplier/receipt + N line items.
  // Most agri-supply trips buy several inputs at once on one OR.
  const blankLine = () => ({ item: inventoryItems[0] || "", brand: "", qty: "", unit: "bags", unitCost: "", itemPhoto: null });
  const blankReceipt = () => ({ date: today, supplier: "", receipt: "", receiptPhoto: null, items: [blankLine()] });
  const [newReceipt, setNewReceipt] = useState(blankReceipt);
  const [viewingPhoto, setViewingPhoto] = useState(null);
  const [newUsage, setNewUsage] = useState({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", area: "", task: "", notes: "" });
  const [viewTab, setViewTab] = useState("stock");
  const [showManageItems, setShowManageItems] = useState(false);
  const [newItemName, setNewItemName] = useState("");

  const areaNames = areas.filter(a => a.name).map(a => a.name);
  const taskNames = allTasks.filter(t => t.phase !== "Growth Stage").map(t => t.activity);
  const uniqueTaskNames = [...new Set(taskNames)];

  // Compute stock levels per item. All quantities normalised to the canonical
  // unit (kg for fertilizers/seed/chemicals, L for FAA) so that:
  //   • bag-purchases (1 bag = 50 kg) line up with task consumption (in kg)
  //   • avgCost is always per-kg (or per-L for FAA) regardless of how the
  //     purchase was entered
  // Inventory is consumed in TWO ways:
  //   (a) manual Usage log entries (legacy / ad-hoc)
  //   (b) protocol tasks marked Completed — buildConsumptionsFromTasks
  //       pulls planned + override qty straight from area task data.
  const normalizeToCanonical = (qty, unit, item) => {
    // unit is what the user entered for this purchase/usage row
    const u = (unit || '').toLowerCase();
    if (u === 'bags' || u === 'bag') return qty * 50;        // 1 bag = 50 kg
    if (u === 'ml' && item === 'FAA') return qty / 1000;     // mL → L for FAA
    return qty;                                              // kg, L, pcs, lot pass through
  };
  const canonicalUnit = (item) => item === 'FAA' ? 'L' : 'kg';

  const stockMap = useMemo(() => {
    const map = {};
    purchases.forEach(p => {
      const canonQty = normalizeToCanonical(p.qty, p.unit, p.item);
      if (!map[p.item]) map[p.item] = { purchased: 0, manualUsed: 0, taskUsed: 0, totalCost: 0, unit: canonicalUnit(p.item) };
      map[p.item].purchased += canonQty;
      map[p.item].totalCost += p.qty * p.unitCost;           // total ₱ paid (unit-agnostic)
    });
    usages.forEach(u => {
      const canonQty = normalizeToCanonical(u.qty, u.unit, u.item);
      if (!map[u.item]) map[u.item] = { purchased: 0, manualUsed: 0, taskUsed: 0, totalCost: 0, unit: canonicalUnit(u.item) };
      map[u.item].manualUsed += canonQty;
    });
    // Task-driven consumption (already in canonical units via buildConsumptionsFromTasks)
    const taskConsumptions = buildConsumptionsFromTasks(allTasks || []);
    taskConsumptions.forEach(c => {
      if (!map[c.item]) map[c.item] = { purchased: 0, manualUsed: 0, taskUsed: 0, totalCost: 0, unit: canonicalUnit(c.item) };
      map[c.item].taskUsed += c.qty;
    });
    return map;
  }, [purchases, usages, allTasks]);

  const stockList = Object.entries(stockMap).map(([item, v]) => {
    const used = (v.manualUsed || 0) + (v.taskUsed || 0);
    const onHandRaw = v.purchased - used;       // can be negative (shortage)
    return {
      item,
      purchased: v.purchased,
      manualUsed: v.manualUsed,
      taskUsed: v.taskUsed,
      used,
      onHandRaw,
      onHand: Math.max(0, onHandRaw),           // displayed value, never negative
      shortage: onHandRaw < 0 ? -onHandRaw : 0, // by how much we're short
      avgCost: v.purchased > 0 ? v.totalCost / v.purchased : 0,
      totalCost: v.totalCost,
      unit: v.unit,
    };
  });

  const totalValue = stockList.reduce((s, r) => s + (r.onHand * r.avgCost), 0);
  const lowStock = stockList.filter(r => r.onHand > 0 && r.onHand <= r.purchased * 0.2);
  const shortItems = stockList.filter(r => r.shortage > 0);

  const updateLine = (idx, field, value) => {
    setNewReceipt(r => ({ ...r, items: r.items.map((it, i) => i === idx ? { ...it, [field]: value } : it) }));
  };
  const addLine = () => setNewReceipt(r => ({ ...r, items: [...r.items, blankLine()] }));
  const removeLine = (idx) => setNewReceipt(r => r.items.length <= 1 ? r : { ...r, items: r.items.filter((_, i) => i !== idx) });

  const addPurchase = () => {
    // Filter valid lines (qty > 0)
    const valid = newReceipt.items
      .map(it => ({ ...it, qty: Math.max(0, Number(it.qty) || 0), unitCost: Math.max(0, Number(it.unitCost) || 0) }))
      .filter(it => it.qty > 0);
    if (valid.length === 0) { alert("Add at least one item with quantity > 0."); return; }
    // Generate sequential IDs starting from max+1; receiptId groups them
    const baseId = purchases.length > 0 ? Math.max(...purchases.map(p => p.id)) + 1 : 1;
    const receiptId = `R${Date.now()}`;
    const newRows = valid.map((it, i) => ({
      id: baseId + i,
      receiptId,
      date: newReceipt.date,
      supplier: newReceipt.supplier,
      receipt: newReceipt.receipt,
      receiptPhoto: newReceipt.receiptPhoto,
      item: it.item, brand: it.brand, qty: it.qty, unit: it.unit, unitCost: it.unitCost, itemPhoto: it.itemPhoto,
    }));
    setPurchases(prev => [...prev, ...newRows]);
    setNewReceipt(blankReceipt());
    setShowAddPurchase(false);
  };

  const addUsage = () => {
    if (!newUsage.qty || !newUsage.area) return;
    const id = usages.length > 0 ? Math.max(...usages.map(u => u.id)) + 1 : 1;
    setUsages(prev => [...prev, { ...newUsage, id, qty: Number(newUsage.qty) }]);
    setNewUsage({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", area: "", task: "", notes: "" });
    setShowAddUsage(false);
  };

  const removePurchase = (id) => setPurchases(prev => prev.filter(p => p.id !== id));
  const removeUsage = (id) => setUsages(prev => prev.filter(u => u.id !== id));

  const formRow = { display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(140px, 1fr))", gap: mobile ? 8 : 10, marginBottom:10 };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* KPIs */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: mobile ? 8 : 12 }}>
        <KpiCard label="Items in Stock" value={stockList.filter(r => r.onHand > 0).length} icon="📦" color="#1565c0" />
        <KpiCard label="Stock Value" value={totalValue > 0 ? totalValue.toLocaleString(undefined, {maximumFractionDigits:0}) : "---"} icon="💵" color="#2e7d32" />
        <KpiCard label="Purchases" value={purchases.length} icon="🛒" color="#ef6c00" />
        <KpiCard label="Low Stock" value={lowStock.length} icon={lowStock.length > 0 ? "⚠" : "✅"} color={lowStock.length > 0 ? "#d32f2f" : "#2e7d32"} />
      </div>

      {/* Sub-tabs */}
      <div style={{ display:"flex", gap:6, background:"white", borderRadius:14, padding:8, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
        {[["stock","📦 Stock Levels"],["purchases","🛒 Purchases"],["usage","📤 Usage Log"],["fertprices","💰 Fert Prices"]].map(([k,l]) => (
          <button key={k} onClick={() => setViewTab(k)} style={{ padding:"8px 16px", borderRadius:8, border:"none", background: viewTab === k ? "#2e7d32" : "transparent", color: viewTab === k ? "white" : "#666", fontWeight: viewTab === k ? 700 : 500, fontSize:13, cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      {/* STOCK LEVELS */}
      {viewTab === "stock" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {/* Upcoming 14-day fertilizer needs — groups across all areas */}
          <UpcomingFertilizerNeeds areas={areas} allTasks={allTasks} stockMap={stockMap} fertilizerPrices={fertilizerPrices} mobile={mobile} />
          {shortItems.length > 0 && (
            <div style={{ background:"#ffebee", border:"1px solid #ef9a9a", borderLeft:"4px solid #c62828", borderRadius:8, padding:"12px 14px", fontSize:12, color:"#b71c1c", lineHeight:1.5 }}>
              <strong>⚠ Inventory shortage on {shortItems.length} item{shortItems.length === 1 ? '' : 's'}:</strong>{" "}
              {shortItems.map(s => `${s.item} (short ${s.shortage.toLocaleString()} ${s.unit})`).join(" · ")}.
              Completed tasks have consumed more than what's been purchased — record the missing purchases.
            </div>
          )}
          <div style={{ background:"#e3f2fd", borderLeft:"4px solid #1565c0", borderRadius:8, padding:"10px 14px", fontSize:11, color:"#0d47a1", lineHeight:1.5 }}>
            <strong>How stock is computed:</strong> Purchases minus task-driven consumption (auto-deducted when a fertilizer/spray task is marked ✓ Completed in an area) minus any manual Usage entries below. <strong>1 bag = 50 kg</strong> — all quantities normalised to kg (or L for FAA) so bag-purchases and kg-tasks line up correctly. Use manual Usage only for ad-hoc consumption not tied to a task.
          </div>
          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto" }}>
            {stockList.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No inventory yet. Add purchases to get started.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead><tr style={{ background:"#e3f2fd" }}>
                  {["Item","Purchased","Used (tasks)","Used (manual)","On Hand","Unit","Average Cost","Stock Value"].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#1565c0", borderBottom:"2px solid #90caf9", fontSize:11 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{stockList.map(r => (
                  <tr key={r.item} style={{ borderBottom:"1px solid #f5f5f5", background: r.shortage > 0 ? "#ffebee" : r.onHand <= 0 ? "#fff3e0" : r.onHand <= r.purchased * 0.2 ? "#fff8e1" : "white" }}>
                    <td style={{ padding:"8px", fontWeight:700 }}>{r.item}</td>
                    <td style={{ padding:"8px" }}>{r.purchased.toLocaleString()}</td>
                    <td style={{ padding:"8px", color: r.taskUsed > 0 ? "#1565c0" : "#999" }}>{(r.taskUsed || 0).toLocaleString()}</td>
                    <td style={{ padding:"8px", color: r.manualUsed > 0 ? "#7b1fa2" : "#999" }}>{(r.manualUsed || 0).toLocaleString()}</td>
                    <td style={{ padding:"8px", fontWeight:800, color: r.shortage > 0 ? "#d32f2f" : r.onHand <= 0 ? "#d32f2f" : r.onHand <= r.purchased * 0.2 ? "#ef6c00" : "#2e7d32" }}>
                      {r.onHand.toLocaleString()}
                      {r.shortage > 0 && <div style={{ fontSize:10, fontWeight:600, color:"#c62828", marginTop:2 }}>⚠ short by {r.shortage.toLocaleString()} — purchase more</div>}
                    </td>
                    <td style={{ padding:"8px" }}>{r.unit}{r.unit === 'kg' && r.purchased >= 50 && <div style={{ fontSize:10, color:"#999" }}>≈ {(r.onHand / 50).toFixed(1)} bags</div>}</td>
                    <td style={{ padding:"8px" }}>
                      {r.avgCost > 0
                        ? <>₱{r.avgCost.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}/{r.unit}{r.unit === 'kg' && <div style={{ fontSize:10, color:"#999" }}>≈ ₱{(r.avgCost * 50).toLocaleString(undefined, {maximumFractionDigits:0})}/bag</div>}</>
                        : "---"}
                    </td>
                    <td style={{ padding:"8px", fontWeight:700, color:"#2e7d32" }}>{r.onHand > 0 && r.avgCost > 0 ? `₱${(r.onHand * r.avgCost).toLocaleString(undefined, {maximumFractionDigits:0})}` : "---"}</td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>

          {/* Manage Items */}
          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflow:"hidden" }}>
            <div onClick={() => setShowManageItems(!showManageItems)} style={{ padding: mobile ? "10px 14px" : "12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", background:"#fafafa", borderBottom: showManageItems ? "1px solid #e0e0e0" : "none" }}>
              <span style={{ fontWeight:700, fontSize:13, color:"#1565c0" }}>Manage Items ({inventoryItems.length})</span>
              <span style={{ fontSize:16, color:"#ccc", transform: showManageItems ? "rotate(180deg)" : "none", transition:"transform .2s" }}>▼</span>
            </div>
            {showManageItems && (
              <div style={{ padding: mobile ? 12 : 18 }}>
                {/* Add new item */}
                <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"flex-end" }}>
                  <label style={{ ...labelStyle, flex:1 }}>New Item Name
                    <input value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder="e.g. Calcium Carbonate" style={inputStyle} onKeyDown={e => {
                      if (e.key === "Enter" && newItemName.trim() && !inventoryItems.includes(newItemName.trim())) {
                        setInventoryItems(prev => [...prev, newItemName.trim()]);
                        setNewItemName("");
                      }
                    }} />
                  </label>
                  <button onClick={() => {
                    if (newItemName.trim() && !inventoryItems.includes(newItemName.trim())) {
                      setInventoryItems(prev => [...prev, newItemName.trim()]);
                      setNewItemName("");
                    }
                  }} disabled={!newItemName.trim() || inventoryItems.includes(newItemName.trim())} style={{ background: newItemName.trim() && !inventoryItems.includes(newItemName.trim()) ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"9px 18px", fontSize:12, fontWeight:700, cursor: newItemName.trim() ? "pointer" : "not-allowed", whiteSpace:"nowrap", marginBottom:4 }}>+ Add</button>
                </div>
                {inventoryItems.includes(newItemName.trim()) && newItemName.trim() && (
                  <div style={{ fontSize:11, color:"#d32f2f", marginTop:-10, marginBottom:10 }}>Item already exists.</div>
                )}
                {/* Item list */}
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {inventoryItems.map(item => {
                    const hasRecords = purchases.some(p => p.item === item) || usages.some(u => u.item === item);
                    return (
                      <div key={item} style={{ display:"flex", alignItems:"center", gap:4, background: hasRecords ? "#e3f2fd" : "#f5f5f5", borderRadius:8, padding:"5px 10px", fontSize:12, border:"1px solid #e0e0e0" }}>
                        <span style={{ fontWeight:600, color:"#333" }}>{item}</span>
                        <button onClick={() => {
                          if (hasRecords) {
                            if (!confirm(`"${item}" has purchase or usage records. Remove anyway?`)) return;
                          }
                          setInventoryItems(prev => prev.filter(i => i !== item));
                        }} title={hasRecords ? "Has records — click to remove anyway" : "Remove item"} style={{ background:"none", border:"none", color: hasRecords ? "#ef6c00" : "#d32f2f", fontSize:14, cursor:"pointer", padding:"0 2px", lineHeight:1, fontWeight:700 }}>×</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* PURCHASES */}
      {viewTab === "purchases" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => setShowAddPurchase(!showAddPurchase)} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>{showAddPurchase ? "Cancel" : "+ New Purchase"}</button>
          </div>

          {showAddPurchase && (() => {
            const validLines = newReceipt.items.filter(it => Number(it.qty) > 0);
            const grandTotal = validLines.reduce((s, it) => s + (Number(it.qty) * Number(it.unitCost)), 0);
            const totalKg = validLines.reduce((s, it) => {
              const u = (it.unit || '').toLowerCase();
              if (u === 'bag' || u === 'bags') return s + (Number(it.qty) * 50);
              if (u === 'kg') return s + Number(it.qty);
              return s;
            }, 0);
            return (
            <div style={{ background:"#e8f5e9", borderRadius:14, padding: mobile ? 12 : 18 }}>
              <h3 style={{ margin:"0 0 4px", fontSize:14, color:"#2e7d32" }}>Record Purchase Receipt</h3>
              <div style={{ fontSize:11, color:"#558b2f", marginBottom:12 }}>One receipt can hold multiple items from the same trip to the supply store.</div>

              {/* Shared receipt header */}
              <div style={{ background:"white", borderRadius:10, padding:12, marginBottom:12, border:"1px solid #c8e6c9" }}>
                <div style={{ fontSize:10, fontWeight:700, color:"#1b5e20", textTransform:"uppercase", letterSpacing:".06em", marginBottom:8 }}>📅 Receipt info (shared)</div>
                <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
                  <label style={labelStyle}>Date <input type="date" value={newReceipt.date} onChange={e => setNewReceipt(r => ({...r, date: e.target.value}))} style={inputStyle} /></label>
                  <label style={labelStyle}>Supplier <input value={newReceipt.supplier} onChange={e => setNewReceipt(r => ({...r, supplier: e.target.value}))} placeholder="Store name..." style={inputStyle} /></label>
                  <label style={labelStyle}>Receipt / Reference <input value={newReceipt.receipt} onChange={e => setNewReceipt(r => ({...r, receipt: e.target.value}))} placeholder="OR#, receipt..." style={inputStyle} /></label>
                  <div style={{ display:"flex", alignItems:"flex-end" }}>
                    <CameraButton label="Receipt Photo" photo={newReceipt.receiptPhoto} onCapture={data => setNewReceipt(r => ({...r, receiptPhoto: data}))} onClear={() => setNewReceipt(r => ({...r, receiptPhoto: null}))} mobile={mobile} />
                  </div>
                </div>
              </div>

              {/* Line items */}
              <div style={{ fontSize:10, fontWeight:700, color:"#1b5e20", textTransform:"uppercase", letterSpacing:".06em", marginBottom:6 }}>📦 Items ({newReceipt.items.length})</div>
              {newReceipt.items.map((it, idx) => {
                const lineTotal = (Number(it.qty) || 0) * (Number(it.unitCost) || 0);
                const isBag = (it.unit || '').toLowerCase().startsWith('bag');
                const kgEquiv = isBag ? Number(it.qty) * 50 : null;
                return (
                  <div key={idx} style={{ background:"white", borderRadius:10, padding:12, marginBottom:8, border:"1px solid #c8e6c9", position:"relative" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6, gap:8 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:"#2e7d32" }}>Line {idx + 1}</div>
                      {newReceipt.items.length > 1 && (
                        <button onClick={() => removeLine(idx)} style={{ background:"transparent", border:"1px solid #ffcdd2", color:"#c62828", borderRadius:6, padding:"2px 8px", fontSize:11, cursor:"pointer" }} title="Remove this item">✕ Remove</button>
                      )}
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "2fr 1.5fr 1fr 1fr 1fr", gap:10 }}>
                      <label style={labelStyle}>Item <select value={it.item} onChange={e => updateLine(idx, 'item', e.target.value)} style={inputStyle}>{inventoryItems.map(i => <option key={i}>{i}</option>)}</select></label>
                      <label style={labelStyle}>Brand <input value={it.brand} onChange={e => updateLine(idx, 'brand', e.target.value)} placeholder="e.g. Atlas, Soilmate..." style={inputStyle} /></label>
                      <label style={labelStyle}>Quantity <input type="number" min="0" step="0.01" value={it.qty} onChange={e => { const v = e.target.value; updateLine(idx, 'qty', v === "" || Number(v) >= 0 ? v : "0"); }} style={inputStyle} /></label>
                      <label style={labelStyle}>Unit <select value={it.unit} onChange={e => updateLine(idx, 'unit', e.target.value)} style={inputStyle}>{["kg","bags","L","mL","pcs","lot"].map(u => <option key={u}>{u}</option>)}</select></label>
                      <label style={labelStyle}>Unit Cost <input type="number" min="0" step="0.01" value={it.unitCost} onChange={e => { const v = e.target.value; updateLine(idx, 'unitCost', v === "" || Number(v) >= 0 ? v : "0"); }} style={{ ...inputStyle, background:"#fff9c4" }} /></label>
                    </div>
                    {(lineTotal > 0 || it.itemPhoto) && (
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:8, flexWrap:"wrap" }}>
                        {lineTotal > 0 && (
                          <span style={{ fontSize:12, color:"#1b5e20", fontWeight:700 }}>
                            Line total: ₱{lineTotal.toLocaleString(undefined, {maximumFractionDigits:2})}
                            {isBag && <span style={{ fontWeight:500, color:"#666", marginLeft:6 }}>= {kgEquiv.toLocaleString()} kg · ₱{(Number(it.unitCost) / 50).toFixed(2)}/kg</span>}
                          </span>
                        )}
                        <CameraButton label="Item Photo (opt)" photo={it.itemPhoto} onCapture={data => updateLine(idx, 'itemPhoto', data)} onClear={() => updateLine(idx, 'itemPhoto', null)} mobile={mobile} />
                      </div>
                    )}
                  </div>
                );
              })}

              {/* + Add item + grand total */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10, marginTop:10 }}>
                <button onClick={addLine} style={{ background:"white", color:"#2e7d32", border:"2px dashed #2e7d32", borderRadius:8, padding:"8px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>+ Add another item</button>
                {grandTotal > 0 && (
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:11, color:"#558b2f", fontWeight:600 }}>{validLines.length} item{validLines.length === 1 ? '' : 's'} · grand total</div>
                    <div style={{ fontSize:18, fontWeight:800, color:"#1b5e20" }}>₱{grandTotal.toLocaleString(undefined, {maximumFractionDigits:2})}</div>
                    {totalKg > 0 && <div style={{ fontSize:10, color:"#666" }}>≈ {totalKg.toLocaleString()} kg total</div>}
                  </div>
                )}
              </div>

              <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:14, paddingTop:12, borderTop:"1px solid #c8e6c9" }}>
                <button onClick={addPurchase} disabled={validLines.length === 0} style={{ background: validLines.length === 0 ? "#bbb" : "#2e7d32", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: validLines.length === 0 ? "not-allowed" : "pointer" }}>Save Receipt ({validLines.length})</button>
                <button onClick={() => { setNewReceipt(blankReceipt()); setShowAddPurchase(false); }} style={{ background:"transparent", color:"#666", border:"1px solid #ddd", borderRadius:8, padding:"10px 16px", fontSize:13, cursor:"pointer" }}>Cancel</button>
              </div>
            </div>
            );
          })()}

          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            {purchases.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No purchases recorded yet.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth: mobile ? 700 : "auto" }}>
                <thead><tr style={{ background:"#e8f5e9" }}>
                  {["Date","Item","Brand","Qty","Unit","Cost","Total","Supplier","Receipt","Photos",""].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#2e7d32", borderBottom:"2px solid #a5d6a7", fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{[...purchases].reverse().map(p => (
                  <tr key={p.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                    <td style={{ padding:"8px", whiteSpace:"nowrap" }}>{fmtDate(p.date)}</td>
                    <td style={{ padding:"8px", fontWeight:700 }}>{p.item}</td>
                    <td style={{ padding:"8px", color:"#1565c0", fontWeight:600 }}>{p.brand || "---"}</td>
                    <td style={{ padding:"8px" }}>{p.qty.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{p.unit}</td>
                    <td style={{ padding:"8px" }}>{p.unitCost.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td style={{ padding:"8px", fontWeight:700, color:"#2e7d32" }}>{(p.qty * p.unitCost).toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{p.supplier}</td>
                    <td style={{ padding:"8px", color:"#999" }}>{p.receipt}</td>
                    <td style={{ padding:"8px" }}>
                      <div style={{ display:"flex", gap:4 }}>
                        {p.receiptPhoto && (
                          <img src={p.receiptPhoto} alt="Receipt" onClick={() => setViewingPhoto({ src: p.receiptPhoto, label: `Receipt — ${p.item} (${fmtDate(p.date)})` })} style={{ width:32, height:32, objectFit:"cover", borderRadius:6, border:"1px solid #a5d6a7", cursor:"pointer" }} title="View receipt" />
                        )}
                        {p.itemPhoto && (
                          <img src={p.itemPhoto} alt="Item" onClick={() => setViewingPhoto({ src: p.itemPhoto, label: `${p.item}${p.brand ? ` — ${p.brand}` : ""} (${fmtDate(p.date)})` })} style={{ width:32, height:32, objectFit:"cover", borderRadius:6, border:"1px solid #90caf9", cursor:"pointer" }} title="View item" />
                        )}
                        {!p.receiptPhoto && !p.itemPhoto && <span style={{ color:"#ccc", fontSize:11 }}>---</span>}
                      </div>
                    </td>
                    <td style={{ padding:"8px" }}><button onClick={() => removePurchase(p.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>x</button></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* USAGE LOG */}
      {viewTab === "usage" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => setShowAddUsage(!showAddUsage)} style={{ background:"#ef6c00", color:"white", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>{showAddUsage ? "Cancel" : "+ Record Usage"}</button>
          </div>

          {showAddUsage && (
            <div style={{ background:"#fff3e0", borderRadius:14, padding:18 }}>
              <h3 style={{ margin:"0 0 12px", fontSize:14, color:"#e65100" }}>Record Usage</h3>
              <div style={formRow}>
                <label style={labelStyle}>Date <input type="date" value={newUsage.date} onChange={e => setNewUsage(u => ({...u, date: e.target.value}))} style={inputStyle} /></label>
                <label style={labelStyle}>Item <select value={newUsage.item} onChange={e => setNewUsage(u => ({...u, item: e.target.value}))} style={inputStyle}>{inventoryItems.map(i => <option key={i}>{i}</option>)}</select></label>
                <label style={labelStyle}>Quantity Used <input type="number" min="0" step="0.01" value={newUsage.qty || ""} onChange={e => { const v = e.target.value; setNewUsage(u => ({...u, qty: v === "" || Number(v) >= 0 ? v : "0"})); }} style={inputStyle} /></label>
                <label style={labelStyle}>Unit <select value={newUsage.unit} onChange={e => setNewUsage(u => ({...u, unit: e.target.value}))} style={inputStyle}>{["kg","bags","L","mL","pcs","lot"].map(u => <option key={u}>{u}</option>)}</select></label>
              </div>
              <div style={formRow}>
                <label style={labelStyle}>Area <select value={newUsage.area} onChange={e => setNewUsage(u => ({...u, area: e.target.value}))} style={inputStyle}><option value="">Select area...</option>{areaNames.map(a => <option key={a}>{a}</option>)}</select></label>
                <label style={labelStyle}>Task <select value={newUsage.task} onChange={e => setNewUsage(u => ({...u, task: e.target.value}))} style={inputStyle}><option value="">Select task...</option>{uniqueTaskNames.map(t => <option key={t}>{t}</option>)}</select></label>
                <label style={labelStyle}>Notes <input value={newUsage.notes} onChange={e => setNewUsage(u => ({...u, notes: e.target.value}))} placeholder="..." style={inputStyle} /></label>
                <div style={{ display:"flex", alignItems:"flex-end" }}>
                  <button onClick={addUsage} style={{ background:"#ef6c00", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%" }}>Save Usage</button>
                </div>
              </div>
              {newUsage.item && stockMap[newUsage.item] && (
                <div style={{ fontSize:12, color:"#e65100", fontWeight:600, marginTop:4 }}>Available: {((stockMap[newUsage.item]?.purchased || 0) - (stockMap[newUsage.item]?.used || 0)).toLocaleString()} {stockMap[newUsage.item]?.unit}</div>
              )}
            </div>
          )}

          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto" }}>
            {usages.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No usage recorded yet.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead><tr style={{ background:"#fff3e0" }}>
                  {["Date","Item","Qty","Unit","Area","Task","Notes",""].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#ef6c00", borderBottom:"2px solid #ffcc80", fontSize:11 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{[...usages].reverse().map(u => (
                  <tr key={u.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                    <td style={{ padding:"8px" }}>{fmtDate(u.date)}</td>
                    <td style={{ padding:"8px", fontWeight:700 }}>{u.item}</td>
                    <td style={{ padding:"8px" }}>{u.qty.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{u.unit}</td>
                    <td style={{ padding:"8px" }}><Badge color="#1565c0" bg="#e3f2fd">{u.area}</Badge></td>
                    <td style={{ padding:"8px" }}>{u.task}</td>
                    <td style={{ padding:"8px", color:"#999" }}>{u.notes}</td>
                    <td style={{ padding:"8px" }}><button onClick={() => removeUsage(u.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>x</button></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* FERTILIZER PRICES */}
      {viewTab === "fertprices" && (
        <FertilizerPricesPanel
          fertilizerPrices={fertilizerPrices}
          setFertilizerPrices={setFertilizerPrices}
          fertilizerPriceHistory={fertilizerPriceHistory}
          setFertilizerPriceHistory={setFertilizerPriceHistory}
          purchases={purchases}
          mobile={mobile}
        />
      )}

      {/* DEMO DATA panel — collapsed by default */}
      <DemoDataPanel bag={demoStateBag} mobile={mobile} />

      {/* Photo Viewer Overlay */}
      {viewingPhoto && (
        <div onClick={() => setViewingPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.85)", zIndex:9999, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          // iOS safe-area: label + close hint stay readable below the status bar / above the home indicator.
          padding: "calc(20px + env(safe-area-inset-top, 0px)) calc(20px + env(safe-area-inset-right, 0px)) calc(20px + env(safe-area-inset-bottom, 0px)) calc(20px + env(safe-area-inset-left, 0px))",
          cursor:"pointer" }}>
          <div style={{ color:"white", fontSize:14, fontWeight:700, marginBottom:12, textAlign:"center" }}>{viewingPhoto.label}</div>
          <img src={viewingPhoto.src} alt="Photo" style={{ maxWidth:"90vw", maxHeight:"75vh", borderRadius:12, objectFit:"contain", boxShadow:"0 4px 20px rgba(0,0,0,.5)" }} />
          <div style={{ color:"#aaa", fontSize:12, marginTop:12 }}>Tap anywhere to close</div>
        </div>
      )}
    </div>
  );
}

function usePersistedState(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = typeof localStorage !== 'undefined' ? localStorage.getItem(key) : null;
      if (raw != null) return JSON.parse(raw);
    } catch(e) {}
    return typeof initial === 'function' ? initial() : initial;
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }, [key, val]);
  return [val, setVal];
}

const FARM_LAT = 16.8167;  // Santa Maria, Isabela
const FARM_LON = 121.7167;

function wmoIcon(code) {
  if (code === 0) return '☀';
  if (code <= 3) return '⛅';
  if (code <= 48) return '☁';
  if (code <= 67) return '🌧';
  if (code <= 77) return '❄';
  if (code <= 82) return '🌧';
  if (code <= 99) return '⛈';
  return '☁';
}
function wmoText(code) {
  if (code === 0) return 'Clear';
  if (code <= 3) return 'Partly cloudy';
  if (code <= 48) return 'Cloudy / fog';
  if (code <= 57) return 'Drizzle';
  if (code <= 67) return 'Rain';
  if (code <= 77) return 'Snow';
  if (code <= 82) return 'Showers';
  if (code <= 99) return 'Thunderstorm';
  return 'Unknown';
}

function useWeather() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState('idle');
  const [updated, setUpdated] = useState(null);

  const load = useCallback(async (force = false) => {
    try {
      const cached = localStorage.getItem('abundance-farm-weather');
      if (cached && !force) {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.ts < 3600000) {
          setData(parsed.data); setUpdated(parsed.ts); setStatus('ok');
          return;
        }
      }
    } catch(e) {}
    setStatus('loading');
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${FARM_LAT}&longitude=${FARM_LON}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max&timezone=Asia/Manila&forecast_days=14`;
      const res = await fetch(url);
      const json = await res.json();
      setData(json); setUpdated(Date.now()); setStatus('ok');
      try { localStorage.setItem('abundance-farm-weather', JSON.stringify({ts: Date.now(), data: json})); } catch(e) {}
    } catch(err) {
      setStatus('error');
    }
  }, []);

  useEffect(() => { load(false); }, [load]);

  return { data, status, updated, reload: () => load(true) };
}

function findWindows(weatherData) {
  if (!weatherData || !weatherData.daily) return { dryStreaks: [], plantingDays: [], heavyRain: [] };
  const d = weatherData.daily;
  const dryStreaks = []; const plantingDays = []; const heavyRain = [];
  let streakStart = null, streakLen = 0;
  for (let i = 0; i < d.time.length; i++) {
    const rain = d.precipitation_sum[i];
    const date = new Date(d.time[i]);
    const label = date.toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric'});
    if (rain < 5) { if (streakStart === null) streakStart = i; streakLen++; }
    else {
      if (streakLen >= 3) dryStreaks.push({
        start: new Date(d.time[streakStart]).toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric'}),
        end: new Date(d.time[streakStart + streakLen - 1]).toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric'}),
        days: streakLen
      });
      streakStart = null; streakLen = 0;
    }
    if (rain < 5 && i + 1 < d.time.length) {
      const next1 = d.precipitation_sum[i + 1];
      const next2 = i + 2 < d.time.length ? d.precipitation_sum[i + 2] : 0;
      if ((next1 >= 2 && next1 <= 25) || (next2 >= 2 && next2 <= 25)) plantingDays.push(label);
    }
    if (rain >= 30) heavyRain.push(label);
  }
  if (streakLen >= 3) dryStreaks.push({
    start: new Date(d.time[streakStart]).toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric'}),
    end: new Date(d.time[streakStart + streakLen - 1]).toLocaleDateString('en-PH', {weekday:'long', month:'long', day:'numeric'}),
    days: streakLen
  });
  return { dryStreaks: dryStreaks.slice(0,3), plantingDays: plantingDays.slice(0,5), heavyRain: heavyRain.slice(0,5) };
}

function analyzePlantingWindow(weatherData, monthIdx) {
  if (!weatherData) return null;
  const isCornPlantingSeason = monthIdx === 10 || monthIdx === 11 || monthIdx === 3 || monthIdx === 4;
  if (!isCornPlantingSeason) return null;
  const w = findWindows(weatherData);
  if (w.plantingDays.length > 0) return { urgent: true, title: 'Corn planting window detected', message: `Best days: ${w.plantingDays.slice(0,3).join(', ')}. Plant before forecast rain for ideal germination.` };
  if (w.dryStreaks.length > 0) return { urgent: false, title: 'Land prep window', message: `Dry stretch: ${w.dryStreaks[0].start}–${w.dryStreaks[0].end} (${w.dryStreaks[0].days} days). Good for plowing.` };
  return { urgent: false, title: 'No clear corn window yet', message: 'Heavy rain or no dry stretches in 14-day forecast. Hold corn land prep.' };
}

// ============================================================
// WEATHER-TRIGGERED ALERTS
// Converts the 14-day forecast into concrete farm actions for the
// next 72 hours. Each alert has:
//   key      — stable id for deduping notifications
//   severity — 'critical' | 'warning' | 'info'
//   icon     — emoji
//   title    — short headline
//   message  — what to do, in plain language
//   areas    — optional list of area names affected
// Thresholds are configurable via DEFAULT_WX_THRESHOLDS, overridable
// from the Today tab UI via the wxThresholds state.
// ============================================================
const DEFAULT_WX_THRESHOLDS = {
  noSprayRainMm: 5,        // rain >= this within 24h → don't spray
  skipAwdRainMm: 30,       // cumulative rain in next 3 days >= this → skip AWD irrigation
  irrigateDryDays: 5,      // dry streak >= this and rice in growing stage → start irrigation
  heavyRainMm: 50,         // rain >= this within 3 days → harvest urgency / drainage warning
  stormWindKmh: 50,        // gust speed → tie down equipment
  heatStressC: 35,         // max temp → rice flowering heat-stress risk
};

function computeWeatherAlerts(weatherData, areas, thresholds = DEFAULT_WX_THRESHOLDS) {
  if (!weatherData || !weatherData.daily) return [];
  const d = weatherData.daily;
  const alerts = [];
  const t = thresholds;

  // Helper: format a date index from the daily array
  const labelAt = (i) => new Date(d.time[i]).toLocaleDateString('en-PH', { weekday:'long', month:'short', day:'numeric' });

  // --- 24-48h rain (don't spray) ----------------------------------------
  const rainToday = d.precipitation_sum[0] || 0;
  const rainTomorrow = d.precipitation_sum[1] || 0;
  const rainProbToday = d.precipitation_probability_max?.[0] || 0;
  if (rainToday >= t.noSprayRainMm || (rainProbToday >= 70 && rainToday >= 2)) {
    alerts.push({
      key: 'no-spray-today',
      severity: 'critical',
      icon: '🧴',
      title: "Don't spray today",
      message: `Rain expected today (${rainToday.toFixed(0)}mm, ${rainProbToday}% prob). Chemical will wash off. Reschedule herbicide/insecticide.`,
    });
  } else if (rainTomorrow >= t.noSprayRainMm) {
    alerts.push({
      key: 'no-spray-tomorrow',
      severity: 'warning',
      icon: '🧴',
      title: 'Spray TODAY — rain tomorrow',
      message: `${labelAt(1)} forecast ${rainTomorrow.toFixed(0)}mm. If spraying is overdue, do it before sunset.`,
    });
  }

  // --- 3-day cumulative rain (skip AWD irrigation) ----------------------
  const rain3day = (d.precipitation_sum.slice(0,3) || []).reduce((s,x) => s + (x||0), 0);
  const riceAreas = (areas || []).filter(a => {
    const status = a.status || '';
    if (status !== 'Active') return false;
    // Prefer explicit crop field; fall back to breed substring for legacy data.
    if (a.crop) return a.crop === 'rice';
    const breed = (a.breed || '').toLowerCase();
    return breed.includes('rc') || breed.includes('palay') || breed.includes('rice') || breed.includes('mestiso') || breed.includes('malagkit') || breed.includes('dinorado') || breed.includes('submarino');
  });
  if (rain3day >= t.skipAwdRainMm && riceAreas.length > 0) {
    alerts.push({
      key: 'skip-awd',
      severity: 'info',
      icon: '💧',
      title: 'Skip AWD irrigation this cycle',
      message: `${rain3day.toFixed(0)}mm rain forecast over next 3 days. Field will refill naturally — save pump fuel and electricity.`,
      areas: riceAreas.map(a => a.name),
    });
  }

  // --- Dry streak (start irrigation rotation) ----------------------------
  const w = findWindows(weatherData);
  const longestDry = w.dryStreaks.reduce((m, s) => s.days > m ? s.days : m, 0);
  if (longestDry >= t.irrigateDryDays && rain3day < 5 && riceAreas.length > 0) {
    alerts.push({
      key: 'start-irrigation',
      severity: 'warning',
      icon: '🚨',
      title: 'Start irrigation rotation',
      message: `${longestDry}-day dry stretch ahead and minimal rain (${rain3day.toFixed(0)}mm in 3 days). Check AWD field tubes — irrigate any parcel below 15cm.`,
      areas: riceAreas.map(a => a.name),
    });
  }

  // --- Heavy rain in 3 days (harvest urgency / drainage) -----------------
  let heavyDayIdx = -1;
  for (let i = 0; i < Math.min(3, d.precipitation_sum.length); i++) {
    if (d.precipitation_sum[i] >= t.heavyRainMm) { heavyDayIdx = i; break; }
  }
  if (heavyDayIdx >= 0) {
    const ripeningRice = (areas || []).filter(a => a.status === 'Active' && /ripening|harvest|matur/i.test(a.stage || ''));
    if (ripeningRice.length > 0) {
      alerts.push({
        key: 'rush-harvest',
        severity: 'critical',
        icon: '🌾',
        title: 'Rush harvest — heavy rain coming',
        message: `${d.precipitation_sum[heavyDayIdx].toFixed(0)}mm forecast on ${labelAt(heavyDayIdx)}. Lodging + grain loss risk. Harvest ripening parcels first.`,
        areas: ripeningRice.map(a => a.name),
      });
    } else {
      alerts.push({
        key: 'drainage-check',
        severity: 'warning',
        icon: '🌊',
        title: 'Heavy rain forecast — check drainage',
        message: `${d.precipitation_sum[heavyDayIdx].toFixed(0)}mm on ${labelAt(heavyDayIdx)}. Inspect canal outlets and bunds before the rain hits.`,
      });
    }
  }

  // --- Storm / high wind --------------------------------------------------
  const maxWind = Math.max(...(d.wind_speed_10m_max || []).slice(0,3));
  if (maxWind >= t.stormWindKmh) {
    const stormIdx = (d.wind_speed_10m_max || []).slice(0,3).findIndex(v => v >= t.stormWindKmh);
    alerts.push({
      key: 'storm-warning',
      severity: 'critical',
      icon: '🌪️',
      title: 'Storm-force winds forecast',
      message: `${maxWind.toFixed(0)} km/h gusts on ${labelAt(stormIdx)}. Tie down equipment, secure greenhouse plastic, check on supervisors at remote parcels.`,
    });
  }

  // --- Heat stress for flowering rice ------------------------------------
  const maxTemp = Math.max(...(d.temperature_2m_max || []).slice(0,5));
  const floweringRice = (areas || []).filter(a => a.status === 'Active' && /flower|booting|head/i.test(a.stage || ''));
  if (maxTemp >= t.heatStressC && floweringRice.length > 0) {
    alerts.push({
      key: 'heat-stress',
      severity: 'warning',
      icon: '🌡️',
      title: 'Heat stress risk — flowering rice',
      message: `${maxTemp.toFixed(0)}°C peak forecast. Rice at flowering is heat-sensitive (>35°C causes spikelet sterility). Keep paddies flooded for cooling.`,
      areas: floweringRice.map(a => a.name),
    });
  }

  // --- Sort: critical first, then warning, then info ----------------------
  const sev = { critical: 0, warning: 1, info: 2 };
  alerts.sort((a, b) => sev[a.severity] - sev[b.severity]);
  return alerts;
}

  const visible = alerts.filter(a => {
    const key = `${a.key}-${new Date().toISOString().slice(0,10)}`;

          padding:'4px 12px', fontWeight:600, letterSpacing:'0.05em'
        }}>
          {expanded ? '↑ Show less' : `↓ Show ${visible.length - 2} more alert${visible.length - 2 === 1 ? '' : 's'}`}

      )}
    </div>
  );
}

function TodayView({ monthIdx, weather, taskState, toggleTask, areas, inventoryAlerts, allTasks }) {
  const now = new Date();
  const monthName = MONTHS_FULL[monthIdx];
  const td = TODAY_DATA[monthIdx];
  const risk = RISK_LEVELS[monthIdx];
  const tasks = (MONTHLY_TASKS[monthIdx] || []).slice(0, 4);
  const d = weather?.data?.daily;
  const advice = analyzePlantingWindow(weather?.data, monthIdx);
  const wxAlerts = useMemo(() => computeWeatherAlerts(weather?.data, areas), [weather?.data, areas]);

  // Existing-app stats
  const activeAreas = areas.filter(a => a.status === 'Active').length;
  const totalHa = areas.reduce((s,a) => s + (parseFloat(a.ha)||0), 0);
  const shortages = inventoryAlerts?.shortages?.length || 0;
  const upcomingShort = inventoryAlerts?.upcomingNeeds?.filter(n => !n.sufficient).length || 0;

  return (
    <div className="ab-fade">
      {/* Hero */}
      <div style={{
        background: 'linear-gradient(135deg, #1F2D1E 0%, #2D4A2B 100%)',
        color: '#F5F0E1', borderRadius: T.radius, padding: 24, marginBottom: 14,
        position: 'relative', overflow: 'hidden'
      }}>
        <div style={{ fontSize: 10, letterSpacing: '0.2em', opacity: 0.6, fontWeight: 600 }}>
          {now.toLocaleDateString('en-PH', {weekday:'long'}).toUpperCase()} · {monthName.toUpperCase()} {now.getDate()}
        </div>
        <div style={{ fontFamily: T.fontDisplay, fontWeight: 400, fontSize: 32, lineHeight: 1.1, margin: '12px 0 8px', letterSpacing: '-0.02em' }}>
          {td.tagline}
        </div>
        <div style={{ marginTop: 14 }}><RiskPill level={risk} /></div>
      </div>

      {/* Weather-triggered alerts */}
      <WeatherAlertsBanner alerts={wxAlerts} />

      {/* Advice pill if in corn planting window */}
      {advice && (
        <div style={{
          background: advice.urgent ? T.cornSoft : T.goldSoft,
          borderLeft: `4px solid ${advice.urgent ? T.corn : T.gold}`,
          padding: 14, borderRadius: T.radiusSm, marginBottom: 14, fontSize: 13, color: T.ink
        }}>
          <strong>{advice.title}</strong> — {advice.message}
        </div>
      )}

      {/* 7-day weather strip */}
      <AbCard>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
          <AbLabel style={{ margin:0 }}>14-day forecast · Santa Maria</AbLabel>
          <span style={{ fontSize:10, color:T.inkMute }}>{weather?.updated ? 'Updated ' + new Date(weather.updated).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}) : 'Loading...'}</span>
        </div>
        {d ? (
          <div className="ab-scroll" style={{ display:'flex', gap:6, overflowX:'auto', paddingBottom:4 }}>
            {d.time.slice(0,7).map((iso, i) => {
              const date = new Date(iso);
              const day = date.toLocaleDateString('en-PH',{weekday:'short'}).toUpperCase();
              const rain = d.precipitation_sum[i];
              const code = d.weather_code[i];
              const isToday = i===0;
              const rainColor = rain >= 30 ? T.danger : rain >= 10 ? T.warn : rain >= 1 ? T.rice : T.inkMute;
              return <div key={i} style={{ flexShrink:0, textAlign:'center', padding:'10px 8px', borderRadius:10, minWidth:60,
                background: isToday ? T.rice : T.bgElev, color: isToday ? 'white' : T.ink }}>
                <div style={{ fontSize:9, letterSpacing:'0.1em', opacity:0.7, fontWeight:600 }}>{day}</div>
                <div style={{ fontFamily:T.fontDisplay, fontSize:18, fontWeight:500, lineHeight:1, margin:'4px 0' }}>{date.getDate()}</div>
                <div style={{ fontSize:18, lineHeight:1 }}>{wmoIcon(code)}</div>
                <div style={{ fontFamily:T.fontMono, fontSize:10, fontWeight:600, marginTop:4, color: isToday ? 'white' : rainColor }}>{rain.toFixed(0)}mm</div>
              </div>;
            })}
          </div>
        ) : (
          <div style={{ color: T.inkMute, fontSize:13, padding:8 }}>{weather?.status === 'error' ? 'Offline — weather unavailable' : 'Loading forecast...'}</div>
        )}
      </AbCard>

      {/* Today 2x2 focus */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14 }}>
        <AbCard tight style={{ marginBottom:0, borderLeft:`4px solid ${T.rice}` }}>
          <AbLabel>Rice</AbLabel>
          <div style={{ fontSize:14, fontWeight:600, color:T.ink }}>{td.rice}</div>
        </AbCard>
        <AbCard tight style={{ marginBottom:0, borderLeft:`4px solid ${T.corn}` }}>
          <AbLabel>Corn</AbLabel>
          <div style={{ fontSize:14, fontWeight:600, color:T.ink }}>{td.corn}</div>
        </AbCard>
        <AbCard tight style={{ marginBottom:0, borderLeft:`4px solid ${T.gold}` }}>
          <AbLabel>Price</AbLabel>
          <div style={{ fontSize:13, color:T.ink }}>{td.price}</div>
        </AbCard>
        <AbCard tight style={{ marginBottom:0, borderLeft:`4px solid ${T.safe}` }}>
          <AbLabel>Typhoon risk</AbLabel>
          <div style={{ fontSize:13, color:T.ink }}>{td.risk}</div>
        </AbCard>
      </div>

      {/* Operations snapshot */}
      <AbCard>
        <AbLabel>Operations snapshot</AbLabel>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginTop:8 }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:T.fontDisplay, fontSize:28, fontWeight:500, color:T.rice }}>{activeAreas}</div>
            <div style={{ fontSize:10, color:T.inkMute, letterSpacing:'0.05em', textTransform:'uppercase' }}>Active areas</div>
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:T.fontDisplay, fontSize:28, fontWeight:500, color:T.rice }}>{totalHa}<span style={{ fontSize:14, color:T.inkMute }}> ha</span></div>
            <div style={{ fontSize:10, color:T.inkMute, letterSpacing:'0.05em', textTransform:'uppercase' }}>Total area</div>
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:T.fontDisplay, fontSize:28, fontWeight:500, color: shortages ? T.danger : T.safe }}>{shortages}</div>
            <div style={{ fontSize:10, color:T.inkMute, letterSpacing:'0.05em', textTransform:'uppercase' }}>Shortages</div>
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:T.fontDisplay, fontSize:28, fontWeight:500, color: upcomingShort ? T.warn : T.safe }}>{upcomingShort}</div>
            <div style={{ fontSize:10, color:T.inkMute, letterSpacing:'0.05em', textTransform:'uppercase' }}>Input alerts</div>
          </div>
        </div>
      </AbCard>

      {/* Today's tasks (top 4) */}
      <AbCard>
        <AbLabel>Today's focus</AbLabel>
        <div>
          {tasks.map((t, i) => {
            const done = taskState[`${monthIdx}-${i}`];
            const tagColors = { rice: T.rice, corn: T.corn, money: T.gold, urgent: T.danger };
            const tagBg = { rice: T.riceSoft, corn: T.cornSoft, money: T.goldSoft, urgent: T.dangerSoft };
            return <div key={i} onClick={() => toggleTask(monthIdx, i)} style={{
              display:'flex', gap:12, padding:'10px 0', borderBottom: i < tasks.length-1 ? `1px solid ${T.line}` : 'none',
              cursor:'pointer', opacity: done ? 0.5 : 1
            }}>
              <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${done ? T.rice : T.lineStrong}`, background: done ? T.rice : 'transparent', flexShrink:0, marginTop:2, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:11 }}>{done ? '✓' : ''}</div>
              <div style={{ flex:1, fontSize:13, textDecoration: done ? 'line-through' : 'none' }}>
                <span style={{ display:'inline-block', fontSize:9, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', background: tagBg[t.tag]||T.bgElev, color: tagColors[t.tag]||T.ink, padding:'2px 6px', borderRadius:4, marginRight:6 }}>{t.tag}</span>
                {t.text}
              </div>
            </div>;
          })}
        </div>
      </AbCard>
    </div>
  );
}

  );
}

function parsePrice(str) {
  if (!str) return null;
  str = String(str).trim();
  if (!str) return null;
  const m = str.match(/^(\d+\.?\d*)\s*(?:-|–|to)\s*(\d+\.?\d*)$/i);
  if (m) {
    const a = parseFloat(m[1]); const b = parseFloat(m[2]);
    if (isNaN(a) || isNaN(b)) return null;
    return (a + b) / 2;
  }
  const num = parseFloat(str);
  return isNaN(num) ? null : num;
}

// ============================================================
// LIVE PRICE SIGNALS — derive sell/hold/avoid from logged data
// ============================================================
// Blend of 3 inputs:
//   1) Personal rolling avg of your own logged prices (last 12mo)
//   2) Seasonal benchmark for current month (PALAY_PRICES/CORN_PRICES)
//   3) Recent trend (last 3 entries vs prior 3)
// Score -3..+3 → STRONG SELL / SELL / HOLD / WEAK / AVOID
function computeSellSignal(priceHistory, benchmark, monthIdx, field, fieldLabel) {
  const all = [...priceHistory]
    .filter(p => p[field] != null && !isNaN(p[field]))
    .map(p => ({ ...p, _d: new Date(p.date) }))
    .sort((a,b) => a._d - b._d);
  if (all.length < 2) return null;
  // Consider last 12 months
  const cutoff = Date.now() - 365 * 24 * 3600 * 1000;
  const recent12 = all.filter(p => p._d.getTime() >= cutoff);
  const basis = recent12.length >= 2 ? recent12 : all;
  const latest = basis[basis.length - 1][field];
  const rollingAvg = basis.reduce((s,p) => s + p[field], 0) / basis.length;
  const bm = benchmark[monthIdx];
  const monthBenchmark = bm.price;

  let score = 0;
  const reasons = [];
  if (latest >= rollingAvg * 1.07) { score += 1; reasons.push(`above your avg ₱${rollingAvg.toFixed(2)}`); }
  else if (latest <= rollingAvg * 0.93) { score -= 1; reasons.push(`below your avg ₱${rollingAvg.toFixed(2)}`); }
  else reasons.push(`near your avg ₱${rollingAvg.toFixed(2)}`);

  if (latest >= monthBenchmark * 1.05) { score += 1; reasons.push(`above seasonal ₱${monthBenchmark}`); }
  else if (latest <= monthBenchmark * 0.95) { score -= 1; reasons.push(`below seasonal ₱${monthBenchmark}`); }

  if (basis.length >= 4) {
    const recent = basis.slice(-3);
    const prior = basis.slice(-6, -3);
    if (prior.length >= 2) {
      const rAvg = recent.reduce((s,p)=>s+p[field],0) / recent.length;
      const pAvg = prior.reduce((s,p)=>s+p[field],0) / prior.length;
      if (rAvg >= pAvg * 1.03) { score += 1; reasons.push('trending up'); }
      else if (rAvg <= pAvg * 0.97) { score -= 1; reasons.push('trending down'); }
    }
  }

  // Seasonal window amplifier: if benchmark says sell and we're above our avg, lean more
  if (bm.action === 'sell' && score >= 0) score += 0; // neutral
  if (bm.action === 'avoid') score -= 0; // neutral

  let verdict, color;
  if (score >= 2) { verdict = 'STRONG SELL'; color = 'safe'; }
  else if (score === 1) { verdict = 'SELL'; color = 'safe'; }
  else if (score === 0) { verdict = 'HOLD'; color = 'warn'; }
  else if (score === -1) { verdict = 'WEAK'; color = 'warn'; }
  else { verdict = 'AVOID'; color = 'danger'; }

  return { verdict, score, color, reasons, latest, rollingAvg, monthBenchmark, field, fieldLabel, samples: basis.length };
}

// Buying signal for inputs (fertilizer/seed/diesel) from Inventory purchases
function computeBuySignal(purchases, item) {
  const rows = (purchases || [])
    .filter(p => p.item === item && p.unitCost != null && !isNaN(p.unitCost) && p.unitCost > 0)
    .map(p => ({ ...p, _d: new Date(p.date || 0) }))
    .sort((a,b) => a._d - b._d);
  if (rows.length < 2) return null;
  const latest = rows[rows.length - 1];
  const avg = rows.reduce((s,p) => s + p.unitCost, 0) / rows.length;
  const delta = (latest.unitCost - avg) / avg;
  let verdict, color, reason;
  if (delta <= -0.07) { verdict = 'GOOD BUY'; color = 'safe'; reason = `₱${latest.unitCost.toFixed(2)} vs avg ₱${avg.toFixed(2)} (${(delta*100).toFixed(0)}%)`; }
  else if (delta >= 0.07) { verdict = 'EXPENSIVE'; color = 'danger'; reason = `₱${latest.unitCost.toFixed(2)} vs avg ₱${avg.toFixed(2)} (+${(delta*100).toFixed(0)}%)`; }
  else { verdict = 'NORMAL'; color = 'warn'; reason = `₱${latest.unitCost.toFixed(2)} near avg ₱${avg.toFixed(2)}`; }
  return { verdict, color, reason, latest: latest.unitCost, avg, samples: rows.length, lastDate: latest.date };
}
