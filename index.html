<!-- Resilient loader: tries multiple CDNs, no crossorigin attr (avoids file:// CORS issues),
     and makes Recharts optional (only used for one chart on the Dashboard). -->
<script>
(function() {
  var CDNS = [
    'https://cdn.jsdelivr.net/npm',
    'https://unpkg.com',
    'https://cdnjs.cloudflare.com/ajax/libs'
  ];
  var DEPS = [
    { global: 'React',      paths: [
        'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
        'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'
    ], required: true },
    { global: 'ReactDOM',   paths: [
        'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'
    ], required: true },
    { global: 'PropTypes',  paths: [
        'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
        'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js'
    ], required: false },
    { global: 'Recharts',   paths: [
        'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js',
        'https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js'
    ], required: false },  // Dashboard has one bar chart; we shim if missing
    { global: 'Babel',      paths: [
        'https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js',
        'https://unpkg.com/@babel/standalone@7.24.7/babel.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js'
    ], required: true }
  ];

  function loadScript(url) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = url; s.async = false;
      s.onload = function() { resolve(url); };
      s.onerror = function() { reject(new Error('Failed ' + url)); };
      document.head.appendChild(s);
    });
  }

  function tryLoad(dep) {
    var attempts = dep.paths.slice();
    function next() {
      if (!attempts.length) return Promise.reject(new Error(dep.global + ' unreachable'));
      var url = attempts.shift();
      return loadScript(url).then(function() {
        if (typeof window[dep.global] !== 'undefined') return dep.global;
        return next();
      }).catch(next);
    }
    return next();
  }

  // Load React then ReactDOM (dependency order matters), then the rest in parallel
  window.__abundanceLoader__ = (async function() {
    var missing = [];
    try { await tryLoad(DEPS[0]); } catch(e) { missing.push('React'); }
    try { await tryLoad(DEPS[1]); } catch(e) { missing.push('ReactDOM'); }
    await Promise.all(DEPS.slice(2).map(function(d) {
      return tryLoad(d).catch(function() {
        if (d.required) missing.push(d.global);
        // Shim optional deps
        if (d.global === 'Recharts') {
          window.Recharts = null;
        }
        if (d.global === 'PropTypes') {
          window.PropTypes = null;
        }
      });
    }));

    if (missing.length) {
      var s = document.getElementById('splash'); if (s) s.remove();
      document.getElementById('root').innerHTML =
        '<div class="ab-error"><h3>Can\u0027t load dependencies</h3>' +
        'Failed to load: <code>' + missing.join(', ') + '</code>. ' +
        'Open this file on a connected device, or host it on any static web server ' +
        '(Cloudflare Pages, Netlify drop, GitHub Pages, etc.).</div>';
      throw new Error('Dependencies missing: ' + missing.join(', '));
    }

    // Shim Recharts if it failed
    if (!window.Recharts) {
      var noop = function() { return null; };
      window.Recharts = {
        BarChart: function(p) { return React.createElement('div', { style: { padding:16, textAlign:'center', color:'#8B9684', fontSize:12 } }, 'Chart unavailable (Recharts blocked by network)'); },
        Bar: noop, XAxis: noop, YAxis: noop, Tooltip: noop,
        ResponsiveContainer: function(p) { return React.createElement('div', {}, p.children); }
      };
    }

    // Transform and execute the app source
    try {
      var src = document.getElementById('app-source').textContent;
      var out = Babel.transform(src, { presets: ['react'] }).code;
      // Execute in global scope so React, ReactDOM, Recharts are visible
      (new Function(out))();
    } catch(e) {
      var s = document.getElementById('splash'); if (s) s.remove();
      document.getElementById('root').innerHTML =
        '<div class="ab-error"><h3>App failed to start</h3>' +
        '<code style="display:block;white-space:pre-wrap;padding:8px;background:#F5F0E1;border-radius:6px;font-size:11px;overflow:auto;max-height:200px;">' +
        (e && e.stack ? e.stack : String(e)).replace(/</g,'&lt;') +
        '</code></div>';
      console.error(e);
    }
  })();
})();
</script>

<!-- Source kept as text/plain so Babel does NOT auto-execute it;
     our loader will transform and run it once all deps are confirmed loaded. -->
<script type="text/plain" id="app-source">
/*
  Abundance Farm — Rice & Corn Operations
  Single-file web app. No build step.
  Original data & design from the Abundance Farm HTML, merged with the
  Rice Farm Operations React app (Dashboard, Areas, Accounting, Equipment,
  Inventory, Breeds). All state persists to localStorage.
*/
// Browser-runtime globals (UMD bundles)
const { useState, useMemo, useCallback, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

// ============================================================
// RESPONSIVE HOOK
// ============================================================
function useIsMobile(breakpoint = 768) {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w < breakpoint;
}

// ============================================================
// DATE HELPERS
// ============================================================
function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1, d));
}
function addDays(dateStr, n) {
  if (!dateStr) return "";
  const dt = parseDate(dateStr);
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().split("T")[0];
}
function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
function fmtDate(s) {
  if (!s) return "";
  const [y, m, d] = s.split("-").map(Number);
  return `${MONTH_NAMES[m - 1]} ${d}, ${y}`;
}
const today = new Date().toISOString().split("T")[0];

// ============================================================
// FIFO COST ENGINE
// Given purchases (sorted by date) and consumption events,
// allocates cost using First-In-First-Out.
// Returns: { costByArea: { areaName: cost }, totalCost, breakdown: [...] }
// ============================================================
function computeFifoCost(purchases, consumptions) {
  // purchases: [{ date, qty, unitCost, ...}] — already sorted by date
  // consumptions: [{ date, qty, area, taskName, item }] — sorted by date
  const pool = purchases.map(p => ({ ...p, remaining: p.qty }));
  const breakdown = [];
  let totalCost = 0;
  const costByArea = {};

  consumptions.sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  for (const c of consumptions) {
    let needed = c.qty;
    let eventCost = 0;
    const lots = [];

    for (const lot of pool) {
      if (needed <= 0) break;
      if (lot.remaining <= 0) continue;
      const take = Math.min(lot.remaining, needed);
      lot.remaining -= take;
      const cost = take * (lot.unitCost || 0);
      eventCost += cost;
      needed -= take;
      lots.push({ purchaseDate: lot.date, qty: take, unitCost: lot.unitCost, cost, supplier: lot.supplier || "" });
    }

    totalCost += eventCost;
    if (!costByArea[c.area]) costByArea[c.area] = 0;
    costByArea[c.area] += eventCost;
    breakdown.push({ ...c, cost: eventCost, lots });
  }

  return { costByArea, totalCost, breakdown };
}

// Build consumption events from completed tasks across all areas
function buildConsumptionsFromTasks(allTasks) {
  const consumptions = [];
  allTasks.filter(t => t.status === "Completed" && t.inputs).forEach(t => {
    t.inputs.forEach(inp => {
      if (!inp.item || inp.item === "Herbicide" || inp.item === "Fungicide" || inp.item === "Insecticide") return;
      const actualKey = `actualInput_${inp.item}`;
      const actualVal = t[actualKey];
      const rawAmt = (actualVal != null && actualVal !== "") ? String(actualVal) : (inp.amount || "");
      if (!rawAmt) return;
      const num = parseFloat(rawAmt) || 0;
      const amt = rawAmt.toLowerCase();
      // Normalize to base unit (kg for fertilizers, mL for FAA)
      let qty = num;
      if (amt.includes("bag")) qty = num * 50;
      // For FAA stored in L in purchases but mL in tasks, normalize to L
      if (inp.item === "FAA" && !amt.includes("l")) qty = num / 1000;
      consumptions.push({
        date: t.actEnd || t.planEnd || t.planStart,
        qty,
        area: t.area,
        taskName: t.activity,
        item: inp.item,
      });
    });
  });
  return consumptions;
}

// ============================================================
// PROTOCOL FORMULA ENGINE
// Reproduces the exact Excel formula chain from Rice Protocol.xltx
// Key inputs: area (ha), transplantDate (C26), maturity (days)
// Anchor: sowingDate (E16) = transplantDate - 16 days
// All other dates derive from these via the formula chain.
// ============================================================
function computeSchedule(area_ha, transplantDate, maturity) {
  // C26 = transplantDate (user input)
  const C26 = transplantDate;
  // E16 = C26 - 16 (Sowing date)
  const E16 = addDays(C26, -16);
  // B43 = E16 + maturity (Harvest)
  const B43 = addDays(E16, maturity);
  // B37 = B43 - 65 (Panicle Initiation)
  const B37 = addDays(B43, -65);

  // --- Seedling Management ---
  const E11 = addDays(E16, -2);       // Washing/Soaking start
  const F11 = addDays(E11, 1);        // Washing/Soaking end
  const E12 = addDays(E11, 1);        // Germination start
  const F12 = addDays(E12, 1);        // Germination end
  const E13 = E12;                    // Seedbed Prep start = Germination start
  const F13 = addDays(E13, 1);        // Seedbed Prep end
  const E14 = E13;                    // Basal Fert seedbed start
  const F14 = addDays(E14, 1);        // Basal Fert seedbed end
  // E16 = Sowing
  const E17 = addDays(E16, 5);        // Irrigate seedbed (2cm)
  const E18 = addDays(E17, 1);        // Pre-Emergent Herbicide seedbed
  const E20 = addDays(E16, 7);        // Fertilizer 21-0-0
  const E21_start = addDays(E16, 9);  // Irrigate saturated start
  const F21 = addDays(E16, 15);       // Irrigate saturated end
  const E23 = addDays(E16, 16);       // Seedling Pulling

  // --- Land Preparation ---
  const B11 = E11;                    // Rotavator start = Washing start
  const C11 = addDays(B11, 2);        // Rotavator end
  const B12 = E11;                    // Irrigate 5cm start
  const C12 = C11;                    // Irrigate 5cm end
  const B13 = addDays(C12, 2);        // Clean Dikes
  const B15 = addDays(B11, 7);        // 1st Harrow start
  const C15 = addDays(B15, 1);        // 1st Harrow end
  const B16 = B15;                    // Repair Dikes start
  const C16 = C15;                    // Repair Dikes end
  const B17 = addDays(B15, 2);        // Irrigate 5cm
  const B19 = addDays(B11, 14);       // Final Harrow
  const B20 = B19;                    // Water Level 2-3cm
  const B21 = addDays(B20, 3);        // Pre-Emergent Herbicide field
  const B22 = addDays(B21, 1);        // Basal Fertilizer field

  // --- Transplanting & Crop Care ---
  const B26 = addDays(E23, 1);        // Transplanting
  const B27 = addDays(B26, 3);        // Irrigate 2-3cm
  const B28 = addDays(B26, 10);       // 1st FAA Spray start
  const C28 = addDays(B26, 14);       // 1st FAA Spray end
  // B34 = B37-7, B31 = B34-7, B29 = B31-7 (cascade backward from Panicle)
  const B34 = addDays(B37, -7);       // N3K3
  const B31 = addDays(B34, -7);       // N2K2
  const B29 = addDays(B31, -7);       // N1K1
  const B30 = addDays(B29, 4);        // Irrigate start after N1K1
  const C30 = addDays(B29, 6);        // Irrigate end after N1K1
  const G30 = addDays(B26, 21);       // Weed control date
  const B32 = addDays(B31, 4);        // Irrigate start after N2K2
  const C32 = addDays(B31, 6);        // Irrigate end after N2K2
  const B33 = addDays(B37, -10);      // Fungicide Spray 1
  const B35 = addDays(B34, 4);        // Irrigate 5cm start after N3K3
  const C35 = addDays(B34, 6);        // Irrigate 5cm end
  const B36 = addDays(B26, 30);       // 2nd FAA start
  const C36 = addDays(B26, 35);       // 2nd FAA end
  const B38 = addDays(B37, 7);        // K Application
  const B39 = addDays(B26, 45);       // 3rd FAA start
  const C39 = addDays(B26, 50);       // 3rd FAA end
  const B41 = addDays(B37, 27);       // Booting
  const B40 = addDays(B41, -7);       // Fungicide Spray 2
  const B42 = addDays(B41, 9);        // Flowering

  // --- Quantity formulas ---
  const basalSeedbedKg = area_ha * 25;   // G14 = D4*25 & " kg"
  const fert2100Kg = area_ha * 5;        // G20 = D4*5 & " kg"
  const basalFieldBags = `${(area_ha * 250) / 50} bags 14-14-14`; // C22
  const urea_N1K1 = area_ha * 50;        // D29
  const mop_N1K1 = area_ha * 15;         // E29
  const urea_N2K2 = urea_N1K1;           // D31 = D29
  const mop_N2K2 = mop_N1K1;             // E31 = E29
  const urea_N3K3 = urea_N1K1;           // D34 = D31
  const mop_N3K3 = area_ha * 20;         // E34
  const mop_K = area_ha * 50;            // E38
  const faa_mL = area_ha * 2000;         // F28 = D4*2000
  // Totals: D44 = SUM(D29,D31,D34)/50, E44 = SUM(E29,E31,E34,E38)/50, F44 = SUM * 3

  return {
    sowingDate: E16,
    harvestDate: B43,
    panicleDate: B37,
    tasks: [
      // Land Preparation
      { id:1, activity:"Rotavator", phase:"Land Prep", planStart:B11, planEnd:C11, formula:"E16-2 → E16" },
      { id:2, activity:"Irrigate (5cm)", phase:"Land Prep", planStart:B12, planEnd:C12, formula:"=E11 → =B11+2" },
      { id:3, activity:"Clean Dikes", phase:"Land Prep", planStart:B13, planEnd:B13, formula:"=C12+2" },
      { id:4, activity:"1st Harrow", phase:"Land Prep", planStart:B15, planEnd:C15, formula:"=B11+7 → +1" },
      { id:5, activity:"Repair Dikes", phase:"Land Prep", planStart:B16, planEnd:C16, formula:"=B15 → =C15" },
      { id:6, activity:"Irrigate (5cm)", phase:"Land Prep", planStart:B17, planEnd:B17, formula:"=B15+2" },
      { id:7, activity:"Final Harrow", phase:"Land Prep", planStart:B19, planEnd:B19, formula:"=B11+14" },
      { id:8, activity:"Water Level (2-3cm)", phase:"Land Prep", planStart:B20, planEnd:B20, formula:"=B19" },
      { id:9, activity:"Pre-Emergent Herbicide", phase:"Land Prep", planStart:B21, planEnd:B21, formula:"=B20+3", inputs:[{item:"Herbicide"}] },
      { id:10, activity:"Basal Fertilizer (Field)", phase:"Land Prep", planStart:B22, planEnd:B22, formula:"=B21+1", inputs:[{item:"14-14-14", amount:`${(area_ha*250)/50} bags`}] },
      // Seedling Management
      { id:11, activity:"Washing/Soaking", phase:"Seedling Mgmt", planStart:E11, planEnd:F11, formula:"=E16-2 → +1" },
      { id:12, activity:"Germination", phase:"Growth Stage", planStart:E12, planEnd:F12, formula:"=E11+1 → +1" },
      { id:13, activity:"Seedbed Preparation", phase:"Seedling Mgmt", planStart:E13, planEnd:F13, formula:"=E12 → +1" },
      { id:14, activity:"Basal Fertilizer (Seedbed)", phase:"Seedling Mgmt", planStart:E14, planEnd:F14, formula:"=E13 → +1", inputs:[{item:"14-14-14", amount:`${basalSeedbedKg} kg`}] },
      { id:15, activity:"Sowing", phase:"Seedling Mgmt", planStart:E16, planEnd:E16, formula:"=C26-16 (anchor)" },
      { id:16, activity:"Irrigate Seedbed (2cm)", phase:"Seedling Mgmt", planStart:E17, planEnd:E17, formula:"=E16+5" },
      { id:17, activity:"Pre-Emergent Herbicide (Seedbed)", phase:"Seedling Mgmt", planStart:E18, planEnd:E18, formula:"=E17+1", inputs:[{item:"Herbicide"}] },
      { id:18, activity:"Top Dress Fertilizer", phase:"Seedling Mgmt", planStart:E20, planEnd:E20, formula:"=E16+7", inputs:[{item:"21-0-0", amount:`${fert2100Kg} kg`}] },
      { id:19, activity:"Irrigate Seedbed (Saturated)", phase:"Seedling Mgmt", planStart:E21_start, planEnd:F21, formula:"=E16+9 → E16+15" },
      { id:20, activity:"Seedling Pulling", phase:"Seedling Mgmt", planStart:E23, planEnd:E23, formula:"=E16+16" },
      // Crop Care
      { id:21, activity:"Transplanting", phase:"Crop Care", planStart:B26, planEnd:B26, formula:"=E23+1" },
      { id:22, activity:"Irrigate (2-3cm)", phase:"Crop Care", planStart:B27, planEnd:B27, formula:"=B26+3" },
      { id:23, activity:"1st FAA Spray", phase:"Crop Care", planStart:B28, planEnd:C28, formula:"=B26+10 → +14", inputs:[{item:"FAA", amount:`${faa_mL} mL`}] },
      { id:24, activity:"N1K1", phase:"Crop Care", planStart:B29, planEnd:B29, formula:"=B31-7", inputs:[{item:"46-0-0", amount:`${urea_N1K1} kg`},{item:"0-0-60", amount:`${mop_N1K1} kg`}] },
      { id:25, activity:"Irrigate (2-3cm)", phase:"Crop Care", planStart:B30, planEnd:C30, formula:"=B29+4 → +6" },
      { id:26, activity:"Weed Control", phase:"Crop Care", planStart:G30, planEnd:G30, formula:"=B26+21", inputs:[{item:"Herbicide"}] },
      { id:27, activity:"N2K2", phase:"Crop Care", planStart:B31, planEnd:B31, formula:"=B34-7", inputs:[{item:"46-0-0", amount:`${urea_N2K2} kg`},{item:"0-0-60", amount:`${mop_N2K2} kg`}] },
      { id:28, activity:"Irrigate (2-3cm)", phase:"Crop Care", planStart:B32, planEnd:C32, formula:"=B31+4 → +6" },
      { id:29, activity:"Fungicide Spray 1", phase:"Crop Care", planStart:B33, planEnd:B33, formula:"=B37-10", inputs:[{item:"Fungicide"}] },
      { id:30, activity:"N3K3", phase:"Crop Care", planStart:B34, planEnd:B34, formula:"=B37-7", inputs:[{item:"46-0-0", amount:`${urea_N3K3} kg`},{item:"0-0-60", amount:`${mop_N3K3} kg`}] },
      { id:31, activity:"Irrigate (5cm)", phase:"Crop Care", planStart:B35, planEnd:C35, formula:"=B34+4 → +6" },
      { id:32, activity:"2nd FAA Spray", phase:"Crop Care", planStart:B36, planEnd:C36, formula:"=B26+30 → +35", inputs:[{item:"FAA", amount:`${faa_mL} mL`}] },
      // Growth Stages
      { id:33, activity:"Panicle Initiation", phase:"Growth Stage", planStart:B37, planEnd:B37, formula:"=B43-65" },
      { id:34, activity:"K Application", phase:"Crop Care", planStart:B38, planEnd:B38, formula:"=B37+7", inputs:[{item:"0-0-60", amount:`${mop_K} kg`}] },
      { id:35, activity:"3rd FAA Spray", phase:"Crop Care", planStart:B39, planEnd:C39, formula:"=B26+45 → +50", inputs:[{item:"FAA", amount:`${faa_mL} mL`}] },
      { id:36, activity:"Fungicide Spray 2", phase:"Crop Care", planStart:B40, planEnd:B40, formula:"=B41-7", inputs:[{item:"Fungicide"}] },
      { id:37, activity:"Booting", phase:"Growth Stage", planStart:B41, planEnd:B41, formula:"=B37+27" },
      { id:38, activity:"Flowering", phase:"Growth Stage", planStart:B42, planEnd:B42, formula:"=B41+9" },
      { id:39, activity:"Harvesting", phase:"Harvest", planStart:B43, planEnd:B43, formula:"=E16+maturity" },
    ],
    quantities: {
      basalSeedbedKg, fert2100Kg, basalFieldBags,
      urea_N1K1, mop_N1K1, urea_N2K2, mop_N2K2, urea_N3K3, mop_N3K3, mop_K, faa_mL,
      totalUreaBags: (urea_N1K1 + urea_N2K2 + urea_N3K3) / 50,
      totalMOPBags: (mop_N1K1 + mop_N2K2 + mop_N3K3 + mop_K) / 50,
      totalFAA_L: faa_mL * 3,
    }
  };
}


// ============================================================
// CONSTANTS
// ============================================================
const PHASES = ["Land Prep", "Seedling Mgmt", "Crop Care", "Growth Stage", "Harvest"];
const STATUSES = ["Not Started", "In Progress", "Completed", "Delayed", "Cancelled"];
const AREA_STATUSES = ["Active", "Planning", "Completed", "On Hold"];
const PHASE_COLORS = { "Land Prep":"#bbdefb", "Seedling Mgmt":"#ffe0b2", "Crop Care":"#c8e6c9", "Growth Stage":"#e1bee7", "Harvest":"#fff9c4" };
const PHASE_ACCENT = { "Land Prep":"#1565c0", "Seedling Mgmt":"#e65100", "Crop Care":"#2e7d32", "Growth Stage":"#7b1fa2", "Harvest":"#f9a825" };

// ============================================================
// SMALL COMPONENTS
// ============================================================
function Badge({ children, color = "#4caf50", bg }) {
  return <span style={{ display:"inline-block", padding:"2px 10px", borderRadius:12, fontSize:11, fontWeight:700, color, background: bg || `${color}18`, whiteSpace:"nowrap" }}>{children}</span>;
}
function StatusBadge({ status }) {
  const m = { "Completed":{c:"#2e7d32",bg:"#c8e6c9"}, "In Progress":{c:"#1565c0",bg:"#bbdefb"}, "Delayed":{c:"#d32f2f",bg:"#ffcdd2"}, "Pending":{c:"#ef6c00",bg:"#ffe0b2"}, "Not Started":{c:"#757575",bg:"#eee"}, "Cancelled":{c:"#9e9e9e",bg:"#f5f5f5"}, "Active":{c:"#2e7d32",bg:"#c8e6c9"}, "Planning":{c:"#1565c0",bg:"#bbdefb"}, "On Hold":{c:"#ef6c00",bg:"#ffe0b2"} };
  const s = m[status] || {c:"#757575",bg:"#eee"};
  return <Badge color={s.c} bg={s.bg}>{status}</Badge>;
}
function KpiCard({ label, value, sub, icon, color }) {
  return (
    <div style={{ background:"white", borderRadius:12, padding:"14px 14px", boxShadow:"0 1px 6px rgba(0,0,0,.07)", borderTop:`4px solid ${color}`, flex:"1 1 140px", minWidth:0 }}>
      <div style={{ fontSize:11, color:"#888", marginBottom:3, display:"flex", alignItems:"center", gap:4 }}><span style={{ fontSize:16 }}>{icon}</span>{label}</div>
      <div style={{ fontSize:20, fontWeight:800, color, wordBreak:"break-word" }}>{value}</div>
      {sub && <div style={{ fontSize:10, color:"#aaa", marginTop:2 }}>{sub}</div>}
    </div>
  );
}
function ProgressBar({ pct, color = "#4caf50", h = 8 }) {
  return (
    <div style={{ background:"#e8e8e8", borderRadius:h, height:h, width:"100%", overflow:"hidden" }}>
      <div style={{ width:`${Math.min(pct,100)}%`, height:"100%", background:color, borderRadius:h, transition:"width .4s" }} />
    </div>
  );
}

// Styles
const filterStyle = { padding:"8px 12px", borderRadius:8, border:"1px solid #ddd", fontSize:13, background:"white", cursor:"pointer" };
const inputStyle = { width:"100%", padding:"8px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, marginTop:4, boxSizing:"border-box" };
const inputSm = { padding:"6px 8px", borderRadius:6, border:"1px solid #e0e0e0", fontSize:12, boxSizing:"border-box" };
const labelStyle = { fontSize:12, color:"#757575", fontWeight:600, display:"flex", flexDirection:"column" };

// ============================================================
// DASHBOARD
// ============================================================
function Dashboard({ tasks, areas, schedules, purchases, harvestLogs, laborLogs, inventoryAlerts }) {
  const mobile = useIsMobile();
  const activeAreas = areas.filter(a => a.name && a.status === "Active");
  const totalHa = areas.reduce((s, a) => s + (a.ha || 0), 0);
  const completed = tasks.filter(t => t.status === "Completed").length;
  const inProgress = tasks.filter(t => t.status === "In Progress").length;
  const totalSpend = purchases.reduce((s, p) => s + ((p.qty || 0) * (p.unitCost || 0)), 0);
  const overallPct = tasks.length ? Math.round(completed / tasks.length * 100) : 0;

  const phaseData = PHASES.map(p => {
    const all = tasks.filter(t => t.phase === p);
    const done = all.filter(t => t.status === "Completed").length;
    return { phase: p, total: all.length, done, pct: all.length ? Math.round(done / all.length * 100) : 0 };
  });

  // Spending by inventory item from purchases
  const itemSpend = {};
  purchases.forEach(p => {
    if (!itemSpend[p.item]) itemSpend[p.item] = 0;
    itemSpend[p.item] += (p.qty || 0) * (p.unitCost || 0);
  });
  const spendData = Object.entries(itemSpend).map(([name, actual]) => ({ name, actual })).filter(c => c.actual > 0);

  const upcoming = tasks.filter(t => t.status !== "Completed" && t.status !== "Cancelled" && t.planStart >= today).sort((a,b) => a.planStart.localeCompare(b.planStart)).slice(0, 8);
  const overdue = tasks.filter(t => t.status !== "Completed" && t.status !== "Cancelled" && t.planEnd < today);

  // FIFO input cost per item per area
  const fifoCosts = useMemo(() => {
    const consumptions = buildConsumptionsFromTasks(tasks);
    const items = [...new Set(consumptions.map(c => c.item))];
    const result = {}; // { itemName: { costByArea, totalCost, breakdown } }
    items.forEach(item => {
      const itemPurchases = purchases.filter(p => p.item === item).sort((a,b) => (a.date||"").localeCompare(b.date||""));
      const itemConsumptions = consumptions.filter(c => c.item === item);
      result[item] = computeFifoCost(itemPurchases, itemConsumptions);
    });
    // Aggregate cost by area across all items
    const areaCosts = {};
    const areaBreakdown = {};
    Object.entries(result).forEach(([item, r]) => {
      Object.entries(r.costByArea).forEach(([area, cost]) => {
        if (!areaCosts[area]) areaCosts[area] = 0;
        areaCosts[area] += cost;
      });
      r.breakdown.forEach(b => {
        if (!areaBreakdown[b.area]) areaBreakdown[b.area] = [];
        areaBreakdown[b.area].push(b);
      });
    });
    return { byItem: result, areaCosts, areaBreakdown };
  }, [tasks, purchases]);

  // Compute current phase for each area
  const areaPhaseInfo = areas.filter(a => a.name).map(a => {
    const sched = schedules[a.id];
    if (!sched) return { ...a, currentPhase: "---", nextTask: null, daysToHarvest: null };
    const areaTasks = tasks.filter(t => t.area === a.name);
    const nextTask = areaTasks.filter(t => t.status !== "Completed" && t.status !== "Cancelled" && t.planStart >= today).sort((x,y) => x.planStart.localeCompare(y.planStart))[0];
    const daysToHarvest = daysBetween(today, sched.harvestDate);
    const done = areaTasks.filter(t => t.status === "Completed").length;
    const pct = areaTasks.length ? Math.round(done / areaTasks.length * 100) : 0;
    // Calculate applied inputs from completed tasks (normalized to kg for fert, mL for FAA)
    // Uses actual input amount if entered, otherwise falls back to planned amount
    const appliedKg = { "14-14-14": 0, "46-0-0": 0, "0-0-60": 0, "FAA_mL": 0 };
    areaTasks.filter(t => t.status === "Completed" && t.inputs).forEach(t => {
      t.inputs.forEach(inp => {
        const actualKey = `actualInput_${inp.item}`;
        const actualVal = t[actualKey];
        // Use actual amount if entered, otherwise use planned
        const rawAmt = (actualVal != null && actualVal !== "") ? String(actualVal) : (inp.amount || "");
        if (!rawAmt) return;
        const num = parseFloat(rawAmt) || 0;
        const amt = rawAmt.toLowerCase();
        if (inp.item === "14-14-14") {
          appliedKg["14-14-14"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "46-0-0") {
          appliedKg["46-0-0"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "0-0-60") {
          appliedKg["0-0-60"] += amt.includes("bag") ? num * 50 : num;
        } else if (inp.item === "FAA") {
          appliedKg["FAA_mL"] += amt.includes("l") ? num * 1000 : num;
        }
      });
    });
    const applied = appliedKg;
    // Labor cost
    const areaLabor = (laborLogs || []).filter(l => l.area === a.name);
    const laborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);
    const areaHarvests = harvestLogs.filter(h => h.area === a.name);
    const grossRev = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);
    const mgrShare = grossRev * 0.10;
    const inputCost = fifoCosts.areaCosts[a.name] || 0;
    const inputBreakdown = fifoCosts.areaBreakdown[a.name] || [];
    return { ...a, currentPhase: nextTask?.phase || "Harvest", nextTask, daysToHarvest, pct, done, total: areaTasks.length, applied, laborCost, mgrShare, totalLaborCost: laborCost + mgrShare, inputCost, inputBreakdown };
  });

  // Total input requirements across all areas
  const totalInputs = useMemo(() => {
    const totals = { urea: 0, mop: 0, faa: 0, triple14: 0 };
    Object.values(schedules).forEach(s => {
      totals.urea += s.quantities.totalUreaBags || 0;
      totals.mop += s.quantities.totalMOPBags || 0;
      totals.faa += s.quantities.totalFAA_L || 0;
      totals.triple14 += (s.quantities.basalSeedbedKg + (s.quantities.basalFieldBags ? parseFloat(s.quantities.basalFieldBags) * 50 : 0)) || 0;
    });
    return totals;
  }, [schedules]);

  const cardStyle = { background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)" };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap: mobile ? 12 : 16 }}>

      {/* KPI Row */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: mobile ? 8 : 12 }}>
        <KpiCard label="Active Areas" value={activeAreas.length} icon="🌾" color="#1565c0" sub={`${totalHa} ha total`} />
        <KpiCard label="Overall Progress" value={`${overallPct}%`} icon="📊" color="#2e7d32" sub={`${completed} of ${tasks.length} tasks`} />
        <KpiCard label="In Progress" value={inProgress} icon="🔄" color="#ef6c00" sub={overdue.length > 0 ? `${overdue.length} overdue` : "On track"} />
        <KpiCard label="Total Spend" value={totalSpend > 0 ? `₱${totalSpend.toLocaleString()}` : "---"} icon="💰" color="#d32f2f" sub={purchases.length > 0 ? `${purchases.length} purchases` : "No records yet"} />
      </div>

      {/* Overdue Alert */}
      {overdue.length > 0 && (
        <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", border:"1px solid #ffcc80", borderRadius:14, padding: mobile ? 12 : 16, display:"flex", alignItems:"flex-start", gap:12 }}>
          <span style={{ fontSize:24 }}>⚠️</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, color:"#e65100", fontSize:13, marginBottom:6 }}>Overdue Tasks ({overdue.length})</div>
            {overdue.slice(0, 5).map(t => (
              <div key={`${t.area}-${t.id}`} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", fontSize:12 }}>
                <Badge color="#e65100" bg="#ffe0b2">{t.area}</Badge>
                <span style={{ fontWeight:600, color:"#bf360c" }}>{t.activity}</span>
                {t.inputs && t.inputs.map((inp, i) => <span key={i} style={{ background:"#ffccbc", borderRadius:4, padding:"1px 5px", fontSize:10, fontWeight:600, color:"#bf360c" }}>{inp.item}</span>)}
                <span style={{ color:"#999", fontSize:11, marginLeft:"auto" }}>due {fmtDate(t.planEnd)}</span>
              </div>
            ))}
            {overdue.length > 5 && <div style={{ fontSize:11, color:"#e65100", marginTop:4 }}>+{overdue.length - 5} more</div>}
          </div>
        </div>
      )}

      {/* Inventory Notifications */}
      {(inventoryAlerts.shortages.length > 0 || inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length > 0) && (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

          {/* Overall Shortages */}
          {inventoryAlerts.shortages.length > 0 && (
            <div style={{ background:"linear-gradient(135deg,#ffebee,#ffcdd2)", border:"1px solid #ef9a9a", borderRadius:14, padding: mobile ? 12 : 16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                <span style={{ fontSize:20 }}>📦</span>
                <div style={{ fontWeight:800, color:"#c62828", fontSize:13 }}>Inventory Shortage — Stock below what's needed</div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "repeat(auto-fit, minmax(200px, 1fr))", gap:8 }}>
                {inventoryAlerts.shortages.map(s => (
                  <div key={s.item} style={{ background:"white", borderRadius:10, padding:"10px 14px", border:"1px solid #ef9a9a" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontWeight:800, color:"#c62828", fontSize:13 }}>{s.item}</span>
                      <span style={{ fontSize:16 }}>⚠️</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:6, fontSize:11 }}>
                      <div><span style={{ color:"#888" }}>On Hand</span><div style={{ fontWeight:700, color:"#d32f2f" }}>{Math.round(s.stock)} {s.unit}</div></div>
                      <div style={{ textAlign:"center" }}><span style={{ color:"#888" }}>Still Needed</span><div style={{ fontWeight:700, color:"#333" }}>{Math.round(s.needed)} {s.unit}</div></div>
                      <div style={{ textAlign:"right" }}><span style={{ color:"#888" }}>Deficit</span><div style={{ fontWeight:800, color:"#c62828" }}>{Math.round(s.deficit)} {s.unit}</div></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Upcoming Tasks Needing Inputs (next 14 days) */}
          {inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length > 0 && (
            <div style={{ background:"linear-gradient(135deg,#fff8e1,#ffecb3)", border:"1px solid #ffcc80", borderRadius:14, padding: mobile ? 12 : 16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                <span style={{ fontSize:20 }}>🔔</span>
                <div style={{ fontWeight:800, color:"#e65100", fontSize:13 }}>Upcoming Tasks — Insufficient Stock (next 14 days)</div>
              </div>
              {inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).slice(0, 8).map((n, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom: i < 7 ? "1px solid #ffe0b2" : "none", fontSize:12 }}>
                  <span style={{ fontWeight:700, color:"#e65100", minWidth:70, fontSize:11 }}>{fmtDate(n.date).replace(/, \d{4}$/, "")}</span>
                  <Badge color="#e65100" bg="#ffe0b2">{n.area}</Badge>
                  <span style={{ fontWeight:600, color:"#333" }}>{n.taskName}</span>
                  <span style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                    <span style={{ background:"#ffccbc", borderRadius:4, padding:"2px 6px", fontSize:10, fontWeight:700, color:"#bf360c" }}>{n.item}: need {Math.round(n.qty)} {n.unit}</span>
                    <span style={{ background:"#ffcdd2", borderRadius:4, padding:"2px 6px", fontSize:10, fontWeight:700, color:"#c62828" }}>have {Math.round(n.stock)} {n.unit}</span>
                  </span>
                </div>
              ))}
            </div>
          )}

          {/* Upcoming Tasks with Sufficient Stock (quiet confirmation) */}
          {inventoryAlerts.upcomingNeeds.filter(n => n.sufficient).length > 0 && inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length === 0 && (
            <div style={{ background:"linear-gradient(135deg,#e8f5e9,#c8e6c9)", border:"1px solid #a5d6a7", borderRadius:14, padding: mobile ? "10px 14px" : "12px 16px", display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>✅</span>
              <div>
                <div style={{ fontWeight:700, color:"#2e7d32", fontSize:12 }}>Inventory Ready</div>
                <div style={{ fontSize:11, color:"#388e3c" }}>All inputs for the next 14 days are sufficiently stocked.</div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Area Cards — one per area with key dates & progress */}
      {areaPhaseInfo.length > 0 && (
        <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "repeat(auto-fit, minmax(300px, 1fr))", gap: 12 }}>
          {areaPhaseInfo.map(a => {
            const sched = schedules[a.id];
            return (
              <div key={a.id} style={{ ...cardStyle, borderLeft:`5px solid ${PHASE_ACCENT[a.currentPhase] || "#666"}`, padding: mobile ? "12px 14px" : "16px 20px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div>
                    <div style={{ fontWeight:800, fontSize:15, color:"#333" }}>{a.name}</div>
                    <div style={{ fontSize:11, color:"#888", marginTop:2 }}>{a.ha} ha · {a.breed} · {a.season}</div>
                  </div>
                  <Badge color={PHASE_ACCENT[a.currentPhase]} bg={PHASE_COLORS[a.currentPhase]}>{a.currentPhase}</Badge>
                </div>

                {/* Progress bar */}
                <div style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:4 }}>
                    <span style={{ color:"#888" }}>{a.done}/{a.total} tasks</span>
                    <span style={{ fontWeight:700, color:"#2e7d32" }}>{a.pct}%</span>
                  </div>
                  <ProgressBar pct={a.pct} h={8} />
                </div>

                {/* Key Dates Row */}
                {sched && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
                    {[
                      ["Sow", sched.sowingDate, "🌱"],
                      ["Transplant", sched.tasks.find(t => t.activity === "Transplanting")?.planStart, "🌾"],
                      ["Panicle", sched.panicleDate, "🌿"],
                      ["Harvest", sched.harvestDate, "🌾"]
                    ].map(([label, date, icon]) => (
                      <div key={label} style={{ background:"#f5f5f0", borderRadius:8, padding:"4px 10px", fontSize:11, display:"flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontSize:12 }}>{icon}</span>
                        <span style={{ color:"#888" }}>{label}:</span>
                        <span style={{ fontWeight:700, color:"#333" }}>{date ? fmtDate(date).replace(/, \d{4}$/, "") : "---"}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* Input Requirements: Applied / Total */}
                {sched && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                    {[
                      { label:"14-14-14", total: sched.quantities.basalSeedbedKg + parseFloat(sched.quantities.basalFieldBags || 0)*50, applied: a.applied["14-14-14"], fmt: v => `${Math.round(v)} kg`, bg:"#e3f2fd", c:"#1565c0" },
                      { label:"46-0-0", total: (sched.quantities.urea_N1K1 + sched.quantities.urea_N2K2 + sched.quantities.urea_N3K3), applied: a.applied["46-0-0"], fmt: v => `${Math.round(v/50)} bags`, bg:"#e8f5e9", c:"#2e7d32" },
                      { label:"0-0-60", total: (sched.quantities.mop_N1K1 + sched.quantities.mop_N2K2 + sched.quantities.mop_N3K3 + sched.quantities.mop_K), applied: a.applied["0-0-60"], fmt: v => `${Math.round(v/50)} bags`, bg:"#fff3e0", c:"#e65100" },
                      { label:"FAA", total: sched.quantities.totalFAA_L, applied: a.applied["FAA_mL"], fmt: v => `${Math.round(v/1000)}L`, bg:"#f3e5f5", c:"#7b1fa2" },
                    ].map(inp => {
                      const pct = inp.total > 0 ? Math.round(inp.applied / inp.total * 100) : 0;
                      const isComplete = pct >= 100;
                      return (
                        <span key={inp.label} style={{ background: isComplete ? "#e8f5e9" : inp.bg, borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4, border: isComplete ? "1px solid #a5d6a7" : "1px solid transparent" }}>
                          <span style={{ fontWeight:700, color: isComplete ? "#2e7d32" : inp.c }}>{inp.label}</span>
                          <span style={{ fontWeight:600, color: isComplete ? "#2e7d32" : "#555" }}>{inp.fmt(inp.applied)}/{inp.fmt(inp.total)}</span>
                          {isComplete && <span style={{ fontSize:9 }}>✓</span>}
                        </span>
                      );
                    })}
                  </div>
                )}

                {/* Costs: Inputs (FIFO) + Labor + Manager */}
                {(a.inputCost > 0 || a.laborCost > 0 || a.mgrShare > 0) && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
                    {a.inputCost > 0 && (
                      <span style={{ background:"#e8eaf6", borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontWeight:700, color:"#283593" }}>Inputs (FIFO)</span>
                        <span style={{ fontWeight:600, color:"#555" }}>₱{a.inputCost.toLocaleString()}</span>
                      </span>
                    )}
                    {a.laborCost > 0 && (
                      <span style={{ background:"#e3f2fd", borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontWeight:700, color:"#1565c0" }}>Labor</span>
                        <span style={{ fontWeight:600, color:"#555" }}>₱{a.laborCost.toLocaleString()}</span>
                      </span>
                    )}
                    {a.mgrShare > 0 && (
                      <span style={{ background:"#fff3e0", borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4 }}>
                        <span style={{ fontWeight:700, color:"#e65100" }}>Manager 10%</span>
                        <span style={{ fontWeight:600, color:"#555" }}>₱{a.mgrShare.toLocaleString()}</span>
                      </span>
                    )}
                    <span style={{ background:"#fce4ec", borderRadius:6, padding:"3px 8px", fontSize:10, display:"inline-flex", alignItems:"center", gap:4 }}>
                      <span style={{ fontWeight:700, color:"#c62828" }}>Total Cost</span>
                      <span style={{ fontWeight:800, color:"#c62828" }}>₱{(a.inputCost + a.totalLaborCost).toLocaleString()}</span>
                    </span>
                  </div>
                )}

                {/* Next task */}
                {a.nextTask && (
                  <div style={{ background:"#f5f5f0", borderRadius:8, padding:"8px 12px", display:"flex", alignItems:"center", gap:8, fontSize:12 }}>
                    <span style={{ fontSize:14 }}>➡️</span>
                    <div style={{ flex:1 }}>
                      <span style={{ fontWeight:700, color:"#333" }}>{a.nextTask.activity}</span>
                      {a.nextTask.inputs && a.nextTask.inputs.map((inp, i) => (
                        <span key={i} style={{ marginLeft:6, background:"#e3f2fd", borderRadius:4, padding:"1px 6px", fontSize:10, fontWeight:600, color:"#1565c0" }}>{inp.item}{inp.amount ? ` ${inp.amount}` : ""}</span>
                      ))}
                    </div>
                    <span style={{ fontWeight:700, fontSize:11, color: daysBetween(today, a.nextTask.planStart) <= 3 ? "#d32f2f" : "#2e7d32" }}>{fmtDate(a.nextTask.planStart).replace(/, \d{4}$/, "")}</span>
                  </div>
                )}

                {/* Harvest result or countdown */}
                {(() => {
                  const areaHarvests = harvestLogs.filter(h => h.area === a.name);
                  if (areaHarvests.length > 0) {
                    const lastH = areaHarvests[areaHarvests.length - 1];
                    return (
                      <div style={{ background:"#fff9c4", borderRadius:8, padding:"8px 12px", marginTop:8, display:"flex", alignItems:"center", gap:10, fontSize:12 }}>
                        <span style={{ fontSize:16 }}>🌾</span>
                        <div style={{ flex:1 }}>
                          <span style={{ fontWeight:700, color:"#f57f17" }}>Harvested: </span>
                          <span style={{ fontWeight:800, color:"#2e7d32" }}>{lastH.totalKg.toLocaleString()} kg</span>
                          <span style={{ color:"#888" }}> ({lastH.bags} bags)</span>
                          {lastH.yieldPerHa && <span style={{ color:"#1565c0", fontWeight:600 }}> · {lastH.yieldPerHa.toLocaleString()} kg/ha</span>}
                        </div>
                        {lastH.buyerPrice && <span style={{ fontWeight:700, color:"#2e7d32" }}>₱{(lastH.totalKg * lastH.buyerPrice).toLocaleString()}</span>}
                      </div>
                    );
                  }
                  if (a.daysToHarvest != null && a.daysToHarvest > 0) {
                    return <div style={{ textAlign:"right", fontSize:11, color:"#888", marginTop:8 }}>{a.daysToHarvest} days to harvest</div>;
                  }
                  return null;
                })()}
              </div>
            );
          })}
        </div>
      )}

      {/* Harvest History Summary (across all areas) */}
      {harvestLogs.length > 0 && (
        <div style={cardStyle}>
          <h3 style={{ margin:"0 0 14px", color:"#f57f17", fontSize:14, fontWeight:800, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:18 }}>🌾</span> Harvest History
          </h3>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: mobile ? 8 : 12, marginBottom:14 }}>
            <div style={{ background:"#fffde7", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:10, color:"#888", fontWeight:600 }}>Total Harvested</div>
              <div style={{ fontSize:18, fontWeight:800, color:"#2e7d32" }}>{harvestLogs.reduce((s,h) => s + h.totalKg, 0).toLocaleString()} kg</div>
            </div>
            <div style={{ background:"#fffde7", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:10, color:"#888", fontWeight:600 }}>Total Bags</div>
              <div style={{ fontSize:18, fontWeight:800, color:"#5d4037" }}>{harvestLogs.reduce((s,h) => s + h.bags, 0).toLocaleString()}</div>
            </div>
            <div style={{ background:"#fffde7", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:10, color:"#888", fontWeight:600 }}>Avg Yield</div>
              <div style={{ fontSize:18, fontWeight:800, color:"#1565c0" }}>{(() => { const yl = harvestLogs.filter(h => h.yieldPerHa); return yl.length ? `${Math.round(yl.reduce((s,h) => s + h.yieldPerHa, 0) / yl.length).toLocaleString()} kg/ha` : "---"; })()}</div>
            </div>
            <div style={{ background:"#fffde7", borderRadius:10, padding:"10px 12px", textAlign:"center" }}>
              <div style={{ fontSize:10, color:"#888", fontWeight:600 }}>Total Revenue</div>
              <div style={{ fontSize:18, fontWeight:800, color:"#2e7d32" }}>₱{harvestLogs.filter(h => h.buyerPrice).reduce((s,h) => s + h.totalKg * h.buyerPrice, 0).toLocaleString()}</div>
            </div>
          </div>
          <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize: mobile ? 11 : 12, minWidth: mobile ? 500 : "auto" }}>
              <thead><tr style={{ background:"#fffde7" }}>
                {["Date","Area","Season","Breed","Bags","Total (kg)","Yield/ha","Grade","Revenue"].map(h => (
                  <th key={h} style={{ padding:"7px 6px", textAlign:"left", fontWeight:700, color:"#f57f17", borderBottom:"2px solid #ffecb3", fontSize:10 }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{[...harvestLogs].reverse().map(h => (
                <tr key={h.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                  <td style={{ padding:"6px", whiteSpace:"nowrap" }}>{fmtDate(h.date)}</td>
                  <td style={{ padding:"6px", fontWeight:600 }}>{h.area}</td>
                  <td style={{ padding:"6px" }}><Badge color="#1565c0" bg="#e3f2fd">{h.season}</Badge></td>
                  <td style={{ padding:"6px" }}>{h.breed}</td>
                  <td style={{ padding:"6px", fontWeight:700 }}>{h.bags.toLocaleString()}</td>
                  <td style={{ padding:"6px", fontWeight:800, color:"#2e7d32" }}>{h.totalKg.toLocaleString()}</td>
                  <td style={{ padding:"6px", color:"#1565c0", fontWeight:600 }}>{h.yieldPerHa ? `${h.yieldPerHa.toLocaleString()} kg/ha` : "---"}</td>
                  <td style={{ padding:"6px" }}><Badge color={h.grade === "Premium" ? "#2e7d32" : h.grade === "Good" ? "#1565c0" : "#ef6c00"} bg={h.grade === "Premium" ? "#e8f5e9" : h.grade === "Good" ? "#e3f2fd" : "#fff3e0"}>{h.grade}</Badge></td>
                  <td style={{ padding:"6px", fontWeight:700, color:"#2e7d32" }}>{h.buyerPrice ? `₱${(h.totalKg * h.buyerPrice).toLocaleString()}` : "---"}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* Phase Progress + Spending Chart */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "repeat(2, 1fr)", gap: 12 }}>
        <div style={cardStyle}>
          <h3 style={{ margin:"0 0 14px", color:"#2e7d32", fontSize:14, fontWeight:800 }}>Progress by Phase</h3>
          {phaseData.map(p => (
            <div key={p.phase} style={{ marginBottom:12 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                <span style={{ fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ width:10, height:10, borderRadius:3, background:PHASE_ACCENT[p.phase], display:"inline-block" }} />
                  {p.phase}
                </span>
                <span style={{ color:"#888" }}>{p.done}/{p.total} <span style={{ fontWeight:700, color: p.pct === 100 ? "#2e7d32" : "#333" }}>({p.pct}%)</span></span>
              </div>
              <ProgressBar pct={p.pct} color={PHASE_ACCENT[p.phase]} />
            </div>
          ))}
        </div>
        <div style={cardStyle}>
          <h3 style={{ margin:"0 0 14px", color:"#5d4037", fontSize:14, fontWeight:800 }}>Spending by Item</h3>
          {spendData.length > 0 ? (
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={spendData} margin={{ left:5, right:5 }}>
                <XAxis dataKey="name" tick={{ fontSize:9 }} angle={-30} textAnchor="end" height={55} />
                <YAxis tick={{ fontSize:10 }} />
                <Tooltip formatter={(v) => `₱${Number(v).toLocaleString()}`} />
                <Bar dataKey="actual" fill="#4caf50" name="Spent" radius={[4,4,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          ) : <div style={{ color:"#bbb", textAlign:"center", padding:40, fontSize:13 }}>Record purchases in Inventory to see spending chart</div>}
        </div>
      </div>

      {/* Upcoming Tasks */}
      <div style={{ ...cardStyle, overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
        <h3 style={{ margin:"0 0 14px", color:"#1565c0", fontSize:14, fontWeight:800 }}>Upcoming Tasks</h3>
        {upcoming.length === 0 ? <div style={{ color:"#bbb", fontSize:13, textAlign:"center", padding:16 }}>No upcoming tasks</div> : (
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {upcoming.map(t => {
              const da = daysBetween(today, t.planStart);
              const urgentColor = da <= 3 ? "#d32f2f" : da <= 7 ? "#ef6c00" : "#2e7d32";
              return (
                <div key={`${t.area}-${t.id}`} style={{ display:"flex", alignItems:"center", gap: mobile ? 8 : 12, padding:"10px 14px", background:"#fafafa", borderRadius:10, borderLeft:`4px solid ${urgentColor}` }}>
                  <div style={{ minWidth: mobile ? 28 : 40, textAlign:"center" }}>
                    <div style={{ fontWeight:800, fontSize: mobile ? 14 : 18, color:urgentColor, lineHeight:1 }}>{da}</div>
                    <div style={{ fontSize:9, color:"#999", fontWeight:600 }}>days</div>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, fontSize:13, color:"#333" }}>{t.activity}</span>
                      <Badge color="#666" bg="#eee">{t.area}</Badge>
                    </div>
                    {t.inputs && t.inputs.length > 0 && (
                      <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginTop:3 }}>
                        {t.inputs.map((inp, i) => (
                          <span key={i} style={{ background:"#e3f2fd", borderRadius:4, padding:"1px 6px", fontSize:10, fontWeight:600, color:"#1565c0" }}>{inp.item}{inp.amount ? ` · ${inp.amount}` : ""}</span>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:"#555" }}>{fmtDate(t.planStart).replace(/, \d{4}$/, "")}</div>
                    <Badge color={PHASE_ACCENT[t.phase]} bg={PHASE_COLORS[t.phase]}>{t.phase}</Badge>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// AREAS MANAGER
// ============================================================
function AreasManager({ areas, setAreas, schedules, breeds, taskMeta, setTaskMeta, customTasks, setCustomTasks, harvestLogs, setHarvestLogs, laborLogs, setLaborLogs, purchases, cashAdvances, setCashAdvances, equipment, fuelLogs, setFuelLogs }) {
  const mobile = useIsMobile();
  const [selectedId, setSelectedId] = useState(areas[0]?.id || null);
  const [subTab, setSubTab] = useState("info");

  const updateArea = (id, field, value) => {
    setAreas(prev => prev.map(a => a.id === id ? { ...a, [field]: field === "ha" || field === "maturity" ? Number(value) || 0 : value } : a));
  };

  const addArea = () => {
    setAreas(prev => {
      const nextId = prev.length > 0 ? Math.max(...prev.map(a => a.id)) + 1 : 1;
      const newArea = { id: nextId, name:"", ha:0, managedBy:"", breed:"", maturity:114, season:"Dry 2026", transplantDate:"", status:"Planning", notes:"" };
      setSelectedId(nextId);
      return [...prev, newArea];
    });
  };

  const removeArea = (id) => {
    setAreas(prev => {
      const next = prev.filter(a => a.id !== id);
      if (selectedId === id && next.length > 0) setSelectedId(next[0].id);
      return next;
    });
  };

  const a = areas.find(x => x.id === selectedId);
  const sched = a ? schedules[a.id] : null;

  // Tasks for the selected area (protocol + custom)
  const areaTasks = useMemo(() => {
    if (!a?.name) return [];
    const protocolTasks = sched ? sched.tasks.map(t => ({
      ...t,
      area: a.name,
      isCustom: false,
      status: taskMeta[`${a.name}-${t.id}`]?.status || "Not Started",
      ...(taskMeta[`${a.name}-${t.id}`] || {}),
    })) : [];
    const custom = (customTasks[a.name] || []).map(t => ({
      ...t,
      area: a.name,
      isCustom: true,
      status: taskMeta[`${a.name}-${t.id}`]?.status || t.status || "Not Started",
      ...(taskMeta[`${a.name}-${t.id}`] || {}),
    }));
    return [...protocolTasks, ...custom].sort((x, y) => (x.planStart || "").localeCompare(y.planStart || ""));
  }, [sched, a, taskMeta, customTasks]);

  const completedCount = areaTasks.filter(t => t.status === "Completed").length;
  const progressPct = areaTasks.length ? Math.round(completedCount / areaTasks.length * 100) : 0;

  const SUB_TABS = [
    { key:"info", label:"Info", icon:"ℹ️" },
    { key:"protocol", label:"Protocol", icon:"📋" },
    { key:"tasks", label:"Tasks", icon:"✅" },
    { key:"labor", label:"Labor", icon:"👷" },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* Area Menu Bar */}
      <div style={{ background:"white", borderRadius:12, boxShadow:"0 1px 4px rgba(0,0,0,.06)", padding: mobile ? 6 : 10, display:"flex", alignItems:"center", gap: mobile ? 6 : 8, overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
        {areas.map(ar => {
          const isActive = ar.id === selectedId;
          return (
            <button key={ar.id} onClick={() => setSelectedId(ar.id)} style={{
              background: isActive ? "#e8f5e9" : "#f5f5f5",
              border: isActive ? "2px solid #2e7d32" : "2px solid transparent",
              borderRadius:10, padding: mobile ? "6px 10px" : "8px 14px", cursor:"pointer", textAlign:"left",
              boxShadow: isActive ? "0 2px 6px rgba(46,125,50,.15)" : "none",
              transition:"all .15s", whiteSpace:"nowrap", flexShrink:0
            }}>
              <div style={{ fontWeight:800, fontSize: mobile ? 11 : 13, color: isActive ? "#1b5e20" : "#555" }}>{ar.name || "Unnamed"}</div>
              <div style={{ fontSize: mobile ? 9 : 10, color:"#999", marginTop:1 }}>{ar.ha > 0 ? `${ar.ha} ha` : "---"}{ar.breed ? ` · ${ar.breed}` : ""}</div>
            </button>
          );
        })}
        <button onClick={addArea} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:10, padding: mobile ? "6px 12px" : "8px 16px", fontSize: mobile ? 11 : 13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>+ Add</button>
      </div>

      {/* Selected Area Detail */}
      {a ? (
        <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 6px rgba(0,0,0,.07)", overflow:"hidden" }}>
          {/* Area header */}
          <div style={{ background: a.name ? "#e8f5e9" : "#f5f5f5", padding: mobile ? "10px 12px" : "14px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontWeight:800, color:"#2e7d32", fontSize: mobile ? 14 : 18 }}>#{a.id}</span>
              <input value={a.name} onChange={e => updateArea(a.id, "name", e.target.value)} placeholder="Area name..." style={{ border:"none", background:"transparent", fontSize: mobile ? 14 : 18, fontWeight:700, color:"#333", outline:"none", width: mobile ? 140 : 220 }} />
            </div>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              <select value={a.status} onChange={e => updateArea(a.id, "status", e.target.value)} style={{ ...inputSm, width: mobile ? 90 : 110 }}>
                {AREA_STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
              {areas.length > 1 && (
                <button onClick={() => removeArea(a.id)} title="Remove area" style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:8, padding: mobile ? "5px 8px" : "6px 12px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Remove</button>
              )}
            </div>
          </div>

          {/* Progress bar */}
          {areaTasks.length > 0 && (
            <div style={{ padding: mobile ? "8px 12px" : "10px 18px", background:"#fafafa", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:11, color:"#888", fontWeight:600, whiteSpace:"nowrap" }}>{completedCount}/{areaTasks.length} tasks ({progressPct}%)</span>
              <div style={{ flex:1 }}><ProgressBar pct={progressPct} color="#2e7d32" h={6} /></div>
            </div>
          )}

          {/* Sub-tabs */}
          <div style={{ display:"flex", gap:0, borderBottom:"2px solid #e0e0e0", padding:"0 4px", background:"#fafafa" }}>
            {SUB_TABS.map(st => (
              <button key={st.key} onClick={() => setSubTab(st.key)} style={{
                padding: mobile ? "8px 12px" : "10px 18px", background:"none", border:"none",
                borderBottom: subTab === st.key ? "3px solid #2e7d32" : "3px solid transparent",
                color: subTab === st.key ? "#2e7d32" : "#999", fontWeight: subTab === st.key ? 700 : 500,
                fontSize: mobile ? 11 : 13, cursor:"pointer", display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap"
              }}><span style={{ fontSize: mobile ? 12 : 14 }}>{st.icon}</span>{st.label}</button>
            ))}
          </div>

          {/* Sub-tab: Info */}
          {subTab === "info" && (
            <div style={{ padding: mobile ? "12px" : "18px 20px", display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(130px, 1fr))", gap:10 }}>
              <label style={labelStyle}>Area (ha)
                <input type="number" value={a.ha || ""} onChange={e => updateArea(a.id, "ha", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
              </label>
              <label style={labelStyle}>Transplant Date
                <input type="date" value={a.transplantDate || ""} onChange={e => updateArea(a.id, "transplantDate", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
              </label>
              <label style={labelStyle}>Breed
                <select value={a.breed} onChange={e => {
                  const breedName = e.target.value;
                  updateArea(a.id, "breed", breedName);
                  const match = breeds.find(b => b.name === breedName);
                  if (match) updateArea(a.id, "maturity", match.maturity);
                }} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }}>
                  <option value="">Select breed...</option>
                  {breeds.map(b => <option key={b.id} value={b.name}>{b.name} ({b.maturity}d)</option>)}
                </select>
              </label>
              <label style={labelStyle}>Maturity (days)
                <input type="number" value={a.maturity || ""} onChange={e => updateArea(a.id, "maturity", e.target.value)} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
              </label>
              <label style={labelStyle}>Managed By
                <input value={a.managedBy} onChange={e => updateArea(a.id, "managedBy", e.target.value)} placeholder="Name" style={inputStyle} />
              </label>
              <label style={labelStyle}>Season
                <input value={a.season} onChange={e => updateArea(a.id, "season", e.target.value)} style={inputStyle} />
              </label>
              <label style={{ ...labelStyle, gridColumn:"span 2" }}>Notes
                <input value={a.notes} onChange={e => updateArea(a.id, "notes", e.target.value)} placeholder="..." style={inputStyle} />
              </label>
            </div>
          )}

          {/* Sub-tab: Protocol */}
          {subTab === "protocol" && sched && a.name && (
            <div style={{ padding: mobile ? "12px" : "18px 20px" }}>
              <ProtocolDetail sched={sched} mobile={mobile} />
            </div>
          )}
          {subTab === "protocol" && (!sched || !a.name) && (
            <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>Fill in area name, hectares, transplant date and maturity to generate the protocol.</div>
          )}

          {/* Sub-tab: Tasks */}
          {subTab === "tasks" && (
            <AreaTaskTracker tasks={areaTasks} taskMeta={taskMeta} setTaskMeta={setTaskMeta} areaName={a.name} mobile={mobile} customTasks={customTasks} setCustomTasks={setCustomTasks} harvestLogs={harvestLogs} setHarvestLogs={setHarvestLogs} areaData={a} equipment={equipment} fuelLogs={fuelLogs} setFuelLogs={setFuelLogs} />
          )}

          {/* Sub-tab: Labor */}
          {subTab === "labor" && a.name && (
            <LaborCostTracker areaName={a.name} areaTasks={areaTasks} harvestLogs={harvestLogs} laborLogs={laborLogs} setLaborLogs={setLaborLogs} managedBy={a.managedBy} mobile={mobile} purchases={purchases} cashAdvances={cashAdvances} setCashAdvances={setCashAdvances} />
          )}
        </div>
      ) : (
        <div style={{ background:"white", borderRadius:14, padding:40, textAlign:"center", color:"#bbb", fontSize:14 }}>
          Select an area or add a new one.
        </div>
      )}
    </div>
  );
}

// ============================================================
// LABOR COST TRACKER (embedded per area inside AreasManager)
// ============================================================
function LaborCostTracker({ areaName, areaTasks, harvestLogs, laborLogs, setLaborLogs, managedBy, mobile, purchases, cashAdvances, setCashAdvances }) {
  const [showAdd, setShowAdd] = useState(false);
  const [entry, setEntry] = useState({ taskId:"", date: today, workers: 1, dailyWage: 500, days: 1, notes:"" });
  const [showAddCA, setShowAddCA] = useState(false);
  const [caEntry, setCaEntry] = useState({ date: today, amount: "", purpose: "", notes: "" });

  const areaLabor = laborLogs.filter(l => l.area === areaName);
  const areaHarvests = harvestLogs.filter(h => h.area === areaName);

  // FIFO input cost for this area
  const fifoCost = useMemo(() => {
    const consumptions = buildConsumptionsFromTasks(areaTasks.filter(t => t.area === areaName));
    const items = [...new Set(consumptions.map(c => c.item))];
    let totalInputCost = 0;
    const itemCosts = [];
    items.forEach(item => {
      const itemPurchases = (purchases || []).filter(p => p.item === item).sort((a,b) => (a.date||"").localeCompare(b.date||""));
      const itemConsumptions = consumptions.filter(c => c.item === item);
      const result = computeFifoCost(itemPurchases, itemConsumptions);
      const areaCost = result.costByArea[areaName] || 0;
      totalInputCost += areaCost;
      if (areaCost > 0 || result.breakdown.length > 0) {
        itemCosts.push({ item, cost: areaCost, breakdown: result.breakdown.filter(b => b.area === areaName) });
      }
    });
    return { totalInputCost, itemCosts };
  }, [areaTasks, areaName, purchases]);

  // Gross harvest revenue
  const grossRevenue = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);
  // Manager share: 10% of gross
  const managerShare = grossRevenue * 0.10;

  // Total additional labor cost
  const totalLaborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);

  // Cash advances for this area's manager
  const areaAdvances = (cashAdvances || []).filter(ca => ca.area === areaName);
  const totalAdvances = areaAdvances.reduce((s, ca) => s + ca.amount, 0);
  const mgrBalance = managerShare - totalAdvances; // positive = still owed, negative = over-advanced

  // Grand total = additional labor + manager share + inputs
  const grandTotal = totalLaborCost + managerShare + fifoCost.totalInputCost;

  const addLabor = () => {
    if (!entry.workers || !entry.dailyWage) return;
    const task = areaTasks.find(t => String(t.id) === String(entry.taskId));
    const totalCost = (Number(entry.workers) || 0) * (Number(entry.dailyWage) || 0) * (Number(entry.days) || 1);
    setLaborLogs(prev => [...prev, {
      id: Date.now(),
      area: areaName,
      taskId: entry.taskId || null,
      taskName: task ? task.activity : (entry.taskId ? entry.taskId : "General"),
      date: entry.date,
      workers: Number(entry.workers) || 0,
      dailyWage: Number(entry.dailyWage) || 0,
      days: Number(entry.days) || 1,
      totalCost,
      notes: entry.notes,
    }]);
    setEntry({ taskId:"", date: today, workers: 1, dailyWage: 500, days: 1, notes:"" });
    setShowAdd(false);
  };

  const addCashAdvance = () => {
    if (!caEntry.amount) return;
    setCashAdvances(prev => [...prev, {
      id: Date.now(),
      area: areaName,
      date: caEntry.date,
      amount: Number(caEntry.amount) || 0,
      purpose: caEntry.purpose || "Cash advance",
      notes: caEntry.notes,
    }]);
    setCaEntry({ date: today, amount: "", purpose: "", notes: "" });
    setShowAddCA(false);
  };

  return (
    <div style={{ padding: mobile ? 12 : 20, display:"flex", flexDirection:"column", gap:14 }}>

      {/* Summary Cards */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
        <div style={{ background:"linear-gradient(135deg,#e8eaf6,#c5cae9)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#283593", textTransform:"uppercase" }}>Input Cost (FIFO)</div>
          <div style={{ fontSize:20, fontWeight:800, color:"#1a237e", marginTop:4 }}>₱{fifoCost.totalInputCost.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#3949ab", marginTop:2 }}>{fifoCost.itemCosts.length} items applied</div>
        </div>
        <div style={{ background:"linear-gradient(135deg,#e3f2fd,#bbdefb)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#1565c0", textTransform:"uppercase" }}>Additional Labor</div>
          <div style={{ fontSize:20, fontWeight:800, color:"#0d47a1", marginTop:4 }}>₱{totalLaborCost.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#1976d2", marginTop:2 }}>{areaLabor.length} entries</div>
        </div>
        <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#e65100", textTransform:"uppercase" }}>Manager Share (10%)</div>
          <div style={{ fontSize:20, fontWeight:800, color:"#bf360c", marginTop:4 }}>₱{managerShare.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#e65100", marginTop:2 }}>{managedBy || "No manager"}</div>
          {totalAdvances > 0 && (
            <div style={{ fontSize:10, color: mgrBalance >= 0 ? "#2e7d32" : "#c62828", marginTop:2, fontWeight:700 }}>
              Advances: ₱{totalAdvances.toLocaleString()} · {mgrBalance >= 0 ? `Balance: ₱${mgrBalance.toLocaleString()}` : `Over: ₱${Math.abs(mgrBalance).toLocaleString()}`}
            </div>
          )}
        </div>
        <div style={{ background:"linear-gradient(135deg,#fce4ec,#f8bbd0)", borderRadius:12, padding:"12px 16px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#c62828", textTransform:"uppercase" }}>Total Area Cost</div>
          <div style={{ fontSize:20, fontWeight:800, color:"#b71c1c", marginTop:4 }}>₱{grandTotal.toLocaleString()}</div>
          <div style={{ fontSize:10, color:"#c62828", marginTop:2 }}>Inputs + Labor + Manager</div>
        </div>
      </div>

      {/* Add Labor Entry */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>Labor Records</div>
        <button onClick={() => setShowAdd(!showAdd)} style={{ background: showAdd ? "#999" : "#1565c0", color:"white", border:"none", borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
          {showAdd ? "Cancel" : "+ Add Labor"}
        </button>
      </div>

      {showAdd && (
        <div style={{ background:"#f5f9ff", borderRadius:12, padding:16, border:"1px solid #bbdefb" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
            <label style={labelStyle}>Task (optional)
              <select value={entry.taskId} onChange={e => setEntry(p => ({...p, taskId: e.target.value}))} style={inputStyle}>
                <option value="">General / No task</option>
                {areaTasks.filter(t => t.phase !== "Growth Stage").map(t => (
                  <option key={t.id} value={t.id}>#{t.id} {t.activity}</option>
                ))}
              </select>
            </label>
            <label style={labelStyle}>Date
              <input type="date" value={entry.date} onChange={e => setEntry(p => ({...p, date: e.target.value}))} style={inputStyle} />
            </label>
            <label style={labelStyle}>No. of Workers
              <input type="number" min="1" value={entry.workers} onChange={e => setEntry(p => ({...p, workers: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>Daily Wage (₱)
              <input type="number" min="0" value={entry.dailyWage} onChange={e => setEntry(p => ({...p, dailyWage: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>No. of Days
              <input type="number" min="1" value={entry.days} onChange={e => setEntry(p => ({...p, days: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#e3f2fd" }} />
            </label>
            <label style={labelStyle}>Notes
              <input value={entry.notes} onChange={e => setEntry(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={inputStyle} />
            </label>
          </div>
          {entry.workers && entry.dailyWage && (
            <div style={{ marginTop:10, fontSize:12, color:"#555" }}>
              Subtotal: <strong style={{ color:"#1565c0", fontSize:14 }}>₱{((Number(entry.workers)||0) * (Number(entry.dailyWage)||0) * (Number(entry.days)||1)).toLocaleString()}</strong>
              <span style={{ marginLeft:8, color:"#999" }}>({entry.workers} worker{entry.workers > 1 ? "s" : ""} × ₱{Number(entry.dailyWage).toLocaleString()} × {entry.days} day{entry.days > 1 ? "s" : ""})</span>
            </div>
          )}
          <button onClick={addLabor} disabled={!entry.workers || !entry.dailyWage} style={{ marginTop:12, background: entry.workers && entry.dailyWage ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: entry.workers && entry.dailyWage ? "pointer" : "not-allowed" }}>Save Labor Entry</button>
        </div>
      )}

      {/* Labor Log Table */}
      {areaLabor.length > 0 ? (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead><tr style={{ background:"#f5f9ff" }}>
              {["Date","Task","Workers","Wage","Days","Total","Notes",""].map(h => (
                <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#1565c0", borderBottom:"2px solid #bbdefb", fontSize:10 }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{[...areaLabor].reverse().map(l => (
              <tr key={l.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                <td style={{ padding:"7px 6px", whiteSpace:"nowrap" }}>{fmtDate(l.date)}</td>
                <td style={{ padding:"7px 6px" }}><Badge color="#1565c0" bg="#e3f2fd">{l.taskName}</Badge></td>
                <td style={{ padding:"7px 6px", fontWeight:700 }}>{l.workers}</td>
                <td style={{ padding:"7px 6px" }}>₱{l.dailyWage.toLocaleString()}</td>
                <td style={{ padding:"7px 6px" }}>{l.days}</td>
                <td style={{ padding:"7px 6px", fontWeight:800, color:"#1565c0" }}>₱{l.totalCost.toLocaleString()}</td>
                <td style={{ padding:"7px 6px", color:"#888" }}>{l.notes || "---"}</td>
                <td style={{ padding:"7px 6px" }}><button onClick={() => setLaborLogs(prev => prev.filter(x => x.id !== l.id))} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:10, cursor:"pointer" }}>x</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      ) : (
        <div style={{ padding:20, textAlign:"center", color:"#bbb", fontSize:12 }}>No labor records yet. Click "+ Add Labor" to log workers.</div>
      )}

      {/* FIFO Input Cost Breakdown */}
      <div style={{ background:"#e8eaf6", borderRadius:12, padding:"14px 18px", border:"1px solid #c5cae9" }}>
        <div style={{ fontWeight:700, fontSize:13, color:"#283593", marginBottom:6 }}>Input Cost — FIFO from Purchases</div>
        {fifoCost.itemCosts.length > 0 ? (
          <div style={{ fontSize:12, color:"#555" }}>
            {fifoCost.itemCosts.map(ic => (
              <div key={ic.item} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700, marginBottom:4 }}>
                  <span style={{ color:"#283593" }}>{ic.item}</span>
                  <span style={{ color:"#1a237e" }}>₱{ic.cost.toLocaleString()}</span>
                </div>
                {ic.breakdown.map((b, i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"2px 0 2px 12px", fontSize:11, borderBottom: i < ic.breakdown.length - 1 ? "1px dashed #c5cae9" : "none" }}>
                    <div>
                      <span style={{ color:"#666" }}>{b.taskName}</span>
                      <span style={{ color:"#999", marginLeft:6 }}>{b.qty} {ic.item === "FAA" ? "L" : "kg"}</span>
                    </div>
                    <div>
                      {b.lots.map((lot, li) => (
                        <span key={li} style={{ marginLeft:6, fontSize:10, color:"#888" }}>
                          {lot.qty}{ic.item === "FAA" ? "L" : "kg"} @ ₱{lot.unitCost}/{ic.item === "FAA" ? "L" : "kg"}
                          {lot.supplier ? ` (${lot.supplier})` : ""}
                        </span>
                      ))}
                      <span style={{ fontWeight:600, color:"#283593", marginLeft:6 }}>₱{b.cost.toLocaleString()}</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
            <div style={{ borderTop:"2px solid #c5cae9", marginTop:8, paddingTop:8, display:"flex", justifyContent:"space-between", fontWeight:800 }}>
              <span>Total Input Cost</span>
              <span style={{ color:"#1a237e", fontSize:14 }}>₱{fifoCost.totalInputCost.toLocaleString()}</span>
            </div>
          </div>
        ) : (
          <div style={{ color:"#9fa8da", fontSize:11 }}>No input costs yet. Costs are computed when tasks with inputs are completed and matching purchases exist in Inventory.</div>
        )}
      </div>

      {/* Manager Compensation & Cash Advances */}
      <div style={{ background:"#fff8e1", borderRadius:12, padding:"14px 18px", border:"1px solid #ffe082" }}>
        <div style={{ fontWeight:700, fontSize:13, color:"#f57f17", marginBottom:6 }}>Manager Compensation — 10% of Sold Rice</div>
        <div style={{ fontSize:12, color:"#555", lineHeight:1.6 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
            <span>Manager: <strong>{managedBy || "Not assigned"}</strong></span>
            <span style={{ fontSize:10, color:"#999" }}>Rate: 10% of selling price/kg</span>
          </div>
          {areaHarvests.length > 0 ? (
            <div style={{ background:"#fffde7", borderRadius:8, padding:"8px 10px", marginBottom:8 }}>
              {areaHarvests.map((h, i) => {
