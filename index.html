                const sellPrice = h.buyerPrice || 0;
                const mgrRate = sellPrice * 0.10;
                const mgrPay = h.totalKg * mgrRate;
                return (
                  <div key={h.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom: i < areaHarvests.length - 1 ? "1px dashed #ffe082" : "none" }}>
                    <div>
                      <span style={{ fontWeight:600 }}>{fmtDate(h.date)}</span>
                      <span style={{ color:"#999", marginLeft:6, fontSize:11 }}>{h.totalKg.toLocaleString()} kg × ₱{sellPrice}/kg × 10%</span>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontSize:10, color:"#888", marginRight:6 }}>₱{mgrRate.toFixed(2)}/kg</span>
                      <span style={{ fontWeight:700, color:"#e65100" }}>₱{mgrPay.toLocaleString()}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div style={{ color:"#bbb", fontSize:11, marginBottom:8 }}>No harvest recorded yet — manager share will compute once rice is sold.</div>
          )}
          <div style={{ display:"flex", justifyContent:"space-between", fontWeight:700 }}>
            <span>Total Manager Share (10%)</span>
            <span style={{ color:"#e65100", fontSize:14 }}>₱{managerShare.toLocaleString()}</span>
          </div>
        </div>

        {/* Cash Advances */}
        <div style={{ borderTop:"2px solid #ffe082", marginTop:12, paddingTop:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontWeight:700, fontSize:12, color:"#e65100" }}>Cash Advances</div>
            <button onClick={() => setShowAddCA(!showAddCA)} style={{ background: showAddCA ? "#999" : "#e65100", color:"white", border:"none", borderRadius:6, padding:"5px 12px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
              {showAddCA ? "Cancel" : "+ Advance"}
            </button>
          </div>

          {showAddCA && (
            <div style={{ background:"#fff3e0", borderRadius:10, padding:12, marginBottom:10, border:"1px solid #ffcc80" }}>
              <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:8 }}>
                <label style={labelStyle}>Date
                  <input type="date" value={caEntry.date} onChange={e => setCaEntry(p => ({...p, date: e.target.value}))} style={inputStyle} />
                </label>
                <label style={labelStyle}>Amount (₱)
                  <input type="number" min="0" value={caEntry.amount} onChange={e => setCaEntry(p => ({...p, amount: e.target.value}))} placeholder="e.g. 5000" style={{ ...inputStyle, fontWeight:700, color:"#e65100", background:"#fff3e0" }} />
                </label>
                <label style={labelStyle}>Purpose
                  <input value={caEntry.purpose} onChange={e => setCaEntry(p => ({...p, purpose: e.target.value}))} placeholder="e.g. Personal, Rice delivery..." style={inputStyle} />
                </label>
              </div>
              <button onClick={addCashAdvance} disabled={!caEntry.amount} style={{ marginTop:8, background: caEntry.amount ? "#e65100" : "#bbb", color:"white", border:"none", borderRadius:6, padding:"8px 18px", fontSize:12, fontWeight:700, cursor: caEntry.amount ? "pointer" : "not-allowed" }}>Save Cash Advance</button>
            </div>
          )}

          {areaAdvances.length > 0 ? (
            <div style={{ marginBottom:10 }}>
              {[...areaAdvances].reverse().map((ca, i) => (
                <div key={ca.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom: i < areaAdvances.length - 1 ? "1px dashed #ffe082" : "none", fontSize:12 }}>
                  <div>
                    <span style={{ fontWeight:600 }}>{fmtDate(ca.date)}</span>
                    <span style={{ color:"#888", marginLeft:6, fontSize:11 }}>{ca.purpose || "Cash advance"}</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontWeight:700, color:"#c62828" }}>-₱{ca.amount.toLocaleString()}</span>
                    <button onClick={() => setCashAdvances(prev => prev.filter(x => x.id !== ca.id))} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:4, padding:"2px 6px", fontSize:9, cursor:"pointer" }}>x</button>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ color:"#bbb", fontSize:11, marginBottom:8 }}>No cash advances recorded.</div>
          )}

          {/* Balance */}
          <div style={{ background: mgrBalance >= 0 ? "#e8f5e9" : "#ffebee", borderRadius:8, padding:"10px 14px", border:`1px solid ${mgrBalance >= 0 ? "#a5d6a7" : "#ef9a9a"}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#888", marginBottom:2 }}>
              <span>Manager Share (10%)</span><span>₱{managerShare.toLocaleString()}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#c62828", marginBottom:4 }}>
              <span>Less: Cash Advances</span><span>-₱{totalAdvances.toLocaleString()}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontWeight:800, borderTop:`1px solid ${mgrBalance >= 0 ? "#a5d6a7" : "#ef9a9a"}`, paddingTop:6 }}>
              <span>{mgrBalance >= 0 ? "Balance Due to Manager" : "Manager Owes (Over-advanced)"}</span>
              <span style={{ color: mgrBalance >= 0 ? "#2e7d32" : "#c62828", fontSize:14 }}>₱{Math.abs(mgrBalance).toLocaleString()}</span>
            </div>
          </div>
        </div>

        {/* Grand Total */}
        <div style={{ borderTop:"2px solid #ffe082", marginTop:12, paddingTop:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#888", marginBottom:2 }}>
            <span>Inputs (FIFO)</span><span>₱{fifoCost.totalInputCost.toLocaleString()}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#888", marginBottom:2 }}>
            <span>Additional Labor</span><span>₱{totalLaborCost.toLocaleString()}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#888", marginBottom:4 }}>
            <span>Manager Share</span><span>₱{managerShare.toLocaleString()}</span>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", fontWeight:800, borderTop:"1px solid #ffe082", paddingTop:6 }}>
            <span>Total Area Cost</span>
            <span style={{ color:"#c62828", fontSize:14 }}>₱{grandTotal.toLocaleString()}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// TASK FUEL SECTION — per-task equipment fuel cost
// ============================================================
function TaskFuelSection({ task, areaName, equipment, fuelLogs, setFuelLogs, mobile }) {
  const [showForm, setShowForm] = useState(false);
  const [entry, setEntry] = useState({ equipId: "", liters: "", costPerLiter: "", hoursOperated: "", notes: "" });

  const labelStyle = { display:"flex", flexDirection:"column", gap:3, fontSize:11, fontWeight:600, color:"#555" };
  const inputStyle = { padding:"7px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:12, background:"white" };

  // Fuel entries linked to this task
  const taskFuel = fuelLogs.filter(f => f.taskId === task.id && f.taskArea === areaName);
  const totalFuelCost = taskFuel.reduce((s, f) => s + (f.totalCost || 0), 0);

  const addFuel = () => {
    if (!entry.liters || !entry.equipId) return;
    const eq = equipment.find(e => e.id === Number(entry.equipId));
    const liters = Number(entry.liters) || 0;
    const costPerLiter = Number(entry.costPerLiter) || 0;
    setFuelLogs(prev => [...prev, {
      id: Date.now(), equipId: Number(entry.equipId), equipName: eq?.name || "Unknown",
      date: task.actStart || task.planStart || today,
      liters, costPerLiter, totalCost: liters * costPerLiter,
      hoursOperated: Number(entry.hoursOperated) || 0,
      notes: entry.notes || `${task.activity}`,
      taskId: task.id, taskArea: areaName, taskName: task.activity,
    }]);
    setEntry({ equipId: "", liters: "", costPerLiter: "", hoursOperated: "", notes: "" });
    setShowForm(false);
  };

  return (
    <div style={{ gridColumn: mobile ? "span 1" : "span 3", background:"#f3faf3", borderRadius:10, padding:"10px 14px", border:"1px solid #e0f2e0" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: showForm || taskFuel.length > 0 ? 8 : 0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ fontSize:14 }}>⛽</span>
          <span style={{ fontSize:11, fontWeight:700, color:"#2e7d32" }}>Equipment Fuel</span>
          {totalFuelCost > 0 && <span style={{ fontSize:11, fontWeight:800, color:"#1b5e20", background:"#c8e6c9", borderRadius:6, padding:"1px 8px" }}>₱{totalFuelCost.toLocaleString()}</span>}
        </div>
        <button onClick={() => setShowForm(!showForm)} style={{ background: showForm ? "#999" : "#2e7d32", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:10, fontWeight:700, cursor:"pointer" }}>
          {showForm ? "Cancel" : "+ Fuel"}
        </button>
      </div>

      {showForm && (
        <div style={{ background:"#e8f5e9", borderRadius:8, padding:10, marginBottom:8, border:"1px solid #c8e6c9" }}>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:8 }}>
            <label style={labelStyle}>Equipment *
              <select value={entry.equipId} onChange={e => setEntry(p => ({...p, equipId: e.target.value}))} style={inputStyle}>
                <option value="">Select equipment...</option>
                {equipment.map(eq => <option key={eq.id} value={eq.id}>{eq.name} ({eq.type})</option>)}
              </select>
            </label>
            <label style={labelStyle}>Liters *
              <input type="number" min="0" step="0.1" value={entry.liters} onChange={e => setEntry(p => ({...p, liters: e.target.value}))} placeholder="e.g. 15" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32" }} />
            </label>
            <label style={labelStyle}>Cost/Liter (₱)
              <input type="number" min="0" step="0.01" value={entry.costPerLiter} onChange={e => setEntry(p => ({...p, costPerLiter: e.target.value}))} placeholder="e.g. 62.50" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32" }} />
            </label>
            <label style={labelStyle}>Hours Used
              <input type="number" min="0" step="0.5" value={entry.hoursOperated} onChange={e => setEntry(p => ({...p, hoursOperated: e.target.value}))} placeholder="e.g. 4" style={inputStyle} />
            </label>
            <label style={labelStyle}>Notes
              <input value={entry.notes} onChange={e => setEntry(p => ({...p, notes: e.target.value}))} placeholder={task.activity || "Optional..."} style={inputStyle} />
            </label>
            {entry.liters && entry.costPerLiter && (
              <div style={{ display:"flex", alignItems:"center", fontSize:12, fontWeight:700, color:"#2e7d32" }}>
                Total: ₱{((Number(entry.liters)||0) * (Number(entry.costPerLiter)||0)).toLocaleString()}
              </div>
            )}
          </div>
          <button onClick={addFuel} disabled={!entry.equipId || !entry.liters} style={{ marginTop:8, background: entry.equipId && entry.liters ? "#2e7d32" : "#bbb", color:"white", border:"none", borderRadius:6, padding:"6px 16px", fontSize:11, fontWeight:700, cursor: entry.equipId && entry.liters ? "pointer" : "not-allowed" }}>Save Fuel</button>
        </div>
      )}

      {taskFuel.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
          {taskFuel.map(f => (
            <div key={f.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:11, padding:"4px 8px", background:"white", borderRadius:6, border:"1px solid #e8f5e9" }}>
              <div>
                <span style={{ fontWeight:700 }}>🚜 {f.equipName}</span>
                <span style={{ color:"#888", marginLeft:6 }}>{f.liters}L × ₱{f.costPerLiter}/L</span>
                {f.hoursOperated > 0 && <span style={{ color:"#aaa", marginLeft:6 }}>{f.hoursOperated}h</span>}
              </div>
              <span style={{ fontWeight:800, color:"#2e7d32" }}>₱{f.totalCost.toLocaleString()}</span>
            </div>
          ))}
        </div>
      )}

      {equipment.length === 0 && !showForm && taskFuel.length === 0 && (
        <div style={{ fontSize:10, color:"#bbb", marginTop:2 }}>Register equipment in the Equipment tab first to log fuel here.</div>
      )}
    </div>
  );
}

// ============================================================
// AREA TASK TRACKER (embedded per area inside AreasManager)
// ============================================================
function AreaTaskTracker({ tasks, taskMeta, setTaskMeta, areaName, mobile, customTasks, setCustomTasks, harvestLogs, setHarvestLogs, areaData, equipment, fuelLogs, setFuelLogs }) {
  const [filterPhase, setFilterPhase] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [expandedId, setExpandedId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newTask, setNewTask] = useState({ activity:"", phase:"Crop Care", planStart:"", planEnd:"", notes:"" });
  const [showHarvestForm, setShowHarvestForm] = useState(false);
  const [harvestEntry, setHarvestEntry] = useState({ date: today, bags: "", weightPerBag: 50, moisture: "", buyerPrice: "", grade: "Good", notes: "" });

  const filtered = tasks.filter(t =>
    (filterPhase === "All" || t.phase === filterPhase) &&
    (filterStatus === "All" || t.status === filterStatus)
  );

  const updateMeta = (id, field, value) => {
    const key = `${areaName}-${id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), [field]: value } }));
  };

  const quickComplete = (t) => {
    const key = `${areaName}-${t.id}`;
    setTaskMeta(prev => ({ ...prev, [key]: { ...(prev[key] || {}), status: "Completed", actEnd: (prev[key]?.actEnd) || today } }));
  };

  const addTask = () => {
    if (!newTask.activity || !newTask.planStart) return;
    const existing = customTasks[areaName] || [];
    const maxId = existing.length > 0 ? Math.max(...existing.map(t => t.id)) : 1000;
    const task = {
      id: maxId + 1,
      activity: newTask.activity,
      phase: newTask.phase,
      planStart: newTask.planStart,
      planEnd: newTask.planEnd || newTask.planStart,
      status: "Not Started",
      notes: newTask.notes,
      isCustom: true,
    };
    setCustomTasks(prev => ({ ...prev, [areaName]: [...(prev[areaName] || []), task] }));
    setNewTask({ activity:"", phase:"Crop Care", planStart:"", planEnd:"", notes:"" });
    setShowAdd(false);
  };

  const removeCustomTask = (taskId) => {
    setCustomTasks(prev => ({
      ...prev,
      [areaName]: (prev[areaName] || []).filter(t => t.id !== taskId),
    }));
    const key = `${areaName}-${taskId}`;
    setTaskMeta(prev => {
      const next = { ...prev };
      delete next[key];
      return next;
    });
  };

  const recordHarvest = () => {
    if (!harvestEntry.bags || !harvestEntry.date) return;
    const bags = Number(harvestEntry.bags) || 0;
    const wpb = Number(harvestEntry.weightPerBag) || 50;
    const totalKg = bags * wpb;
    const log = {
      id: Date.now(),
      area: areaName,
      season: areaData?.season || "",
      breed: areaData?.breed || "",
      ha: areaData?.ha || 0,
      date: harvestEntry.date,
      bags,
      weightPerBag: wpb,
      totalKg,
      moisture: harvestEntry.moisture ? Number(harvestEntry.moisture) : null,
      buyerPrice: harvestEntry.buyerPrice ? Number(harvestEntry.buyerPrice) : null,
      grade: harvestEntry.grade,
      notes: harvestEntry.notes,
      yieldPerHa: areaData?.ha ? Math.round(totalKg / areaData.ha) : null,
    };
    setHarvestLogs(prev => [...prev, log]);
    setHarvestEntry({ date: today, bags: "", weightPerBag: 50, moisture: "", buyerPrice: "", grade: "Good", notes: "" });
    setShowHarvestForm(false);
  };

  const areaHarvests = harvestLogs.filter(h => h.area === areaName);

  return (
    <div style={{ padding: mobile ? 10 : 16, display:"flex", flexDirection:"column", gap:10 }}>
      {/* Filters + Add button */}
      <div style={{ display:"flex", flexWrap:"wrap", gap: mobile ? 6 : 10, alignItems:"center" }}>
        <select value={filterPhase} onChange={e => setFilterPhase(e.target.value)} style={{ ...filterStyle, fontSize: mobile ? 11 : 13, padding: mobile ? "6px 8px" : "8px 12px" }}>
          <option value="All">All Phases</option>
          {PHASES.map(p => <option key={p}>{p}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ ...filterStyle, fontSize: mobile ? 11 : 13, padding: mobile ? "6px 8px" : "8px 12px" }}>
          <option value="All">All Statuses</option>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <span style={{ fontSize: mobile ? 10 : 12, color:"#999" }}>{filtered.length} tasks</span>
        <button onClick={() => setShowAdd(!showAdd)} style={{ marginLeft:"auto", background: showAdd ? "#999" : "#1565c0", color:"white", border:"none", borderRadius:8, padding: mobile ? "6px 12px" : "8px 16px", fontSize: mobile ? 11 : 12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>{showAdd ? "Cancel" : "+ Add Task"}</button>
      </div>

      {/* Add Task Form */}
      {showAdd && (
        <div style={{ background:"#e3f2fd", borderRadius:14, padding: mobile ? 12 : 18, border:"2px solid #90caf9" }}>
          <h4 style={{ margin:"0 0 10px", fontSize:14, color:"#1565c0" }}>New Custom Task</h4>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
            <label style={labelStyle}>Activity Name *
              <input value={newTask.activity} onChange={e => setNewTask(p => ({...p, activity: e.target.value}))} placeholder="e.g. Apply insecticide" style={inputStyle} />
            </label>
            <label style={labelStyle}>Phase
              <select value={newTask.phase} onChange={e => setNewTask(p => ({...p, phase: e.target.value}))} style={inputStyle}>
                {PHASES.filter(p => p !== "Growth Stage").map(p => <option key={p}>{p}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Planned Start *
              <input type="date" value={newTask.planStart} onChange={e => setNewTask(p => ({...p, planStart: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0", background:"#bbdefb" }} />
            </label>
            <label style={labelStyle}>Planned End
              <input type="date" value={newTask.planEnd} onChange={e => setNewTask(p => ({...p, planEnd: e.target.value}))} style={inputStyle} />
            </label>
            <label style={{ ...labelStyle, gridColumn: mobile ? "span 1" : "span 2" }}>Notes
              <input value={newTask.notes} onChange={e => setNewTask(p => ({...p, notes: e.target.value}))} placeholder="Optional details..." style={inputStyle} />
            </label>
          </div>
          <button onClick={addTask} disabled={!newTask.activity || !newTask.planStart} style={{ marginTop:12, background: newTask.activity && newTask.planStart ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: newTask.activity && newTask.planStart ? "pointer" : "not-allowed" }}>Save Task</button>
        </div>
      )}

      {/* Task list */}
      {filtered.length === 0 && !showAdd && (
        <div style={{ padding:30, textAlign:"center", color:"#bbb", fontSize:13 }}>No tasks found. {tasks.length === 0 ? "Fill in area details to generate tasks, or add a custom task." : "Try changing the filters."}</div>
      )}

      {filtered.map(t => {
        const isGrowthStage = t.phase === "Growth Stage";
        const isExp = expandedId === t.id;
        const status = t.status || "Not Started";
        const delay = daysBetween(t.planEnd, t.actEnd);

        if (isGrowthStage) {
          return (
            <div key={t.id} style={{ background:"linear-gradient(135deg,#f3e5f5,#e1bee7)", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderLeft:`5px solid #7b1fa2`, overflow:"hidden", display:"flex", alignItems:"center", gap:12, padding:"13px 18px" }}>
              <span style={{ fontSize:20 }}>🌱</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:800, fontSize:14, color:"#4a148c" }}>{t.activity}</div>
                <div style={{ fontSize:11, color:"#7b1fa2", marginTop:2 }}>{fmtDate(t.planStart)}{t.planEnd !== t.planStart ? ` → ${fmtDate(t.planEnd)}` : ""}</div>
              </div>
              <Badge color="#7b1fa2" bg="#e1bee7">Growth Stage</Badge>
            </div>
          );
        }

        return (
          <div key={t.id} style={{ background: t.isCustom ? "#fffde7" : "white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", borderLeft:`5px solid ${t.isCustom ? "#ff8f00" : (PHASE_COLORS[t.phase] || "#ccc")}`, overflow:"hidden", border:"1px solid #f0f0f0" }}>
            <div onClick={() => setExpandedId(isExp ? null : t.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"13px 16px", cursor:"pointer" }}>
              <span style={{ fontWeight:700, color:"#aaa", fontSize:12, minWidth:30 }}>#{t.id}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:13, color:"#333", display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                  {t.activity}
                  {t.isCustom && <Badge color="#ff8f00" bg="#fff3e0">Custom</Badge>}
                </div>
                {t.inputs && t.inputs.length > 0 && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
                    {t.inputs.map((inp, idx) => {
                      const actualVal = t[`actualInput_${inp.item}`];
                      const hasActual = actualVal != null && actualVal !== "";
                      return (
                      <span key={idx} style={{ display:"inline-flex", alignItems:"center", gap:4, background: hasActual ? "#e8f5e9" : "#e3f2fd", border:`1px solid ${hasActual ? "#a5d6a7" : "#bbdefb"}`, borderRadius:6, padding:"2px 8px", fontSize:11 }}>
                        <span style={{ fontWeight:700, color: hasActual ? "#2e7d32" : "#1565c0" }}>{inp.item}</span>
                        {hasActual ? (
                          <span style={{ color:"#2e7d32", fontWeight:600 }}>{actualVal}<span style={{ color:"#999", fontWeight:400 }}>/{inp.amount}</span></span>
                        ) : (
                          inp.amount && <span style={{ color:"#555", fontWeight:600 }}>{inp.amount}</span>
                        )}
                      </span>
                      );})}
                  </div>
                )}
                <div style={{ fontSize:11, color:"#aaa", marginTop:3 }}>{fmtDate(t.planStart)} → {fmtDate(t.planEnd)}{t.notes ? ` · ${t.notes}` : ""}</div>
              </div>
              <StatusBadge status={status} />
              {status !== "Completed" && (
                <button onClick={e => { e.stopPropagation(); quickComplete(t); }} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:8, padding:"5px 14px", fontSize:11, fontWeight:700, cursor:"pointer" }}>Done</button>
              )}
              <span style={{ fontSize:16, color:"#ccc", transform: isExp ? "rotate(180deg)" : "none", transition:"transform .2s" }}>▼</span>
            </div>

            {isExp && (
              <div style={{ padding: mobile ? "0 10px 12px" : "0 16px 16px", borderTop:"1px solid #f5f5f5", display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10, paddingTop:12 }}>
                <label style={labelStyle}>Status
                  <select value={status} onChange={e => updateMeta(t.id, "status", e.target.value)} style={inputStyle}>
                    {STATUSES.map(s => <option key={s}>{s}</option>)}
                  </select>
                </label>
                <label style={labelStyle}>Actual Start
                  <input type="date" value={t.actStart || ""} onChange={e => updateMeta(t.id, "actStart", e.target.value)} style={inputStyle} />
                </label>
                <label style={labelStyle}>Actual End
                  <input type="date" value={t.actEnd || ""} onChange={e => updateMeta(t.id, "actEnd", e.target.value)} style={inputStyle} />
                </label>
                <label style={labelStyle}>Assigned To
                  <input value={t.assignedTo || ""} onChange={e => updateMeta(t.id, "assignedTo", e.target.value)} placeholder="Worker" style={inputStyle} />
                </label>
                <label style={{ ...labelStyle, gridColumn: mobile ? "span 1" : "span 2" }}>Remarks
                  <input value={t.remarks || ""} onChange={e => updateMeta(t.id, "remarks", e.target.value)} placeholder="Notes..." style={inputStyle} />
                </label>
                {t.inputs && t.inputs.length > 0 && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3", background:"#fafafa", borderRadius:10, padding:"10px 14px" }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#666", marginBottom:8 }}>Actual Inputs Applied</div>
                    <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : `repeat(${Math.min(t.inputs.length, 3)}, 1fr)`, gap:8 }}>
                      {t.inputs.map((inp, idx) => {
                        const metaKey = `actualInput_${inp.item}`;
                        const planned = inp.amount || "";
                        return (
                          <label key={idx} style={labelStyle}>
                            <span style={{ display:"flex", alignItems:"center", gap:4 }}>
                              <span style={{ fontWeight:700, color:"#1565c0" }}>{inp.item}</span>
                              <span style={{ fontSize:10, color:"#999" }}>planned: {planned}</span>
                            </span>
                            <input
                              value={t[metaKey] ?? ""}
                              onChange={e => updateMeta(t.id, metaKey, e.target.value)}
                              placeholder={planned || "Amount applied..."}
                              style={{ ...inputStyle, fontWeight:700, color:"#2e7d32", background:"#e8f5e9" }}
                            />
                          </label>
                        );
                      })}
                    </div>
                  </div>
                )}
                {/* Fuel / Equipment Cost — only for tasks that use equipment */}
                {["Rotavator","Repair Dikes","Final Harrow","Harvesting"].includes(t.activity) && (
                  <TaskFuelSection task={t} areaName={areaName} equipment={equipment || []} fuelLogs={fuelLogs || []} setFuelLogs={setFuelLogs} mobile={mobile} />
                )}

                {delay > 0 && <div style={{ gridColumn: mobile ? "span 1" : "span 3", color:"#d32f2f", fontSize:12, fontWeight:600 }}>Delayed by {delay} day(s)</div>}
                {t.isCustom && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3" }}>
                    <button onClick={() => removeCustomTask(t.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:8, padding:"6px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Remove Task</button>
                  </div>
                )}
                {/* Harvest recording button */}
                {t.phase === "Harvest" && t.activity === "Harvesting" && (
                  <div style={{ gridColumn: mobile ? "span 1" : "span 3" }}>
                    <button onClick={() => setShowHarvestForm(!showHarvestForm)} style={{ background: showHarvestForm ? "#999" : "#f9a825", color: showHarvestForm ? "white" : "#333", border:"none", borderRadius:8, padding:"8px 20px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                      {showHarvestForm ? "Cancel" : "🌾 Record Harvest Output"}
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Harvest Recording Form */}
      {showHarvestForm && (
        <div style={{ background:"linear-gradient(135deg,#fff9c4,#fff3e0)", borderRadius:14, padding: mobile ? 14 : 20, border:"2px solid #f9a825" }}>
          <h4 style={{ margin:"0 0 12px", fontSize:14, color:"#f57f17", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:20 }}>🌾</span> Record Harvest — {areaName}
          </h4>
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
            <label style={labelStyle}>Harvest Date *
              <input type="date" value={harvestEntry.date} onChange={e => setHarvestEntry(p => ({...p, date: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#e65100", background:"white" }} />
            </label>
            <label style={labelStyle}>Number of Bags *
              <input type="number" min="0" value={harvestEntry.bags} onChange={e => setHarvestEntry(p => ({...p, bags: e.target.value}))} placeholder="e.g. 200" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32", background:"white" }} />
            </label>
            <label style={labelStyle}>Weight per Bag (kg)
              <input type="number" min="0" value={harvestEntry.weightPerBag} onChange={e => setHarvestEntry(p => ({...p, weightPerBag: e.target.value}))} style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Total Weight
              <div style={{ padding:"9px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, marginTop:4, background:"#e8f5e9", fontWeight:800, color:"#2e7d32" }}>
                {((Number(harvestEntry.bags) || 0) * (Number(harvestEntry.weightPerBag) || 50)).toLocaleString()} kg
              </div>
            </label>
            <label style={labelStyle}>Moisture (%)
              <input type="number" min="0" max="100" step="0.1" value={harvestEntry.moisture} onChange={e => setHarvestEntry(p => ({...p, moisture: e.target.value}))} placeholder="e.g. 14" style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Buyer Price (₱/kg)
              <input type="number" min="0" step="0.01" value={harvestEntry.buyerPrice} onChange={e => setHarvestEntry(p => ({...p, buyerPrice: e.target.value}))} placeholder="e.g. 21" style={{ ...inputStyle, background:"white" }} />
            </label>
            <label style={labelStyle}>Grade
              <select value={harvestEntry.grade} onChange={e => setHarvestEntry(p => ({...p, grade: e.target.value}))} style={{ ...inputStyle, background:"white" }}>
                {["Premium","Good","Fair","Reject"].map(g => <option key={g}>{g}</option>)}
              </select>
            </label>
            <label style={labelStyle}>Notes
              <input value={harvestEntry.notes} onChange={e => setHarvestEntry(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={{ ...inputStyle, background:"white" }} />
            </label>
          </div>
          {harvestEntry.bags && harvestEntry.buyerPrice && (
            <div style={{ marginTop:10, padding:"8px 14px", background:"#e8f5e9", borderRadius:8, fontSize:13 }}>
              Estimated Revenue: <strong style={{ color:"#2e7d32", fontSize:15 }}>₱{((Number(harvestEntry.bags) || 0) * (Number(harvestEntry.weightPerBag) || 50) * (Number(harvestEntry.buyerPrice) || 0)).toLocaleString()}</strong>
            </div>
          )}
          <button onClick={recordHarvest} disabled={!harvestEntry.bags || !harvestEntry.date} style={{ marginTop:12, background: harvestEntry.bags && harvestEntry.date ? "#f9a825" : "#ccc", color: harvestEntry.bags && harvestEntry.date ? "#333" : "#999", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: harvestEntry.bags && harvestEntry.date ? "pointer" : "not-allowed" }}>Save Harvest Record</button>
        </div>
      )}

      {/* Harvest History for this Area */}
      {areaHarvests.length > 0 && (
        <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflow:"hidden" }}>
          <div style={{ background:"linear-gradient(135deg,#fff9c4,#fffde7)", padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <h4 style={{ margin:0, fontSize:14, color:"#f57f17", display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:16 }}>📋</span> Harvest Records ({areaHarvests.length})
            </h4>
            <span style={{ fontSize:12, fontWeight:700, color:"#2e7d32" }}>
              Total: {areaHarvests.reduce((s, h) => s + h.totalKg, 0).toLocaleString()} kg ({areaHarvests.reduce((s, h) => s + h.bags, 0).toLocaleString()} bags)
            </span>
          </div>
          <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize: mobile ? 11 : 12, minWidth: mobile ? 600 : "auto" }}>
              <thead><tr style={{ background:"#fffde7" }}>
                {["Date","Season","Breed","Bags","Wt/Bag","Total (kg)","Yield/ha","Moisture","Grade","Price","Revenue",""].map(h => (
                  <th key={h} style={{ padding:"8px 6px", textAlign:"left", fontWeight:700, color:"#f57f17", borderBottom:"2px solid #ffecb3", fontSize:10 }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{[...areaHarvests].reverse().map(h => (
                <tr key={h.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                  <td style={{ padding:"7px 6px", whiteSpace:"nowrap" }}>{fmtDate(h.date)}</td>
                  <td style={{ padding:"7px 6px" }}><Badge color="#1565c0" bg="#e3f2fd">{h.season}</Badge></td>
                  <td style={{ padding:"7px 6px" }}>{h.breed}</td>
                  <td style={{ padding:"7px 6px", fontWeight:700 }}>{h.bags.toLocaleString()}</td>
                  <td style={{ padding:"7px 6px" }}>{h.weightPerBag} kg</td>
                  <td style={{ padding:"7px 6px", fontWeight:800, color:"#2e7d32" }}>{h.totalKg.toLocaleString()}</td>
                  <td style={{ padding:"7px 6px", fontWeight:600, color:"#1565c0" }}>{h.yieldPerHa ? `${h.yieldPerHa.toLocaleString()} kg/ha` : "---"}</td>
                  <td style={{ padding:"7px 6px" }}>{h.moisture ? `${h.moisture}%` : "---"}</td>

function CameraButton({ label, photo, onCapture, onClear, mobile }) {
  const fileRef = useCallback((node) => {
    if (node) node._ref = node;
  }, []);

  const handleCapture = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => onCapture(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
      <span style={{ fontSize:12, color:"#757575", fontWeight:600 }}>{label}</span>
      {photo ? (
        <div style={{ position:"relative", display:"inline-block" }}>
          <img src={photo} alt={label} style={{ width: mobile ? 70 : 90, height: mobile ? 70 : 90, objectFit:"cover", borderRadius:10, border:"2px solid #a5d6a7", cursor:"pointer" }} onClick={() => onCapture && false} />
          <button onClick={onClear} style={{ position:"absolute", top:-6, right:-6, background:"#d32f2f", color:"white", border:"none", borderRadius:"50%", width:20, height:20, fontSize:11, fontWeight:700, cursor:"pointer", lineHeight:"18px", textAlign:"center" }}>x</button>
        </div>
      ) : (
        <label style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4, width: mobile ? 70 : 90, height: mobile ? 70 : 90, borderRadius:10, border:"2px dashed #bbb", background:"#fafafa", cursor:"pointer", fontSize:11, color:"#999", textAlign:"center", flexDirection:"column" }}>
          <span style={{ fontSize:22 }}>📷</span>
          <span>Tap</span>
          <input type="file" accept="image/*" capture="environment" onChange={handleCapture} ref={fileRef} style={{ display:"none" }} />
        </label>
      )}
    </div>
  );
}

// ============================================================
// ACCOUNTING TAB — Per-area P&L, Cash Flow, Farm Summary
// ============================================================
function AccountingTab({ areas, schedules, allTasks, purchases, usages, harvestLogs, laborLogs, cashAdvances, maintenanceLogs, fuelLogs, electricityBills, setElectricityBills }) {
  const mobile = useIsMobile();
  const [view, setView] = useState("farm"); // "farm" or area id
  const namedAreas = areas.filter(a => a.name);

  // Compute financials per area
  const areaFinancials = useMemo(() => {
    return namedAreas.map(a => {
      const areaHarvests = harvestLogs.filter(h => h.area === a.name);
      const areaLabor = laborLogs.filter(l => l.area === a.name);
      const areaAdvances = (cashAdvances || []).filter(ca => ca.area === a.name);
      const areaTasks = allTasks.filter(t => t.area === a.name);

      // Revenue
      const totalKg = areaHarvests.reduce((s, h) => s + h.totalKg, 0);
      const grossRevenue = areaHarvests.reduce((s, h) => s + (h.totalKg * (h.buyerPrice || 0)), 0);

      // COGS: Input costs (FIFO)
      const consumptions = buildConsumptionsFromTasks(areaTasks.filter(t => t.area === a.name));
      const items = [...new Set(consumptions.map(c => c.item))];
      let inputCost = 0;
      const inputDetails = [];
      items.forEach(item => {
        const itemPurchases = purchases.filter(p => p.item === item).sort((x,y) => (x.date||"").localeCompare(y.date||""));
        const itemConsumptions = consumptions.filter(c => c.item === item);
        const result = computeFifoCost(itemPurchases, itemConsumptions);
        const cost = result.costByArea[a.name] || 0;
        inputCost += cost;
        if (cost > 0) inputDetails.push({ item, cost });
      });

      // Labor cost
      const laborCost = areaLabor.reduce((s, l) => s + l.totalCost, 0);

      // Manager share (10% of gross revenue)
      const mgrShare = grossRevenue * 0.10;

      // Equipment costs: task-linked fuel goes to the task's area, unlinked split evenly
      const areaCount = namedAreas.length || 1;
      const maintCost = (maintenanceLogs || []).reduce((s, m) => s + m.cost, 0) / areaCount;
      const areaFuel = (fuelLogs || []).filter(f => f.taskArea === a.name).reduce((s, f) => s + f.totalCost, 0);
      const unlinkFuel = (fuelLogs || []).filter(f => !f.taskArea).reduce((s, f) => s + f.totalCost, 0) / areaCount;
      const fuelCost = areaFuel + unlinkFuel;
      const equipCost = maintCost + fuelCost;

      // Electricity (irrigation) — split evenly across areas
      const electricityCost = (electricityBills || []).reduce((s, b) => s + b.amount, 0) / areaCount;

      // Total expenses
      const totalExpenses = inputCost + laborCost + mgrShare + equipCost + electricityCost;

      // Net profit
      const netProfit = grossRevenue - totalExpenses;

      // Cash flow
      const totalAdvances = areaAdvances.reduce((s, ca) => s + ca.amount, 0);
      const mgrBalance = mgrShare - totalAdvances;

      // Cash received (from sales)
      const cashReceived = grossRevenue;
      // Cash paid out
      const cashPaidOut = laborCost + totalAdvances + inputCost + equipCost + electricityCost;
      const netCashFlow = cashReceived - cashPaidOut;

      return {
        ...a, totalKg, grossRevenue, inputCost, inputDetails, laborCost, mgrShare, equipCost, electricityCost,
        totalExpenses, netProfit, totalAdvances, mgrBalance, cashReceived, cashPaidOut, netCashFlow,
        harvestCount: areaHarvests.length, laborEntries: areaLabor.length, advanceEntries: areaAdvances.length,
        harvests: areaHarvests, laborRecords: areaLabor, advances: areaAdvances,
      };
    });
  }, [namedAreas, allTasks, purchases, harvestLogs, laborLogs, cashAdvances, maintenanceLogs, fuelLogs, electricityBills]);

  // Farm-wide totals
  const farmTotals = useMemo(() => {
    const t = { grossRevenue:0, inputCost:0, laborCost:0, mgrShare:0, equipCost:0, electricityCost:0, totalExpenses:0, netProfit:0,
      totalKg:0, totalAdvances:0, cashReceived:0, cashPaidOut:0, netCashFlow:0 };
    areaFinancials.forEach(a => {
      t.grossRevenue += a.grossRevenue; t.inputCost += a.inputCost; t.laborCost += a.laborCost;
      t.mgrShare += a.mgrShare; t.equipCost += a.equipCost; t.electricityCost += a.electricityCost;
      t.totalExpenses += a.totalExpenses; t.netProfit += a.netProfit;
      t.totalKg += a.totalKg; t.totalAdvances += a.totalAdvances;
      t.cashReceived += a.cashReceived; t.cashPaidOut += a.cashPaidOut; t.netCashFlow += a.netCashFlow;
    });
    return t;
  }, [areaFinancials]);

  const selectedArea = view !== "farm" ? areaFinancials.find(a => a.id === Number(view)) : null;
  const data = selectedArea || farmTotals;
  const title = selectedArea ? selectedArea.name : "All Areas (Farm Total)";

  const PnlRow = ({ label, value, bold, color, indent, border }) => (
    <div style={{ display:"flex", justifyContent:"space-between", padding: `${border ? "8px" : "4px"} 0`,
      borderTop: border ? "2px solid #e0e0e0" : "none",
      paddingLeft: indent ? 16 : 0,
      fontWeight: bold ? 800 : 400, fontSize: bold ? 14 : 12, color: color || "#333" }}>
      <span>{label}</span>
      <span>₱{(value || 0).toLocaleString()}</span>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

      {/* Area Selector */}
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <button onClick={() => setView("farm")} style={{
          padding:"8px 16px", borderRadius:20, border: view === "farm" ? "2px solid #2e7d32" : "1px solid #ddd",
          background: view === "farm" ? "#e8f5e9" : "white", fontWeight: view === "farm" ? 800 : 500,
          color: view === "farm" ? "#2e7d32" : "#666", fontSize:12, cursor:"pointer"
        }}>Farm Total</button>
        {namedAreas.map(a => (
          <button key={a.id} onClick={() => setView(String(a.id))} style={{
            padding:"8px 16px", borderRadius:20, border: view === String(a.id) ? "2px solid #1565c0" : "1px solid #ddd",
            background: view === String(a.id) ? "#e3f2fd" : "white", fontWeight: view === String(a.id) ? 800 : 500,
            color: view === String(a.id) ? "#1565c0" : "#666", fontSize:12, cursor:"pointer"
          }}>{a.name} <span style={{ fontSize:10, color:"#999" }}>{a.ha}ha</span></button>
        ))}
      </div>

      {/* KPI Summary */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
        <KpiCard label="Revenue" value={data.grossRevenue > 0 ? `₱${data.grossRevenue.toLocaleString()}` : "---"} icon="💵" color="#2e7d32" sub={`${(data.totalKg || 0).toLocaleString()} kg sold`} />
        <KpiCard label="Total Expenses" value={data.totalExpenses > 0 ? `₱${data.totalExpenses.toLocaleString()}` : "---"} icon="📤" color="#c62828" sub="Inputs + Labor + Manager" />
        <KpiCard label="Net Profit" value={`₱${(data.netProfit || 0).toLocaleString()}`} icon={data.netProfit >= 0 ? "📈" : "📉"} color={data.netProfit >= 0 ? "#2e7d32" : "#c62828"} sub={data.grossRevenue > 0 ? `${Math.round((data.netProfit / data.grossRevenue) * 100)}% margin` : "---"} />
        <KpiCard label="Net Cash Flow" value={`₱${(data.netCashFlow || 0).toLocaleString()}`} icon="🏦" color={data.netCashFlow >= 0 ? "#1565c0" : "#c62828"} sub={`In: ₱${(data.cashReceived||0).toLocaleString()} Out: ₱${(data.cashPaidOut||0).toLocaleString()}`} />
      </div>

      {/* Electricity Bills */}
      <ElectricityBillSection bills={electricityBills} setBills={setElectricityBills} mobile={mobile} />

      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:16 }}>

        {/* P&L Statement */}
        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
          <div style={{ fontWeight:800, fontSize:15, color:"#333", marginBottom:12 }}>{title}</div>
          <div style={{ fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", marginBottom:4 }}>Profit & Loss Statement</div>

          <div style={{ borderTop:"2px solid #2e7d32", paddingTop:8 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#2e7d32", textTransform:"uppercase", marginBottom:4 }}>Revenue</div>
            <PnlRow label="Rice Sales" value={data.grossRevenue} bold color="#2e7d32" />
          </div>

          <div style={{ borderTop:"1px solid #eee", marginTop:8, paddingTop:8 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#c62828", textTransform:"uppercase", marginBottom:4 }}>Cost of Production</div>
            <PnlRow label="Input Materials (FIFO)" value={data.inputCost} indent />
            {selectedArea && selectedArea.inputDetails.map(d => (
              <PnlRow key={d.item} label={d.item} value={d.cost} indent color="#888" />
            ))}
            <PnlRow label="Additional Labor" value={data.laborCost} indent />
            <PnlRow label="Manager Share (10%)" value={data.mgrShare} indent />
            <PnlRow label="Equipment (Maint + Fuel)" value={data.equipCost || 0} indent />
            <PnlRow label="Electricity (Irrigation)" value={data.electricityCost || 0} indent />
            <PnlRow label="Total Expenses" value={data.totalExpenses} bold color="#c62828" border />
          </div>

          <div style={{ marginTop:4 }}>
            <PnlRow label="Net Profit / (Loss)" value={data.netProfit} bold color={data.netProfit >= 0 ? "#2e7d32" : "#c62828"} border />
          </div>

          {data.grossRevenue > 0 && (
            <div style={{ marginTop:12, display:"flex", gap:8, flexWrap:"wrap" }}>
              <span style={{ background:"#e8f5e9", borderRadius:6, padding:"4px 10px", fontSize:10, fontWeight:700, color:"#2e7d32" }}>
                Margin: {Math.round((data.netProfit / data.grossRevenue) * 100)}%
              </span>
              <span style={{ background:"#e3f2fd", borderRadius:6, padding:"4px 10px", fontSize:10, fontWeight:700, color:"#1565c0" }}>
                Cost/kg: ₱{data.totalKg > 0 ? (data.totalExpenses / data.totalKg).toFixed(2) : "---"}
              </span>
              <span style={{ background:"#fff3e0", borderRadius:6, padding:"4px 10px", fontSize:10, fontWeight:700, color:"#e65100" }}>
                Revenue/kg: ₱{data.totalKg > 0 ? (data.grossRevenue / data.totalKg).toFixed(2) : "---"}
              </span>
            </div>
          )}
        </div>

        {/* Cash Flow */}
        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", marginBottom:8 }}>Cash Flow Statement</div>

          <div style={{ borderTop:"2px solid #2e7d32", paddingTop:8 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#2e7d32", textTransform:"uppercase", marginBottom:4 }}>Cash Inflows</div>
            <PnlRow label="Rice Sales Revenue" value={data.cashReceived} />
            <PnlRow label="Total Inflows" value={data.cashReceived} bold color="#2e7d32" border />
          </div>

          <div style={{ borderTop:"1px solid #eee", marginTop:8, paddingTop:8 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#c62828", textTransform:"uppercase", marginBottom:4 }}>Cash Outflows</div>
            <PnlRow label="Input Purchases (FIFO cost)" value={data.inputCost} indent />
            <PnlRow label="Labor Payments" value={data.laborCost} indent />
            <PnlRow label="Manager Cash Advances" value={data.totalAdvances || 0} indent />
            <PnlRow label="Equipment (Maint + Fuel)" value={data.equipCost || 0} indent />
            <PnlRow label="Electricity (Irrigation)" value={data.electricityCost || 0} indent />
            <PnlRow label="Total Outflows" value={data.cashPaidOut} bold color="#c62828" border />
          </div>

          <PnlRow label="Net Cash Flow" value={data.netCashFlow} bold color={data.netCashFlow >= 0 ? "#2e7d32" : "#c62828"} border />

          {/* Payables/Receivables */}
          <div style={{ borderTop:"1px solid #eee", marginTop:12, paddingTop:10 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#888", textTransform:"uppercase", marginBottom:6 }}>Outstanding Balances</div>
            <PnlRow label="Manager Share Earned" value={data.mgrShare} indent />
            <PnlRow label="Less: Advances Given" value={-(data.totalAdvances || 0)} indent color="#c62828" />
            <PnlRow label={((data.mgrShare - (data.totalAdvances || 0)) >= 0) ? "Payable to Manager" : "Receivable from Manager"} value={Math.abs(data.mgrShare - (data.totalAdvances || 0))} bold color={((data.mgrShare - (data.totalAdvances || 0)) >= 0) ? "#e65100" : "#2e7d32"} border />
          </div>
        </div>
      </div>

      {/* Per-Area Comparison Table (only in farm view) */}
      {view === "farm" && areaFinancials.length > 0 && (
        <div style={{ background:"white", borderRadius:14, padding: mobile ? 14 : 20, boxShadow:"0 1px 6px rgba(0,0,0,.07)", overflowX:"auto" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#888", textTransform:"uppercase", marginBottom:10 }}>Area Comparison</div>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead><tr style={{ background:"#f5f5f0" }}>
              {["Area","Ha","Revenue","Inputs","Labor","Manager","Expenses","Net Profit","Margin"].map(h => (
                <th key={h} style={{ padding:"8px 6px", textAlign: h === "Area" ? "left" : "right", fontWeight:700, color:"#666", borderBottom:"2px solid #e0e0e0", fontSize:10 }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {areaFinancials.map(a => (
                <tr key={a.id} onClick={() => setView(String(a.id))} style={{ borderBottom:"1px solid #f0f0f0", cursor:"pointer" }}>
                  <td style={{ padding:"8px 6px", fontWeight:700 }}>{a.name}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right" }}>{a.ha}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:700, color:"#2e7d32" }}>₱{a.grossRevenue.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{a.inputCost.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{a.laborCost.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{a.mgrShare.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:600, color:"#c62828" }}>₱{a.totalExpenses.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:800, color: a.netProfit >= 0 ? "#2e7d32" : "#c62828" }}>₱{a.netProfit.toLocaleString()}</td>
                  <td style={{ padding:"8px 6px", textAlign:"right", fontWeight:600 }}>{a.grossRevenue > 0 ? `${Math.round((a.netProfit / a.grossRevenue) * 100)}%` : "---"}</td>
                </tr>
              ))}
              <tr style={{ borderTop:"2px solid #333", fontWeight:800 }}>
                <td style={{ padding:"8px 6px" }}>TOTAL</td>
                <td style={{ padding:"8px 6px", textAlign:"right" }}>{namedAreas.reduce((s,a) => s + (a.ha||0), 0)}</td>
                <td style={{ padding:"8px 6px", textAlign:"right", color:"#2e7d32" }}>₱{farmTotals.grossRevenue.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{farmTotals.inputCost.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{farmTotals.laborCost.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right" }}>₱{farmTotals.mgrShare.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right", color:"#c62828" }}>₱{farmTotals.totalExpenses.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right", color: farmTotals.netProfit >= 0 ? "#2e7d32" : "#c62828" }}>₱{farmTotals.netProfit.toLocaleString()}</td>
                <td style={{ padding:"8px 6px", textAlign:"right" }}>{farmTotals.grossRevenue > 0 ? `${Math.round((farmTotals.netProfit / farmTotals.grossRevenue) * 100)}%` : "---"}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ============================================================
// EQUIPMENT & TOOLS
// ============================================================
function EquipmentTab({ equipment, setEquipment, maintenanceLogs, setMaintenanceLogs, fuelLogs, setFuelLogs, toolInventory, setToolInventory }) {
  const mobile = useIsMobile();
  const [view, setView] = useState("equipment"); // equipment | tools
  const [showAddEquip, setShowAddEquip] = useState(false);
  const [showAddTool, setShowAddTool] = useState(false);
  const [selectedEquip, setSelectedEquip] = useState(null);
  const [showMaint, setShowMaint] = useState(false);
  const [showFuel, setShowFuel] = useState(false);

  const [newEquip, setNewEquip] = useState({ name:"", type:"Tractor", purchaseDate:"", purchaseCost:"", condition:"Good", notes:"" });
  const [newTool, setNewTool] = useState({ name:"", qty:1, condition:"Good", location:"Storage", purchaseDate:"", unitCost:"", notes:"" });
  const [maintEntry, setMaintEntry] = useState({ date: today, type:"Oil Change", cost:"", mechanic:"", notes:"" });
  const [fuelEntry, setFuelEntry] = useState({ date: today, liters:"", costPerLiter:"", hoursOperated:"", notes:"" });

  const equipTypes = ["Tractor", "Hand Tractor", "Water Pump", "Sprayer", "Thresher", "Harvester", "Dryer", "Hauling Vehicle", "Generator", "Other"];
  const maintTypes = ["Oil Change", "Filter Replacement", "Tire/Track Repair", "Engine Overhaul", "Belt Replacement", "Blade Sharpening", "Bearing Replacement", "Electrical Repair", "Hydraulic Repair", "General Service", "Other"];
  const conditions = ["Excellent", "Good", "Fair", "Needs Repair", "Out of Service"];

  const labelStyle = { display:"flex", flexDirection:"column", gap:3, fontSize:11, fontWeight:600, color:"#555" };
  const inputStyle = { padding:"8px 10px", borderRadius:8, border:"1px solid #ddd", fontSize:13, background:"white" };

  const addEquipment = () => {
    if (!newEquip.name) return;
    setEquipment(prev => [...prev, { ...newEquip, id: Date.now(), purchaseCost: Number(newEquip.purchaseCost) || 0 }]);
    setNewEquip({ name:"", type:"Tractor", purchaseDate:"", purchaseCost:"", condition:"Good", notes:"" });
    setShowAddEquip(false);
  };

  const addTool = () => {
    if (!newTool.name) return;
    setToolInventory(prev => [...prev, { ...newTool, id: Date.now(), qty: Number(newTool.qty) || 1, unitCost: Number(newTool.unitCost) || 0 }]);
    setNewTool({ name:"", qty:1, condition:"Good", location:"Storage", purchaseDate:"", unitCost:"", notes:"" });
    setShowAddTool(false);
  };

  const addMaintenance = () => {
    if (!selectedEquip) return;
    setMaintenanceLogs(prev => [...prev, { ...maintEntry, id: Date.now(), equipId: selectedEquip.id, equipName: selectedEquip.name, cost: Number(maintEntry.cost) || 0 }]);
    setMaintEntry({ date: today, type:"Oil Change", cost:"", mechanic:"", notes:"" });
    setShowMaint(false);
  };

  const addFuel = () => {
    if (!selectedEquip || !fuelEntry.liters) return;
    const liters = Number(fuelEntry.liters) || 0;
    const costPerLiter = Number(fuelEntry.costPerLiter) || 0;
    setFuelLogs(prev => [...prev, { ...fuelEntry, id: Date.now(), equipId: selectedEquip.id, equipName: selectedEquip.name, liters, costPerLiter, totalCost: liters * costPerLiter, hoursOperated: Number(fuelEntry.hoursOperated) || 0 }]);
    setFuelEntry({ date: today, liters:"", costPerLiter:"", hoursOperated:"", notes:"" });
    setShowFuel(false);
  };

  // Summaries
  const totalMaintCost = maintenanceLogs.reduce((s, m) => s + m.cost, 0);
  const totalFuelCost = fuelLogs.reduce((s, f) => s + f.totalCost, 0);
  const totalFuelLiters = fuelLogs.reduce((s, f) => s + f.liters, 0);
  const totalEquipCost = equipment.reduce((s, e) => s + (e.purchaseCost || 0), 0);
  const totalToolCost = toolInventory.reduce((s, t) => s + (t.unitCost || 0) * (t.qty || 1), 0);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      {/* Sub-nav */}
      <div style={{ display:"flex", gap:6 }}>
        {[{k:"equipment",l:"Equipment",icon:"🚜"},{k:"tools",l:"Tool Inventory",icon:"🔧"}].map(v => (
          <button key={v.k} onClick={() => { setView(v.k); setSelectedEquip(null); }} style={{
            flex:1, padding:"10px 14px", borderRadius:10, border: view === v.k ? "2px solid #2e7d32" : "2px solid #e0e0e0",
            background: view === v.k ? "#e8f5e9" : "white", color: view === v.k ? "#2e7d32" : "#888",
            fontWeight:700, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6
          }}>
            <span>{v.icon}</span>{v.l}
          </button>
        ))}
      </div>

      {/* ========== EQUIPMENT VIEW ========== */}
      {view === "equipment" && (
        <>
          {/* Summary Cards */}
          <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap:10 }}>
            <div style={{ background:"linear-gradient(135deg,#e3f2fd,#bbdefb)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#1565c0", textTransform:"uppercase" }}>Equipment</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#0d47a1", marginTop:4 }}>{equipment.length}</div>
              <div style={{ fontSize:10, color:"#1976d2", marginTop:2 }}>₱{totalEquipCost.toLocaleString()} invested</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#fff3e0,#ffe0b2)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#e65100", textTransform:"uppercase" }}>Maintenance</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#bf360c", marginTop:4 }}>₱{totalMaintCost.toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#e65100", marginTop:2 }}>{maintenanceLogs.length} records</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#fce4ec,#f8bbd0)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#c62828", textTransform:"uppercase" }}>Fuel Cost</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#b71c1c", marginTop:4 }}>₱{totalFuelCost.toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#c62828", marginTop:2 }}>{totalFuelLiters.toLocaleString()} L total</div>
            </div>
            <div style={{ background:"linear-gradient(135deg,#ede7f6,#d1c4e9)", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#4527a0", textTransform:"uppercase" }}>Total Equipment Cost</div>
              <div style={{ fontSize:20, fontWeight:800, color:"#311b92", marginTop:4 }}>₱{(totalMaintCost + totalFuelCost).toLocaleString()}</div>
              <div style={{ fontSize:10, color:"#4527a0", marginTop:2 }}>Maintenance + Fuel</div>
            </div>
          </div>

          {/* Equipment List / Detail */}
          {!selectedEquip ? (
            <>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>Equipment Registry</div>
                <button onClick={() => setShowAddEquip(!showAddEquip)} style={{ background: showAddEquip ? "#999" : "#2e7d32", color:"white", border:"none", borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  {showAddEquip ? "Cancel" : "+ Add Equipment"}
                </button>
              </div>

              {showAddEquip && (
                <div style={{ background:"#f5fff5", borderRadius:12, padding:16, border:"1px solid #c8e6c9" }}>
                  <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr 1fr", gap:10 }}>
                    <label style={labelStyle}>Name / Model
                      <input value={newEquip.name} onChange={e => setNewEquip(p => ({...p, name: e.target.value}))} placeholder="e.g. Kubota L3301" style={inputStyle} />
                    </label>
                    <label style={labelStyle}>Type
                      <select value={newEquip.type} onChange={e => setNewEquip(p => ({...p, type: e.target.value}))} style={inputStyle}>
                        {equipTypes.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </label>
                    <label style={labelStyle}>Condition
                      <select value={newEquip.condition} onChange={e => setNewEquip(p => ({...p, condition: e.target.value}))} style={inputStyle}>
                        {conditions.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </label>
                    <label style={labelStyle}>Purchase Date
                      <input type="date" value={newEquip.purchaseDate} onChange={e => setNewEquip(p => ({...p, purchaseDate: e.target.value}))} style={inputStyle} />
                    </label>
                    <label style={labelStyle}>Purchase Cost (₱)
                      <input type="number" min="0" value={newEquip.purchaseCost} onChange={e => setNewEquip(p => ({...p, purchaseCost: e.target.value}))} placeholder="0" style={{ ...inputStyle, fontWeight:700, color:"#2e7d32" }} />
                    </label>
                    <label style={labelStyle}>Notes
                      <input value={newEquip.notes} onChange={e => setNewEquip(p => ({...p, notes: e.target.value}))} placeholder="Optional..." style={inputStyle} />
                    </label>
                  </div>
                  <button onClick={addEquipment} disabled={!newEquip.name} style={{ marginTop:12, background: newEquip.name ? "#2e7d32" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor: newEquip.name ? "pointer" : "not-allowed" }}>Save Equipment</button>
                </div>
              )}

              {equipment.length === 0 ? (
                <div style={{ textAlign:"center", padding:30, color:"#aaa", fontSize:13 }}>No equipment registered yet. Add your farm equipment above.</div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap:10 }}>
                  {equipment.map(eq => {
                    const eqMaint = maintenanceLogs.filter(m => m.equipId === eq.id);
                    const eqFuel = fuelLogs.filter(f => f.equipId === eq.id);
                    const eqMaintCost = eqMaint.reduce((s, m) => s + m.cost, 0);
                    const eqFuelCost = eqFuel.reduce((s, f) => s + f.totalCost, 0);
                    const condColor = eq.condition === "Excellent" ? "#2e7d32" : eq.condition === "Good" ? "#1565c0" : eq.condition === "Fair" ? "#f57f17" : "#c62828";
                    return (
                      <div key={eq.id} onClick={() => setSelectedEquip(eq)} style={{ background:"white", borderRadius:12, padding:14, border:"1px solid #e0e0e0", cursor:"pointer", transition:"all .15s", boxShadow:"0 1px 4px rgba(0,0,0,.04)" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                          <div style={{ fontWeight:700, fontSize:14, color:"#333" }}>🚜 {eq.name}</div>
                          <span style={{ fontSize:10, fontWeight:700, color: condColor, background: condColor + "18", padding:"2px 8px", borderRadius:6 }}>{eq.condition}</span>
                        </div>
                        <div style={{ fontSize:11, color:"#888", marginBottom:8 }}>{eq.type}{eq.purchaseDate ? ` · Acquired ${fmtDate(eq.purchaseDate)}` : ""}</div>
                        <div style={{ display:"flex", gap:12, fontSize:11 }}>
                          <span>🔧 <strong>{eqMaint.length}</strong> services · ₱{eqMaintCost.toLocaleString()}</span>
                          <span>⛽ <strong>{eqFuel.length}</strong> fills · ₱{eqFuelCost.toLocaleString()}</span>
                        </div>
                        <div style={{ fontSize:10, color:"#bbb", marginTop:6 }}>Tap to view details →</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          ) : (
            /* ===== Equipment Detail View ===== */
            <>
              <button onClick={() => setSelectedEquip(null)} style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:8, padding:"8px 16px", fontSize:12, fontWeight:700, cursor:"pointer", alignSelf:"flex-start", color:"#555" }}>
                ← Back to Equipment List
              </button>

              <div style={{ background:"white", borderRadius:14, padding:16, border:"1px solid #e0e0e0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div>
                    <div style={{ fontWeight:800, fontSize:18, color:"#333" }}>🚜 {selectedEquip.name}</div>
                    <div style={{ fontSize:12, color:"#888" }}>{selectedEquip.type}{selectedEquip.purchaseDate ? ` · Since ${fmtDate(selectedEquip.purchaseDate)}` : ""}</div>
                  </div>

                </label>
                <label style={labelStyle}>Quantity
                  <input type="number" min="1" value={newTool.qty} onChange={e => setNewTool(p => ({...p, qty: e.target.value}))} style={{ ...inputStyle, fontWeight:700, color:"#1565c0" }} />
                </label>
