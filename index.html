// INVENTORY TRACKER
// ============================================================
const DEFAULT_INVENTORY_ITEMS = [
  "14-14-14","46-0-0","0-0-60","21-0-0","FAA","Pre-Emergent Herbicide","Fungicide","Insecticide","Seeds","Weed Control Herbicide","Other"
];

function InventoryTracker({ purchases, setPurchases, usages, setUsages, areas, allTasks, inventoryItems, setInventoryItems }) {
  const mobile = useIsMobile();
  const [showAddPurchase, setShowAddPurchase] = useState(false);
  const [showAddUsage, setShowAddUsage] = useState(false);
  const [newPurchase, setNewPurchase] = useState({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", unitCost: 0, supplier: "", receipt: "", brand: "", receiptPhoto: null, itemPhoto: null });
  const [viewingPhoto, setViewingPhoto] = useState(null);
  const [newUsage, setNewUsage] = useState({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", area: "", task: "", notes: "" });
  const [viewTab, setViewTab] = useState("stock");
  const [showManageItems, setShowManageItems] = useState(false);
  const [newItemName, setNewItemName] = useState("");

  const areaNames = areas.filter(a => a.name).map(a => a.name);
  const taskNames = allTasks.filter(t => t.phase !== "Growth Stage").map(t => t.activity);
  const uniqueTaskNames = [...new Set(taskNames)];

  // Compute stock levels per item
  const stockMap = useMemo(() => {
    const map = {};
    purchases.forEach(p => {
      if (!map[p.item]) map[p.item] = { purchased: 0, used: 0, totalCost: 0, unit: p.unit };
      map[p.item].purchased += p.qty;
      map[p.item].totalCost += p.qty * p.unitCost;
    });
    usages.forEach(u => {
      if (!map[u.item]) map[u.item] = { purchased: 0, used: 0, totalCost: 0, unit: u.unit };
      map[u.item].used += u.qty;
    });
    return map;
  }, [purchases, usages]);

  const stockList = Object.entries(stockMap).map(([item, v]) => ({
    item,
    purchased: v.purchased,
    used: v.used,
    onHand: v.purchased - v.used,
    avgCost: v.purchased > 0 ? v.totalCost / v.purchased : 0,
    totalCost: v.totalCost,
    unit: v.unit,
  }));

  const totalValue = stockList.reduce((s, r) => s + (r.onHand * r.avgCost), 0);
  const lowStock = stockList.filter(r => r.onHand > 0 && r.onHand <= r.purchased * 0.2);

  const addPurchase = () => {
    if (!newPurchase.qty) return;
    const id = purchases.length > 0 ? Math.max(...purchases.map(p => p.id)) + 1 : 1;
    setPurchases(prev => [...prev, { ...newPurchase, id, qty: Number(newPurchase.qty), unitCost: Number(newPurchase.unitCost) }]);
    setNewPurchase({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", unitCost: 0, supplier: "", receipt: "", brand: "", receiptPhoto: null, itemPhoto: null });
    setShowAddPurchase(false);
  };

  const addUsage = () => {
    if (!newUsage.qty || !newUsage.area) return;
    const id = usages.length > 0 ? Math.max(...usages.map(u => u.id)) + 1 : 1;
    setUsages(prev => [...prev, { ...newUsage, id, qty: Number(newUsage.qty) }]);
    setNewUsage({ date: today, item: inventoryItems[0] || "", qty: 0, unit: "kg", area: "", task: "", notes: "" });
    setShowAddUsage(false);
  };

  const removePurchase = (id) => setPurchases(prev => prev.filter(p => p.id !== id));
  const removeUsage = (id) => setUsages(prev => prev.filter(u => u.id !== id));

  const formRow = { display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(auto-fit, minmax(140px, 1fr))", gap: mobile ? 8 : 10, marginBottom:10 };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* KPIs */}
      <div style={{ display:"grid", gridTemplateColumns: mobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: mobile ? 8 : 12 }}>
        <KpiCard label="Items in Stock" value={stockList.filter(r => r.onHand > 0).length} icon="📦" color="#1565c0" />
        <KpiCard label="Stock Value" value={totalValue > 0 ? totalValue.toLocaleString(undefined, {maximumFractionDigits:0}) : "---"} icon="💵" color="#2e7d32" />
        <KpiCard label="Purchases" value={purchases.length} icon="🛒" color="#ef6c00" />
        <KpiCard label="Low Stock" value={lowStock.length} icon={lowStock.length > 0 ? "⚠" : "✅"} color={lowStock.length > 0 ? "#d32f2f" : "#2e7d32"} />
      </div>

      {/* Sub-tabs */}
      <div style={{ display:"flex", gap:6, background:"white", borderRadius:14, padding:8, boxShadow:"0 1px 4px rgba(0,0,0,.06)" }}>
        {[["stock","📦 Stock Levels"],["purchases","🛒 Purchases"],["usage","📤 Usage Log"]].map(([k,l]) => (
          <button key={k} onClick={() => setViewTab(k)} style={{ padding:"8px 16px", borderRadius:8, border:"none", background: viewTab === k ? "#2e7d32" : "transparent", color: viewTab === k ? "white" : "#666", fontWeight: viewTab === k ? 700 : 500, fontSize:13, cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      {/* STOCK LEVELS */}
      {viewTab === "stock" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto" }}>
            {stockList.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No inventory yet. Add purchases to get started.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead><tr style={{ background:"#e3f2fd" }}>
                  {["Item","Purchased","Used","On Hand","Unit","Average Cost","Stock Value"].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#1565c0", borderBottom:"2px solid #90caf9", fontSize:11 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{stockList.map(r => (
                  <tr key={r.item} style={{ borderBottom:"1px solid #f5f5f5", background: r.onHand <= 0 ? "#fff3e0" : r.onHand <= r.purchased * 0.2 ? "#fff8e1" : "white" }}>
                    <td style={{ padding:"8px", fontWeight:700 }}>{r.item}</td>
                    <td style={{ padding:"8px" }}>{r.purchased.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{r.used.toLocaleString()}</td>
                    <td style={{ padding:"8px", fontWeight:800, color: r.onHand <= 0 ? "#d32f2f" : r.onHand <= r.purchased * 0.2 ? "#ef6c00" : "#2e7d32" }}>{r.onHand.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{r.unit}</td>
                    <td style={{ padding:"8px" }}>{r.avgCost > 0 ? r.avgCost.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) : "---"}</td>
                    <td style={{ padding:"8px", fontWeight:700, color:"#2e7d32" }}>{r.onHand > 0 && r.avgCost > 0 ? (r.onHand * r.avgCost).toLocaleString(undefined, {maximumFractionDigits:0}) : "---"}</td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>

          {/* Manage Items */}
          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflow:"hidden" }}>
            <div onClick={() => setShowManageItems(!showManageItems)} style={{ padding: mobile ? "10px 14px" : "12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer", background:"#fafafa", borderBottom: showManageItems ? "1px solid #e0e0e0" : "none" }}>
              <span style={{ fontWeight:700, fontSize:13, color:"#1565c0" }}>Manage Items ({inventoryItems.length})</span>
              <span style={{ fontSize:16, color:"#ccc", transform: showManageItems ? "rotate(180deg)" : "none", transition:"transform .2s" }}>▼</span>
            </div>
            {showManageItems && (
              <div style={{ padding: mobile ? 12 : 18 }}>
                {/* Add new item */}
                <div style={{ display:"flex", gap:8, marginBottom:14, alignItems:"flex-end" }}>
                  <label style={{ ...labelStyle, flex:1 }}>New Item Name
                    <input value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder="e.g. Calcium Carbonate" style={inputStyle} onKeyDown={e => {
                      if (e.key === "Enter" && newItemName.trim() && !inventoryItems.includes(newItemName.trim())) {
                        setInventoryItems(prev => [...prev, newItemName.trim()]);
                        setNewItemName("");
                      }
                    }} />
                  </label>
                  <button onClick={() => {
                    if (newItemName.trim() && !inventoryItems.includes(newItemName.trim())) {
                      setInventoryItems(prev => [...prev, newItemName.trim()]);
                      setNewItemName("");
                    }
                  }} disabled={!newItemName.trim() || inventoryItems.includes(newItemName.trim())} style={{ background: newItemName.trim() && !inventoryItems.includes(newItemName.trim()) ? "#1565c0" : "#bbb", color:"white", border:"none", borderRadius:8, padding:"9px 18px", fontSize:12, fontWeight:700, cursor: newItemName.trim() ? "pointer" : "not-allowed", whiteSpace:"nowrap", marginBottom:4 }}>+ Add</button>
                </div>
                {inventoryItems.includes(newItemName.trim()) && newItemName.trim() && (
                  <div style={{ fontSize:11, color:"#d32f2f", marginTop:-10, marginBottom:10 }}>Item already exists.</div>
                )}
                {/* Item list */}
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {inventoryItems.map(item => {
                    const hasRecords = purchases.some(p => p.item === item) || usages.some(u => u.item === item);
                    return (
                      <div key={item} style={{ display:"flex", alignItems:"center", gap:4, background: hasRecords ? "#e3f2fd" : "#f5f5f5", borderRadius:8, padding:"5px 10px", fontSize:12, border:"1px solid #e0e0e0" }}>
                        <span style={{ fontWeight:600, color:"#333" }}>{item}</span>
                        <button onClick={() => {
                          if (hasRecords) {
                            if (!confirm(`"${item}" has purchase or usage records. Remove anyway?`)) return;
                          }
                          setInventoryItems(prev => prev.filter(i => i !== item));
                        }} title={hasRecords ? "Has records — click to remove anyway" : "Remove item"} style={{ background:"none", border:"none", color: hasRecords ? "#ef6c00" : "#d32f2f", fontSize:14, cursor:"pointer", padding:"0 2px", lineHeight:1, fontWeight:700 }}>×</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* PURCHASES */}
      {viewTab === "purchases" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => setShowAddPurchase(!showAddPurchase)} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>{showAddPurchase ? "Cancel" : "+ New Purchase"}</button>
          </div>

          {showAddPurchase && (
            <div style={{ background:"#e8f5e9", borderRadius:14, padding:18 }}>
              <h3 style={{ margin:"0 0 12px", fontSize:14, color:"#2e7d32" }}>Record Purchase</h3>
              <div style={formRow}>
                <label style={labelStyle}>Date <input type="date" value={newPurchase.date} onChange={e => setNewPurchase(p => ({...p, date: e.target.value}))} style={inputStyle} /></label>
                <label style={labelStyle}>Item <select value={newPurchase.item} onChange={e => setNewPurchase(p => ({...p, item: e.target.value}))} style={inputStyle}>{inventoryItems.map(i => <option key={i}>{i}</option>)}</select></label>
                <label style={labelStyle}>Brand <input value={newPurchase.brand} onChange={e => setNewPurchase(p => ({...p, brand: e.target.value}))} placeholder="e.g. Atlas, Soilmate..." style={inputStyle} /></label>
                <label style={labelStyle}>Quantity <input type="number" value={newPurchase.qty || ""} onChange={e => setNewPurchase(p => ({...p, qty: e.target.value}))} style={inputStyle} /></label>
              </div>
              <div style={formRow}>
                <label style={labelStyle}>Unit <select value={newPurchase.unit} onChange={e => setNewPurchase(p => ({...p, unit: e.target.value}))} style={inputStyle}>{["kg","bags","L","mL","pcs","lot"].map(u => <option key={u}>{u}</option>)}</select></label>
                <label style={labelStyle}>Unit Cost <input type="number" value={newPurchase.unitCost || ""} onChange={e => setNewPurchase(p => ({...p, unitCost: e.target.value}))} style={{ ...inputStyle, background:"#fff9c4" }} /></label>
                <label style={labelStyle}>Supplier <input value={newPurchase.supplier} onChange={e => setNewPurchase(p => ({...p, supplier: e.target.value}))} placeholder="Store name..." style={inputStyle} /></label>
                <label style={labelStyle}>Receipt / Reference <input value={newPurchase.receipt} onChange={e => setNewPurchase(p => ({...p, receipt: e.target.value}))} placeholder="OR#, receipt..." style={inputStyle} /></label>
              </div>
              {/* Photo Capture */}
              <div style={{ display:"flex", gap: mobile ? 12 : 20, flexWrap:"wrap", marginBottom:12 }}>
                <CameraButton label="Receipt Photo" photo={newPurchase.receiptPhoto} onCapture={data => setNewPurchase(p => ({...p, receiptPhoto: data}))} onClear={() => setNewPurchase(p => ({...p, receiptPhoto: null}))} mobile={mobile} />
                <CameraButton label="Item Photo" photo={newPurchase.itemPhoto} onCapture={data => setNewPurchase(p => ({...p, itemPhoto: data}))} onClear={() => setNewPurchase(p => ({...p, itemPhoto: null}))} mobile={mobile} />
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                <button onClick={addPurchase} style={{ background:"#2e7d32", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save Purchase</button>
                {newPurchase.qty > 0 && newPurchase.unitCost > 0 && (
                  <span style={{ fontSize:12, color:"#1b5e20", fontWeight:700 }}>Total: {(Number(newPurchase.qty) * Number(newPurchase.unitCost)).toLocaleString()}</span>
                )}
              </div>
            </div>
          )}

          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
            {purchases.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No purchases recorded yet.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth: mobile ? 700 : "auto" }}>
                <thead><tr style={{ background:"#e8f5e9" }}>
                  {["Date","Item","Brand","Qty","Unit","Cost","Total","Supplier","Receipt","Photos",""].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#2e7d32", borderBottom:"2px solid #a5d6a7", fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{[...purchases].reverse().map(p => (
                  <tr key={p.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                    <td style={{ padding:"8px", whiteSpace:"nowrap" }}>{fmtDate(p.date)}</td>
                    <td style={{ padding:"8px", fontWeight:700 }}>{p.item}</td>
                    <td style={{ padding:"8px", color:"#1565c0", fontWeight:600 }}>{p.brand || "---"}</td>
                    <td style={{ padding:"8px" }}>{p.qty.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{p.unit}</td>
                    <td style={{ padding:"8px" }}>{p.unitCost.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td style={{ padding:"8px", fontWeight:700, color:"#2e7d32" }}>{(p.qty * p.unitCost).toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{p.supplier}</td>
                    <td style={{ padding:"8px", color:"#999" }}>{p.receipt}</td>
                    <td style={{ padding:"8px" }}>
                      <div style={{ display:"flex", gap:4 }}>
                        {p.receiptPhoto && (
                          <img src={p.receiptPhoto} alt="Receipt" onClick={() => setViewingPhoto({ src: p.receiptPhoto, label: `Receipt — ${p.item} (${fmtDate(p.date)})` })} style={{ width:32, height:32, objectFit:"cover", borderRadius:6, border:"1px solid #a5d6a7", cursor:"pointer" }} title="View receipt" />
                        )}
                        {p.itemPhoto && (
                          <img src={p.itemPhoto} alt="Item" onClick={() => setViewingPhoto({ src: p.itemPhoto, label: `${p.item}${p.brand ? ` — ${p.brand}` : ""} (${fmtDate(p.date)})` })} style={{ width:32, height:32, objectFit:"cover", borderRadius:6, border:"1px solid #90caf9", cursor:"pointer" }} title="View item" />
                        )}
                        {!p.receiptPhoto && !p.itemPhoto && <span style={{ color:"#ccc", fontSize:11 }}>---</span>}
                      </div>
                    </td>
                    <td style={{ padding:"8px" }}><button onClick={() => removePurchase(p.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>x</button></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* USAGE LOG */}
      {viewTab === "usage" && (
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => setShowAddUsage(!showAddUsage)} style={{ background:"#ef6c00", color:"white", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>{showAddUsage ? "Cancel" : "+ Record Usage"}</button>
          </div>

          {showAddUsage && (
            <div style={{ background:"#fff3e0", borderRadius:14, padding:18 }}>
              <h3 style={{ margin:"0 0 12px", fontSize:14, color:"#e65100" }}>Record Usage</h3>
              <div style={formRow}>
                <label style={labelStyle}>Date <input type="date" value={newUsage.date} onChange={e => setNewUsage(u => ({...u, date: e.target.value}))} style={inputStyle} /></label>
                <label style={labelStyle}>Item <select value={newUsage.item} onChange={e => setNewUsage(u => ({...u, item: e.target.value}))} style={inputStyle}>{inventoryItems.map(i => <option key={i}>{i}</option>)}</select></label>
                <label style={labelStyle}>Quantity Used <input type="number" value={newUsage.qty || ""} onChange={e => setNewUsage(u => ({...u, qty: e.target.value}))} style={inputStyle} /></label>
                <label style={labelStyle}>Unit <select value={newUsage.unit} onChange={e => setNewUsage(u => ({...u, unit: e.target.value}))} style={inputStyle}>{["kg","bags","L","mL","pcs","lot"].map(u => <option key={u}>{u}</option>)}</select></label>
              </div>
              <div style={formRow}>
                <label style={labelStyle}>Area <select value={newUsage.area} onChange={e => setNewUsage(u => ({...u, area: e.target.value}))} style={inputStyle}><option value="">Select area...</option>{areaNames.map(a => <option key={a}>{a}</option>)}</select></label>
                <label style={labelStyle}>Task <select value={newUsage.task} onChange={e => setNewUsage(u => ({...u, task: e.target.value}))} style={inputStyle}><option value="">Select task...</option>{uniqueTaskNames.map(t => <option key={t}>{t}</option>)}</select></label>
                <label style={labelStyle}>Notes <input value={newUsage.notes} onChange={e => setNewUsage(u => ({...u, notes: e.target.value}))} placeholder="..." style={inputStyle} /></label>
                <div style={{ display:"flex", alignItems:"flex-end" }}>
                  <button onClick={addUsage} style={{ background:"#ef6c00", color:"white", border:"none", borderRadius:8, padding:"10px 24px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%" }}>Save Usage</button>
                </div>
              </div>
              {newUsage.item && stockMap[newUsage.item] && (
                <div style={{ fontSize:12, color:"#e65100", fontWeight:600, marginTop:4 }}>Available: {((stockMap[newUsage.item]?.purchased || 0) - (stockMap[newUsage.item]?.used || 0)).toLocaleString()} {stockMap[newUsage.item]?.unit}</div>
              )}
            </div>
          )}

          <div style={{ background:"white", borderRadius:14, boxShadow:"0 1px 4px rgba(0,0,0,.06)", overflowX:"auto" }}>
            {usages.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:"#bbb", fontSize:13 }}>No usage recorded yet.</div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead><tr style={{ background:"#fff3e0" }}>
                  {["Date","Item","Qty","Unit","Area","Task","Notes",""].map(h => (
                    <th key={h} style={{ padding:"10px 8px", textAlign:"left", fontWeight:700, color:"#ef6c00", borderBottom:"2px solid #ffcc80", fontSize:11 }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{[...usages].reverse().map(u => (
                  <tr key={u.id} style={{ borderBottom:"1px solid #f5f5f5" }}>
                    <td style={{ padding:"8px" }}>{fmtDate(u.date)}</td>
                    <td style={{ padding:"8px", fontWeight:700 }}>{u.item}</td>
                    <td style={{ padding:"8px" }}>{u.qty.toLocaleString()}</td>
                    <td style={{ padding:"8px" }}>{u.unit}</td>
                    <td style={{ padding:"8px" }}><Badge color="#1565c0" bg="#e3f2fd">{u.area}</Badge></td>
                    <td style={{ padding:"8px" }}>{u.task}</td>
                    <td style={{ padding:"8px", color:"#999" }}>{u.notes}</td>
                    <td style={{ padding:"8px" }}><button onClick={() => removeUsage(u.id)} style={{ background:"#ffcdd2", color:"#c62828", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>x</button></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* Photo Viewer Overlay */}
      {viewingPhoto && (
        <div onClick={() => setViewingPhoto(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.85)", zIndex:9999, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:20, cursor:"pointer" }}>
          <div style={{ color:"white", fontSize:14, fontWeight:700, marginBottom:12, textAlign:"center" }}>{viewingPhoto.label}</div>
          <img src={viewingPhoto.src} alt="Photo" style={{ maxWidth:"90vw", maxHeight:"75vh", borderRadius:12, objectFit:"contain", boxShadow:"0 4px 20px rgba(0,0,0,.5)" }} />
          <div style={{ color:"#aaa", fontSize:12, marginTop:12 }}>Tap anywhere to close</div>
        </div>
      )}
    </div>
  );
}

function usePersistedState(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = typeof localStorage !== 'undefined' ? localStorage.getItem(key) : null;
      if (raw != null) return JSON.parse(raw);
    } catch(e) {}
    return typeof initial === 'function' ? initial() : initial;
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }, [key, val]);
  return [val, setVal];
}

function wmoIcon(code) {
  if (code === 0) return '☀';
  if (code <= 3) return '⛅';
  if (code <= 48) return '☁';
  if (code <= 67) return '🌧';
  if (code <= 77) return '❄';
  if (code <= 82) return '🌧';
  if (code <= 99) return '⛈';
  return '☁';
}
function wmoText(code) {
  if (code === 0) return 'Clear';
  if (code <= 3) return 'Partly cloudy';
  if (code <= 48) return 'Cloudy / fog';
  if (code <= 57) return 'Drizzle';
  if (code <= 67) return 'Rain';
  if (code <= 77) return 'Snow';
  if (code <= 82) return 'Showers';
  if (code <= 99) return 'Thunderstorm';
  return 'Unknown';
}

function useWeather() {
  const [data, setData] = useState(null);
  const [status, setStatus] = useState('idle');
  const [updated, setUpdated] = useState(null);

  const load = useCallback(async (force = false) => {
    try {
      const cached = localStorage.getItem('abundance-farm-weather');
      if (cached && !force) {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.ts < 3600000) {
          setData(parsed.data); setUpdated(parsed.ts); setStatus('ok');
          return;
        }
      }
    } catch(e) {}
    setStatus('loading');
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${FARM_LAT}&longitude=${FARM_LON}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max&timezone=Asia/Manila&forecast_days=14`;
      const res = await fetch(url);
      const json = await res.json();
      setData(json); setUpdated(Date.now()); setStatus('ok');
      try { localStorage.setItem('abundance-farm-weather', JSON.stringify({ts: Date.now(), data: json})); } catch(e) {}
    } catch(err) {
      setStatus('error');
    }
  }, []);

  useEffect(() => { load(false); }, [load]);

  return { data, status, updated, reload: () => load(true) };
}

function findWindows(weatherData) {
  if (!weatherData || !weatherData.daily) return { dryStreaks: [], plantingDays: [], heavyRain: [] };
  const d = weatherData.daily;
  const dryStreaks = []; const plantingDays = []; const heavyRain = [];
  let streakStart = null, streakLen = 0;
  for (let i = 0; i < d.time.length; i++) {
    const rain = d.precipitation_sum[i];
    const date = new Date(d.time[i]);
    const label = date.toLocaleDateString('en-PH', {month:'short', day:'numeric'});
    if (rain < 5) { if (streakStart === null) streakStart = i; streakLen++; }
    else {
      if (streakLen >= 3) dryStreaks.push({
        start: new Date(d.time[streakStart]).toLocaleDateString('en-PH', {month:'short', day:'numeric'}),
        end: new Date(d.time[streakStart + streakLen - 1]).toLocaleDateString('en-PH', {month:'short', day:'numeric'}),
        days: streakLen
      });
      streakStart = null; streakLen = 0;
    }
    if (rain < 5 && i + 1 < d.time.length) {
      const next1 = d.precipitation_sum[i + 1];
      const next2 = i + 2 < d.time.length ? d.precipitation_sum[i + 2] : 0;
      if ((next1 >= 2 && next1 <= 25) || (next2 >= 2 && next2 <= 25)) plantingDays.push(label);
    }
    if (rain >= 30) heavyRain.push(label);
  }
  if (streakLen >= 3) dryStreaks.push({
    start: new Date(d.time[streakStart]).toLocaleDateString('en-PH', {month:'short', day:'numeric'}),
    end: new Date(d.time[streakStart + streakLen - 1]).toLocaleDateString('en-PH', {month:'short', day:'numeric'}),
    days: streakLen
  });
  return { dryStreaks: dryStreaks.slice(0,3), plantingDays: plantingDays.slice(0,5), heavyRain: heavyRain.slice(0,5) };
}

function analyzePlantingWindow(weatherData, monthIdx) {
  if (!weatherData) return null;
  const isCornPlantingSeason = monthIdx === 10 || monthIdx === 11 || monthIdx === 3 || monthIdx === 4;
  if (!isCornPlantingSeason) return null;
  const w = findWindows(weatherData);
  if (w.plantingDays.length > 0) return { urgent: true, title: 'Corn planting window detected', message: `Best days: ${w.plantingDays.slice(0,3).join(', ')}. Plant before forecast rain for ideal germination.` };
  if (w.dryStreaks.length > 0) return { urgent: false, title: 'Land prep window', message: `Dry stretch: ${w.dryStreaks[0].start}–${w.dryStreaks[0].end} (${w.dryStreaks[0].days} days). Good for plowing.` };
  return { urgent: false, title: 'No clear corn window yet', message: 'Heavy rain or no dry stretches in 14-day forecast. Hold corn land prep.' };
}

function parsePrice(str) {
  if (!str) return null;
  str = String(str).trim();
  if (!str) return null;
  const m = str.match(/^(\d+\.?\d*)\s*(?:-|–|to)\s*(\d+\.?\d*)$/i);
  if (m) {
    const a = parseFloat(m[1]); const b = parseFloat(m[2]);
    if (isNaN(a) || isNaN(b)) return null;
    return (a + b) / 2;
  }
  const num = parseFloat(str);
  return isNaN(num) ? null : num;
}

function PricesView({ monthIdx }) {
  const [priceHistory, setPriceHistory] = usePersistedState('abundance-farm-prices-v2', []);
  const [entry, setEntry] = useState({ date: new Date().toISOString().split('T')[0], palayFreshLow:'', palayFreshHigh:'', palayDryLow:'', palayDryHigh:'', cornFreshLow:'', cornFreshHigh:'', cornDryLow:'', cornDryHigh:'' });
  const [calc, setCalc] = useState({ qty:'', price:'', cost:'' });

  const pairAvg = (lo, hi) => {
    const a = parseFloat(lo), b = parseFloat(hi);
    const aok = !isNaN(a), bok = !isNaN(b);
    if (!aok && !bok) return null;
    if (aok && !bok) return a;
    if (!aok && bok) return b;
    return (a + b) / 2;
  };

  const logPrice = () => {
    const pf = pairAvg(entry.palayFreshLow, entry.palayFreshHigh);
    const pd = pairAvg(entry.palayDryLow, entry.palayDryHigh);
    const cf = pairAvg(entry.cornFreshLow, entry.cornFreshHigh);
    const cd = pairAvg(entry.cornDryLow, entry.cornDryHigh);
    if (pf == null && pd == null && cf == null && cd == null) { alert('Enter at least one price'); return; }
    if (!entry.date) { alert('Select a date'); return; }
    const date = new Date(entry.date + 'T12:00:00').toISOString();
    setPriceHistory(prev => {
      const next = [...prev, { date, palayFresh: pf, palayDry: pd, cornFresh: cf, cornDry: cd }];
      return next.length > 500 ? next.slice(-500) : next;
    });
    setEntry({ date: new Date().toISOString().split('T')[0], palayFreshLow:'', palayFreshHigh:'', palayDryLow:'', palayDryHigh:'', cornFreshLow:'', cornFreshHigh:'', cornDryLow:'', cornDryHigh:'' });
  };

  const deletePrice = (idx) => {
    if (!confirm('Delete this entry?')) return;
    const sorted = [...priceHistory].sort((a,b) => new Date(b.date) - new Date(a.date));
    const target = sorted[idx];
    setPriceHistory(prev => prev.filter(p => !(p.date === target.date && JSON.stringify(p) === JSON.stringify(target))));
  };

  const sorted = [...priceHistory].sort((a,b) => new Date(b.date) - new Date(a.date));
  const pf = sorted.filter(p => p.palayFresh != null).map(p => p.palayFresh);
  const pd = sorted.filter(p => p.palayDry != null).map(p => p.palayDry);
  const cf = sorted.filter(p => p.cornFresh != null).map(p => p.cornFresh);
  const cd = sorted.filter(p => p.cornDry != null).map(p => p.cornDry);
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
  const fmtP = (n) => n == null ? '' : (n % 1 === 0 ? `₱${n}` : `₱${n.toFixed(2)}`);

  const qty = parseFloat(calc.qty) || 0;
  const pr = parseFloat(calc.price) || 0;
  const co = parseFloat(calc.cost) || 0;
  const revenue = qty * pr;
  const totalCost = qty * co;
  const profit = revenue - totalCost;
  const margin = revenue > 0 ? (profit / revenue * 100) : 0;

function App() {
  const mobile = useIsMobile();
  const [tab, setTab] = usePersistedState("rfops-tab", "today");
  // Operations state — all persisted to localStorage
  const [areas, setAreas] = usePersistedState("rfops-areas", DEFAULT_AREAS);
  const [taskMeta, setTaskMeta] = usePersistedState("rfops-taskMeta", {});
  const [purchases, setPurchases] = usePersistedState("rfops-purchases", []);
  const [usages, setUsages] = usePersistedState("rfops-usages", []);
  const [breeds, setBreeds] = usePersistedState("rfops-breeds", DEFAULT_BREEDS);
  const [customTasks, setCustomTasks] = usePersistedState("rfops-customTasks", {});
  const [inventoryItems, setInventoryItems] = usePersistedState("rfops-inventoryItems", DEFAULT_INVENTORY_ITEMS);
  const [harvestLogs, setHarvestLogs] = usePersistedState("rfops-harvestLogs", []);
  const [laborLogs, setLaborLogs] = usePersistedState("rfops-laborLogs", []);
  const [cashAdvances, setCashAdvances] = usePersistedState("rfops-cashAdvances", []);
  const [equipment, setEquipment] = usePersistedState("rfops-equipment", []);
  const [maintenanceLogs, setMaintenanceLogs] = usePersistedState("rfops-maintenanceLogs", []);
  const [fuelLogs, setFuelLogs] = usePersistedState("rfops-fuelLogs", []);
  const [toolInventory, setToolInventory] = usePersistedState("rfops-toolInventory", []);
  const [electricityBills, setElectricityBills] = usePersistedState("rfops-electricityBills", []);

  // Abundance Farm state
  const [taskState, setTaskState] = usePersistedState("abundance-farm-tasks", {});
  const weather = useWeather();
  const monthIdx = new Date().getMonth();
  const toggleAbTask = (mi, ti) => setTaskState(s => ({ ...s, [`${mi}-${ti}`]: !s[`${mi}-${ti}`] }));
  const resetAbMonth = (mi) => {
    if (!confirm('Clear all checkboxes for this month?')) return;
    setTaskState(s => {
      const next = { ...s };
      (MONTHLY_TASKS[mi]||[]).forEach((_, i) => { delete next[`${mi}-${i}`]; });
      return next;
    });
  };

  // Compute schedules for all named areas
  const schedules = useMemo(() => {
    const out = {};
    areas.forEach(a => {
      if (a.name && a.transplantDate && a.maturity && a.ha) {
        out[a.id] = computeSchedule(a.ha, a.transplantDate, a.maturity);
      }
    });
    return out;
  }, [areas]);

  // Flatten all tasks across areas (protocol + custom)
  const allTasks = useMemo(() => {
    const tasks = [];
    areas.forEach(a => {
      const sched = schedules[a.id];
      if (sched) {
        sched.tasks.forEach(t => {
          const meta = taskMeta[`${a.name}-${t.id}`] || {};
          tasks.push({ ...t, area: a.name, status: meta.status || "Not Started", ...meta });
        });
      }
      // Include custom tasks for this area
      const ct = customTasks[a.name] || [];
      ct.forEach(t => {
        const meta = taskMeta[`${a.name}-${t.id}`] || {};
        tasks.push({ ...t, area: a.name, status: meta.status || t.status || "Not Started", ...meta });
      });
    });
    return tasks;
  }, [areas, schedules, taskMeta, customTasks]);

  // Inventory monitoring: compute stock on-hand and compare to upcoming task needs
  const inventoryAlerts = useMemo(() => {
    // 1. Compute current on-hand per item (from purchases - usages)
    const onHand = {};
    purchases.forEach(p => {
      if (!onHand[p.item]) onHand[p.item] = 0;
      onHand[p.item] += p.qty;
    });
    usages.forEach(u => {
      if (!onHand[u.item]) onHand[u.item] = 0;
      onHand[u.item] -= u.qty;
    });

    // 2. Compute total needed per item across all areas (full protocol)
    const totalNeeded = {};
    areas.forEach(a => {
      const sched = schedules[a.id];
      if (!sched) return;
      const q = sched.quantities;
      const add = (item, qty) => { if (!totalNeeded[item]) totalNeeded[item] = 0; totalNeeded[item] += qty; };
      add("14-14-14", q.basalSeedbedKg + (parseFloat(q.basalFieldBags) || 0) * 50);
      add("46-0-0", q.urea_N1K1 + q.urea_N2K2 + q.urea_N3K3);
      add("0-0-60", q.mop_N1K1 + q.mop_N2K2 + q.mop_N3K3 + q.mop_K);
      add("21-0-0", q.fert2100Kg);
      add("FAA", q.totalFAA_L / 1000); // convert mL to L
    });

    // 3. Compute already-applied per item (from completed tasks)
    const applied = {};
    allTasks.filter(t => t.status === "Completed" && t.inputs).forEach(t => {
      t.inputs.forEach(inp => {
        if (!inp.amount) return;
        const num = parseFloat(inp.amount) || 0;
        const amt = (inp.amount || "").toLowerCase();
        let qty = num;
        if (amt.includes("bag")) qty = num * 50;
        if (inp.item === "FAA" && !amt.includes("l")) qty = num / 1000;
        if (!applied[inp.item]) applied[inp.item] = 0;
        applied[inp.item] += qty;
      });
    });

    // 4. Remaining needed = total - applied
    const remaining = {};
    Object.keys(totalNeeded).forEach(item => {
      remaining[item] = Math.max(0, (totalNeeded[item] || 0) - (applied[item] || 0));
    });

    // 5. Upcoming tasks with inputs (next 14 days)
    const twoWeeks = addDays(today, 14);
    const upcomingNeeds = [];
    allTasks.filter(t =>
      t.status !== "Completed" && t.status !== "Cancelled" &&
      t.inputs && t.inputs.length > 0 &&
      t.planStart >= today && t.planStart <= twoWeeks
    ).sort((a,b) => a.planStart.localeCompare(b.planStart)).forEach(t => {
      t.inputs.forEach(inp => {
        if (!inp.amount) return;
        const num = parseFloat(inp.amount) || 0;
        const amt = (inp.amount || "").toLowerCase();
        let qty = num;
        let unit = "kg";
        if (amt.includes("bag")) { qty = num * 50; unit = "kg"; }
        if (inp.item === "FAA") { unit = "L"; qty = amt.includes("l") ? num : num / 1000; }
        const stock = onHand[inp.item] || 0;
        const sufficient = stock >= qty;
        upcomingNeeds.push({
          area: t.area, taskName: t.activity, date: t.planStart,
          item: inp.item, qty, unit, stock, sufficient,
          deficit: sufficient ? 0 : qty - stock,
        });
      });
    });

    // 6. Items where remaining > on-hand (overall shortage)
    const shortages = [];
    Object.keys(remaining).forEach(item => {
      const stock = onHand[item] || 0;
      const need = remaining[item];
      if (need > 0 && stock < need) {
        shortages.push({
          item, stock, needed: need, deficit: need - stock,
          unit: item === "FAA" ? "L" : "kg",
        });
      }
    });

    return { onHand, totalNeeded, applied, remaining, upcomingNeeds, shortages };
  }, [allTasks, areas, schedules, purchases, usages]);

  const riskLevel = RISK_LEVELS[monthIdx];
  const todayDate = new Date().toLocaleDateString('en-PH', { weekday:'long', month:'long', day:'numeric' });

  return (
    <div style={{ minHeight:"100vh", background: T.bg, color: T.ink, fontFamily: T.fontBody, maxWidth:"100vw", overflowX:"hidden", boxSizing:"border-box", paddingBottom: mobile ? 80 : 0 }}>
      <AbundanceGlobalStyles />

      {/* Header — Abundance Farm brand */}
      <header style={{
        position:"sticky", top:0, zIndex:50,
        padding: mobile ? "14px 16px 12px" : "18px 28px 14px",
        background: T.bg, borderBottom:`1px solid ${T.line}`
      }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap: 12 }}>
          <div>
            <div style={{ fontFamily: T.fontDisplay, fontWeight: 600, fontSize: mobile ? 20 : 24, letterSpacing:"-0.01em", color: T.ink, lineHeight: 1 }}>
              Abundance <span style={{ color: T.corn, fontStyle:"italic" }}>Farm</span>
            </div>
            <div style={{ fontFamily: T.fontBody, fontSize: 10, color: T.inkMute, letterSpacing: "0.12em", textTransform:"uppercase", marginTop: 4 }}>
              MAK-CT · Rice & Corn Operations · {todayDate}
            </div>
          </div>
          <RiskPill level={riskLevel} />
        </div>
      </header>

      {/* Desktop: Top nav — horizontally scrollable */}
      {!mobile && (
        <nav className="ab-scroll" style={{ display:"flex", background: T.bgElev, borderBottom:`1px solid ${T.line}`, padding:"0 12px", overflowX:"auto", gap: 2 }}>
          {TABS.map(t => {
            const badge = t.key === "inventory" ? inventoryAlerts.shortages.length : (t.key === "dashboard" ? inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length : 0);
            const active = tab === t.key;
            const accent = t.group === "abundance" ? T.rice : T.corn;
            return (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                padding:"14px 16px", background:"none", border:"none",
                borderBottom: active ? `3px solid ${accent}` : "3px solid transparent",
                color: active ? accent : T.inkSoft,
                fontFamily: T.fontBody, fontWeight: active ? 700 : 500, fontSize: 13,
                cursor:"pointer", display:"flex", alignItems:"center", gap: 6,
                whiteSpace:"nowrap", position:"relative", letterSpacing:"0.02em"
              }}>
                <span style={{ fontSize: 15 }}>{t.icon}</span>{t.label}
                {badge > 0 && <span style={{ background: T.danger, color:"white", borderRadius: 10, padding:"1px 6px", fontSize: 9, fontWeight: 700, marginLeft: 4, lineHeight: "14px" }}>{badge}</span>}
              </button>
            );
          })}
        </nav>
      )}

      {/* Mobile: Horizontal-scrollable bottom nav */}
      {mobile && (
        <nav className="ab-scroll" style={{
          position:"fixed", bottom: 0, left: 0, right: 0, zIndex: 999,
          display:"flex", overflowX:"auto",
          background: T.bgCard, borderTop: `1px solid ${T.line}`,
          boxShadow: "0 -2px 10px rgba(31,45,30,0.06)",
          padding: "6px 8px calc(6px + env(safe-area-inset-bottom, 0px))",
          gap: 2
        }}>
          {TABS.map(t => {
            const active = tab === t.key;
            const badge = t.key === "inventory" ? inventoryAlerts.shortages.length : (t.key === "dashboard" ? inventoryAlerts.upcomingNeeds.filter(n => !n.sufficient).length : 0);
            const accent = t.group === "abundance" ? T.rice : T.corn;
            return (
              <button key={t.key} onClick={() => { setTab(t.key); window.scrollTo(0,0); }} style={{
                flex:"0 0 auto", minWidth: 68,
                display:"flex", flexDirection:"column", alignItems:"center", gap: 2,
                background: active ? T.bgElev : "none", border: "none", padding: "8px 10px",
                borderRadius: T.radiusSm, position: "relative",
                color: active ? accent : T.inkMute, cursor:"pointer",
                fontFamily: T.fontBody
              }}>
                <span style={{ fontSize: 18, lineHeight: 1, position:"relative" }}>
                  {t.icon}
                  {badge > 0 && <span style={{ position:"absolute", top:-4, right:-8, background: T.danger, color:"white", borderRadius: 8, padding:"0 4px", fontSize: 8, fontWeight: 700, lineHeight: "14px", minWidth: 14, textAlign:"center" }}>{badge}</span>}
                </span>
                <span style={{ fontSize: 9, fontWeight: active ? 700 : 500, letterSpacing: "0.05em" }}>{t.label}</span>
                {active && <div style={{ width: 20, height: 2, borderRadius: 1, background: accent, marginTop: 1 }} />}
              </button>
            );
          })}
        </nav>
      )}

      <main style={{ maxWidth: 960, margin:"0 auto", padding: mobile ? "8px 16px 32px" : "12px 24px 40px", boxSizing:"border-box", overflowX:"hidden" }}>
        {tab === "today" && <TodayView monthIdx={monthIdx} weather={weather} taskState={taskState} toggleTask={toggleAbTask} areas={areas} inventoryAlerts={inventoryAlerts} allTasks={allTasks} />}
        {tab === "calendar" && <CalendarView monthIdx={monthIdx} />}
        {tab === "dashboard" && <Dashboard tasks={allTasks} areas={areas} schedules={schedules} purchases={purchases} harvestLogs={harvestLogs} laborLogs={laborLogs} inventoryAlerts={inventoryAlerts} />}
        {tab === "areas" && <AreasManager areas={areas} setAreas={setAreas} schedules={schedules} breeds={breeds} taskMeta={taskMeta} setTaskMeta={setTaskMeta} customTasks={customTasks} setCustomTasks={setCustomTasks} harvestLogs={harvestLogs} setHarvestLogs={setHarvestLogs} laborLogs={laborLogs} setLaborLogs={setLaborLogs} purchases={purchases} cashAdvances={cashAdvances} setCashAdvances={setCashAdvances} equipment={equipment} fuelLogs={fuelLogs} setFuelLogs={setFuelLogs} />}
        {tab === "crops" && <CropsView />}
        {tab === "prices" && <PricesView monthIdx={monthIdx} />}
        {tab === "weather" && <WeatherView weather={weather} monthIdx={monthIdx} />}
        {tab === "tasks" && <TasksView monthIdx={monthIdx} taskState={taskState} toggleTask={toggleAbTask} resetMonth={resetAbMonth} />}
        {tab === "accounting" && <AccountingTab areas={areas} schedules={schedules} allTasks={allTasks} purchases={purchases} usages={usages} harvestLogs={harvestLogs} laborLogs={laborLogs} cashAdvances={cashAdvances} maintenanceLogs={maintenanceLogs} fuelLogs={fuelLogs} electricityBills={electricityBills} setElectricityBills={setElectricityBills} />}
        {tab === "equipment" && <EquipmentTab equipment={equipment} setEquipment={setEquipment} maintenanceLogs={maintenanceLogs} setMaintenanceLogs={setMaintenanceLogs} fuelLogs={fuelLogs} setFuelLogs={setFuelLogs} toolInventory={toolInventory} setToolInventory={setToolInventory} />}
        {tab === "inventory" && <InventoryTracker purchases={purchases} setPurchases={setPurchases} usages={usages} setUsages={setUsages} areas={areas} allTasks={allTasks} inventoryItems={inventoryItems} setInventoryItems={setInventoryItems} />}
        {tab === "breeds" && <BreedManager breeds={breeds} setBreeds={setBreeds} />}
      </main>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
setTimeout(() => { const s = document.getElementById('splash'); if (s) s.classList.add('hide'); }, 50);

</script>

</body>
</html>
